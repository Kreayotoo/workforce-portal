<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreayotoo Solutions Portal</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a4e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kreayotoo">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a1a4e;--navy2:#2d2d8f;--navy3:#12123a;--bg:#f0f2f5;--white:#fff;--border:#e2e5ea;--text:#111;--muted:#6b7280;--green-bg:#dcfce7;--green-txt:#166534;--red-bg:#fee2e2;--red-txt:#991b1b;--amber-bg:#fef3c7;--amber-txt:#92400e;--blue-bg:#eff6ff;--blue-txt:#1e40af;--purple-bg:#f5f3ff;--purple-txt:#4c1d95}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:17px;line-height:1.5}
.hidden{display:none!important}
input,select,textarea,button{font-family:inherit;font-size:16px}
input[type=text],input[type=email],input[type=date],input[type=number],input[type=time],input[type=password],select,textarea{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:7px;background:var(--white);color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--navy2);box-shadow:0 0 0 3px rgba(45,45,143,.1)}
textarea{resize:vertical}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:14px;color:var(--muted);text-align:left;padding:12px 14px;border-bottom:1px solid var(--border);font-weight:700;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td{padding:14px 14px;border-bottom:1px solid #f3f4f6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600}
.bg{background:var(--green-bg);color:var(--green-txt)}
.br{background:var(--red-bg);color:var(--red-txt)}
.ba{background:var(--amber-bg);color:var(--amber-txt)}
.bb{background:var(--blue-bg);color:var(--blue-txt)}
.bp{background:var(--purple-bg);color:var(--purple-txt)}
.bx{background:#f1f5f9;color:#475569}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-hd h3{font-size:18px;font-weight:700}
.stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1rem}
.stat{background:#f8f9fb;border-radius:10px;padding:1.15rem}
.stat-lbl{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;font-weight:600}
.stat-val{font-size:30px;font-weight:700;color:var(--text);line-height:1.1}
.stat-sub{font-size:13px;color:var(--muted);margin-top:4px}
.btn{padding:10px 18px;border-radius:7px;cursor:pointer;font-weight:600;border:none;font-size:15px;transition:background .15s}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy2)}
.btn-sec{background:var(--white);color:var(--text);border:1px solid var(--border)}.btn-sec:hover{background:#f9fafb}
.btn-link{background:none;border:none;color:var(--navy2);cursor:pointer;font-size:14px;font-weight:600;padding:0}
.btn-icon{background:none;border:none;cursor:pointer;padding:5px 7px;border-radius:4px;font-size:16px}.btn-icon:hover{background:#f1f5f9}
.btn-del:hover{background:#fee2e2}
.btn-g{background:var(--green-bg);color:var(--green-txt);border:1px solid #bbf7d0;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-r{background:var(--red-bg);color:var(--red-txt);border:1px solid #fecaca;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.fld{margin-bottom:1rem}
.fld label{display:block;font-size:14px;color:var(--muted);margin-bottom:5px;font-weight:600}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.pg-title{font-size:26px;font-weight:700;line-height:1.2}
.pg-sub{font-size:14px;color:var(--muted);margin-top:4px}
.search-bar{display:flex;gap:10px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:12px}
.notif-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f3f4f6;align-items:flex-start}
.notif-row:last-child{border-bottom:none}
.ni{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ni-info{background:#eff6ff}.ni-warning{background:#fffbeb}.ni-success{background:#f0fdf4}.ni-danger{background:#fee2e2}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--white);border-radius:14px;padding:1.75rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-hd h3{font-size:20px;font-weight:700}
.modal-ftr{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.xbtn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);line-height:1}
.topbar{background:var(--navy);color:#fff;padding:0 1rem;height:62px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.tb-logo{font-size:18px;font-weight:800;letter-spacing:.07em}
.tb-logo span{color:#60a5fa}
.sidebar{width:72px;background:var(--navy3);display:flex;flex-direction:column;align-items:flex-start;padding:12px 0;gap:2px;min-height:calc(100vh - 62px);position:sticky;top:62px;height:calc(100vh - 62px);transition:width .25s ease;overflow:hidden;overflow-y:auto;z-index:50;flex-shrink:0}
.sidebar:hover{width:240px}
.si{width:100%;height:56px;border-radius:0;display:flex;align-items:center;cursor:pointer;color:rgba(255,255,255,.6);transition:.15s;position:relative;padding:0 14px;gap:14px;white-space:nowrap}
.si:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.95)}
.si.act{background:rgba(255,255,255,.15);color:#fff;border-left:3px solid #60a5fa}
.si-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.si-label{font-size:15px;font-weight:600;opacity:0;transition:opacity .2s ease;pointer-events:none}
.sidebar:hover .si-label{opacity:1}
.si-dot{position:absolute;top:10px;left:38px;width:10px;height:10px;border-radius:50%;background:#ef4444;border:2px solid var(--navy3)}
.main{flex:1;padding:1.25rem;min-width:0;overflow-x:hidden}
.app{display:flex;flex-direction:column;min-height:100vh}
.body-row{display:flex;flex:1;min-height:0}
.prog-bar{background:#e5e7eb;border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:6px;border-radius:4px}
.alert{padding:9px 13px;border-radius:7px;font-size:14px;margin-bottom:10px}
.alert-e{background:var(--red-bg);color:var(--red-txt)}
.alert-s{background:var(--green-bg);color:var(--green-txt)}
.muted{font-size:12px;color:var(--muted)}
.modules-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:12px;margin-bottom:1rem}
.mod-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.1rem .6rem;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .2s ease;position:relative}
.mod-card:hover{border-color:var(--navy2);transform:scale(1.08);box-shadow:0 8px 24px rgba(45,45,143,.25);background:#eef0ff;z-index:10}
.mod-card:hover .mod-ic{background:var(--navy);color:#fff;font-size:30px;width:60px;height:60px}
.mod-card:hover .mod-lb{color:var(--navy2);font-weight:700;font-size:14px}
.mod-card:active{transform:scale(1.02)}
.mod-ic{width:56px;height:56px;border-radius:12px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:26px;transition:all .2s ease}
.mod-lb{font-size:13px;font-weight:600;color:#334155;text-align:center;transition:all .2s ease;line-height:1.2}
.mod-dot{position:absolute;top:8px;right:8px;width:10px;height:10px;border-radius:50%;background:#ef4444;box-shadow:0 0 0 2px #fff}

/* LOGIN */
.login-wrap{display:flex;min-height:100vh}
.login-left{flex:1;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;color:#fff}
.login-logo{width:64px;height:64px;background:rgba(255,255,255,.15);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;border:1.5px solid rgba(255,255,255,.3);margin-bottom:1rem}
.login-left h1{font-size:20px;font-weight:700;margin-bottom:.3rem}
.login-left p{font-size:12px;opacity:.6;text-align:center;max-width:180px;margin-bottom:1.5rem}
.feat{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.8;margin-bottom:7px}
.fdot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}
.login-right{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--white)}
.login-card{width:100%;max-width:320px}
.login-card h2{font-size:20px;font-weight:700;margin-bottom:.25rem}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem}
.login-toggle{font-size:12px;color:var(--muted);text-align:center;margin-top:12px}
.login-toggle span{color:var(--navy2);cursor:pointer;font-weight:600}
.geo-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.geo-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.geo-status{font-size:12px;color:#0369a1;font-weight:600}
.geo-sub{font-size:11px;color:#0284c7;margin-top:2px}
.geo-err{background:#fef2f2;border-color:#fecaca}.geo-err .geo-status{color:#b91c1c}.geo-err .geo-sub{color:#dc2626}
.geo-ok{background:#f0fdf4;border-color:#bbf7d0}.geo-ok .geo-status{color:#166534}.geo-ok .geo-sub{color:#15803d}
.geo-warn{background:#fffbeb;border-color:#fde68a}.geo-warn .geo-status{color:#92400e}.geo-warn .geo-sub{color:#b45309}
.map-frame{width:100%;height:260px;border-radius:10px;border:1px solid var(--border);background:#f1f5f9;overflow:hidden;position:relative}
.map-pin{position:absolute;transform:translate(-50%,-100%);font-size:24px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.05) 1px,transparent 1px);background-size:40px 40px}
.loc-card{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f3f4f6;align-items:flex-start}
.loc-card:last-child{border-bottom:none}
/* FACE RECOGNITION */
.face-box{background:#0f172a;border-radius:10px;padding:14px;margin-bottom:12px;color:#fff}
.face-box-hd{font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cam-wrap{position:relative;width:100%;aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:#000}
.cam-wrap video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.cam-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
.face-status{margin-top:10px;text-align:center;font-size:12px;min-height:20px}
.face-status.scanning{color:#60a5fa;animation:pulse 1.5s infinite}
.face-status.success{color:#4ade80;font-weight:700;font-size:14px}
.face-status.fail{color:#f87171}
.face-status.idle{color:#94a3b8}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.face-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:130px;height:130px;border-radius:50%;border:2px dashed rgba(96,165,250,.6);pointer-events:none}
.face-ring.detected{border-color:#4ade80;border-style:solid;box-shadow:0 0 0 4px rgba(74,222,128,.15)}
.face-ring.matched{border-color:#4ade80;border-style:solid;border-width:3px}
.face-ring.fail{border-color:#f87171;border-style:solid}
.face-tabs{display:flex;gap:6px;margin-bottom:12px}
.face-tab{flex:1;padding:7px;border:1px solid rgba(255,255,255,.15);border-radius:7px;font-size:12px;cursor:pointer;text-align:center;background:rgba(255,255,255,.05);color:#94a3b8;font-weight:600;transition:.15s}
.face-tab.active{background:rgba(96,165,250,.2);border-color:#60a5fa;color:#60a5fa}
.enroll-thumb{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid #334155}
.login-methods{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.method-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--white);transition:.15s;font-size:13px;font-weight:600;width:100%;text-align:left}
.method-btn:hover{border-color:var(--navy2);background:#f8f9ff}
.method-btn.active{border-color:var(--navy2);background:#eff6ff;color:var(--navy2)}
.method-ic{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.reg-wrap{display:flex;min-height:100vh}
.reg-right{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;background:#f8fafc;overflow-y:auto}
.reg-card{width:100%;max-width:420px;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.75rem}
.steps-bar{display:flex;gap:0;margin-bottom:1.5rem}
.step-dot{flex:1;height:4px;background:#e5e7eb;border-radius:2px;transition:.3s}
.step-dot.done{background:#0f766e}
.step-dot.active{background:#0f766e;opacity:.5}

/* ── RESPONSIVE ───────────────────────────────────────────── */
.show-on-mobile{display:none}
.hide-on-mobile{display:block}
@media (max-width:768px){
  .show-on-mobile{display:block!important}
  .hide-on-mobile{display:none!important}
  /* Login pages scroll naturally */
  .login-wrap{min-height:100vh!important}
  /* Lock app to viewport ONLY when logged in (app structure present) */
  .app{height:100dvh!important;min-height:0!important;max-height:100dvh!important;display:flex!important;flex-direction:column!important;overflow:hidden!important}
  .app .body-row{flex:1!important;min-height:0!important;overflow:hidden!important;display:flex!important;flex-direction:column!important;position:relative!important}
  /* Topbar stays at top, doesn't scroll */
  .app .topbar{position:sticky!important;top:0!important;flex-shrink:0!important;z-index:100!important}
  /* Main content area handles ALL scrolling */
  .app .main{flex:1!important;overflow-y:auto!important;-webkit-overflow-scrolling:touch!important;min-height:0!important}
  /* Login */
  .login-wrap{flex-direction:column}
  .login-left{min-height:auto!important;padding:1.5rem!important;flex:none!important}
  .login-left>div{max-width:100%!important}
  .login-left>div>div:first-child{margin-bottom:1rem!important}
  .login-left>div>div:nth-child(2){display:none}
  .login-left>div>div:last-child{display:none}
  .login-right{min-height:auto!important;padding:1.25rem!important;flex:none!important}
  .login-card{max-width:100%!important;padding:1.25rem!important}
  /* Registration */
  .reg-wrap{flex-direction:column}
  .login-left .login-logo{width:52px!important;height:52px!important}
  /* Topbar */
  .topbar{gap:6px;padding:0 .6rem;height:52px;flex-wrap:nowrap}
  .tb-logo{font-size:15px;flex-shrink:0}
  .tb-logo img{height:28px!important;max-width:110px!important}
  .topbar span{display:none}
  /* Hide non-essential topbar elements on mobile */
  .tb-mobile-hide{display:none!important}
  .topbar button{font-size:11px!important;padding:4px 7px!important}
  .topbar .btn-sec{font-size:11px!important;padding:5px 9px!important}
  /* Sidebar → bottom nav on mobile */
  .sidebar{
    width:100%!important;
    min-height:60px!important;
    height:calc(60px + env(safe-area-inset-bottom,0))!important;
    max-height:calc(60px + env(safe-area-inset-bottom,0))!important;
    flex-direction:row!important;
    justify-content:space-around!important;
    padding:0!important;
    padding-bottom:env(safe-area-inset-bottom,0)!important;
    position:fixed!important;
    bottom:0!important;
    top:auto!important;
    left:0!important;
    right:0!important;
    z-index:9999!important;
    gap:0!important;
    overflow:hidden!important;
    box-shadow:0 -2px 12px rgba(0,0,0,.15)!important;
    transform:none!important;
  }
  .sidebar[style*="065f46"]{
    background:#065f46!important;
    position:fixed!important;
    bottom:0!important;
    top:auto!important;
    left:0!important;
    right:0!important;
    z-index:9999!important;
  }
  .sidebar:hover{width:100%!important}
  .si{width:auto!important;flex:1!important;flex-direction:column!important;height:60px!important;padding:0!important;justify-content:center!important;border-left:none!important;border-top:3px solid transparent}
  .si.act{border-left:none!important;border-top:3px solid #60a5fa!important}
  .si-icon{font-size:24px!important;width:32px!important;height:32px!important}
  .si-label{display:none!important}
  /* Main content - add bottom padding for fixed nav */
  .main{padding:1rem 1rem 80px 1rem!important}
  .body-row{flex-direction:column}
  /* Stats grid */
  .stat-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important}
  .stat-val{font-size:24px!important}
  /* Modules grid */
  .modules-grid{grid-template-columns:repeat(4,minmax(0,1fr))!important}
  .mod-card{padding:.9rem .5rem!important;gap:8px!important}
  .mod-ic{width:52px!important;height:52px!important;font-size:24px!important}
  .mod-lb{font-size:13px!important}
  .mod-card:hover{transform:scale(1.05)!important}
  /* Two col layouts → single */
  .two-col{grid-template-columns:1fr!important}
  .frow{grid-template-columns:1fr!important}
  /* Page header */
  .page-hd{flex-wrap:wrap;gap:8px}
  .pg-title{font-size:22px!important}
  .page-hd .btn{font-size:13px;padding:7px 12px}
  /* Tables - horizontal scroll, bigger text */
  .card{overflow-x:auto}
  table{min-width:480px}
  td{font-size:14px!important;padding:12px 10px!important}
  th{font-size:13px!important;padding:10px!important}
  /* Modal */
  .modal{padding:1.25rem;max-height:95vh}
  .modal-bg{padding:.5rem;align-items:flex-end}
  .modal{border-radius:14px 14px 0 0;max-width:100%!important}
  /* Search bar */
  .search-bar input,.search-bar select{width:100%!important;max-width:100%!important}
  /* Employee portal sidebar */
  .sidebar[style*="065f46"]{background:#065f46!important}
}

@media (max-width:480px){
  .stat-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important}
  .modules-grid{grid-template-columns:repeat(3,minmax(0,1fr))!important}
  .pg-title{font-size:18px!important}
  .topbar{height:48px}
  .main{padding:.9rem .9rem 72px .9rem!important}
  .card{padding:1rem}
  /* Settings grid → single column */
  div[style*="grid-template-columns:1fr 1fr"]{display:block!important}
  div[style*="grid-template-columns:1fr 1fr"]>*{margin-bottom:1rem}
}

@media (min-width:769px){
  /* Desktop enhancements */
  .login-wrap{flex-direction:row}
  .sidebar{position:sticky;top:50px;height:calc(100vh - 50px)}
  .stat-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .modules-grid{grid-template-columns:repeat(8,minmax(0,1fr))}
  .two-col{grid-template-columns:2fr 1fr}
  .frow{grid-template-columns:1fr 1fr}
}

@media (min-width:1200px){
  .main{padding:1.5rem}
  .stat-val{font-size:26px}
  .pg-title{font-size:20px}
}
</style>
</head>
<body>

<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const fmt = n => new Intl.NumberFormat('en-IN').format(Math.round(n||0));
const initials = name => (name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const todayStr = () => new Date().toISOString().split('T')[0];

// Time-of-day greeting
function greetingForTime(){
  const h = new Date().getHours();
  if(h >= 5 && h < 12) return 'Good morning';
  if(h >= 12 && h < 17) return 'Good afternoon';
  if(h >= 17 && h < 21) return 'Good evening';
  return 'Good night';
}

// Current time label (e.g., "4:47 PM")
function timeLabel(){
  return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}

// Live clock updater — refreshes any element with class="live-clock" every 30 seconds
// Also updates class="live-greeting" elements so greeting stays in sync as time flips
(function startLiveClock(){
  if(window._liveClockTimer) return;
  const update=()=>{
    document.querySelectorAll('.live-clock').forEach(el=>{
      el.textContent = timeLabel();
    });
    document.querySelectorAll('.live-greeting').forEach(el=>{
      // Preserve the name portion (after ", ") and update only the greeting
      const txt = el.textContent || '';
      const match = txt.match(/^(Good (morning|afternoon|evening|night))(,.*)$/);
      if(match){
        el.textContent = greetingForTime() + match[3];
      }
    });
  };
  window._liveClockTimer = setInterval(update, 30000); // every 30 seconds
})();

async function sendOTP(email, name){

function verifyOTP(email, enteredOtp){
  const rec = _otpStore[email];
  if(!rec) return { valid: false, msg: 'No OTP sent to this email. Please request again.' };
  if(Date.now() > rec.expiry){ delete _otpStore[email]; return { valid: false, msg: 'OTP expired. Please request a new one.' }; }
  if(rec.otp !== enteredOtp.trim()) return { valid: false, msg: 'Incorrect OTP. Please try again.' };
  rec.verified = true;
  return { valid: true };
}

// Generic upsert helper - handles duplicates gracefully
async function sbUpsert(table, payload, matchCol, matchVal){
  try{
    if(matchVal){
      // Try update first
      const r=await sb(table,'PATCH',payload,`?${matchCol}=eq.${encodeURIComponent(matchVal)}`);
      if(r!==null) return r;
    }
    // Fall back to insert with merge-duplicates
    const res=await fetch(`${SB_URL}/rest/v1/${table}`,{
      method:'POST',
      headers:{...SB_HDR,'Prefer':'return=representation,resolution=merge-duplicates'},
      body:JSON.stringify(payload)
    });
    if(!res.ok){console.error(`❌ SB upsert ${table}:`,await res.text());return null;}
    const t=await res.text();return t?JSON.parse(t):true;
  }catch(e){console.error(`❌ SB upsert ${table} error:`,e.message);return null;}
}

    status:(lv.status||'Pending TL').includes('TL')||(lv.status||'').includes('HR')?'Pending':(lv.status||'Pending'),
    company_id:cid
  };

  async function tryWrite(payload){
    if(lv._uuid){
      console.log('[sbSaveLeave] PATCHing existing row', lv._uuid);
      const res=await fetch(`${SB_URL}/rest/v1/leaves?id=eq.${lv._uuid}`,{method:'PATCH',headers:{...SB_HDR,'Prefer':'return=representation'},body:JSON.stringify(payload)});
      if(!res.ok){ const t=await res.text(); console.error('❌ SB leave PATCH:',res.status,t); return {ok:false,status:res.status,text:t}; }
      const t=await res.text(); console.log('[sbSaveLeave] PATCH ok'); return {ok:true,data:t?JSON.parse(t):true};
    }
    console.log('[sbSaveLeave] POSTing new row with payload:', payload);
    const res=await fetch(`${SB_URL}/rest/v1/leaves`,{method:'POST',headers:{...SB_HDR,'Prefer':'return=representation'},body:JSON.stringify(payload)});
    if(!res.ok){ const t=await res.text(); console.error('❌ SB leave POST:',res.status,t); return {ok:false,status:res.status,text:t}; }
    const t=await res.text();
    console.log('[sbSaveLeave] POST ok, response:', t.substring(0,300));
    return {ok:true,data:t?JSON.parse(t):true};
  }

  // First try full payload
  let result=await tryWrite(fullPayload);

  // If it failed with "column does not exist" error, retry with basic payload
  if(!result.ok && result.text && (result.text.includes('column') || result.text.includes('schema'))){
    console.warn('⚠️ Leave table missing new columns — saving without TL/HR fields. Run SQL migration for full feature support.');
    showToast('⚠️ Leave saved (basic mode). Ask admin to run DB migration for TL/HR flow.', 'info');
    result=await tryWrite(basicPayload);
  }

  // If it failed with check-constraint or RLS error, retry with status='Pending' (the safe old value)
  if(!result.ok && result.text && (result.text.includes('check') || result.text.includes('violat') || result.text.includes('constraint'))){
    console.warn('⚠️ Status value rejected by DB constraint — retrying with status=Pending');
    const retryFull={...fullPayload, status:'Pending'};
    result=await tryWrite(retryFull);
    if(!result.ok){
      const retryBasic={...basicPayload, status:'Pending'};
      result=await tryWrite(retryBasic);
    }
  }

  if(!result.ok){
    console.error('[sbSaveLeave] FINAL FAILURE, leave not saved to DB!', result);
    showToast(`❌ Couldn't save: ${(result.text||'unknown error').substring(0,100)}`, 'danger');
    return null;
  }
  const r=result.data;
  if(r&&r[0]){
    lv._uuid=r[0].id;
    console.log('[sbSaveLeave] ✅ Leave saved with _uuid=', lv._uuid);
  }
  return r;
}

// ─── KYC DOCUMENT STORAGE (Supabase Storage) ──────────────────────
const KYC_BUCKET='kyc-documents';

// Upload file to private bucket. Returns storage path on success, null on failure.
async function uploadKYCFile(file, empUuid, docType){
  if(!file) return null;
  const allowed=['image/jpeg','image/jpg','image/png','application/pdf'];
  if(!allowed.includes(file.type)){ showToast('Only JPG, PNG, or PDF allowed','info'); return null; }
  if(file.size > 5*1024*1024){ showToast('File too large (max 5 MB)','info'); return null; }

  const ext = file.name.split('.').pop().toLowerCase();
  const timestamp = Date.now();
  const path = `${empUuid}/${docType}_${timestamp}.${ext}`;

  try{
    const res = await fetch(`${SB_URL}/storage/v1/object/${KYC_BUCKET}/${path}`,{
      method:'POST',
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY,
        'Content-Type':file.type,
        'x-upsert':'true'
      },
      body:file
    });
    if(!res.ok){
      const errText=await res.text();
      console.error('❌ Upload failed:', res.status, errText);
      return null;
    }
    return path;
  }catch(e){
    console.error('❌ Upload error:', e);
    return null;
  }
}

// Get a signed URL that expires in 60 minutes (for secure admin viewing/download)
async function getKYCSignedUrl(path){
  if(!path) return null;
  try{
    const res = await fetch(`${SB_URL}/storage/v1/object/sign/${KYC_BUCKET}/${path}`,{
      method:'POST',
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY,
        'Content-Type':'application/json'
      },
      body:JSON.stringify({expiresIn:3600})
    });
    if(!res.ok){
      console.error('❌ Signed URL failed:', await res.text());
      return null;
    }
    const data = await res.json();
    return `${SB_URL}/storage/v1${data.signedURL||data.signedUrl}`;
  }catch(e){
    console.error('❌ Signed URL error:', e);
    return null;
  }
}

// Delete file from bucket (when employee replaces or admin removes)
async function deleteKYCFile(path){
  if(!path) return false;
  try{
    const res = await fetch(`${SB_URL}/storage/v1/object/${KYC_BUCKET}/${path}`,{
      method:'DELETE',
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY
      }
    });
    return res.ok;
  }catch(e){
    console.error('❌ Delete error:', e);
    return false;
  }
}

// Open signed URL in new tab (for viewing)
async function viewKYCDocument(path, docLabel){
  if(!path){ showToast('No file uploaded','info'); return; }
  showToast(`Opening ${docLabel}…`,'info');
  const url = await getKYCSignedUrl(path);
  if(!url){ showToast('Could not generate link','info'); return; }

}

// ─── UNIVERSAL DATE PARSER ────────────────────────────────────────
// Handles: YYYY-MM-DD, DD/MM/YYYY, MM/DD/YYYY, DD-MM-YYYY, DD MM YYYY,
//          MM-DD-YYYY, DD.MM.YYYY, "Jan 15 2000", "15 Jan 2000", "January 15 2000" etc.
function parseAnyDate(raw){
  if(!raw||!raw.toString().trim()) return '';
  const s=raw.toString().trim();

  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  // Named month formats: "Jan 15 2000", "15 Jan 2000", "January 15, 2000"
  const months={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  const namedMatch=s.match(/(\d{1,2})[^\w]?([a-zA-Z]+)[^\w]?(\d{4})|([a-zA-Z]+)[^\w]?(\d{1,2})[^\w]?(\d{4})/);
  if(namedMatch){
    let d,m,y;
    if(namedMatch[1]){d=namedMatch[1];const mn=namedMatch[2].toLowerCase().slice(0,3);m=months[mn];y=namedMatch[3];}
    else{const mn=namedMatch[4].toLowerCase().slice(0,3);m=months[mn];d=namedMatch[5];y=namedMatch[6];}
    if(m&&d&&y) return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  // Split by common separators
  const parts=s.split(/[\s\/\-\.]+/).filter(Boolean);
  if(parts.length!==3) return '';

  const [a,b,c]=parts.map(Number);

  // YYYY-MM-DD or YYYY/MM/DD (year first)
  if(parts[0].length===4&&a>1900&&b>=1&&b<=12&&c>=1&&c<=31){
    return `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
  }

  // If c is a year (4 digits or >31)
  if(parts[2].length===4||c>31){
    const year=parts[2].padStart(4,'20');
    // DD/MM/YYYY — if a<=31 and b<=12
    if(a<=31&&b>=1&&b<=12){
      // Disambiguate MM/DD vs DD/MM: if a>12, must be DD
      if(a>12) return `${year}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
      // if b>12, must be DD in position 2 (MM/DD/YYYY)
      if(b>12) return `${year}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
      // Default to DD/MM/YYYY (Indian standard)
      return `${year}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
    }
  }

  return '';
}

// ─── GEOLOCATION ──────────────────────────────────────────────────
let geoState = {status:'idle',lat:null,lng:null,accuracy:null,city:null,address:null};

function getDistanceM(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getNearestOffice(lat,lng){
  const locs=(D.officeLocations&&D.officeLocations.length)?D.officeLocations:[{id:'default',name:'Office',lat:D.settings.officeLat||17.385,lng:D.settings.officeLng||78.4867,radius:D.settings.officeRadius||500}];
  let nearest=null,minDist=Infinity;
  locs.forEach(loc=>{
    const d=getDistanceM(lat,lng,loc.lat,loc.lng);
    if(d<minDist){minDist=d;nearest={...loc,dist:d,inZone:d<=loc.radius};}
  });
  return nearest;
}

function geoBoxHTML(){
  const s=geoState;
  if(s.status==='idle') return `<div class="geo-box"><div class="geo-icon">📍</div><div><div class="geo-status">Detecting your location…</div><div class="geo-sub">Location will be recorded with login</div></div></div>`;
  if(s.status==='loading') return `<div class="geo-box"><div class="geo-icon">🔄</div><div><div class="geo-status">Getting your location…</div><div class="geo-sub">Please allow location access when prompted</div></div></div>`;
  if(s.status==='error') return `<div class="geo-box geo-err"><div class="geo-icon">⚠</div><div><div class="geo-status">Location unavailable</div><div class="geo-sub">${s.error||'Permission denied — login will still work'}</div></div></div>`;
  if(s.status==='ok'){
    const nearest=getNearestOffice(s.lat,s.lng);
    const inOffice=nearest&&nearest.inZone;
    return `<div class="geo-box ${inOffice?'geo-ok':'geo-warn'}"><div class="geo-icon">${inOffice?'✅':'📍'}</div><div>
      <div class="geo-status">${inOffice?`Within zone: ${nearest.name}`:'Outside all office zones'}</div>
      <div class="geo-sub">${s.address||s.city||'Location captured'} &nbsp;·&nbsp; ±${Math.round(s.accuracy||0)}m accuracy</div>
      ${nearest?`<div class="geo-sub" style="margin-top:1px">Nearest: ${nearest.name} — ${nearest.dist<1000?Math.round(nearest.dist)+'m':((nearest.dist/1000).toFixed(1))+'km'} away</div>`:''}
    </div></div>`;
  }
  return '';
}

// ─── PRECISE REVERSE GEOCODING ───────────────────────────────────
async function getLocationName(lat, lng){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=18&addressdetails=1`);
    const d=await r.json();
    const a=d.address||{};
    // Priority: most specific → least specific
    // quarter/neighbourhood/road are more precise than suburb
    const specific=a.amenity||a.building||a.tourism||a.leisure||'';
    const street=a.road||a.pedestrian||a.path||'';
    const local=a.quarter||a.neighbourhood||a.residential||a.hamlet||'';
    const area=a.suburb||a.village||a.town_district||'';
    const city=a.city||a.town||a.municipality||a.county||'';

    // Build location string from most specific available parts
    if(specific && street) return `${specific}, ${street}, ${city}`;
    if(specific) return `${specific}, ${city}`;
    if(local && city) return `${local}, ${city}`;
    if(street && city) return `${street}, ${city}`;
    if(area && city) return `${area}, ${city}`;
    if(city) return city;
    return d.display_name?.split(',').slice(0,2).join(',').trim()||'Location detected';
  }catch(e){
    return 'Location detected';
  }
}

function captureGeo(){
  if(!navigator.geolocation){geoState={status:'error',error:'Geolocation not supported'};if($('geo-box-wrap'))$('geo-box-wrap').innerHTML=geoBoxHTML();return;}
  geoState={status:'loading'};if($('geo-box-wrap'))$('geo-box-wrap').innerHTML=geoBoxHTML();
  navigator.geolocation.getCurrentPosition(
    pos=>{
      geoState={status:'ok',lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,city:null,address:null};
      getLocationName(pos.coords.latitude,pos.coords.longitude).then(name=>{
        geoState.address=name;
        geoState.city=name;
      }).catch(()=>{}).finally(()=>{if($('geo-box-wrap'))$('geo-box-wrap').innerHTML=geoBoxHTML();});
    },
    err=>{const m={1:'Location permission denied',2:'Position unavailable',3:'Request timed out'};geoState={status:'error',error:m[err.code]||err.message};if($('geo-box-wrap'))$('geo-box-wrap').innerHTML=geoBoxHTML();}
    ,{timeout:10000,enableHighAccuracy:true}
  );
}

// ─── FACE RECOGNITION ENGINE ──────────────────────────────────────
const FR = {
  loaded: false, loading: false, stream: null, interval: null,
  mode: 'idle', // idle | scanning | matched | failed | enrolling
  matchedUser: null, descriptor: null,
  MODEL_URL: 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'
};

async function frLoadModels(){
  if(FR.loaded||FR.loading) return;
  FR.loading=true;
  try{
    await faceapi.nets.tinyFaceDetector.loadFromUri(FR.MODEL_URL);
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(FR.MODEL_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(FR.MODEL_URL);
    FR.loaded=true;
  }catch(e){console.warn('face-api models failed:',e);}
  FR.loading=false;
}

async function frStartCamera(videoId, canvasId, onResult){
  frStopCamera();
  try{
    // Pre-flight: check if mediaDevices is even available (HTTPS / supported browser)
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      if(onResult) onResult({type:'cam-error',msg:'Camera not supported on this device/browser. Try opening in Chrome.'});
      return;
    }
    FR.stream = await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}});
    const vid=$( videoId); if(!vid) return;
    vid.srcObject=FR.stream; vid.play();
    await new Promise(r=>vid.onloadedmetadata=r);
    await frLoadModels();
    frScanLoop(videoId, canvasId, onResult);
  }catch(e){
    let msg='Camera not available';
    if(e && e.name){
      if(e.name==='NotAllowedError' || e.name==='PermissionDeniedError'){
        msg='Camera permission denied. Open Settings → Apps → Kreayotoo → Permissions → Camera → Allow, then reopen the app.';
      } else if(e.name==='NotFoundError' || e.name==='DevicesNotFoundError'){
        msg='No camera found on this device.';
      } else if(e.name==='NotReadableError' || e.name==='TrackStartError'){
        msg='Camera is being used by another app. Close other camera apps and try again.';
      } else if(e.name==='OverconstrainedError'){
        msg='Camera does not support the required settings.';
      } else if(e.name==='SecurityError'){
        msg='Camera blocked — needs a secure (HTTPS) connection.';
      } else {
        msg='Camera error: '+e.name+'. Try restarting the app.';
      }
    }
    if(onResult) onResult({type:'cam-error',msg:msg});
  }
}

function frStopCamera(){
  if(FR.interval){clearInterval(FR.interval);FR.interval=null;}
  if(FR.stream){FR.stream.getTracks().forEach(t=>t.stop());FR.stream=null;}
  FR.mode='idle';
}

function frScanLoop(videoId, canvasId, onResult){
  FR.mode='scanning';
  FR.interval = setInterval(async()=>{
    const vid=$(videoId),cvs=$(canvasId);
    if(!vid||!cvs||!FR.loaded) return;
    const opts=new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.5});
    const det = await faceapi.detectSingleFace(vid,opts).withFaceLandmarks(true).withFaceDescriptor();
    cvs.width=vid.videoWidth; cvs.height=vid.videoHeight;
    const ctx=cvs.getContext('2d'); ctx.clearRect(0,0,cvs.width,cvs.height);
    if(det){
      const box=det.detection.box;
      ctx.strokeStyle='#4ade80'; ctx.lineWidth=2; ctx.strokeRect(box.x,box.y,box.width,box.height);
      if(onResult) onResult({type:'detected', descriptor:det.descriptor, det});
    } else {
      if(onResult) onResult({type:'no-face'});
    }
  },400);
}

async function frCaptureSingle(videoId){
  const vid=$(videoId); if(!vid||!FR.loaded) return null;
  await frLoadModels();
  const opts=new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.5});
  const det=await faceapi.detectSingleFace(vid,opts).withFaceLandmarks(true).withFaceDescriptor();
  return det?det.descriptor:null;
}

// Load ALL enrolled faces in the current company (for anti-impersonation cross-check)
// Cached for 5 minutes to avoid hitting Supabase every scan
let _allFacesCache={data:null,ts:0,companyId:null};
async function frLoadAllFacesInCompany(){
  const cid=currentCompany?currentCompany.company_id:null;
  const now=Date.now();
  if(_allFacesCache.data && _allFacesCache.companyId===cid && (now-_allFacesCache.ts)<300000){
    return _allFacesCache.data;
  }
  const cidFilter = cid ? `&company_id=eq.${cid}` : '';
  const rows=await sb('employees','GET',null,`?face_descriptor=not.is.null&select=email,name,face_descriptor${cidFilter}`);
  const out=[];
  if(rows && rows.length){
    for(const r of rows){
      if(!r.face_descriptor) continue;
      try{
        const arr=JSON.parse(r.face_descriptor);
        out.push({email:r.email, name:r.name, descriptor:new Float32Array(arr)});
      }catch(_){}
    }
  }
  _allFacesCache={data:out,ts:now,companyId:cid};
  return out;
}

function frInvalidateFacesCache(){_allFacesCache={data:null,ts:0,companyId:null};}

// STRICT face match against the current employee's stored face,
// with anti-impersonation cross-check against ALL enrolled employees in the company.
// Returns: {match:boolean, dist:number, reason:string, closestOther?:{name,dist}}
function frStrictMatch(descriptor, currentEmpEmail, storedDescriptor, allFaces){
  if(!storedDescriptor) return {match:false, dist:99, reason:'no-stored-face'};
  const myDist=faceapi.euclideanDistance(descriptor, storedDescriptor);
  console.log('[FaceMatch] Distance to enrolled self:', myDist.toFixed(3));

  // Stage 1: live face must be CLOSE to the enrolled face (strict threshold)
  // 0.45 is industry-standard "same person" cutoff for face-api.js
  const STRICT_THRESHOLD = 0.45;
  if(myDist >= STRICT_THRESHOLD){
    return {match:false, dist:myDist, reason:'too-far-from-self'};
  }

  // Stage 2: anti-impersonation — live face must NOT match any other enrolled
  // employee closer than (or comparably close to) the current employee
  let closestOther=null;
  if(allFaces && allFaces.length){
    for(const other of allFaces){
      if(!other.descriptor) continue;
      // Skip the current employee themselves
      if(other.email && currentEmpEmail && other.email.toLowerCase()===currentEmpEmail.toLowerCase()) continue;
      const otherDist=faceapi.euclideanDistance(descriptor, other.descriptor);
      if(!closestOther || otherDist<closestOther.dist){
        closestOther={name:other.name, email:other.email, dist:otherDist};
      }
      // Reject if another employee matches CLOSER (with safety margin)
      // Margin of 0.08 means: their face must clearly belong to claimed user, not someone else
      if(otherDist < myDist + 0.08){
        console.warn('[FaceMatch] Rejected — closer match to', other.name, 'dist:', otherDist.toFixed(3), 'vs self:', myDist.toFixed(3));
        return {match:false, dist:myDist, reason:'matches-other-closer', closestOther:{name:other.name, dist:otherDist}};
      }
    }
  }

  console.log('[FaceMatch] Accepted. Self-dist:', myDist.toFixed(3), closestOther?'closest other: '+closestOther.name+' @ '+closestOther.dist.toFixed(3):'no other faces in company');
  return {match:true, dist:myDist, reason:'ok', closestOther};
}

// Legacy wrapper kept for any old call sites
function frMatchSingleEmployee(descriptor, storedDescriptor){
  const result=frStrictMatch(descriptor, null, storedDescriptor, []);
  return result.match;
}

// Old match against all (keep for admin face login)
function frMatchDescriptor(descriptor){
  const enrolled=frGetEnrolled();
  if(!enrolled.length) return null;
  let best=null, bestDist=Infinity;
  enrolled.forEach(e=>{
    const dist=faceapi.euclideanDistance(descriptor, e.descriptor);
    if(dist<bestDist){bestDist=dist;best=e;}
  });
  return bestDist<0.5?{name:best.name,distance:bestDist}:null;
}

  faceTabMode=tab;

    const panel=$(`face-${t}-panel`); if(panel) panel.classList.toggle('hidden',t!==tab);

async function startFaceScan(){
  const statusEl=$('face-status-txt'),ring=$('face-ring');
  if(statusEl) statusEl.textContent='Starting camera…'; statusEl&&statusEl.setAttribute('class','face-status scanning');
  await frStartCamera('fr-video','fr-canvas', result=>{
    const s=$('face-status-txt'),r=$('face-ring');
    if(result.type==='cam-error'){
      if(s){s.textContent=result.msg;s.className='face-status fail';}
      if(r) r.className='face-ring fail'; return;
    }
    if(result.type==='no-face'){
      if(s){s.textContent='No face detected — look at the camera';s.className='face-status idle';}
      if(r) r.className='face-ring'; return;
    }
    if(result.type==='detected'){
      if(r) r.className='face-ring detected';
      const match=frMatchDescriptor(result.descriptor);
      if(match){
        frStopCamera();
        if(s){s.textContent=`✅ Face matched: ${match.name}`;s.className='face-status success';}
        if(r) r.className='face-ring matched';
        // Auto-fill email if we find this employee
        const emp=D.employees.find(e=>e.name.toLowerCase()===match.name.toLowerCase());
        if(emp&&$('l-email')) $('l-email').value=emp.email;
        if($('l-pass')) $('l-pass').value='';
        if($('login-err')) $('login-err').innerHTML=`<div class="alert alert-s">Face recognised as <strong>${match.name}</strong>. Enter password or <button onclick="faceSignIn('${match.name}')" class="btn btn-primary" style="padding:2px 10px;font-size:12px;margin-left:4px">Sign in with face only</button></div>`;
      } else {
        if(frGetEnrolled().length===0){
          if(s){s.textContent='No faces enrolled — enroll first using the Enroll Face tab';s.className='face-status fail';}
        } else {
          if(s){s.textContent='Face not recognised — try again or use password';s.className='face-status fail';}
          if(r) r.className='face-ring fail';
        }
      }
    }
  });
}

async function startFaceEnroll(){
  const s=$('enroll-status-txt'),r=$('face-ring-enroll');
  if(s){s.textContent='Starting camera…';s.className='face-status scanning';}
  await frStartCamera('fr-video-enroll','fr-canvas-enroll', result=>{
    const st=$('enroll-status-txt'),rg=$('face-ring-enroll');
    if(result.type==='cam-error'){if(st){st.textContent=result.msg;st.className='face-status fail';}return;}
    if(result.type==='no-face'){if(st){st.textContent='No face — look at the camera';st.className='face-status idle';}if(rg)rg.className='face-ring';return;}
    if(result.type==='detected'){if(st){st.textContent='Face detected — click Capture & Enroll';st.className='face-status success';}if(rg)rg.className='face-ring detected';}
  });
}

async function enrollFace(){
  const name=($('enroll-name')||{}).value?.trim();
  if(!name){alert('Enter your name first');return;}
  const s=$('enroll-status-txt');
  if(s){s.textContent='Capturing…';s.className='face-status scanning';}
  const desc=await frCaptureSingle('fr-video-enroll');
  if(!desc){if(s){s.textContent='No face detected — reposition and try again';s.className='face-status fail';}return;}
  const list=frGetEnrolled().filter(e=>e.name.toLowerCase()!==name.toLowerCase());

  setTimeout(()=>{if(s&&s.textContent.includes('enrolled'))s.textContent='Face enrolled. You can now use face login.';},2000);
}

function faceSignIn(name){
  // Sign in purely by face match — log it
  const nearest=geoState.status==='ok'?getNearestOffice(geoState.lat,geoState.lng):null;

}

  const err=$('forgot-err'); if(err) err.innerHTML='';

let _forgotEmail = null;
let _forgotUserInfo = null;

async function sendPasswordOTP(){
  const email = $('forgot-email')?.value?.trim().toLowerCase();
  const err = $('forgot-err');
  if(!email){ if(err) err.innerHTML = `<div class="alert alert-e">Please enter your email</div>`; return; }
  if(err) err.innerHTML = `<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">🔎 Looking up your account…</div>`;

  // Check if email exists as employee or company admin
  try{
    let user=null, role=null;
    // Try employee first
    const emps = await sb('employees','GET',null,`?email=eq.${encodeURIComponent(email)}&select=id,name,email,company_id`);
    if(emps && emps.length){
      user = emps[0]; role = 'employee';
    } else {
      const cos = await sb('companies','GET',null,`?admin_email=eq.${encodeURIComponent(email)}&select=company_id,admin_name,admin_email,name`);
      if(cos && cos.length){
        user = cos[0]; role = 'admin'; user.name = cos[0].admin_name || 'Admin';
      }
    }

    if(!user){
      if(err) err.innerHTML = `<div class="alert alert-e">No account found with this email. <br>Try another email or <strong>contact your admin/HR</strong> to help reset your account.</div>`;
      return;
    }

    _forgotEmail = email;
    _forgotUserInfo = { user, role };

    // Send OTP
    if(err) err.innerHTML = `<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">📧 Sending code to ${email}…</div>`;
    const r = await sendOTP(email, user.name || '');
    if(r.success){
      if(err) err.innerHTML = `<div class="alert alert-s">✅ Code sent! Check your inbox (and spam folder).</div>`;
      // Reveal step 2
      const s1=$('forgot-step1'); if(s1) s1.classList.add('hidden');
      const s2=$('forgot-step2'); if(s2) s2.classList.remove('hidden');
      setTimeout(()=>$('forgot-otp')?.focus(), 100);
    } else {
      if(err) err.innerHTML = `<div class="alert alert-e">Could not send email: ${r.error||'unknown error'}. Contact your admin.</div>`;
    }
  }catch(e){
    console.error('Forgot password error:', e);
    if(err) err.innerHTML = `<div class="alert alert-e">Something went wrong: ${e.message||e}</div>`;
  }
}

async function resendPasswordOTP(){
  if(!_forgotEmail || !_forgotUserInfo){
    showForgotPassword();
    return;
  }
  const err = $('forgot-err');
  if(err) err.innerHTML = `<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">📧 Resending code…</div>`;
  const r = await sendOTP(_forgotEmail, _forgotUserInfo.user.name||'');
  if(r.success){
    if(err) err.innerHTML = `<div class="alert alert-s">✅ New code sent!</div>`;
  } else {
    if(err) err.innerHTML = `<div class="alert alert-e">Could not resend: ${r.error||'try again'}</div>`;
  }
}

async function verifyOTPAndReset(){
  const err = $('forgot-err');
  const otp = $('forgot-otp')?.value?.trim();
  const newPass = $('forgot-newpass')?.value;
  const newPass2 = $('forgot-newpass2')?.value;

  if(!otp || otp.length !== 6){
    if(err) err.innerHTML = `<div class="alert alert-e">Enter the 6-digit code from your email</div>`;
    return;
  }
  if(!newPass || newPass.length < 6){
    if(err) err.innerHTML = `<div class="alert alert-e">New password must be at least 6 characters</div>`;
    return;
  }
  if(newPass !== newPass2){
    if(err) err.innerHTML = `<div class="alert alert-e">Passwords don't match</div>`;
    return;
  }

  // Verify OTP
  const v = verifyOTP(_forgotEmail, otp);
  if(!v.valid){
    if(err) err.innerHTML = `<div class="alert alert-e">${v.reason||'Invalid or expired code'}</div>`;
    return;
  }

  if(err) err.innerHTML = `<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">⚙️ Updating password…</div>`;

  // Update password in DB based on role
  try{
    const { user, role } = _forgotUserInfo;
    if(role === 'employee'){
      const res = await fetch(`${SB_URL}/rest/v1/employees?id=eq.${user.id}`, {
        method: 'PATCH',
        headers: {...SB_HDR, 'Prefer': 'return=representation'},
        body: JSON.stringify({ password_hash: newPass })
      });
      if(!res.ok){ throw new Error(`DB error ${res.status}`); }
    } else if(role === 'admin'){
      const res = await fetch(`${SB_URL}/rest/v1/companies?company_id=eq.${encodeURIComponent(user.company_id)}`, {
        method: 'PATCH',
        headers: {...SB_HDR, 'Prefer': 'return=representation'},
        body: JSON.stringify({ admin_password: newPass })
      });
      if(!res.ok){ throw new Error(`DB error ${res.status}`); }
    }

    if(err) err.innerHTML = `<div class="alert alert-s">✅ Password updated! Sign in with your new password.</div>`;
    // Clear OTP state
    delete _otpStore[_forgotEmail];
    _forgotEmail = null;
    _forgotUserInfo = null;
    // Pre-fill email back on sign-in
    const signinEmail=$('smart-email'); const entered=$('forgot-email')?.value;
    setTimeout(()=>{
      showSignin();
      if(signinEmail && entered) signinEmail.value = entered;
      $('smart-pass')?.focus();
    }, 1500);
  }catch(e){
    console.error('Password update error:', e);
    if(err) err.innerHTML = `<div class="alert alert-e">Could not update password: ${e.message||e}. Contact your admin.</div>`;
  }
}

// Filter companies as the user types (no list shown until 2+ chars)
function filterCompanyDropdown(query){
  const list = $('su-emp-company-list');
  const sel  = $('su-emp-company-selected');
  const hidden = $('su-emp-company');
  if(!list) return;
  const q = (query||'').trim().toLowerCase();
  // Clear selection if user starts typing again
  if(hidden && hidden.value && (!q || (q && !q.startsWith((sel?.dataset?.name||'').toLowerCase().slice(0,q.length))))){
    hidden.value = '';
    if(sel){ sel.style.display = 'none'; sel.innerHTML = ''; sel.dataset.name=''; }
  }
  // Don't show anything until at least 2 characters typed
  if(q.length < 2){
    list.style.display = 'none';
    list.innerHTML = '';
    return;
  }
  const all = window._signupCompanies || [];
  const matches = all.filter(c => (c.name||'').toLowerCase().includes(q));
  if(matches.length === 0){
    list.innerHTML = '<div style="padding:10px 14px;color:#64748b;font-size:12px;font-style:italic">No company found matching "'+escapeHtml(query)+'". Ask your HR to register it first.</div>';
    list.style.display = 'block';
    return;
  }
  list.innerHTML = matches.slice(0,10).map(c=>{
    // Highlight the matched portion
    const lower = (c.name||'').toLowerCase();
    const idx = lower.indexOf(q);
    let display;
    if(idx >= 0){
      display = escapeHtml(c.name.slice(0,idx)) + '<strong style="background:#fef08a;color:#78350f;padding:0 2px;border-radius:3px">' + escapeHtml(c.name.slice(idx,idx+q.length)) + '</strong>' + escapeHtml(c.name.slice(idx+q.length));
    } else {
      display = escapeHtml(c.name);
    }
    return `<div onmousedown="pickCompanyForSignup('${c.company_id}','${escapeHtml(c.name).replace(/'/g,'&apos;')}')" style="padding:9px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9;font-size:13px" onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background='#fff'">${display}<div style="font-size:10px;color:#94a3b8;margin-top:1px">${c.company_id}</div></div>`;
  }).join('');
  list.style.display = 'block';
}

function pickCompanyForSignup(code, name){
  const hidden = $('su-emp-company');
  const search = $('su-emp-company-search');
  const list   = $('su-emp-company-list');

function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// SMART LOGIN — email decides role
async function doSmartLogin(){
  const em = ($('smart-email')||{}).value?.trim().toLowerCase();
  const pw = ($('smart-pass')||{}).value;
  const err = $('login-err');
  if(!em||!pw){ if(err)err.innerHTML=`<div class="alert alert-e">Enter email and password</div>`; return; }
  if(err) err.innerHTML = `<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;margin-bottom:8px">🔎 Looking up your account…</div>`;

  // 1. Super admin (hardcoded)
  if(em === D.user.email.toLowerCase() && pw === D.user.password){
    currentCompany = null;
    currentRole = 'admin';
    D.loggedIn = true;
    save();
    if(err) err.innerHTML = `<div class="alert alert-s">✅ Welcome, Super Admin!</div>`;
    await syncFromSupabase();
    renderApp();
    return;
  }

  // 2. Company admin
  try{
    const companies = await sb('companies','GET',null,`?admin_email=eq.${encodeURIComponent(em)}&select=*`);
    if(companies && companies.length){
      const company = companies[0];
      if(company.admin_password !== pw){
        if(err) err.innerHTML = `<div class="alert alert-e">Wrong password</div>`;
        return;
      }
      if(company.status && company.status !== 'Active'){
        if(err) err.innerHTML = `<div class="alert alert-e">This company account is inactive.</div>`;
        return;
      }
      currentCompany = company;
      currentRole = 'admin';
      D.loggedIn = true;
      D.settings = {...D.settings, company: company.name};
      save();
      if(err) err.innerHTML = `<div class="alert alert-s">✅ Welcome to ${company.name}!</div>`;
      await syncFromSupabase();
      renderApp();
      return;
    }
  }catch(e){ console.warn('Company lookup failed:', e); }

  // 3. Employee
  try{
    const employees = await sb('employees','GET',null,`?email=eq.${encodeURIComponent(em)}&select=*`);
    if(employees && employees.length){
      const empRec = employees[0];
      // Check password — stored as password_hash (plain text for now in this portal)
      if(empRec.password_hash && empRec.password_hash !== pw){
        if(err) err.innerHTML = `<div class="alert alert-e">Wrong password</div>`;
        return;
      }
      if(!empRec.password_hash){
        if(err) err.innerHTML = `<div class="alert alert-e">No password set for this account. Please ask your admin to set one.</div>`;
        return;
      }
      // Set the company scope for this employee
      if(empRec.company_id){
        const cRes = await sb('companies','GET',null,`?company_id=eq.${encodeURIComponent(empRec.company_id)}&select=*`);
        if(cRes && cRes.length){
          currentCompany = cRes[0];
          D.settings = {...D.settings, company: cRes[0].name};
        }
      }
      currentRole = 'employee';
      D.loggedIn = true;
      save();
      // Build the employee object for the employee portal
      await syncFromSupabase();
      const emp = D.employees.find(e => e.email && e.email.toLowerCase() === em);
      if(!emp){
        if(err) err.innerHTML = `<div class="alert alert-e">Couldn't load employee profile. Try again.</div>`;
        return;
      }
      currentEmployee = emp;
      if(err) err.innerHTML = `<div class="alert alert-s">✅ Welcome, ${emp.name}!</div>`;
      renderEmployeeApp();
      return;
    }
  }catch(e){ console.warn('Employee lookup failed:', e); }

  if(err) err.innerHTML = `<div class="alert alert-e">No account found with this email. <a href="#" onclick="event.preventDefault();showSignup()" style="color:#7c3aed;font-weight:700">Sign up?</a></div>`;
}

// COMPANY SIGNUP — creates a company + admin
async function doCompanySignup(){
  const err = $('signup-err');
  const name = ($('su-company-name')||{}).value?.trim();
  const adminName = ($('su-admin-name')||{}).value?.trim();
  const email = ($('su-admin-email')||{}).value?.trim().toLowerCase();
  const phone = ($('su-admin-phone')||{}).value?.trim();
  const pw = ($('su-admin-pass')||{}).value;

  if(!name || !adminName || !email || !pw){
    if(err) err.innerHTML = `<div class="alert alert-e">Please fill all required fields</div>`;
    return;
  }
  if(pw.length < 6){
    if(err) err.innerHTML = `<div class="alert alert-e">Password must be 6+ characters</div>`;
    return;
  }
  if(err) err.innerHTML = `<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">⚙️ Creating company account…</div>`;

  // Check if email already in use
  try{
    const existing = await sb('companies','GET',null,`?admin_email=eq.${encodeURIComponent(email)}&select=company_id`);
    if(existing && existing.length){
      if(err) err.innerHTML = `<div class="alert alert-e">This email is already registered as a company admin. <a href="#" onclick="event.preventDefault();showSignin()" style="font-weight:700">Sign in instead?</a></div>`;
      return;
    }
    const existingEmp = await sb('employees','GET',null,`?email=eq.${encodeURIComponent(email)}&select=id`);
    if(existingEmp && existingEmp.length){
      if(err) err.innerHTML = `<div class="alert alert-e">This email is already used by an employee. Use a different email for your admin account.</div>`;
      return;
    }
  }catch(e){ /* continue */ }

  // Generate unique company code (first 3 letters of name + 3-digit number)
  const prefix = name.replace(/[^A-Za-z]/g,'').toUpperCase().slice(0,3).padEnd(3,'X');
  const code = `${prefix}${Math.floor(Math.random()*900+100)}`;

  const payload = {
    company_id: code,
    name,
    admin_name: adminName,
    admin_email: email,
    admin_phone: phone || null,
    admin_password: pw,
    status: 'Active',
    created_at: new Date().toISOString()
  };

  try{
    const res = await fetch(`${SB_URL}/rest/v1/companies`, {
      method: 'POST',
      headers: {...SB_HDR, 'Prefer': 'return=representation'},
      body: JSON.stringify(payload)
    });
    if(!res.ok){
      const errText = await res.text();
      if(err) err.innerHTML = `<div class="alert alert-e">Could not create account: ${errText.substring(0,200)}</div>`;
      return;
    }
    const rows = await res.json();
    const company = rows[0];
    if(err) err.innerHTML = `<div class="alert alert-s">✅ Company created! Your company code: <strong>${code}</strong></div>`;
    setTimeout(()=>{
      // Auto-login
      currentCompany = company;
      currentRole = 'admin';
      D.loggedIn = true;
      D.settings = {...D.settings, company: company.name};
      save();
      syncFromSupabase().then(()=>renderApp());
    }, 1500);
  }catch(e){
    console.error('Company signup error:', e);
    if(err) err.innerHTML = `<div class="alert alert-e">Network error: ${e.message||e}</div>`;
  }
}

// ─── EMPLOYEE SIGNUP WITH EMAIL OTP ──────────────────────────────
let _empSignupData = null;

async function empSignupSendOTP(){
  const err = $('signup-emp-err');
  const code = ($('su-emp-company')||{}).value?.trim().toUpperCase();
  const name = ($('su-emp-name')||{}).value?.trim();
  const email = ($('su-emp-email')||{}).value?.trim().toLowerCase();
  const phone = ($('su-emp-phone')||{}).value?.trim();
  const pw = ($('su-emp-pass')||{}).value;

  if(!code){ if(err) err.innerHTML = `<div class="alert alert-e">Please select your company</div>`; return; }
  if(!name || !email || !pw){ if(err) err.innerHTML = `<div class="alert alert-e">Please fill all required fields</div>`; return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ if(err) err.innerHTML = `<div class="alert alert-e">Enter a valid email address</div>`; return; }
  if(pw.length < 6){ if(err) err.innerHTML = `<div class="alert alert-e">Password must be 6+ characters</div>`; return; }

  if(err) err.innerHTML = `<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">🔎 Verifying company…</div>`;

  try{
    const companies = await sb('companies','GET',null,`?company_id=eq.${encodeURIComponent(code)}&select=*`);
    if(!companies || !companies.length){
      if(err) err.innerHTML = `<div class="alert alert-e">Selected company no longer exists. Please pick again.</div>`;
      return;
    }
    const company = companies[0];

    const existing = await sb('employees','GET',null,`?email=eq.${encodeURIComponent(email)}&company_id=eq.${encodeURIComponent(code)}&select=id`);
    if(existing && existing.length){
      if(err) err.innerHTML = `<div class="alert alert-e">This email is already registered in ${company.name}. <a href="#" onclick="event.preventDefault();showSignin()" style="font-weight:700">Sign in instead?</a></div>`;
      return;
    }

    if(err) err.innerHTML = `<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">📧 Sending verification code…</div>`;
    const result = await sendOTP(email, name);
    if(!result.success){
      if(err) err.innerHTML = `<div class="alert alert-e">Failed to send OTP. Check email and try again.</div>`;
      return;
    }

    _empSignupData = { code, name, email, phone, pw, company };
    $('signup-employee-form').classList.add('hidden');
    $('signup-employee-otp').classList.remove('hidden');
    if($('su-emp-otp-email-display')) $('su-emp-otp-email-display').textContent = email;
    if($('signup-emp-otp-err')) $('signup-emp-otp-err').innerHTML = '';
    if($('su-emp-otp-input')) $('su-emp-otp-input').value = '';
    startOTPTimer('su-emp-otp-timer');
  }catch(e){
    console.error('empSignupSendOTP failed:', e);
    if(err) err.innerHTML = `<div class="alert alert-e">Could not send code. Please try again.</div>`;
  }
}

async function doEmployeeSignup(prefilledData){
  // When called from OTP verify, use prefilled values + otp error display
  const fromOTP = !!prefilledData;
  const err = fromOTP ? $('signup-emp-otp-err') : $('signup-emp-err');
  const code = fromOTP ? prefilledData.code : (($('su-emp-company')||{}).value?.trim().toUpperCase());
  const name = fromOTP ? prefilledData.name : (($('su-emp-name')||{}).value?.trim());
  const email = fromOTP ? prefilledData.email : (($('su-emp-email')||{}).value?.trim().toLowerCase());
  const phone = fromOTP ? prefilledData.phone : (($('su-emp-phone')||{}).value?.trim());
  const pw = fromOTP ? prefilledData.pw : (($('su-emp-pass')||{}).value);

  if(!code){
    if(err) err.innerHTML = `<div class="alert alert-e">Please select your company</div>`;
    return;
  }
  if(!name || !email || !pw){
    if(err) err.innerHTML = `<div class="alert alert-e">Please fill all required fields</div>`;
    return;
  }
  if(pw.length < 6){
    if(err) err.innerHTML = `<div class="alert alert-e">Password must be 6+ characters</div>`;
    return;
  }
  if(!fromOTP && err) err.innerHTML = `<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">🔎 Verifying company…</div>`;

  try{
    const company = fromOTP ? prefilledData.company : null;
    if(!company){
      const companies = await sb('companies','GET',null,`?company_id=eq.${encodeURIComponent(code)}&select=*`);
      if(!companies || !companies.length){
        if(err) err.innerHTML = `<div class="alert alert-e">Selected company no longer exists. Please pick again.</div>`;
        return;
      }
      // re-assign for non-OTP path
      var companyResolved = companies[0];
    }
    const finalCompany = fromOTP ? company : companyResolved;

    // Check if email already exists in this company
    const existing = await sb('employees','GET',null,`?email=eq.${encodeURIComponent(email)}&company_id=eq.${encodeURIComponent(code)}&select=id,emp_id,status,name`);
    if(existing && existing.length){
      const row = existing[0];
      // If they were previously offboarded, reactivate instead of blocking
      if(row.status === 'Inactive'){
        if(err) err.innerHTML = `<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">🔄 Reactivating your previous account…</div>`;
        const reactivatePayload = {
          name,
          phone: phone || null,
          status: 'Active',
          password_hash: pw,
          self_registered: true,
          date_of_joining: new Date().toISOString().slice(0,10)
        };
        const rRes = await fetch(`${SB_URL}/rest/v1/employees?id=eq.${row.id}`, {
          method: 'PATCH',
          headers: {...SB_HDR, 'Prefer': 'return=representation'},
          body: JSON.stringify(reactivatePayload)
        });
        if(!rRes.ok){
          const errText = await rRes.text();
          if(err) err.innerHTML = `<div class="alert alert-e">Could not reactivate: ${errText.substring(0,200)}</div>`;
          return;
        }
        if(err) err.innerHTML = `<div class="alert alert-s">✅ Welcome back to ${finalCompany.name}! Employee ID: <strong>${row.emp_id}</strong></div>`;
        try{
          await sbSaveNotification({
            msg: `🔄 ${name} rejoined as an employee (ID: ${row.emp_id})`,
            type: 'success',
            to: finalCompany.admin_email,
            company_id: code
          });
        }catch(e){}
        setTimeout(()=>{
          currentCompany = finalCompany;
          currentRole = 'employee';
          D.loggedIn = true;
          D.settings = {...D.settings, company: finalCompany.name};
          save();
          syncFromSupabase().then(()=>{
            const emp = D.employees.find(e => e.email && e.email.toLowerCase() === email);
            if(emp){ currentEmployee = emp; renderEmployeeApp(); }
            else { location.reload(); }
          });
        }, 1500);
        return;
      }
      // Active account already exists — block
      if(err) err.innerHTML = `<div class="alert alert-e">This email is already registered in ${finalCompany.name}. <a href="#" onclick="event.preventDefault();showSignin()" style="font-weight:700">Sign in instead?</a></div>`;

    }

    // Generate fresh emp ID — find next free number across all rows (active + inactive)
    const allEmps = await sb('employees','GET',null,`?company_id=eq.${encodeURIComponent(code)}&select=emp_id`);
    const usedNumbers = new Set();
    (allEmps || []).forEach(e => {
      const m = (e.emp_id || '').match(/-(\d+)$/);
      if(m) usedNumbers.add(parseInt(m[1], 10));
    });
    let nextNum = 1;
    while(usedNumbers.has(nextNum)) nextNum++;
    const empId = `${code}-${String(nextNum).padStart(3,'0')}`;

    const payload = {
      emp_id: empId,
      name,
      email,
      phone: phone || null,
      department: 'Unassigned',
      role: 'Employee',
      status: 'Active',
      salary: 0,
      date_of_joining: new Date().toISOString().slice(0,10),
      self_registered: true,
      password_hash: pw,
      emp_type: 'office',
      company_id: code
    };

    const res = await fetch(`${SB_URL}/rest/v1/employees`, {
      method: 'POST',
      headers: {...SB_HDR, 'Prefer': 'return=representation'},
      body: JSON.stringify(payload)
    });
    if(!res.ok){
      const errText = await res.text();
      if(err) err.innerHTML = `<div class="alert alert-e">Could not create account: ${errText.substring(0,200)}</div>`;
      return;
    }
    if(err) err.innerHTML = `<div class="alert alert-s">✅ Welcome to ${finalCompany.name}! Employee ID: <strong>${empId}</strong></div>`;

    // Notify company admin
    try{
      await sbSaveNotification({
        msg: `👋 ${name} just joined as an employee (ID: ${empId})`,
        type: 'success',
        to: finalCompany.admin_email,
        company_id: code
      });
    }catch(e){/* non-critical */}

    setTimeout(()=>{
      // Auto-login as employee
      currentCompany = finalCompany;
      currentRole = 'employee';
      D.loggedIn = true;
      D.settings = {...D.settings, company: finalCompany.name};
      save();
      syncFromSupabase().then(()=>{

function startEmpFaceLogin(email, faceData){
  frLoadModels();
  frStartCamera('emp-face-video','emp-face-canvas', result=>{
    const s=$('emp-face-status');
    if(!s)return;
    if(result.type==='cam-error'){s.textContent=result.msg;s.style.color='#ef4444';return;}
    if(result.type==='no-face'){s.textContent='No face detected — look at the camera';s.style.color='var(--muted)';return;}
    if(result.type==='detected'){
      s.textContent='🔍 Verifying your face…';s.style.color='#0f766e';
      // Match ONLY against this specific employee's stored face
      const isMatch=frMatchSingleEmployee(result.descriptor, faceData.descriptor);
      if(isMatch){
        frStopCamera();
        s.textContent=`✅ Face verified! Logging in…`;s.style.color='#166534';
        // Find employee object and login
        const emp=D.employees.find(e=>e.email.toLowerCase()===email);
        if(emp){
          setTimeout(()=>loginAsEmployee(emp),800);
        } else {
          // Fetch from Supabase if not in local cache
          sb('employees','GET',null,`?email=eq.${encodeURIComponent(email)}&limit=1`).then(rows=>{
            if(rows&&rows.length){
              const row=rows[0];
              const empObj={id:row.emp_id||row.id,_uuid:row.id,name:row.name,email:row.email,phone:row.phone||'',dob:row.dob||'',dept:row.department||'',role:row.role||'',status:row.status||'Active',salary:row.salary||0,joined:row.date_of_joining||'',passwordHash:row.password_hash||'emp@123'};
              loginAsEmployee(empObj);
            }
          });
        }
      } else {
        s.textContent='❌ Face does not match. Try again or use password.';s.style.color='#ef4444';
      }
    }
  });
}

async function doEmpLogin(){
  const em=($('emp-email')||{}).value?.trim(),pw=($('emp-pass')||{}).value;
  if(!em||!pw){if($('emp-login-err'))$('emp-login-err').innerHTML=`<div class="alert alert-e">Enter your email and password</div>`;return;}
  if($('emp-login-err'))$('emp-login-err').innerHTML=`<div class="alert alert-e" style="color:#0f766e;background:#f0fdf4;border-color:#bbf7d0">Checking credentials…</div>`;

  // Check Supabase for password
  const rows=await sb('employees','GET',null,`?email=eq.${encodeURIComponent(em.toLowerCase())}&limit=1`);
  let empObj=null;
  let passwordCorrect=false;

  if(!rows||!rows.length){
    const local=D.employees.find(e=>e.email.toLowerCase()===em.toLowerCase());
    if(!local){if($('emp-login-err'))$('emp-login-err').innerHTML=`<div class="alert alert-e">No employee found. <span style="cursor:pointer;text-decoration:underline" onclick="showRegister()">Register here</span></div>`;return;}
    passwordCorrect = pw===(local.passwordHash||'emp@123');
    empObj=local;
  } else {
    const row=rows[0];
    passwordCorrect = pw===(row.password_hash||'emp@123');
    empObj={id:row.emp_id||row.id,_uuid:row.id,name:row.name,email:row.email,phone:row.phone||'',dob:row.dob||'',dept:row.department||'',role:row.role||'',status:row.status||'Active',salary:row.salary||0,joined:row.date_of_joining||'',selfRegistered:row.self_registered||false,passwordHash:row.password_hash||'emp@123'};
    const idx=D.employees.findIndex(e=>e.email.toLowerCase()===em.toLowerCase());
    if(idx>=0)D.employees[idx]=empObj; else D.employees.push(empObj);
    save();
  }

  if(passwordCorrect){
    // ✅ Password correct — login directly, no OTP needed
    if($('emp-login-err'))$('emp-login-err').innerHTML='';
    loginAsEmployee(empObj);
  } else {
    // ❌ Wrong password — send OTP as fallback
    if(!empObj.email){if($('emp-login-err'))$('emp-login-err').innerHTML=`<div class="alert alert-e">Wrong password</div>`;return;}
    if($('emp-login-err'))$('emp-login-err').innerHTML=`<div class="alert alert-e" style="color:#92400e;background:#fffbeb;border-color:#fde68a">⚠️ Wrong password. Sending OTP to your email as alternative…</div>`;
    _empLoginData=empObj;
    const result=await sendOTP(empObj.email, empObj.name);
    if(!result.success){
      if($('emp-login-err'))$('emp-login-err').innerHTML=`<div class="alert alert-e">Wrong password. OTP also failed to send. Please check your credentials.</div>`;
      return;
    }
    if($('emp-login-form'))$('emp-login-form').classList.add('hidden');
    if($('emp-otp-form'))$('emp-otp-form').classList.remove('hidden');
    if($('emp-otp-email-show'))$('emp-otp-email-show').textContent=empObj.email;
    if($('emp-login-err'))$('emp-login-err').innerHTML='';
    startOTPTimer('emp-otp-timer');
  }
}

async function loginAsEmployee(emp){
  const nearest=geoState.status==='ok'?getNearestOffice(geoState.lat,geoState.lng):null;
  const log={id:Date.now(),user:emp.name,email:emp.email,time:new Date().toLocaleString('en-IN'),lat:geoState.lat,lng:geoState.lng,accuracy:geoState.accuracy,address:geoState.address||geoState.city||'Unknown',geoStatus:geoState.status,inOffice:nearest?nearest.inZone:null,nearestOffice:nearest?nearest.name:null,method:'password'};
  if(!D.loginLogs)D.loginLogs=[];D.loginLogs.unshift(log);
  sbLoginLog(log);
  currentRole='employee';currentEmployee=emp;D.loggedIn=true;
  empPage='emp-dashboard';
  save();

  // Show quick loading state while we verify KYC status from server
  $('root').innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f2f5">
    <div style="text-align:center">
      <div style="font-size:40px;margin-bottom:12px">👋</div>
      <div style="font-size:16px;font-weight:600;color:#111">Welcome back, ${emp.name.split(' ')[0]}!</div>
      <div style="font-size:13px;color:#64748b;margin-top:6px">Loading your workspace…</div>
    </div>
  </div>`;

  // Fetch fresh KYC status from server — do not trust cached value.
  // This prevents re-prompting users who already completed KYC if their local cache is stale.
  try{
    if(emp._uuid){
      const fresh = await sb('employees','GET',null,`?id=eq.${emp._uuid}&select=kyc_completed,kyc_completed_at,aadhaar_number,pan_number,dob,address,bank_account,bank_ifsc,bank_name,emergency_contact_name,emergency_contact_phone,emergency_contact_relation`);
      if(fresh && fresh[0]){
        const row = fresh[0];
        emp.kycCompleted = !!row.kyc_completed;
        emp.kycCompletedAt = row.kyc_completed_at;
        // Hydrate any other fields that might be stale
        if(row.aadhaar_number) emp.aadhaar = row.aadhaar_number;
        if(row.pan_number) emp.pan = row.pan_number;
        if(row.dob) emp.dob = row.dob;
        if(row.address) emp.address = row.address;
        if(row.bank_account) emp.bankAccount = row.bank_account;
        if(row.bank_ifsc) emp.bankIfsc = row.bank_ifsc;
        if(row.bank_name) emp.bankName = row.bank_name;
        if(row.emergency_contact_name) emp.emergencyName = row.emergency_contact_name;
        if(row.emergency_contact_phone) emp.emergencyPhone = row.emergency_contact_phone;
        if(row.emergency_contact_relation) emp.emergencyRelation = row.emergency_contact_relation;
        // Persist so next time is fast
        const idx=D.employees.findIndex(e=>e._uuid===emp._uuid);
        if(idx>=0) D.employees[idx]=emp;
        save();
      }
    }
  }catch(e){ console.warn('Fresh KYC check failed, using cached value:', e); }

  // KYC gate: block portal only if KYC is incomplete according to DB (or cache if DB unreachable)
  if(!emp.kycCompleted){ renderKYCGate(); return; }
  renderEmployeeApp();
}
