// ─── PAYROLL ENGINE ───────────────────────────────────────────────
// Calculates payslip components from CTC using the company salary structure.
// All amounts in INR per month.
// Calculates payslip components from CTC using the company's salary structure.
// Target: Net Pay is ~84% of CTC (matches both ₹25K→₹21,200 and ₹55K→₹46,228 reference payslips)
// For higher CTCs (≥₹45K), MPP kicks in which keeps the ratio stable at scale.
function calcSalaryBreakdown(ctc){
  const c=parseFloat(ctc)||0;
  if(c<=0) return null;

  // Guard: CTC too low for this salary structure.
  // Fixed components (Conveyance 1,250 + Travel 1,600 = 2,850) + min deductions
  // (PF ₹1,800×2 + PT ₹200 = ₹3,800) = ₹6,650 floor just for fixed + deductions.
  // Plus Basic/HRA/LTA make this viable only above ~₹20,000 CTC.
  const MIN_VIABLE_CTC = 20000;
  if(c < MIN_VIABLE_CTC){
    return {
      ctc: c,
      basic:0, hra:0, lta:0, conveyance:0, travel:0, special:0, deputation:0,
      totalEarnings:0, gross:0,
      professionalTax:0, employeePf:0, employerPf:0, mpp:0, esic:0, otherDeduction:0,
      totalDeductions:0, netBeforeLop:0,
      _belowMinimum: true,
      _minRequired: MIN_VIABLE_CTC
    };
  }

  const basic = Math.round(c * 0.45);
  const hra = Math.round(basic * 0.40);
  const lta = Math.round(basic * 0.10);
  const conveyance = 1250;
  const travel = 1600;
  const deputation = 0;
  const professionalTax = 200;
  const esic = 0;
  const otherDeduction = 0;

  // PF: 12% of Basic, clamped between ₹1,800 (min) and ₹2,430 (max = 12% × ₹20,250)
  const pfBase = Math.max(15000, Math.min(basic, 20250));
  const employeePf = Math.round(pfBase * 0.12);
  const employerPf = Math.round(pfBase * 0.12);

  // MPP: activates when Basic ≥ ₹20,250 (i.e., CTC ≥ ₹45,000)
  // At higher CTCs, MPP scales to keep the Net/CTC ratio at ~84% (matches reference payslips)
  let mpp = 0;
  if(basic >= 20250){
    // Base MPP = 6.75% of CTC (matches ₹55K reference: 6.75% × 55,000 = ₹3,712)
    // For very high CTCs, scale MPP so total deductions keep Net around 84% of CTC
    const baseMpp = Math.floor(c * 0.0675);
    // Total target deductions to hit ~84% Net: CTC × 0.16 minus PT minus Employer PF contributed to Gross
    // Simpler: for CTC > 55K, scale MPP to match the reference ratio
    // At 55K: MPP = 3712 (6.75%). Above that, MPP absorbs the extra balancer.
    const targetNet = Math.round(c * 0.8405);
    const targetDeductions = c - targetNet;
    // MPP = target deductions - PT - both PFs
    const mppNeeded = targetDeductions - professionalTax - employeePf - employerPf;
    mpp = Math.max(baseMpp, mppNeeded);
  }

  // Special Allowance = balancer: CTC minus (everything else including MPP)
  const special = Math.max(0,
    c - basic - hra - lta - conveyance - travel - deputation
      - mpp - employeePf - employerPf - professionalTax - esic - otherDeduction
  );

  const totalEarnings = basic + hra + lta + conveyance + travel + special + deputation;
  const totalDeductions = professionalTax + employeePf + employerPf + mpp + esic + otherDeduction;
  // Net Pay equals Total Earnings (per reference payslip convention)
  const netBeforeLop = totalEarnings;

  return {
    ctc: c,
    basic, hra, lta, conveyance, travel, special, deputation,
    totalEarnings,
    gross: totalEarnings,
    professionalTax, employeePf, employerPf, mpp, esic, otherDeduction,
    totalDeductions,
    netBeforeLop
  };
}

// Count approved leaves for an employee in a given month (YYYY-MM)
function countLeaveDaysInMonth(empName, yearMonth){
  if(!D.leaves) return 0;
  const [year, month] = yearMonth.split('-').map(Number);
  const monthStart = new Date(year, month-1, 1);
  const monthEnd = new Date(year, month, 0); // last day of month
  let days=0;
  D.leaves.forEach(lv=>{
    if(lv.emp!==empName) return;
    if(lv.status!=='Approved') return;
    const from=new Date(lv.from), to=new Date(lv.to||lv.from);
    // Intersect [from,to] with [monthStart, monthEnd]
    const start = from < monthStart ? monthStart : from;
    const end = to > monthEnd ? monthEnd : to;
    if(end >= start){
      const d = Math.floor((end - start)/86400000) + 1;
      days += d;
    }
  });
  return days;
}

// Returns the paid leaves accrued per month based on admin settings (CL + EL).
// Defaults to 1 + 1 = 2/month if settings not configured.
function getPaidLeavesPerMonth(){
  const s=D.settings||{};
  const cl=parseFloat(s.clPerMonth);
  const el=parseFloat(s.elPerMonth);
  const perMonth=(isNaN(cl)?1:cl)+(isNaN(el)?1:el);
  return perMonth;
}

// Calculate paid-leave balance available for the given month.
// Accrues `getPaidLeavesPerMonth()` days/month starting from joining date. Cumulative.
function getPaidLeaveQuotaFor(emp, yearMonth){
  const perMonth=getPaidLeavesPerMonth();
  if(!emp.joined) return perMonth; // fallback if unknown join date
  const [y, m] = yearMonth.split('-').map(Number);
  const monthStart = new Date(y, m-1, 1);
  const joined = new Date(emp.joined);
  if(joined > monthStart){
    // Not yet employed during most of the month — no accrual
    if(joined.getFullYear()===y && joined.getMonth()===m-1) return perMonth; // joined this month: full quota
    return 0;
  }
  // Months completed from join date through the payslip month (inclusive)
  const joinY=joined.getFullYear(), joinM=joined.getMonth();
  const monthsElapsed = (y - joinY)*12 + (m-1 - joinM) + 1;
  return monthsElapsed * perMonth;
}

// Count paid leaves USED up to (but not including) the payslip month — i.e. those that already consumed balance
function getPaidLeaveUsedBefore(emp, yearMonth){
  if(!emp.joined) return 0;
  const [y, m] = yearMonth.split('-').map(Number);
  const monthStart = new Date(y, m-1, 1);
  if(!D.leaves) return 0;
  let used=0;
  D.leaves.forEach(lv=>{
    if(lv.emp!==emp.name) return;
    if(lv.status!=='Approved') return;
    const to=new Date(lv.to||lv.from);
    if(to < monthStart) used += (lv.days||0);
  });
  return used;
}

// Compute the full payslip including leave adjustments
function calcPayslip(emp, yearMonth){
  const breakdown = calcSalaryBreakdown(emp.salary||0);
  if(!breakdown) return null;
  const [y, m] = yearMonth.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();

  const leavesThisMonth = countLeaveDaysInMonth(emp.name, yearMonth);
  const quota = getPaidLeaveQuotaFor(emp, yearMonth);
  const usedBefore = getPaidLeaveUsedBefore(emp, yearMonth);
  const availablePaid = Math.max(0, quota - usedBefore);
  const paidUsedThisMonth = Math.min(leavesThisMonth, availablePaid);
  const lopDays = Math.max(0, leavesThisMonth - availablePaid);
  const perDaySalary = Math.round(breakdown.gross / daysInMonth);
  const lopDeduction = lopDays * perDaySalary;
  const daysWorked = daysInMonth - leavesThisMonth;
  const daysPaid = daysInMonth - lopDays;
  const carryForward = Math.max(0, availablePaid - paidUsedThisMonth);

  const netPay = breakdown.netBeforeLop - lopDeduction;

  // Leave balances to show on payslip — use the actual admin-configured CL and EL accrual rates
  const s=D.settings||{};
  const clPerMonth=parseFloat(s.clPerMonth);
  const elPerMonth=parseFloat(s.elPerMonth);
  const clRate=isNaN(clPerMonth)?1:clPerMonth;
  const elRate=isNaN(elPerMonth)?1:elPerMonth;

  // Months employed (same calc as quota)
  let monthsElapsed=1;
  if(emp.joined){
    const jd=new Date(emp.joined);
    const joinY=jd.getFullYear(), joinM=jd.getMonth();
    monthsElapsed=Math.max(1,(y-joinY)*12 + (m-1-joinM) + 1);
  }

  // CL balance: accrued − used
  const clAccrued = Math.floor(monthsElapsed * clRate);
  const clUsedBefore=(D.leaves||[]).filter(l=>l.emp===emp.name && (l.type==='Casual'||l.type==='CL') && l.status==='Approved' && new Date(l.to||l.from) < new Date(y, m-1, 1)).reduce((s,l)=>s+(l.days||0),0);
  const clUsedThis=(D.leaves||[]).filter(l=>l.emp===emp.name && (l.type==='Casual'||l.type==='CL') && l.status==='Approved' && (()=>{const t=new Date(l.to||l.from);return t.getFullYear()===y && t.getMonth()===m-1;})()).reduce((s,l)=>s+(l.days||0),0);
  const clBalance = Math.max(0, clAccrued - clUsedBefore - clUsedThis);

  // EL balance: accrued − used
  const elAccrued = Math.floor(monthsElapsed * elRate);
  const elUsedBefore = (D.leaves||[]).filter(l=>l.emp===emp.name && (l.type==='Earned'||l.type==='EL') && l.status==='Approved' && new Date(l.to||l.from) < new Date(y, m-1, 1)).reduce((s,l)=>s+(l.days||0),0);
  const elUsedThis = (D.leaves||[]).filter(l=>l.emp===emp.name && (l.type==='Earned'||l.type==='EL') && l.status==='Approved' && (()=>{const t=new Date(l.to||l.from);return t.getFullYear()===y && t.getMonth()===m-1;})()).reduce((s,l)=>s+(l.days||0),0);
  const elBalance = Math.max(0, elAccrued - elUsedBefore - elUsedThis);
  const tlBalance = clBalance + elBalance;

  return {
    ...breakdown,
    month: yearMonth,
    daysInMonth, daysWorked, daysPaid,
    leavesThisMonth, paidUsedThisMonth, lopDays, lopDeduction, perDaySalary, carryForward,
    quota, availablePaid,
    clBalance, elBalance, tlBalance,
    netPay: Math.max(0, netPay)
  };
}

function monthLabel(ym){
  const [y,m]=ym.split('-').map(Number);
  return new Date(y,m-1,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
}
function currentMonth(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
// Generate last 12 months as options
function last12Months(){
  const out=[]; const d=new Date();
  for(let i=0;i<12;i++){
    const y=d.getFullYear(), m=d.getMonth()+1;
    out.push(`${y}-${String(m).padStart(2,'0')}`);
    d.setMonth(d.getMonth()-1);
  }
  return out;
}

function printPayslip(){
  const area=document.getElementById('payslip-print-area');
  if(!area){window.print();return;}
  const w=window.open('','_blank','width=900,height=700');
  if(!w){window.print();return;}
  w.document.write(`<!DOCTYPE html><html><head><title>Payslip</title>
    <style>body{margin:0;padding:20px;font-family:Arial,sans-serif}@media print{body{padding:0}}</style>
    </head><body>${area.outerHTML}<script>window.onload=()=>setTimeout(()=>window.print(),300)<\/script></body></html>`);
  w.document.close();
}

async function uploadProfilePhoto(file){
  const emp=currentEmployee;
  const msg=$('personal-msg');
  if(!file) return;
  if(!['image/jpeg','image/png'].includes(file.type)){
    if(msg)msg.innerHTML=`<div class="alert alert-e">Only JPG or PNG files allowed</div>`;
    return;
  }
  if(file.size>2*1024*1024){
    if(msg)msg.innerHTML=`<div class="alert alert-e">File too large (max 2 MB)</div>`;
    return;
  }
  if(msg)msg.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">📤 Uploading photo…</div>`;
  try{
    const ext=file.name.split('.').pop().toLowerCase();
    const path=`profile-photos/${emp._uuid||emp.id}-${Date.now()}.${ext}`;
    const uploadRes=await fetch(`${SB_URL}/storage/v1/object/kyc-documents/${path}`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${SB_KEY}`,'apikey':SB_KEY,'Content-Type':file.type},
      body:file
    });
    if(!uploadRes.ok){
      const err=await uploadRes.text();
      if(msg)msg.innerHTML=`<div class="alert alert-e">Upload failed: ${err.substring(0,100)}</div>`;
      return;
    }
    // Get a long-lived signed URL (1 year)
    const signRes=await fetch(`${SB_URL}/storage/v1/object/sign/kyc-documents/${path}`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${SB_KEY}`,'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({expiresIn:31536000})
    });
    if(!signRes.ok){
      if(msg)msg.innerHTML=`<div class="alert alert-e">Could not generate URL</div>`;
      return;
    }
    const {signedURL}=await signRes.json();
    const fullUrl=`${SB_URL}/storage/v1${signedURL}`;
    // Save to employee record
    const r=await sb('employees','PATCH',{photo_url:fullUrl},`?id=eq.${emp._uuid}`);
    if(!r){
      if(msg)msg.innerHTML=`<div class="alert alert-e">Could not save photo URL</div>`;
      return;
    }
    emp.photoUrl=fullUrl;
    const idx=D.employees.findIndex(e=>e._uuid===emp._uuid);
    if(idx>=0) D.employees[idx]=emp;
    save();
    if(msg)msg.innerHTML=`<div class="alert alert-s">✅ Profile photo updated</div>`;
    showToast('✅ Photo uploaded','success');
    // Re-render profile tab
    navEmp('emp-profile');
  }catch(e){
    console.error('Photo upload error:',e);
    if(msg)msg.innerHTML=`<div class="alert alert-e">Upload failed: ${e.message}</div>`;
  }
}

async function handleKYCFileUpload(input, docType){
  const emp=currentEmployee;
  const msg=$('kyc-upload-msg');
  const file=input.files&&input.files[0];
  if(!file) return;

  // Show inline progress
  if(msg) msg.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">📤 Uploading ${file.name}… (${(file.size/1024).toFixed(0)} KB)</div>`;

  // Delete old file if replacing
  const oldPath=emp[docType+'FilePath'];
  if(oldPath) await deleteKYCFile(oldPath);

  const newPath=await uploadKYCFile(file, emp._uuid, docType);
  if(!newPath){
    if(msg) msg.innerHTML=`<div class="alert alert-e">Upload failed. Check file size (max 5 MB) and type (JPG/PNG/PDF).</div>`;
    input.value='';
    return;
  }

  // Update employee row with new path
  const patchCol=docType==='aadhaar'
    ? {aadhaar_file_path:newPath, aadhaar_file_name:file.name, aadhaar_uploaded_at:new Date().toISOString()}
    : {pan_file_path:newPath, pan_file_name:file.name, pan_uploaded_at:new Date().toISOString()};
  const r=await sb('employees','PATCH',patchCol,`?id=eq.${emp._uuid}`);
  if(!r){
    if(msg) msg.innerHTML=`<div class="alert alert-e">File uploaded but failed to save reference. Contact admin.</div>`;
    return;
  }

  // Update local
  emp[docType+'FilePath']=newPath;
  emp[docType+'FileName']=file.name;
  emp[docType+'UploadedAt']=new Date().toISOString();
  const idx=D.employees.findIndex(e=>e._uuid===emp._uuid); if(idx>=0) D.employees[idx]=emp;
  save();

  // Notify admin
  const docLabel=docType==='aadhaar'?'Aadhaar':'PAN';
  await sbSaveNotification({msg:`📎 ${emp.name} uploaded ${docLabel} document`,type:'info'});

  showToast(`✅ ${docLabel} uploaded`,'success');
  if(msg) msg.innerHTML=`<div class="alert alert-s">✅ ${docLabel} document uploaded successfully</div>`;
  setTimeout(()=>renderEmployeeApp(),800);
}

async function removeKYCFile(docType){
  const emp=currentEmployee;
  const docLabel=docType==='aadhaar'?'Aadhaar':'PAN';
  if(!confirm(`Remove the uploaded ${docLabel} document?\n\nThe file will be deleted permanently. You can upload a new one anytime.`)) return;

  const path=emp[docType+'FilePath'];
  if(path) await deleteKYCFile(path);

  const patchCol=docType==='aadhaar'
    ? {aadhaar_file_path:null, aadhaar_file_name:null, aadhaar_uploaded_at:null}
    : {pan_file_path:null, pan_file_name:null, pan_uploaded_at:null};
  await sb('employees','PATCH',patchCol,`?id=eq.${emp._uuid}`);

  emp[docType+'FilePath']='';
  emp[docType+'FileName']='';
  emp[docType+'UploadedAt']=null;
  const idx=D.employees.findIndex(e=>e._uuid===emp._uuid); if(idx>=0) D.employees[idx]=emp;
  save();

  showToast(`${docLabel} removed`,'info');
  renderEmployeeApp();
}

async function submitKYCRequest(){
  const emp=currentEmployee;
  const msg=$('kyc-edit-msg');
  const aadhaar=($('pf-aadhaar')||{}).value?.replace(/\s/g,'')||'';
  const pan=($('pf-pan')||{}).value?.trim()||'';

  if(!aadhaar&&!pan){if(msg)msg.innerHTML=`<div class="alert alert-e">Nothing to update</div>`;return;}
  if(aadhaar&&!/^\d{12}$/.test(aadhaar)){if(msg)msg.innerHTML=`<div class="alert alert-e">Aadhaar must be 12 digits</div>`;return;}
  if(pan&&!/^[A-Z]{5}[0-9]{4}[A-Z]$/.test(pan)){if(msg)msg.innerHTML=`<div class="alert alert-e">PAN format invalid (ABCDE1234F)</div>`;return;}
  if(aadhaar===emp.aadhaar&&pan===emp.pan){if(msg)msg.innerHTML=`<div class="alert alert-e">No changes detected</div>`;return;}

  // Duplicate checks
  if(aadhaar&&aadhaar!==emp.aadhaar){
    const dup=await sb('employees','GET',null,`?aadhaar_number=eq.${aadhaar}&id=neq.${emp._uuid}&select=id`);
    if(dup&&dup.length){if(msg)msg.innerHTML=`<div class="alert alert-e">This Aadhaar is already registered to another employee</div>`;return;}
  }
  if(pan&&pan!==emp.pan){
    const dup=await sb('employees','GET',null,`?pan_number=eq.${pan}&id=neq.${emp._uuid}&select=id`);
    if(dup&&dup.length){if(msg)msg.innerHTML=`<div class="alert alert-e">This PAN is already registered to another employee</div>`;return;}
  }

  if(msg)msg.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">Saving…</div>`;

  const payload={};
  if(aadhaar) payload.aadhaar_number=aadhaar;
  if(pan) payload.pan_number=pan;

  const r=await sb('employees','PATCH',payload,`?id=eq.${emp._uuid}`);
  if(!r){if(msg)msg.innerHTML=`<div class="alert alert-e">Save failed. Try again.</div>`;return;}

  if(aadhaar) emp.aadhaar=aadhaar;
  if(pan) emp.pan=pan;
  const idx=D.employees.findIndex(e=>e._uuid===emp._uuid); if(idx>=0) D.employees[idx]=emp;
  save();

  await sbSaveNotification({msg:`🪪 ${emp.name} updated their KYC details`,type:'info'});

  if(msg)msg.innerHTML=`<div class="alert alert-s">✅ KYC details saved</div>`;
  showToast('✅ KYC saved','success');
  setTimeout(()=>renderEmployeeApp(),800);
}

async function verifyProfileOTP(kind, msgElId){
  const emp=currentEmployee;
  const msg=$(msgElId);
  const otp=($('profile-otp-input')||{}).value?.trim()||'';
  if(!otp){if(msg)msg.innerHTML=`<div class="alert alert-e">Enter OTP</div>`;return;}
  const v=verifyOTP(emp.email, otp);
  if(!v.valid){if(msg)msg.innerHTML=`<div class="alert alert-e">${v.msg}</div>`;return;}

  if(kind==='bank'){
    const payload=_bankPendingPayload;
    if(!payload){if(msg)msg.innerHTML=`<div class="alert alert-e">No pending update</div>`;return;}
    const r=await sb('employees','PATCH',payload,`?id=eq.${emp._uuid}`);
    if(!r){if(msg)msg.innerHTML=`<div class="alert alert-e">Update failed</div>`;return;}
    Object.assign(emp,{bankAccount:payload.bank_account,bankIfsc:payload.bank_ifsc,bankName:payload.bank_name});
    const idx=D.employees.findIndex(e=>e._uuid===emp._uuid); if(idx>=0) D.employees[idx]=emp;
    save();
    await sbSaveNotification({msg:`🏦 ${emp.name} updated their bank details`,type:'warning'});
    _bankPendingPayload=null;
    if(msg)msg.innerHTML=`<div class="alert alert-s">✅ Bank details updated</div>`;
    showToast('✅ Bank details saved','success');
    setTimeout(()=>renderEmployeeApp(),1200);
  }
}

  });

  // Welcome — joined today or within last 7 days
  D.employees.forEach(e=>{
    if(!e.joined)return;
    try{
      const d=parseAnyDate(e.joined);
      if(!d)return;
      const dt=new Date(d);
      const diff=(today-dt)/86400000;
      if(diff>=0 && diff<7) result.welcome.push({emp:e,days:Math.floor(diff)});
    }catch(ex){}
  });

  // Sendoff — Inactive employees (recently marked inactive)
  D.employees.forEach(e=>{
    if(e.status==='Inactive') result.sendoff.push(e);
  });

  // Festivals today or upcoming 7 days
  INDIAN_FESTIVALS.forEach(f=>{
    const fDate=new Date(today.getFullYear(),f.month-1,f.day);
    const diff=Math.floor((fDate-today)/86400000);
    if(diff>=0 && diff<=7) result.festivals.push({...f,daysAway:diff});
    // Also check if today
    if(f.month===todayM && f.day===todayD) {
      if(!result.festivals.find(x=>x.name===f.name))
        result.festivals.unshift({...f,daysAway:0});
    }
  });

  return result;
}

// Dismissed celebration IDs are stored per-day in localStorage so they don't reappear until tomorrow
function getDismissedCelebrations(){
  try{ return JSON.parse(localStorage.getItem('wf_dismissed_celebrations')||'{}'); }catch(e){ return {}; }
}
function setDismissedCelebrations(o){ localStorage.setItem('wf_dismissed_celebrations', JSON.stringify(o)); }
function isCelDismissed(key){
  const today=todayStr();
  const d=getDismissedCelebrations();
  return d[today]&&d[today].includes(key);
}
function dismissCelebration(key){
  const today=todayStr();
  const d=getDismissedCelebrations();
  // Clean up any old days
  Object.keys(d).forEach(k=>{if(k!==today) delete d[k];});
  if(!d[today]) d[today]=[];
  if(!d[today].includes(key)) d[today].push(key);
  setDismissedCelebrations(d);
  if(currentRole==='admin') nav(currentPage); else renderEmployeeApp();
}
function dismissAllCelebrations(){
  if(!confirm('Dismiss all celebrations for today?')) return;
  const today=todayStr();
  const d=getDismissedCelebrations();
  d[today]=['__all__'];
  setDismissedCelebrations(d);
  if(currentRole==='admin') nav(currentPage); else renderEmployeeApp();
}

async function wizSaveAndContinue(step){

  }
  if(step===2){

    const el=parseFloat($('wiz-el')?.value)||1;
    D.settings.hours=hours;
    D.settings.weekOff=weekOff;
    D.settings.clPerMonth=cl;
    D.settings.elPerMonth=el;

async function wizHandleCSV(file){
  const msg=$('wiz-upload-msg');
  if(!file){return;}
  const ext=file.name.split('.').pop().toLowerCase();
  if(!['csv','xlsx','xls'].includes(ext)){
    if(msg)msg.innerHTML=`<div class="alert alert-e">Unsupported file type. Please upload CSV or Excel (.xlsx/.xls).</div>`;
    return;
  }
  if(file.size>5*1024*1024){
    if(msg)msg.innerHTML=`<div class="alert alert-e">File too large (max 5 MB).</div>`;
    return;
  }
  if(msg)msg.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">📤 Reading ${file.name}…</div>`;

  try{
    const text=await file.text();
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){
      if(msg)msg.innerHTML=`<div class="alert alert-e">File has no data rows. Please include at least one employee.</div>`;
      return;
    }
    const header=lines[0].split(',').map(h=>h.trim().toLowerCase());
    const col=(name)=>header.findIndex(h=>h.includes(name));
    const idxName=col('name'), idxEmail=col('email'), idxPhone=col('phone'), idxDob=col('birth')>=0?col('birth'):col('dob');
    const idxDept=col('department')>=0?col('department'):col('dept'), idxRole=col('role'), idxSalary=col('ctc')>=0?col('ctc'):col('salary');
    const idxJoined=col('joining')>=0?col('joining'):col('joined'), idxType=col('type');

    if(idxName<0||idxEmail<0){
      if(msg)msg.innerHTML=`<div class="alert alert-e">Missing required columns. Need at least <strong>Name</strong> and <strong>Email</strong>. Download the template for reference.</div>`;
      return;
    }

    const newEmployees=[], errors=[];
    for(let i=1;i<lines.length;i++){
      const cells=lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      const name=cells[idxName]||'';
      const email=cells[idxEmail]||'';
      if(!name||!email){ errors.push(`Row ${i+1}: missing name or email`); continue; }
      newEmployees.push({
        name, email,
        phone:idxPhone>=0?cells[idxPhone]:'',
        dob:idxDob>=0?cells[idxDob]:'',
        dept:idxDept>=0?cells[idxDept]||'Engineering':'Engineering',
        role:idxRole>=0?cells[idxRole]||'Employee':'Employee',
        salary:idxSalary>=0?parseInt(cells[idxSalary])||0:0,
        joined:idxJoined>=0?cells[idxJoined]||todayStr():todayStr(),
        empType:idxType>=0?(cells[idxType]||'office').toLowerCase():'office',
        status:'Active',
        passwordHash:'emp@123'
      });
    }

    if(!newEmployees.length){
      if(msg)msg.innerHTML=`<div class="alert alert-e">No valid rows found. ${errors.length?'Errors: '+errors.slice(0,3).join('; '):''}</div>`;
      return;
    }

    // Save each to Supabase
    let saved=0, skipped=0;
    for(const e of newEmployees){
      // Check duplicate by email
      const existing=D.employees.find(x=>x.email.toLowerCase()===e.email.toLowerCase());
      if(existing){ skipped++; continue; }
      const newId='EMP-'+String(D.employees.length+saved+101).padStart(3,'0');
      e.id=newId;
      D.employees.push(e);
      const r=await sbSaveEmployee(e);
      if(r&&r[0])e._uuid=r[0].id;
      saved++;
    }
    save();

    if(msg)msg.innerHTML=`<div class="alert alert-s">✅ Bulk import: <strong>${saved} employees added</strong>${skipped?`, ${skipped} skipped (duplicate email)`:''}${errors.length?`, ${errors.length} skipped (errors)`:''}</div>`;
    showToast(`✅ Imported ${saved} employees`,'success');
    await sbSaveNotification({msg:`📥 Bulk import: ${saved} employees added${skipped?`, ${skipped} skipped`:''}`,type:'success'});
  }catch(e){
    console.error('CSV parse error:',e);
    if(msg)msg.innerHTML=`<div class="alert alert-e">Could not read file: ${e.message}. Check the format and try again.</div>`;
  }
}

function getFilteredEmps(){
  const q=($('emp-q')||{}).value?.toLowerCase()||'';

  const reg=($('emp-reg')||{}).value||'';
  return D.employees.filter(e=>{
    const mq=!q||e.name.toLowerCase().includes(q)||e.email.toLowerCase().includes(q)||(e.dept||'').toLowerCase().includes(q)||(e.role||'').toLowerCase().includes(q)||(e.phone||'').includes(q);
    const md=!d||e.dept===d;
    const ms=!s||e.status===s;
    const mr=!reg||(reg==='self'&&e.selfRegistered)||(reg==='admin'&&!e.selfRegistered);
    return mq&&md&&ms&&mr;
  });
}

function handleCSVDrop(e){
  e.preventDefault();
  $('csv-dropzone').style.borderColor='';
  const file=e.dataTransfer.files[0];
  if(file) readCSVFile(file);
}

function handleCSVFile(input){
  const file=input.files[0];
  if(file) readCSVFile(file);
}

function readCSVFile(file){
  if(!file.name.match(/\.(csv|txt)$/i)){
    if($('csv-file-preview'))$('csv-file-preview').innerHTML=`<span style="color:#991b1b">Please select a .csv file</span>`;
    return;
  }
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    const lines=text.trim().split('\n').filter(l=>l.trim());
    let dataLines=lines;
    if(lines[0].toLowerCase().includes('name')&&lines[0].toLowerCase().includes('email')) dataLines=lines.slice(1);
    if($('csv-file-preview'))$('csv-file-preview').innerHTML=`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px">✅ <strong>${file.name}</strong> loaded — <strong>${dataLines.length} employees</strong> found. Click "Import employees" to proceed.</div>`;
    if($('csv-dropzone'))$('csv-dropzone').innerHTML=`<div style="font-size:24px;margin-bottom:.5rem">✅</div><div style="font-weight:600;font-size:14px;color:#166534">${file.name}</div><div style="font-size:12px;color:#166534">${dataLines.length} employees ready to import</div>`;
    // Store parsed text for importCSV to use
    window._csvRawText=text;
  };
  reader.readAsText(file);
}

function parseCSVLine(line){
  const result=[],re=/("([^"]*)"|([^,]*))(,|$)/g;
  let m;while((m=re.exec(line))!==null){result.push((m[2]!==undefined?m[2]:m[3]||'').trim());if(m[4]==='')break;}
  return result;
}

function previewCSV(){
  const raw=($('csv-input')||{}).value||'';
  const lines=raw.trim().split('\n').filter(l=>l.trim());
  const prev=$('csv-preview');if(!prev)return;
  if(!lines.length){prev.innerHTML='';return;}
  let dataLines=lines;
  if(lines[0].toLowerCase().includes('name')&&lines[0].toLowerCase().includes('email')) dataLines=lines.slice(1);
  prev.innerHTML=`<span style="color:#0f766e;font-weight:600">${dataLines.length} employee${dataLines.length!==1?'s':''} found in CSV</span>`;
}

async function importCSV(){
  const raw=window._csvRawText||($('csv-input')||{}).value||'';
  window._csvRawText=null;
  const lines=raw.trim().split('\n').filter(l=>l.trim());
  const err=$('csv-err');
  if(!lines.length){if(err)err.innerHTML=`<div class="alert alert-e">No data found</div>`;return;}
  let dataLines=lines;
  if(lines[0].toLowerCase().includes('name')&&lines[0].toLowerCase().includes('email')) dataLines=lines.slice(1);
  if(!dataLines.length){if(err)err.innerHTML=`<div class="alert alert-e">No employee data found after header</div>`;return;}

  const btn=document.querySelector('#bulk-import-wrap .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Importing…';}
  showSyncBanner(`Saving ${dataLines.length} employees…`);

  // Parse all rows first
  const toImport=[];
  for(const line of dataLines){
    const cols=parseCSVLine(line);
    if(cols.length<2) continue;
    const [name,email,phone,rawDob,dept,role,salary]=cols;
    if(!name||!email) continue;
    let dob='';
    if(rawDob&&rawDob.trim()) dob=parseAnyDate(rawDob.trim());
    toImport.push({name:name.trim(),email:email.trim().toLowerCase(),phone:(phone||'').trim(),dob,dept:(dept||'Engineering').trim(),role:(role||'Employee').trim(),salary:parseInt(salary)||0});
  }

  let saved=0, failed=0;

  for(let i=0;i<toImport.length;i++){
    const row=toImport[i];
    showSyncBanner(`Saving ${i+1}/${toImport.length}: ${row.name}…`);

    // Check if employee already exists in Supabase by email
    const existing=await sb('employees','GET',null,`?email=eq.${encodeURIComponent(row.email)}&select=id,emp_id`);
    
    const empId=(existing&&existing.length>0)?existing[0].emp_id:('EMP-'+String(D.employees.length+101+saved).padStart(3,'0'));
    const empUUID=(existing&&existing.length>0)?existing[0].id:null;

    const payload={
      emp_id:empId, name:row.name, email:row.email,
      department:row.dept, role:row.role, status:'Active',
      salary:row.salary, date_of_joining:todayStr(),
      password_hash:'emp@123', emp_type:'office',
      company_id: currentCompany ? currentCompany.company_id : 'KSPL'
    };
    if(row.phone) payload.phone=row.phone;
    if(row.dob&&/^\d{4}-\d{2}-\d{2}$/.test(row.dob)) payload.dob=row.dob;

    let r;
    if(empUUID){
      // Update existing by UUID
      r=await sb('employees','PATCH',payload,`?id=eq.${empUUID}`);
    } else {
      // Try insert - if fails due to emp_id conflict, find and update that record
      r=await sb('employees','POST',payload);
      if(!r){
        // emp_id conflict - find the conflicting record and update it
        const conflict=await sb('employees','GET',null,`?emp_id=eq.${encodeURIComponent(empId)}&select=id`);
        if(conflict&&conflict.length>0){
          r=await sb('employees','PATCH',payload,`?id=eq.${conflict[0].id}`);
          if(r&&r[0]) empUUID=r[0].id;
        }
      }
    }

    if(r){
      const uuid=empUUID||(r[0]?r[0].id:null);
      // Update local cache
      const localIdx=D.employees.findIndex(e=>e.email===row.email);
      const empObj={id:empId,_uuid:uuid,name:row.name,email:row.email,phone:row.phone,dob:row.dob,dept:row.dept,role:row.role,status:'Active',salary:row.salary,joined:todayStr(),passwordHash:'emp@123',empType:'office'};
      if(localIdx>=0) D.employees[localIdx]=empObj;
      else D.employees.push(empObj);
      saved++;
    } else {
      failed++;
      console.error('❌ Failed:',row.name);
    }
  }

  const notif={msg:`Import complete: ${saved} saved, ${failed} failed`,type:'success',read:false};
  D.notifications.unshift({id:Date.now(),...notif,time:'Just now'});
  sbSaveNotification(notif);
  save();
  hideSyncBanner();
  closeModal('bulk-import-wrap');
  nav('employees');
  setTimeout(()=>alert(`✅ Import complete!\n\n${saved} employees saved to database\n${failed} failed\n\nAll data is saved permanently.`),100);
}

async function saveEmp(){
  const data={name:$('ef-name').value,email:$('ef-email').value,phone:$('ef-ph').value,dob:$('ef-dob-birth').value,joined:$('ef-doj').value,dept:$('ef-dept').value,role:$('ef-role').value,salary:parseInt($('ef-sal').value)||0,status:$('ef-st').value,empType:$('ef-type').value||'office',bloodGroup:$('ef-bg')?.value||''};
  if(!data.name||!data.email){alert('Name and email are required');return;}
  if(editingEmpId){
    const existing=D.employees.find(e=>e.id===editingEmpId);
    // Capture old values BEFORE mutating
    const oldRole=existing.role, oldDept=existing.dept, oldStatus=existing.status;
    Object.assign(existing,data);
    await sbSaveEmployee(existing);
    // Notify employee of meaningful changes
    if(existing.email){
      const changes=[];
      if(data.role!==oldRole&&data.role) changes.push(`role changed to <strong>${data.role}</strong>`);
      if(data.dept!==oldDept&&data.dept) changes.push(`department changed to <strong>${data.dept}</strong>`);
      if(data.status!==oldStatus&&data.status){
        if(data.status==='Inactive') changes.push(`account <strong>deactivated</strong>`);
        else if(oldStatus==='Inactive'&&data.status==='Active') changes.push(`account <strong>reactivated</strong>`);
        else changes.push(`status changed to <strong>${data.status}</strong>`);
      }
      if(changes.length){
        await sbSaveNotification({
          msg:`📋 Admin updated your profile: ${changes.join(', ')}`,
          type:'info',
          to:existing.email
        });
      }
    }
  } else {
    const newId=$('ef-empid-val').value.trim()||'EMP-'+String(D.employees.length+101).padStart(3,'0');
    data.id=newId;data.passwordHash='emp@123';
    D.employees.push(data);
    const r=await sbSaveEmployee(data);
    if(r&&r[0])data._uuid=r[0].id;
    // Admin notification (untargeted)
    await sbSaveNotification({msg:`New employee ${data.name} added`,type:'info'});
    // Welcome notification for the new employee themselves
    if(data.email){
      await sbSaveNotification({
        msg:`👋 Welcome to ${D.settings.company||'the company'}, ${data.name.split(' ')[0]}! Log in with your email and the default password, then complete your profile details.`,
        type:'success',
        to:data.email
      });
    }
  }
  save();
  nav(currentPage);
}

function maskAadhaar(a){ if(!a) return '—'; const s=a.replace(/\s/g,''); return s.length===12?`XXXX XXXX ${s.slice(-4)}`:'XXXX XXXX XXXX'; }
function maskPAN(p){ if(!p) return '—'; return p.length===10?`${p.slice(0,3)}XX${p.slice(-3)}`:'XXXXXXXXXX'; }
function maskAccount(a){ if(!a) return '—'; if(a.length<=4) return 'XX'+a; return 'XXXX'+a.slice(-4); }

let _searchDebounce=null;
function runUniversalSearch(query){
  clearTimeout(_searchDebounce);
  _searchDebounce=setTimeout(()=>_doUniversalSearch(query), 200);
}
function _doUniversalSearch(query){
  const box=$('univ-search-results');
  if(!box) return;
  const q=(query||'').trim().toLowerCase();
  if(!q){ box.style.display='none'; box.innerHTML=''; return; }
  const qDigits=q.replace(/\D/g,'');

  const results={employees:[],leaves:[],expenses:[],performance:[],attendance:[],holidays:[],pages:[],departments:[]};

  // 1. Employees (full profile search)
  (D.employees||[]).forEach(e=>{
    const hit = (e.name && e.name.toLowerCase().includes(q)) ||
                (e.id && e.id.toLowerCase().includes(q)) ||
                (e.email && e.email.toLowerCase().includes(q)) ||
                (e.pan && e.pan.toLowerCase().includes(q)) ||
                (e.role && e.role.toLowerCase().includes(q)) ||
                (e.dept && e.dept.toLowerCase().includes(q)) ||
                (e.bankName && e.bankName.toLowerCase().includes(q)) ||
                (qDigits.length>=3 && (
                  (e.aadhaar && e.aadhaar.includes(qDigits)) ||
                  (e.phone && e.phone.replace(/\D/g,'').includes(qDigits)) ||
                  (e.bankAccount && e.bankAccount.includes(qDigits)) ||
                  (e.uan && e.uan.includes(qDigits))
                ));
    if(hit) results.employees.push(e);
  });

  // 2. Leaves (by employee name, type, status, reason, date)
  (D.leaves||[]).forEach(l=>{
    const blob=`${l.emp||''} ${l.type||''} ${l.status||''} ${l.reason||''} ${l.from||''} ${l.to||''}`.toLowerCase();
    if(blob.includes(q)) results.leaves.push(l);
  });

  // 3. Expenses (by employee name, category, description, status, amount)
  (D.expenses||[]).forEach(ex=>{
    const blob=`${ex.emp||''} ${ex.cat||''} ${ex.desc||''} ${ex.status||''} ${ex.amount||''} ${ex.date||''}`.toLowerCase();
    if(blob.includes(q)) results.expenses.push(ex);
  });

  // 4. Performance reviews
  (D.performance||[]).forEach(p=>{
    const blob=`${p.emp||''} ${p.quarter||''} ${p.rating||''} ${p.notes||''}`.toLowerCase();
    if(blob.includes(q)) results.performance.push(p);
  });

  // 5. Attendance (by employee name, date, status)
  (D.attendance||[]).forEach(a=>{
    const blob=`${a.empName||''} ${a.date||''} ${a.status||''}`.toLowerCase();
    if(blob.includes(q)) results.attendance.push(a);
  });

  // 6. Holidays
  (D.holidays||[]).forEach(h=>{
    const blob=`${h.name||''} ${h.date||''} ${h.type||''}`.toLowerCase();
    if(blob.includes(q)) results.holidays.push(h);
  });

  // 7. Departments
  const deptList=[...new Set((D.employees||[]).map(e=>e.dept).filter(Boolean))];
  deptList.forEach(d=>{ if(d.toLowerCase().includes(q)) results.departments.push(d); });

  // 8. Navigation / pages
  const pages=[
    {name:'Dashboard',emoji:'⊞',page:'dashboard',keywords:'home overview stats'},
    {name:'Employees',emoji:'👥',page:'employees',keywords:'directory staff people'},
    {name:'Attendance',emoji:'📅',page:'attendance',keywords:'check-in check-out present absent'},
    {name:'Leave',emoji:'🏖',page:'leave',keywords:'vacation off sick'},
    {name:'Payroll',emoji:'💰',page:'payroll',keywords:'salary payslip ctc pay'},
    {name:'Expenses',emoji:'🧾',page:'expenses',keywords:'claim reimbursement travel food'},
    {name:'Performance',emoji:'⭐',page:'performance',keywords:'review rating appraisal'},
    {name:'Holidays',emoji:'📆',page:'holidays',keywords:'festival national company calendar'},
    {name:'Org Chart',emoji:'🏢',page:'orgchart',keywords:'hierarchy reporting structure'},
    {name:'ID Cards',emoji:'🪪',page:'idcards',keywords:'badge identity'},
    {name:'Locations',emoji:'🗺',page:'locations',keywords:'office map login'},
    {name:'Notifications',emoji:'🔔',page:'notifications',keywords:'alerts updates'},
    {name:'Settings',emoji:'⚙',page:'settings',keywords:'preferences config'},
    {name:'Companies',emoji:'🏭',page:'companies',keywords:'tenant organization'}
  ];
  pages.forEach(p=>{
    if(p.name.toLowerCase().includes(q)||p.keywords.includes(q)) results.pages.push(p);
  });

  // Count totals
  const totalHits = results.employees.length+results.leaves.length+results.expenses.length+results.performance.length+results.attendance.length+results.holidays.length+results.pages.length+results.departments.length;
  if(!totalHits){
    box.innerHTML=`<div style="padding:14px;color:var(--muted);font-size:13px;text-align:center">No results for "${query}"</div>`;
    box.style.display='block';return;
  }

  // Build HTML with sections
  let html='';

  // Section renderer
  const section=(label,count,rows)=>{
    if(!rows.length) return '';
    return `<div style="padding:6px 12px;background:#f8fafc;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid #f1f5f9">${label} <span style="background:#e2e8f0;color:#475569;padding:1px 6px;border-radius:8px;margin-left:4px">${count}</span></div>${rows.join('')}`;
  };

  // Pages (top, for quick nav)
  if(results.pages.length){
    const pageRows=results.pages.slice(0,5).map(p=>`
      <div onclick="closeSearch();nav('${p.page}')" style="padding:8px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;display:flex;align-items:center;gap:10px" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">

function infoCard(label,value){
  return `<div style="background:#f8fafc;border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px">${label}</div><div style="font-size:13px;font-weight:600;margin-top:2px;word-break:break-word">${value}</div></div>`;
}
function infoCardMasked(label, rawValue, masked, full){
  const safeFull=(full||'').replace(/'/g,"&#39;");
  return `<div class="masked-card" data-full="${safeFull}" data-masked="${masked}" style="background:#f8fafc;border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px">${label}</div><div class="masked-val" style="font-size:13px;font-weight:600;margin-top:2px;word-break:break-word;font-family:monospace">${masked}</div></div>`;
}
function renderAdminKYCDocBadge(docType, e, label){
  const path=e[docType+'FilePath'];
  const fileName=e[docType+'FileName'];
  const uploadedAt=e[docType+'UploadedAt'];
  if(!path){
    return `<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:18px">⚠️</span>
      <div style="flex:1">
        <div style="font-size:11px;color:#92400e;font-weight:700">${label}</div>
        <div style="font-size:11px;color:#92400e;margin-top:1px">Not uploaded</div>
      </div>
    </div>`;
  }
  const ago=uploadedAt?new Date(uploadedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
  const safePath=path.replace(/'/g,"&#39;");
  const safeLabel=label.replace(/'/g,"&#39;");
  return `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px" onclick="viewKYCDocument('${safePath}','${safeLabel}')" onmouseover="this.style.background='#dcfce7'" onmouseout="this.style.background='#f0fdf4'" title="Click to view/download">
    <span style="font-size:18px">📎</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;color:#166534;font-weight:700">${label}</div>
      <div style="font-size:11px;color:#166534;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fileName||'Document'}${ago?' · '+ago:''}</div>
    </div>
    <span style="font-size:11px;color:#166534;font-weight:700">View ↗</span>
  </div>`;
}
function toggleRevealIdentity(btn){
  const revealed=btn.getAttribute('data-revealed')==='1';
  const cards=document.querySelectorAll('.masked-card');
  cards.forEach(c=>{
    const val=c.querySelector('.masked-val');
    if(!val) return;
    val.textContent = revealed ? c.getAttribute('data-masked') : c.getAttribute('data-full');
  });
  btn.setAttribute('data-revealed', revealed?'0':'1');
  btn.textContent = revealed ? '👁 Reveal' : '🔒 Hide';
}

async function loadAdminSessions(date){
  showSyncBanner('Loading sessions…');
  const cFilter=currentCompany?`&company_id=eq.${currentCompany.company_id}`:'';
  const rows=await sb('attendance_sessions','GET',null,`?date=eq.${date}&order=check_in.desc${cFilter}`);
  hideSyncBanner();
  if(!rows||!rows.length){showToast('No sessions found for this date','info');return;}
  if(!D.attSessions) D.attSessions=[];
  // Merge with local sessions
  rows.forEach(r=>{
    const existing=D.attSessions.find(s=>s._uuid===r.id);
    if(!existing){
      D.attSessions.unshift({
        _uuid:r.id,_localId:r.id,
        empName:r.employee_name,empId:r.employee_id,
        date:r.date,checkIn:r.check_in,checkOut:r.check_out,
        location:r.location||'',lat:r.latitude,lng:r.longitude,
        photo:''
      });
    }
  });
  save();
  nav('attendance');
}
function markAllAtt(status){
  document.querySelectorAll('.att-st').forEach(s=>s.value=status);
}
async function saveAtt(){
  const date=window._attDate||todayStr();
  showSyncBanner('Saving attendance…');
  const promises=[];
  // First fetch existing records for this date from Supabase to get UUIDs
  const existingRecs=await sb('attendance','GET',null,`?date=eq.${date}&select=id,employee_name`).catch(()=>null);

  document.querySelectorAll('.att-st').forEach(s=>{
    const id=s.dataset.id,emp=D.employees.find(e=>e.id===id);
    if(!emp)return;
    if(s.value==='Not marked') return; // Don't save Not marked
    const inT=document.querySelector(`.att-in[data-id="${id}"]`).value;
    const outT=document.querySelector(`.att-out[data-id="${id}"]`).value;

    // Find existing record — check Supabase result first, then local cache
    const sbRec=existingRecs?existingRecs.find(r=>r.employee_name===emp.name):null;
    const localRec=D.attendance.find(a=>a.date===date&&(a.empName===emp.name||a.empId===emp._uuid));

    // Remove old local records for this employee+date
    D.attendance=D.attendance.filter(a=>!(a.date===date&&(a.empName===emp.name||a.empId===emp._uuid)));

    const rec={empId:emp._uuid||id,empName:emp.name,date,status:s.value,in:inT,out:outT};
    // Use UUID from Supabase or local cache for update
    if(sbRec&&sbRec.id) rec._uuid=sbRec.id;
    else if(localRec&&localRec._uuid) rec._uuid=localRec._uuid;

    D.attendance.unshift(rec);
    promises.push(sbSaveAttendance(rec));
  });
  await Promise.all(promises);
  save();hideSyncBanner();
  showToast('✅ Attendance saved for '+date,'success');
  nav('attendance');
}

function pgLeaveBalance(){
  const types=getLeaveTypes().filter(t=>t.annualQuota>0); // only accruing types

  const year=new Date().getFullYear();

  return `

    <div>

      <div style="font-size:12px;color:var(--muted)">Accrued minus used, per employee per leave type</div>
    </div>
    <button class="btn btn-sec" style="font-size:12px" onclick="exportBalanceCSV()">⬇ Export CSV</button>
  </div>

  <div class="card" style="padding:0;overflow-x:auto">
    <table style="min-width:900px">
      <thead><tr>
        <th style="padding-left:12px;text-align:left">Employee</th>
        ${types.map(t=>`<th style="text-align:center"><span style="color:${t.color}">${t.icon} ${t.code}</span></th>`).join('')}
        <th style="text-align:center">Total</th>
      </tr></thead>
      <tbody>${emps.map(e=>{
        const bal=calcLeaveBalanceFor(e, types, year);
        const total=types.reduce((s,t)=>s+(bal[t.code]?.balance||0),0);
        return `<tr>
          <td style="padding-left:12px"><div style="display:flex;align-items:center;gap:8px">${av(e.name,28)}<div><div style="font-weight:600">${e.name}</div><div style="font-size:11px;color:var(--muted)">${e.dept||'—'}</div></div></div></td>
          ${types.map(t=>{
            const b=bal[t.code]||{balance:0,used:0,accrued:0};
            const pct=b.accrued>0?Math.round((b.balance/b.accrued)*100):0;
            const color=pct>50?'#16a34a':pct>20?'#f59e0b':'#ef4444';
            return `<td style="text-align:center"><div style="font-weight:700;color:${color};font-size:14px">${b.balance.toFixed(1)}</div><div style="font-size:10px;color:var(--muted)">${b.used}/${b.accrued}</div></td>`;
          }).join('')}
          <td style="text-align:center"><strong style="color:var(--navy);font-size:15px">${total.toFixed(1)}</strong></td>
        </tr>`;
      }).join('')||`<tr><td colspan="${types.length+2}" style="text-align:center;padding:2rem;color:var(--muted)">No active employees</td></tr>`}</tbody>
    </table>
  </div>

  <div style="margin-top:1rem;padding:12px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;font-size:12px;color:#1e40af">
    💡 Balance = Accrued − Used. Colour coding: <span style="color:#16a34a;font-weight:700">green &gt; 50%</span>, <span style="color:#f59e0b;font-weight:700">amber 20-50%</span>, <span style="color:#ef4444;font-weight:700">red &lt; 20%</span>
  </div>`;
}

function calcLeaveBalanceFor(emp, types, year){
  const bal={};
  const yearStart=new Date(year,0,1);
  const now=new Date();
  types.forEach(t=>{
    let accrued=0;
    if(t.accrual==='yearly') accrued=t.annualQuota;
    else if(t.accrual==='monthly'){
      // Months elapsed since year start OR join date, whichever later
      const joinDate=emp.joined?new Date(emp.joined):yearStart;
      const start=joinDate>yearStart?joinDate:yearStart;
      const monthsElapsed=(now.getFullYear()-start.getFullYear())*12 + (now.getMonth()-start.getMonth())+1;
      accrued=Math.max(0, monthsElapsed*t.accrualRate);
    }
    const used=(D.leaves||[]).filter(l=>l.emp===emp.name && (l.type===t.code||l.type===t.name) && l.status==='Approved' && new Date(l.from).getFullYear()===year).reduce((s,l)=>s+(l.days||0),0);
    bal[t.code]={accrued, used, balance:Math.max(0,accrued-used)};
  });
  return bal;
}

function exportLeaveLogsCSV(){
  const rows=D.leaves||[];
  if(!rows.length){ showToast('Nothing to export','info'); return; }
  const hdr=['Employee','Type','From','To','Days','Status','Reason','Applied On'];
  const lines=[hdr.join(',')];
  rows.forEach(l=>{
    const esc=s=>`"${String(s||'').replace(/"/g,'""')}"`;
    lines.push([esc(l.emp),esc(l.type),esc(l.from),esc(l.to),l.days||0,esc(l.status),esc(l.reason),esc(l.appliedAt||'')].join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`LeaveLogs_${todayStr()}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast(`✅ Downloaded ${rows.length} rows`,'success');
}

function exportBalanceCSV(){
  const year=new Date().getFullYear();
  const types=getLeaveTypes().filter(t=>t.annualQuota>0);
  const emps=D.employees.filter(e=>e.status==='Active');
  const hdr=['Employee','Department', ...types.map(t=>`${t.code} Accrued`), ...types.map(t=>`${t.code} Used`), ...types.map(t=>`${t.code} Balance`)];
  const lines=[hdr.join(',')];
  emps.forEach(e=>{

      ...types.map(t=>bal[t.code]?.accrued||0),

    ];
    lines.push(row.join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');

async function updateSalaryStructure(id, newStruct){
  const e=D.employees.find(x=>x.id===id);
  if(!e) return;

  if(old===newStruct) return;
  e.salaryStructure=newStruct;
  await sbSaveEmployee(e);
  save();
  nav('payroll');
}

async function updateSalary(id,val){
  const v=parseInt(val);
  if(isNaN(v)||v<=0){ showToast('Enter a valid CTC','info'); return; }
  const e=D.employees.find(x=>x.id===id||x._uuid===id);
  if(!e){ console.error('Employee not found locally:', id); showToast('Employee not found','info'); return; }
  const oldSalary=e.salary||0;
  if(v===oldSalary) return;
  if(!e.email){ showToast('Cannot update: employee has no email','info'); return; }

  console.log(`💰 Updating CTC for ${e.name} (${e.email}): ${oldSalary} → ${v}`);

  // Step 1: If we don't have a UUID locally, look up by email in Supabase
  let uuid = e._uuid;
  if(!uuid){
    console.log('  ⏳ No local UUID, looking up by email...');
    try{
      const byEmail=await sb('employees','GET',null,`?email=eq.${encodeURIComponent(e.email)}&select=id`);
      if(byEmail && byEmail[0] && byEmail[0].id){
        uuid = byEmail[0].id;
        e._uuid = uuid;
        console.log('  ✓ Found UUID by email:', uuid);
      }
    }catch(err){
      console.error('  ❌ Email lookup failed:', err);
    }
  }

  // Step 2: If still no UUID, the employee doesn't exist in Supabase yet — create them
  if(!uuid){
    console.log('  ⏳ Employee not in Supabase yet, creating new row...');
    e.salary=v;
    const r=await sbSaveEmployee(e);
    if(!r){
      showToast(`❌ Failed to create ${e.name} in database`,'info');
      return;
    }
    if(r&&r[0]&&r[0].id){
      e._uuid=r[0].id;
      console.log('  ✓ Created in Supabase:', r[0].id);
    }
    save();
    showToast(`✅ Created ${e.name} with CTC ₹${fmt(v)}`,'success');
    nav('payroll');
    return;
  }

  // Step 3: We have a UUID — do a narrow PATCH with verification
  console.log('  ⏳ PATCHing salary on UUID:', uuid);
  try{
    const res = await fetch(`${SB_URL}/rest/v1/employees?id=eq.${uuid}`,{
      method:'PATCH',
      headers:{...SB_HDR, 'Prefer':'return=representation'},
      body:JSON.stringify({salary:v})
    });
    if(!res.ok){
      const errText=await res.text();
      console.error('  ❌ PATCH failed:', res.status, errText);
      showToast(`❌ Save failed: ${errText.substring(0,100)}`,'info');
      return;
    }
    const rows=await res.json();
    console.log('  ✓ Server returned:', rows);
    if(!rows||!rows[0]){
      showToast('❌ Update returned no row','info');
      return;
    }
    if(parseInt(rows[0].salary)!==v){
      showToast(`❌ DB saved ₹${rows[0].salary}, expected ₹${v}`,'info');
      return;
    }
  }catch(err){
    console.error('  ❌ Network error:', err);
    showToast('❌ Network error while saving','info');
    return;
  }

  // Success — update local cache
  e.salary=v;
  const idx=D.employees.findIndex(x=>x._uuid===uuid||x.id===e.id);
  if(idx>=0) D.employees[idx]=e;
  save();

  // Notify employee of salary change
  if(e.email){
    const direction=v>oldSalary?'revised upward':'revised';
    await sbSaveNotification({
      msg:`💰 Your salary has been ${direction} to ₹${fmt(v)} per month`,
      type:'success',
      to:e.email
    });
  }

  showToast(`✅ ${e.name}: ₹${fmt(oldSalary)} → ₹${fmt(v)}`,'success');
  nav('payroll');
}

function pgLocations(){
  if(!D.loginLogs)D.loginLogs=[];
  if(!D.officeLocations)D.officeLocations=[];
  const logs=D.loginLogs;
  const total=logs.length;
  const inOff=logs.filter(l=>l.inOffice===true).length;
  const outOff=logs.filter(l=>l.inOffice===false).length;
  const uniqueEmps=[...new Set(logs.map(l=>l.user))];

  function statusBadge(log){
    if(log.inOffice===true) return '<span class="badge bg">✅ In-office</span>';
    const emp=D.employees.find(e=>e.name===log.user);
    if(!log.lat) return '<span class="badge bx">📵 No GPS</span>';
    return '<span class="badge ba">📍 Outside office</span>';
  }

  function trailSVG(empLogs){
    const valid=empLogs.filter(l=>l.lat&&l.lng).slice(0,15);
    if(!valid.length) return '<div style="background:#f1f5f9;border-radius:8px;height:130px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center">No GPS data yet<br>Location captured on next login</div>';
    const lats=valid.map(l=>l.lat),lngs=valid.map(l=>l.lng);
    const pad=0.006;
    const minLa=Math.min(...lats)-pad,maxLa=Math.max(...lats)+pad;
    const minLn=Math.min(...lngs)-pad,maxLn=Math.max(...lngs)+pad;
    const w=320,h=130;
    const tx=ln=>((ln-minLn)/(maxLn-minLn||.001))*w;
    const ty=la=>(1-(la-minLa)/(maxLa-minLa||.001))*h;
    const pts=valid.map(l=>`${tx(l.lng)},${ty(l.lat)}`).join(' ');
    const dots=valid.map((l,i)=>`<circle cx="${tx(l.lng)}" cy="${ty(l.lat)}" r="${i===0?9:5}" fill="${i===0?'#3b82f6':l.inOffice?'#22c55e':'#f59e0b'}" opacity="${Math.max(0.35,1-i*0.06)}"/><text x="${tx(l.lng)}" y="${ty(l.lat)+3.5}" text-anchor="middle" font-size="7" fill="#fff">${i===0?'●':i+1}</text>`).join('');
    return `<svg width="100%" viewBox="0 0 ${w} ${h}" style="border-radius:8px;border:1px solid var(--border);background:#f0f9ff">
      <polyline points="${pts}" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="5,3"/>
      ${dots}
      <text x="3" y="10" font-size="8" fill="#64748b">🔵 Latest  🟡 Remote  🟢 In-office</text>
    </svg>`;
  }

  return `
  <div class="page-hd">
    <div><div class="pg-title">Login location tracking</div><div class="pg-sub">Every employee login GPS captured automatically</div></div>
    <button class="btn btn-primary" onclick="nav('settings')">⚙ Office locations</button>
  </div>

  <div class="stat-grid">
    <div class="stat"><div class="stat-lbl">Total logins</div><div class="stat-val">${total}</div><div class="stat-sub">All employees</div></div>
    <div class="stat"><div class="stat-lbl">In-office</div><div class="stat-val">${inOff}</div><div class="stat-sub">${total?Math.round(inOff/total*100):0}% of logins</div></div>
    <div class="stat"><div class="stat-lbl">Outside office</div><div class="stat-val">${outOff}</div><div class="stat-sub">Travel / remote / field</div></div>
    <div class="stat"><div class="stat-lbl">Employees tracked</div><div class="stat-val">${uniqueEmps.length}</div><div class="stat-sub">Unique logins</div></div>
  </div>

  <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 16px;margin-bottom:1rem;font-size:13px;color:#1e40af">
    <strong>📍 How this works:</strong> Every time any employee logs in — whether from office, home, another city, or a client site — their GPS location is automatically captured and shown here. No manual entry needed.
  </div>

  <div class="card" style="margin-bottom:1rem">
    <div class="card-hd">
      <h3>Per-employee location history</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="loc-emp-filter" onchange="renderLocTrails()" style="width:180px;font-size:12px">
          <option value="">All employees</option>
          ${uniqueEmps.map(n=>`<option>${n}</option>`).join('')}
        </select>
        <select id="loc-date-filter" onchange="renderLocTrails()" style="width:140px;font-size:12px">
          <option value="">All dates</option>
          <option value="today">Today</option>
          <option value="week">This week</option>
          <option value="month">This month</option>
        </select>
      </div>
    </div>
    <div id="loc-trails-grid" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem">
      ${uniqueEmps.slice(0,6).map(name=>{
        const empLogs=logs.filter(l=>l.user===name);
        const last=empLogs[0];
        const emp=D.employees.find(e=>e.name===name);
        return `<div style="border:1px solid var(--border);border-radius:10px;padding:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            ${av(name,30)}
            <div style="min-width:0">
              <div style="font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
              <div style="font-size:10px;color:var(--muted)">${emp?emp.role+' · '+emp.dept:'Employee'}</div>
            </div>
          </div>
          ${trailSVG(empLogs)}
          <div style="margin-top:8px;font-size:11px">
            <div style="color:var(--muted)">Last login: ${last?last.time:'Never'}</div>
            <div style="color:var(--muted);margin-top:2px">📍 ${last&&last.address?last.address:'No location data'}</div>
            <div style="margin-top:4px;display:flex;align-items:center;gap:6px">
              ${last?statusBadge(last):''}<span style="color:var(--muted)">${empLogs.length} login${empLogs.length!==1?'s':''}</span>
            </div>
          </div>
        </div>`;
      }).join('')}

    ${uniqueEmps.length>6?`<div style="text-align:center;margin-top:12px"><button class="btn btn-sec" onclick="showAllTrails()">Show all ${uniqueEmps.length} employees</button></div>`:''}

    <div class="card-hd" style="padding:1rem 1rem 0">
      <h3>Complete login log</h3>
      <span class="muted">${logs.length} records</span>
    </div>
    ${logs.length===0?`<div style="text-align:center;padding:2rem;color:var(--muted)">No login records yet.<br>Location is captured automatically on next login.</div>`:

function renderLocTrails(){
  const empF=($('loc-emp-filter')||{}).value||'';
  const dateF=($('loc-date-filter')||{}).value||'';
  const grid=$('loc-trails-grid');if(!grid)return;
  let logs=D.loginLogs||[];
  const now=new Date();
  if(dateF==='today') logs=logs.filter(l=>{try{return new Date(l.time).toDateString()===now.toDateString();}catch(e){return true;}});
  if(dateF==='week') logs=logs.filter(l=>{try{return (now-new Date(l.time))<7*86400000;}catch(e){return true;}});
  if(dateF==='month') logs=logs.filter(l=>{try{return new Date(l.time).getMonth()===now.getMonth();}catch(e){return true;}});
  const emps=empF?[empF]:[...new Set(logs.map(l=>l.user))];
  grid.style.gridTemplateColumns=`repeat(${Math.min(emps.length,3)},minmax(0,1fr))`;
  grid.innerHTML=emps.map(name=>{
    const empLogs=logs.filter(l=>l.user===name);
    const last=empLogs[0];
    const emp=D.employees.find(e=>e.name===name);
    const valid=empLogs.filter(l=>l.lat&&l.lng).slice(0,15);
    let trailHtml='';
    if(!valid.length){trailHtml='<div style="background:#f1f5f9;border-radius:8px;height:130px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;text-align:center">No GPS data</div>';}
    else{
      const pad=0.006,lats=valid.map(l=>l.lat),lngs=valid.map(l=>l.lng);
      const minLa=Math.min(...lats)-pad,maxLa=Math.max(...lats)+pad,minLn=Math.min(...lngs)-pad,maxLn=Math.max(...lngs)+pad;
      const w=320,h=130,tx=ln=>((ln-minLn)/(maxLn-minLn||.001))*w,ty=la=>(1-(la-minLa)/(maxLa-minLa||.001))*h;
      const pts=valid.map(l=>`${tx(l.lng)},${ty(l.lat)}`).join(' ');
      const dots=valid.map((l,i)=>`<circle cx="${tx(l.lng)}" cy="${ty(l.lat)}" r="${i===0?9:5}" fill="${i===0?'#3b82f6':l.inOffice?'#22c55e':'#f59e0b'}" opacity="${Math.max(0.35,1-i*0.06)}"/><text x="${tx(l.lng)}" y="${ty(l.lat)+3.5}" text-anchor="middle" font-size="7" fill="#fff">${i===0?'●':i+1}</text>`).join('');
      trailHtml=`<svg width="100%" viewBox="0 0 ${w} ${h}" style="border-radius:8px;border:1px solid var(--border);background:#f0f9ff"><polyline points="${pts}" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="5,3"/>${dots}<text x="3" y="10" font-size="8" fill="#64748b">🔵 Latest  🟡 Outside  🟢 In-office</text></svg>`;
    }
    const inOfficeCnt=empLogs.filter(l=>l.inOffice===true).length;
    const badge=last?(last.inOffice===true?'<span class="badge bg">✅ In-office</span>':last.lat?'<span class="badge ba">📍 Outside</span>':'<span class="badge bx">No GPS</span>'):'';
    return `<div style="border:1px solid var(--border);border-radius:10px;padding:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">${av(name,30)}<div style="min-width:0"><div style="font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div><div style="font-size:10px;color:var(--muted)">${emp?emp.role+' · '+emp.dept:'Employee'}</div></div></div>
      ${trailHtml}
      <div style="margin-top:8px;font-size:11px">
        <div style="color:var(--muted)">Last: ${last?last.time:'Never'}</div>
        <div style="color:var(--muted);margin-top:1px">📍 ${last&&last.address?last.address:'—'}</div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px">${badge}<span style="color:var(--muted)">${inOfficeCnt}/${empLogs.length} in-office</span></div>
      </div>
    </div>`;
  }).join('');
}

function showAllTrails(){
  const grid=$('loc-trails-grid');if(!grid)return;
  const empFilter=($('loc-emp-filter')||{}).value||'';
  const emps=empFilter?[empFilter]:[...new Set((D.loginLogs||[]).map(l=>l.user))];
  grid.style.gridTemplateColumns=`repeat(${Math.min(emps.length,3)},minmax(0,1fr))`;
  renderLocTrails();
}

function viewFieldTrail(id,name){

    const sel=$('loc-emp-filter');

  return `

    </div>
  </div>
  <div class="card" style="padding:0">
    ${D.notifications.map(n=>{
      // Use &#39; to HTML-escape single quotes inside double-quoted attribute
      const nid=JSON.stringify(n.id||n._uuid||'').replace(/"/g,'&#34;');
      return `<div class="notif-row" style="cursor:pointer;background:${n.read?'':'#fafbff'};margin:0;padding:12px 1rem;border-bottom:1px solid #f3f4f6;display:flex;align-items:flex-start;gap:12px" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='${n.read?'':'#fafbff'}'" onclick="handleNotifClick(${nid})">
        <div class="ni ni-${n.type||'info'}">${n.type==='warning'?'⚠':n.type==='success'?'✓':n.type==='danger'?'✕':'ℹ'}</div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:${n.read?400:600};line-height:1.4">${n.msg}</div><div style="font-size:11px;color:var(--muted);margin-top:3px">${n.time}</div></div>
        ${!n.read?'<div style="width:8px;height:8px;border-radius:50%;background:#3b82f6;flex-shrink:0;margin-top:6px" title="Unread"></div>':''}
        <button title="Dismiss" onclick="event.stopPropagation();dismissNotif(${nid})" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:18px;padding:2px 8px;border-radius:4px;flex-shrink:0" onmouseover="this.style.background='#fee2e2';this.style.color='#991b1b'" onmouseout="this.style.background='none';this.style.color='#94a3b8'">×</button>
      </div>`;
    }).join('')||'<div style="text-align:center;color:var(--muted);padding:3rem 1rem"><div style="font-size:40px;margin-bottom:8px">🔔</div><div style="font-size:14px;font-weight:600">No notifications</div><div style="font-size:12px;margin-top:4px">You&#39;re all caught up!</div></div>'}
  </div>`;
}

// Unified handler: marks read + routes to relevant page based on content
function handleNotifClick(id){
  if(!id) return;
  const n=D.notifications.find(x=>x.id===id||x._uuid===id);
  if(!n) return;
  if(!n.read){
    n.read=true;
    if(n._uuid) sbMarkNotifRead(n);
    save();
  }
  // Smart routing based on notification content
  const msg=(n.msg||'').toLowerCase();
  if(msg.includes('kyc')||msg.includes('aadhaar')||msg.includes('pan')){
    if(currentRole==='admin') nav('kycrequests'); else navEmp('emp-profile');
    return;
  }
  if(msg.includes('leave')){ currentRole==='admin' ? nav('leave') : navEmp('emp-leave'); return; }
  if(msg.includes('expense')){ currentRole==='admin' ? nav('expenses') : navEmp('emp-dashboard'); return; }
  if(msg.includes('check-in')||msg.includes('attendance')){ currentRole==='admin' ? nav('attendance') : navEmp('emp-attendance'); return; }
  if(msg.includes('employee')||msg.includes('joined')){ currentRole==='admin' ? nav('employees') : null; return; }
  if(msg.includes('bank')){ currentRole==='admin' ? nav('employees') : navEmp('emp-profile'); return; }
  // Fallback — just re-render current page so the read state updates
  currentRole==='admin' ? nav(currentPage) : renderEmployeeApp();
}

async function dismissNotif(id){
  if(!id) return;
  const n=D.notifications.find(x=>x.id===id||x._uuid===id);
  if(!n) return;
  // Delete from Supabase if it came from there
  if(n._uuid){
    await sb('notifications','DELETE',null,`?id=eq.${n._uuid}`);
  }
  D.notifications=D.notifications.filter(x=>x!==n);
  save();
  currentRole==='admin' ? nav(currentPage) : renderEmployeeApp();
}

async function clearAllNotifs(){
  if(!confirm(`Clear all ${D.notifications.length} notifications? This cannot be undone.`)) return;
  // Delete the Supabase-backed ones in parallel
  const uuids=D.notifications.filter(n=>n._uuid).map(n=>n._uuid);
  if(uuids.length){
    const inList=uuids.map(u=>`"${u}"`).join(',');
    await sb('notifications','DELETE',null,`?id=in.(${inList})`);
  }
  D.notifications=[];
  save();
  showToast('All notifications cleared','info');
  currentRole==='admin' ? nav(currentPage) : renderEmployeeApp();
}

function markRead(id){
  const n=D.notifications.find(x=>x.id===id||x._uuid===id);
  if(n){
    n.read=true;
    if(n._uuid) sbMarkNotifRead(n);
    save();
    currentRole==='admin' ? nav('notifications') : navEmp('emp-notifications');
  }
}
function markAllRead(){
  D.notifications.forEach(n=>{if(!n.read){n.read=true;if(n._uuid)sbMarkNotifRead(n);}});
  save();
  currentRole==='admin' ? nav(currentPage) : renderEmployeeApp();
}

function openAddLocModal(editId){
  const existing=editId?D.officeLocations.find(l=>l.id===editId):null;
  const colors=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
  const wrap=$('loc-modal-wrap');if(!wrap)return;
  wrap.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal('loc-modal-wrap')">
  <div class="modal"><div class="modal-hd"><h3>${editId?'Edit location':'Add office location'}</h3><button class="xbtn" onclick="closeModal('loc-modal-wrap')">×</button></div>
  <div class="fld"><label>Location name</label><input type="text" id="loc-name" placeholder="e.g. Head Office Hyderabad" value="${existing?existing.name:''}"></div>
  <div class="frow">
    <div class="fld"><label>Latitude</label><input type="number" id="loc-lat" step="0.0001" placeholder="17.3850" value="${existing?existing.lat:''}"></div>
    <div class="fld"><label>Longitude</label><input type="number" id="loc-lng" step="0.0001" placeholder="78.4867" value="${existing?existing.lng:''}"></div>
  </div>
  <div class="fld"><label>Allowed radius (meters)</label><input type="number" id="loc-rad" min="50" max="10000" step="50" value="${existing?existing.radius:500}" placeholder="500"></div>
  <div class="fld"><label>Color tag</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      ${colors.map(c=>`<div onclick="selectLocColor(this,'${c}')" data-color="${c}" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:${(existing?existing.color:colors[0])===c?'3px solid #111':'3px solid transparent'}"></div>`).join('')}
    </div>
    <input type="hidden" id="loc-color" value="${existing?existing.color:colors[0]}">
  </div>
  <button class="btn btn-sec" style="width:100%;margin-bottom:8px" onclick="captureLocFromGPS()">📍 Use my current GPS location</button>
  <div id="loc-gps-status" style="font-size:12px;color:var(--muted);margin-bottom:8px"></div>
  <div class="modal-ftr"><button class="btn btn-sec" onclick="closeModal('loc-modal-wrap')">Cancel</button><button class="btn btn-primary" onclick="saveLocModal('${editId||''}')">Save location</button></div>

function editLocModal(id){openAddLocModal(id);}
function selectLocColor(el,color){
  document.querySelectorAll('[data-color]').forEach(e=>e.style.border='3px solid transparent');
  el.style.border='3px solid #111';
  if($('loc-color'))$('loc-color').value=color;
}
function captureLocFromGPS(){
  const s=$('loc-gps-status');if(s)s.textContent='Getting GPS…';
  if(!navigator.geolocation){if(s)s.textContent='GPS not available';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    if($('loc-lat'))$('loc-lat').value=pos.coords.latitude.toFixed(6);
    if($('loc-lng'))$('loc-lng').value=pos.coords.longitude.toFixed(6);
    if(s)s.textContent=`✅ Location set: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
  },err=>{if(s)s.textContent='Could not get GPS location';},{enableHighAccuracy:true});
}
function useCurrentLoc(id){
  if(!navigator.geolocation){alert('GPS not available');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const loc=D.officeLocations.find(l=>l.id===id);
    if(loc){loc.lat=parseFloat(pos.coords.latitude.toFixed(6));loc.lng=parseFloat(pos.coords.longitude.toFixed(6));save();nav('settings');alert(`✅ ${loc.name} location updated to your current position!`);}
  },()=>alert('Could not get GPS location'),{enableHighAccuracy:true});
}
async function saveLocModal(editId){
  const name=($('loc-name')||{}).value?.trim();
  const lat=parseFloat(($('loc-lat')||{}).value);
  const lng=parseFloat(($('loc-lng')||{}).value);
  const radius=parseInt(($('loc-rad')||{}).value)||500;
  const color=($('loc-color')||{}).value||'#3b82f6';
  if(!name||isNaN(lat)||isNaN(lng)){alert('Please fill in name, latitude and longitude');return;}
  if(!D.officeLocations)D.officeLocations=[];
  if(editId){
    const loc=D.officeLocations.find(l=>l.id===editId);
    if(loc){Object.assign(loc,{name,lat,lng,radius,color});await sbSaveLocation(loc);}
  } else {
    const loc={id:'LOC-'+Date.now(),name,lat,lng,radius,color};
    D.officeLocations.push(loc);
    await sbSaveLocation(loc);
  }
  save();closeModal('loc-modal-wrap');nav('settings');
}
async function deleteLoc(id){
  const loc=D.officeLocations.find(l=>l.id===id);
  if(!loc||!confirm(`Delete "${loc.name}"?`))return;
  await sbDeleteLocation(loc);
  D.officeLocations=D.officeLocations.filter(l=>l.id!==id);
  save();nav('settings');
}
function saveSettings(){
  D.settings={...D.settings,company:$('st-cn').value,email:$('st-em').value,tz:$('st-tz').value,currency:$('st-cu').value,hours:parseInt($('st-wh').value)||9};
  save();$('st-msg').innerHTML=`<div class="alert alert-s" style="margin-bottom:8px">Settings saved!</div>`;
  setTimeout(()=>{if($('st-msg'))$('st-msg').innerHTML='';},2000);
}
function useMyLocation(){
  if(!navigator.geolocation){alert('Geolocation not supported');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    if($('st-olat'))$('st-olat').value=pos.coords.latitude.toFixed(6);
    if($('st-olng'))$('st-olng').value=pos.coords.longitude.toFixed(6);
    alert(`Office location set to:\n${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}\n\nClick "Save changes" to confirm.`);
  },()=>alert('Could not get location. Please enter coordinates manually.'),{enableHighAccuracy:true});
}
function saveProfile(){
  D.user.name=$('st-name').value||D.user.name;
  D.user.email=$('st-uemail').value||D.user.email;
  const pw=$('st-pw').value;if(pw&&pw.length>=6)D.user.password=pw;
  save();nav('settings');
}

// ─── HOLIDAY CALENDAR ────────────────────────────────────────────
function pgHolidays(empView=false){
  if(!D.holidays) D.holidays=[
    {id:1,name:'New Year',date:'2026-01-01',type:'National'},
    {id:2,name:'Republic Day',date:'2026-01-26',type:'National'},
    {id:3,name:'Holi',date:'2026-03-25',type:'Festival'},
    {id:4,name:'Good Friday',date:'2026-04-03',type:'National'},
    {id:5,name:'Labour Day',date:'2026-05-01',type:'National'},
    {id:6,name:'Independence Day',date:'2026-08-15',type:'National'},
    {id:7,name:'Gandhi Jayanti',date:'2026-10-02',type:'National'},
    {id:8,name:'Dussehra',date:'2026-10-11',type:'Festival'},
    {id:9,name:'Diwali',date:'2026-10-30',type:'Festival'},
    {id:10,name:'Christmas',date:'2026-12-25',type:'National'},
  ];
  const today=todayStr();
  const activeFilter=window._holidayFilter||'Festival';
  const filtered=activeFilter==='All'?D.holidays:D.holidays.filter(h=>h.type===activeFilter);
  const upcoming=filtered.filter(h=>h.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const past=filtered.filter(h=>h.date<today).sort((a,b)=>b.date.localeCompare(a.date));
  const typeColor={National:'bb',Festival:'ba',Optional:'bx',Company:'bg'};
  const filters=[
    {key:'Festival',label:'🎉 Festival',count:D.holidays.filter(h=>h.type==='Festival').length},
    {key:'National',label:'🇮🇳 National',count:D.holidays.filter(h=>h.type==='National').length},
    {key:'Company',label:'🏢 Company',count:D.holidays.filter(h=>h.type==='Company').length},
    {key:'Optional',label:'⚪ Optional',count:D.holidays.filter(h=>h.type==='Optional').length},
    {key:'All',label:'📋 All',count:D.holidays.length}
  ];
  return `
  <div class="page-hd">
    <div><div class="pg-title">Holiday Calendar 2026</div><div class="pg-sub">Showing <strong>${activeFilter}</strong> · ${upcoming.length} upcoming · Sundays are weekly offs (not listed)</div></div>
    ${!empView?`<button class="btn btn-primary" onclick="addHolidayModal()">+ Add holiday</button>`:''}
  </div>
  <div style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap">
    ${filters.map(f=>`<button onclick="setHolidayFilter('${f.key}')" style="padding:6px 14px;border-radius:20px;border:1px solid ${activeFilter===f.key?'var(--navy)':'var(--border)'};background:${activeFilter===f.key?'var(--navy)':'var(--white)'};color:${activeFilter===f.key?'#fff':'var(--text)'};font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px">
      ${f.label} <span style="background:${activeFilter===f.key?'rgba(255,255,255,.25)':'#f1f5f9'};padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700">${f.count}</span>
    </button>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
    <div class="card">
      <div class="card-hd"><h3>🗓 Upcoming holidays</h3><span class="muted">${upcoming.length} remaining</span></div>
      ${upcoming.length===0?`<div style="text-align:center;color:var(--muted);padding:1.5rem;font-size:13px">No upcoming ${activeFilter==='All'?'':activeFilter+' '}holidays</div>`:
      upcoming.map(h=>{
        const d=new Date(h.date);
        const daysLeft=Math.round((d-new Date(today))/86400000);
        return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f3f4f6">
          <div style="background:#f1f5f9;border-radius:8px;padding:6px 10px;text-align:center;min-width:48px">
            <div style="font-size:16px;font-weight:800;color:var(--navy)">${d.getDate()}</div>
            <div style="font-size:10px;color:var(--muted)">${d.toLocaleString('en-IN',{month:'short'})}</div>
          </div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${h.name}</div>
            <div style="font-size:11px;color:var(--muted)">${d.toLocaleString('en-IN',{weekday:'long'})} · ${daysLeft===0?'Today':daysLeft===1?'Tomorrow':`In ${daysLeft} days`}</div>
          </div>
          <span class="badge ${typeColor[h.type]||'bx'}">${h.type}</span>
          ${!empView?`<button class="btn-icon btn-del" onclick="deleteHoliday(${h.id})">🗑</button>`:''}
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-hd"><h3>✅ Past holidays</h3><span class="muted">${past.length} done</span></div>
      ${past.length===0?`<div style="text-align:center;color:var(--muted);padding:1.5rem;font-size:13px">No past ${activeFilter==='All'?'':activeFilter+' '}holidays</div>`:
      past.slice(0,8).map(h=>{
        const d=new Date(h.date);
        return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f3f4f6;opacity:.6">
          <div style="background:#f1f5f9;border-radius:8px;padding:6px 10px;text-align:center;min-width:48px">
            <div style="font-size:16px;font-weight:800;color:var(--muted)">${d.getDate()}</div>
            <div style="font-size:10px;color:var(--muted)">${d.toLocaleString('en-IN',{month:'short'})}</div>
          </div>
          <div style="flex:1"><div style="font-weight:500;font-size:13px">${h.name}</div></div>
          <span class="badge ${typeColor[h.type]||'bx'}">${h.type}</span>
        </div>`;
      }).join('')}
    </div>
  </div>
  <div id="holiday-modal-wrap"></div>`;
}
function setHolidayFilter(key){
  window._holidayFilter=key;
  // Re-render the right page whether admin or employee
  if(currentRole==='employee') renderEmployeeApp(); else nav(currentPage);
}
function addHolidayModal(){
  const wrap=$('holiday-modal-wrap');if(!wrap)return;
  wrap.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal('holiday-modal-wrap')">
  <div class="modal" style="max-width:400px">
    <div class="modal-hd"><h3>Add holiday</h3><button class="xbtn" onclick="closeModal('holiday-modal-wrap')">×</button></div>
    <div class="fld"><label>Holiday name</label><input type="text" id="hol-name" placeholder="e.g. Diwali"></div>
    <div class="fld"><label>Date</label><input type="date" id="hol-date" value="${todayStr()}"></div>
    <div class="fld"><label>Type</label><select id="hol-type"><option>National</option><option>Festival</option><option>Optional</option><option>Company</option></select></div>
    <div class="modal-ftr"><button class="btn btn-sec" onclick="closeModal('holiday-modal-wrap')">Cancel</button><button class="btn btn-primary" onclick="saveHoliday()">Add holiday</button></div>
  </div></div>`;
}
async function saveHoliday(){
  if(!D.holidays)D.holidays=[];
  const name=($('hol-name')||{}).value?.trim();
  const date=($('hol-date')||{}).value;
  const type=($('hol-type')||{}).value;
  if(!name||!date)return;
  const h={id:Date.now(),name,date,type};
  D.holidays.push(h);
  await sbSaveHoliday(h);
  save();closeModal('holiday-modal-wrap');nav('holidays');
}
async function deleteHoliday(id){
  if(!confirm('Delete this holiday?'))return;
  const h=D.holidays.find(x=>x.id===id||x._uuid===id||x.id==id);
  if(h) await sbDeleteHoliday(h);
  D.holidays=D.holidays.filter(x=>x.id!==id&&x._uuid!==id&&x.id!=id);
  save();nav('holidays');
}
