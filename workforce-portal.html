<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreayotoo Solutions Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a1a4e;--navy2:#2d2d8f;--navy3:#12123a;--bg:#f0f2f5;--white:#fff;--border:#e2e5ea;--text:#111;--muted:#6b7280;--green-bg:#dcfce7;--green-txt:#166534;--red-bg:#fee2e2;--red-txt:#991b1b;--amber-bg:#fef3c7;--amber-txt:#92400e;--blue-bg:#eff6ff;--blue-txt:#1e40af;--purple-bg:#f5f3ff;--purple-txt:#4c1d95}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.hidden{display:none!important}
input,select,textarea,button{font-family:inherit;font-size:13px}
input[type=text],input[type=email],input[type=date],input[type=number],input[type=time],input[type=password],select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--white);color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--navy2);box-shadow:0 0 0 3px rgba(45,45,143,.1)}
textarea{resize:vertical}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:11px;color:var(--muted);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td{padding:8px 10px;border-bottom:1px solid #f3f4f6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:var(--green-bg);color:var(--green-txt)}
.br{background:var(--red-bg);color:var(--red-txt)}
.ba{background:var(--amber-bg);color:var(--amber-txt)}
.bb{background:var(--blue-bg);color:var(--blue-txt)}
.bp{background:var(--purple-bg);color:var(--purple-txt)}
.bx{background:#f1f5f9;color:#475569}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1rem}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-hd h3{font-size:14px;font-weight:600}
.stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.stat{background:#f8f9fb;border-radius:8px;padding:.875rem}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;font-weight:500}
.stat-val{font-size:22px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}
.btn{padding:7px 14px;border-radius:7px;cursor:pointer;font-weight:600;border:none;font-size:13px;transition:background .15s}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy2)}
.btn-sec{background:var(--white);color:var(--text);border:1px solid var(--border)}.btn-sec:hover{background:#f9fafb}
.btn-link{background:none;border:none;color:var(--navy2);cursor:pointer;font-size:12px;font-weight:500;padding:0}
.btn-icon{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:4px;font-size:13px}.btn-icon:hover{background:#f1f5f9}
.btn-del:hover{background:#fee2e2}
.btn-g{background:var(--green-bg);color:var(--green-txt);border:1px solid #bbf7d0;padding:3px 9px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600}
.btn-r{background:var(--red-bg);color:var(--red-txt);border:1px solid #fecaca;padding:3px 9px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600}
.fld{margin-bottom:.875rem}
.fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.pg-title{font-size:18px;font-weight:700}
.pg-sub{font-size:12px;color:var(--muted);margin-top:2px}
.search-bar{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:10px}
.notif-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f3f4f6;align-items:flex-start}
.notif-row:last-child{border-bottom:none}
.ni{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ni-info{background:#eff6ff}.ni-warning{background:#fffbeb}.ni-success{background:#f0fdf4}.ni-danger{background:#fee2e2}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;font-size:11px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--white);border-radius:14px;padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-ftr{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.xbtn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
.topbar{background:var(--navy);color:#fff;padding:0 1rem;height:50px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.tb-logo{font-size:15px;font-weight:800;letter-spacing:.07em}
.tb-logo span{color:#60a5fa}
.sidebar{width:56px;background:var(--navy3);display:flex;flex-direction:column;align-items:flex-start;padding:10px 0;gap:2px;min-height:calc(100vh - 50px);position:sticky;top:50px;height:calc(100vh - 50px);transition:width .25s ease;overflow:hidden;overflow-y:auto;z-index:50;flex-shrink:0}
.sidebar:hover{width:220px}
.si{width:100%;height:40px;border-radius:0;display:flex;align-items:center;cursor:pointer;color:rgba(255,255,255,.5);transition:.15s;position:relative;padding:0 10px;gap:12px;white-space:nowrap}
.si:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.9)}
.si.act{background:rgba(255,255,255,.15);color:#fff;border-left:3px solid #60a5fa}
.si-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.si-label{font-size:13px;font-weight:600;opacity:0;transition:opacity .2s ease;pointer-events:none}
.sidebar:hover .si-label{opacity:1}
.si-dot{position:absolute;top:6px;left:28px;width:8px;height:8px;border-radius:50%;background:#ef4444}
.main{flex:1;padding:1.25rem;min-width:0;overflow-x:hidden}
.app{display:flex;flex-direction:column;min-height:100vh}
.body-row{display:flex;flex:1;min-height:0}
.prog-bar{background:#e5e7eb;border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:6px;border-radius:4px}
.alert{padding:8px 12px;border-radius:7px;font-size:12px;margin-bottom:10px}
.alert-e{background:var(--red-bg);color:var(--red-txt)}
.alert-s{background:var(--green-bg);color:var(--green-txt)}
.muted{font-size:11px;color:var(--muted)}
.modules-grid{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.mod-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:.7rem;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .2s ease;position:relative}
.mod-card:hover{border-color:var(--navy2);transform:scale(1.15);box-shadow:0 8px 24px rgba(45,45,143,.25);background:#eef0ff;z-index:10}
.mod-card:hover .mod-ic{background:var(--navy);font-size:20px;width:40px;height:40px}
.mod-card:hover .mod-lb{color:var(--navy2);font-weight:700;font-size:12px}
.mod-card:active{transform:scale(1.05)}
.mod-ic{width:36px;height:36px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s ease}
.mod-lb{font-size:11px;font-weight:600;color:var(--muted);text-align:center;transition:all .2s ease}
.mod-dot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;background:#ef4444}

/* LOGIN */
.login-wrap{display:flex;min-height:100vh}
.login-left{flex:1;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;color:#fff}
.login-logo{width:64px;height:64px;background:rgba(255,255,255,.15);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;border:1.5px solid rgba(255,255,255,.3);margin-bottom:1rem}
.login-left h1{font-size:20px;font-weight:700;margin-bottom:.3rem}
.login-left p{font-size:12px;opacity:.6;text-align:center;max-width:180px;margin-bottom:1.5rem}
.feat{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.8;margin-bottom:7px}
.fdot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}
.login-right{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--white)}
.login-card{width:100%;max-width:320px}
.login-card h2{font-size:20px;font-weight:700;margin-bottom:.25rem}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem}
.login-toggle{font-size:12px;color:var(--muted);text-align:center;margin-top:12px}
.login-toggle span{color:var(--navy2);cursor:pointer;font-weight:600}
.geo-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.geo-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.geo-status{font-size:12px;color:#0369a1;font-weight:600}
.geo-sub{font-size:11px;color:#0284c7;margin-top:2px}
.geo-err{background:#fef2f2;border-color:#fecaca}.geo-err .geo-status{color:#b91c1c}.geo-err .geo-sub{color:#dc2626}
.geo-ok{background:#f0fdf4;border-color:#bbf7d0}.geo-ok .geo-status{color:#166534}.geo-ok .geo-sub{color:#15803d}
.geo-warn{background:#fffbeb;border-color:#fde68a}.geo-warn .geo-status{color:#92400e}.geo-warn .geo-sub{color:#b45309}
.map-frame{width:100%;height:260px;border-radius:10px;border:1px solid var(--border);background:#f1f5f9;overflow:hidden;position:relative}
.map-pin{position:absolute;transform:translate(-50%,-100%);font-size:24px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.05) 1px,transparent 1px);background-size:40px 40px}
.loc-card{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f3f4f6;align-items:flex-start}
.loc-card:last-child{border-bottom:none}
/* FACE RECOGNITION */
.face-box{background:#0f172a;border-radius:10px;padding:14px;margin-bottom:12px;color:#fff}
.face-box-hd{font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cam-wrap{position:relative;width:100%;aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:#000}
.cam-wrap video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.cam-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
.face-status{margin-top:10px;text-align:center;font-size:12px;min-height:20px}
.face-status.scanning{color:#60a5fa;animation:pulse 1.5s infinite}
.face-status.success{color:#4ade80;font-weight:700;font-size:14px}
.face-status.fail{color:#f87171}
.face-status.idle{color:#94a3b8}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.face-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:130px;height:130px;border-radius:50%;border:2px dashed rgba(96,165,250,.6);pointer-events:none}
.face-ring.detected{border-color:#4ade80;border-style:solid;box-shadow:0 0 0 4px rgba(74,222,128,.15)}
.face-ring.matched{border-color:#4ade80;border-style:solid;border-width:3px}
.face-ring.fail{border-color:#f87171;border-style:solid}
.face-tabs{display:flex;gap:6px;margin-bottom:12px}
.face-tab{flex:1;padding:7px;border:1px solid rgba(255,255,255,.15);border-radius:7px;font-size:12px;cursor:pointer;text-align:center;background:rgba(255,255,255,.05);color:#94a3b8;font-weight:600;transition:.15s}
.face-tab.active{background:rgba(96,165,250,.2);border-color:#60a5fa;color:#60a5fa}
.enroll-thumb{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid #334155}
.login-methods{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.method-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--white);transition:.15s;font-size:13px;font-weight:600;width:100%;text-align:left}
.method-btn:hover{border-color:var(--navy2);background:#f8f9ff}
.method-btn.active{border-color:var(--navy2);background:#eff6ff;color:var(--navy2)}
.method-ic{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.reg-wrap{display:flex;min-height:100vh}
.reg-right{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;background:#f8fafc;overflow-y:auto}
.reg-card{width:100%;max-width:420px;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.75rem}
.steps-bar{display:flex;gap:0;margin-bottom:1.5rem}
.step-dot{flex:1;height:4px;background:#e5e7eb;border-radius:2px;transition:.3s}
.step-dot.done{background:#0f766e}
.step-dot.active{background:#0f766e;opacity:.5}

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width:768px){
  /* Login */
  .login-wrap{flex-direction:column}
  .login-left{min-height:auto!important;padding:1.5rem!important;flex:none!important}
  .login-left>div{max-width:100%!important}
  .login-left>div>div:first-child{margin-bottom:1rem!important}
  .login-left>div>div:nth-child(2){display:none}
  .login-left>div>div:last-child{display:none}
  .login-right{min-height:auto!important;padding:1.25rem!important;flex:none!important}
  .login-card{max-width:100%!important;padding:1.25rem!important}
  /* Registration */
  .reg-wrap{flex-direction:column}
  .login-left .login-logo{width:52px!important;height:52px!important}
  /* Topbar */
  .topbar{gap:8px;padding:0 .75rem;height:46px}
  .tb-logo{font-size:13px}
  .topbar span{display:none}
  /* Sidebar → bottom nav on mobile */
  .sidebar{width:100%!important;min-height:auto!important;height:54px!important;flex-direction:row!important;justify-content:space-around!important;padding:0!important;position:fixed!important;bottom:0!important;top:auto!important;left:0;right:0;z-index:90;gap:0!important;overflow:hidden!important}
  .sidebar:hover{width:100%!important}
  .si{width:auto!important;flex:1!important;flex-direction:column!important;height:54px!important;padding:0!important;justify-content:center!important;border-left:none!important;border-top:3px solid transparent}
  .si.act{border-left:none!important;border-top:3px solid #60a5fa!important}
  .si-icon{font-size:18px!important}
  .si-label{display:none!important}
  /* Main content - add bottom padding for fixed nav */
  .main{padding:.875rem .875rem 70px .875rem!important}
  .body-row{flex-direction:column}
  /* Stats grid */
  .stat-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important}
  /* Modules grid */
  .modules-grid{grid-template-columns:repeat(4,minmax(0,1fr))!important}
  .mod-card{padding:.5rem!important}
  .mod-card:hover{transform:scale(1.05)!important}
  /* Two col layouts → single */
  .two-col{grid-template-columns:1fr!important}
  .frow{grid-template-columns:1fr!important}
  /* Page header */
  .page-hd{flex-wrap:wrap;gap:8px}
  .page-hd .btn{font-size:12px;padding:6px 10px}
  /* Tables - horizontal scroll */
  .card{overflow-x:auto}
  table{min-width:480px}
  /* Modal */
  .modal{padding:1rem;max-height:95vh}
  .modal-bg{padding:.5rem;align-items:flex-end}
  .modal{border-radius:14px 14px 0 0;max-width:100%!important}
  /* Search bar */
  .search-bar input,.search-bar select{width:100%!important;max-width:100%!important}
  /* Employee portal sidebar */
  .sidebar[style*="065f46"]{background:#065f46!important}
}

@media (max-width:480px){
  .stat-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important}
  .modules-grid{grid-template-columns:repeat(3,minmax(0,1fr))!important}
  .pg-title{font-size:15px}
  .topbar{height:44px}
  .main{padding:.75rem .75rem 64px .75rem!important}
  .card{padding:.75rem}
  /* Settings grid → single column */
  div[style*="grid-template-columns:1fr 1fr"]{display:block!important}
  div[style*="grid-template-columns:1fr 1fr"]>*{margin-bottom:1rem}
}

@media (min-width:769px){
  /* Desktop enhancements */
  .login-wrap{flex-direction:row}
  .sidebar{position:sticky;top:50px;height:calc(100vh - 50px)}
  .stat-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .modules-grid{grid-template-columns:repeat(8,minmax(0,1fr))}
  .two-col{grid-template-columns:2fr 1fr}
  .frow{grid-template-columns:1fr 1fr}
}

@media (min-width:1200px){
  .main{padding:1.5rem}
  .stat-val{font-size:26px}
  .pg-title{font-size:20px}
}
</style>

<body>

<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const fmt = n => new Intl.NumberFormat('en-IN').format(Math.round(n||0));
const initials = name => (name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const todayStr = () => new Date().toISOString().split('T')[0];
const dateLabel = () => new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const avColors = [['#eff6ff','#1e40af'],['#f0fdf4','#166534'],['#fdf4ff','#6b21a8'],['#fffbeb','#92400e'],['#fef2f2','#991b1b']];
const av = (name,size=28) => {
  const i=(name||'').charCodeAt(0)%avColors.length;
  return `<div class="av" style="width:${size}px;height:${size}px;background:${avColors[i][0]};color:${avColors[i][1]};font-size:${Math.round(size*.38)}px">${initials(name)}</div>`;
};
const badge = s => {
  const map={Active:'bg',Approved:'bg',Present:'bg',Pending:'ba','Half Day':'ba','Not marked':'bx',Inactive:'br',Rejected:'br',Absent:'br',Casual:'bb',Sick:'bb',Earned:'bb',Maternity:'bp',Paternity:'bp',Travel:'bb',Food:'bb',Training:'bb',Accommodation:'bb',Other:'bx'};
  return `<span class="badge ${map[s]||'bx'}">${s}</span>`;
};

// ─── SUPABASE CONFIG ──────────────────────────────────────────────
const SB_URL = 'https://ecigerazcsildhklbxri.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjaWdlcmF6Y3NpbGRoa2xieHJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzEwNjAsImV4cCI6MjA5MTg0NzA2MH0.cun4QLVdJ1U4VmvHDJ1tS5AzrAywVwKtpaGiykapkUM';
const SB_HDR = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'};

async function sb(table,method='GET',body=null,query=''){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${table}${query}`,{method,headers:SB_HDR,body:body?JSON.stringify(body):null});
    if(!r.ok){
      const errText=await r.text();
      console.error(`❌ SB ${method} ${table}:`,r.status, errText);
      return null;
    }
    if(method==='DELETE')return true;
    const t=await r.text();return t?JSON.parse(t):true;
  }catch(e){console.error('❌ SB fetch error:',e.message);return null;}
}

// ─── DATA LAYER ───────────────────────────────────────────────────
const STORE_KEY = 'wf_portal_v3'; // bumped version clears old cache automatically
const DEPTS = ['Engineering','HR','Sales','Finance','Operations','Marketing','Legal'];

function loadData(){ try{return JSON.parse(localStorage.getItem(STORE_KEY))||null;}catch(e){return null;} }
function saveData(d){ localStorage.setItem(STORE_KEY,JSON.stringify(d)); }

// Clear any old cache versions on load
['wf_portal_v1','wf_portal_v2'].forEach(k=>localStorage.removeItem(k));

function initData(){
  return {

async function sbSaveEmployee(emp){
  const payload={
    emp_id:emp.id, name:emp.name, email:emp.email,
    department:emp.dept||'Engineering', role:emp.role||'Employee',
    status:emp.status||'Active', salary:emp.salary||0,
    date_of_joining:emp.joined||todayStr()
  };
  if(emp.phone) payload.phone=emp.phone;
  if(emp.dob){
    let dob=emp.dob.trim();
    const parts=dob.split(/[\s\/\-\.]/);
    if(parts.length===3&&parts[0].length<=2&&parseInt(parts[0])<=31){
      dob=`${parts[2].padStart(4,'20')}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
    }
    if(/^\d{4}-\d{2}-\d{2}$/.test(dob)) payload.dob=dob;
  }
  if(emp.selfRegistered!==undefined) payload.self_registered=!!emp.selfRegistered;
  if(emp.passwordHash) payload.password_hash=emp.passwordHash;
  if(emp.empType) payload.emp_type=emp.empType;

  try{
    // If we have a UUID, just update
    if(emp._uuid){
      const r=await sb('employees','PATCH',payload,`?id=eq.${emp._uuid}`);
      if(r!==null){console.log('✅ Updated:',emp.name);return r;}
    }
    // Check if employee with this emp_id already exists
    const existing=await sb('employees','GET',null,`?emp_id=eq.${encodeURIComponent(emp.id)}&select=id`);
    if(existing&&existing.length>0){
      // Update existing record
      emp._uuid=existing[0].id;
      const r=await sb('employees','PATCH',payload,`?id=eq.${emp._uuid}`);
      console.log('✅ Updated existing:',emp.name);
      return r;
    }
    // Also check by email
    const byEmail=await sb('employees','GET',null,`?email=eq.${encodeURIComponent(emp.email)}&select=id`);
    if(byEmail&&byEmail.length>0){
      emp._uuid=byEmail[0].id;
      const r=await sb('employees','PATCH',payload,`?id=eq.${emp._uuid}`);
      console.log('✅ Updated by email:',emp.name);
      return r;
    }
    // Insert new record
    const r=await sb('employees','POST',payload);
    if(r&&r[0]){emp._uuid=r[0].id;console.log('✅ Inserted:',emp.name);}
    return r;
  }catch(e){
    console.error('❌ sbSaveEmployee error:',emp.name,e.message);
    return null;
  }
}

// Generic upsert helper - handles duplicates gracefully
async function sbUpsert(table, payload, matchCol, matchVal){
  try{
    if(matchVal){
      // Try update first
      const r=await sb(table,'PATCH',payload,`?${matchCol}=eq.${encodeURIComponent(matchVal)}`);
      if(r!==null) return r;
    }
    // Fall back to insert with merge-duplicates
    const res=await fetch(`${SB_URL}/rest/v1/${table}`,{
      method:'POST',
      headers:{...SB_HDR,'Prefer':'return=representation,resolution=merge-duplicates'},
      body:JSON.stringify(payload)
    });
    if(!res.ok){console.error(`❌ SB upsert ${table}:`,await res.text());return null;}
    const t=await res.text();return t?JSON.parse(t):true;
  }catch(e){console.error(`❌ SB upsert ${table} error:`,e.message);return null;}
}

// ─── GEOLOCATION ──────────────────────────────────────────────────
let geoState = {status:'idle',lat:null,lng:null,accuracy:null,city:null,address:null};

function getDistanceM(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getNearestOffice(lat,lng){
  const locs=(D.officeLocations&&D.officeLocations.length)?D.officeLocations:[{id:'default',name:'Office',lat:D.settings.officeLat||17.385,lng:D.settings.officeLng||78.4867,radius:D.settings.officeRadius||500}];
  let nearest=null,minDist=Infinity;
  locs.forEach(loc=>{
    const d=getDistanceM(lat,lng,loc.lat,loc.lng);
    if(d<minDist){minDist=d;nearest={...loc,dist:d,inZone:d<=loc.radius};}
  });
  return nearest;
}

function geoBoxHTML(){
  const s=geoState;
  if(s.status==='idle') return `<div class="geo-box"><div class="geo-icon">📍</div><div><div class="geo-status">Detecting your location…</div><div class="geo-sub">Location will be recorded with login</div></div></div>`;
  if(s.status==='loading') return `<div class="geo-box"><div class="geo-icon">🔄</div><div><div class="geo-status">Getting your location…</div><div class="geo-sub">Please allow location access when prompted</div></div></div>`;
  if(s.status==='error') return `<div class="geo-box geo-err"><div class="geo-icon">⚠</div><div><div class="geo-status">Location unavailable</div><div class="geo-sub">${s.error||'Permission denied — login will still work'}</div></div></div>`;
  if(s.status==='ok'){
    const nearest=getNearestOffice(s.lat,s.lng);
    const inOffice=nearest&&nearest.inZone;
    return `<div class="geo-box ${inOffice?'geo-ok':'geo-warn'}"><div class="geo-icon">${inOffice?'✅':'📍'}</div><div>
      <div class="geo-status">${inOffice?`Within zone: ${nearest.name}`:'Outside all office zones'}</div>
      <div class="geo-sub">${s.address||s.city||'Location captured'} &nbsp;·&nbsp; ±${Math.round(s.accuracy||0)}m accuracy</div>
      ${nearest?`<div class="geo-sub" style="margin-top:1px">Nearest: ${nearest.name} — ${nearest.dist<1000?Math.round(nearest.dist)+'m':((nearest.dist/1000).toFixed(1))+'km'} away</div>`:''}
    </div></div>`;
  }
  return '';
}

function captureGeo(){
  if(!navigator.geolocation){geoState={status:'error',error:'Geolocation not supported'};if($('geo-box-wrap'))$('geo-box-wrap').innerHTML=geoBoxHTML();return;}
  geoState={status:'loading'};if($('geo-box-wrap'))$('geo-box-wrap').innerHTML=geoBoxHTML();
  navigator.geolocation.getCurrentPosition(
    pos=>{
      geoState={status:'ok',lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,city:null,address:null};
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)
        .then(r=>r.json()).then(d=>{
          geoState.city=d.address?.city||d.address?.town||d.address?.village||'';
          geoState.address=(d.address?.road?d.address.road+', ':'')+geoState.city;
        }).catch(()=>{}).finally(()=>{if($('geo-box-wrap'))$('geo-box-wrap').innerHTML=geoBoxHTML();});
    },
    err=>{const m={1:'Location permission denied',2:'Position unavailable',3:'Request timed out'};geoState={status:'error',error:m[err.code]||err.message};if($('geo-box-wrap'))$('geo-box-wrap').innerHTML=geoBoxHTML();}
    ,{timeout:10000,enableHighAccuracy:true}
  );
}

// ─── FACE RECOGNITION ENGINE ──────────────────────────────────────
const FR = {
  loaded: false, loading: false, stream: null, interval: null,
  mode: 'idle', // idle | scanning | matched | failed | enrolling
  matchedUser: null, descriptor: null,
  MODEL_URL: 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'
};

async function frLoadModels(){
  if(FR.loaded||FR.loading) return;
  FR.loading=true;
  try{
    await faceapi.nets.tinyFaceDetector.loadFromUri(FR.MODEL_URL);
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(FR.MODEL_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(FR.MODEL_URL);
    FR.loaded=true;
  }catch(e){console.warn('face-api models failed:',e);}
  FR.loading=false;
}

async function frStartCamera(videoId, canvasId, onResult){
  frStopCamera();
  try{
    FR.stream = await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}});
    const vid=$( videoId); if(!vid) return;
    vid.srcObject=FR.stream; vid.play();
    await new Promise(r=>vid.onloadedmetadata=r);
    await frLoadModels();
    frScanLoop(videoId, canvasId, onResult);
  }catch(e){
    if(onResult) onResult({type:'cam-error',msg:e.name==='NotAllowedError'?'Camera permission denied':'Camera not available'});
  }
}

function frStopCamera(){
  if(FR.interval){clearInterval(FR.interval);FR.interval=null;}
  if(FR.stream){FR.stream.getTracks().forEach(t=>t.stop());FR.stream=null;}
  FR.mode='idle';
}

function frScanLoop(videoId, canvasId, onResult){
  FR.mode='scanning';
  FR.interval = setInterval(async()=>{
    const vid=$(videoId),cvs=$(canvasId);
    if(!vid||!cvs||!FR.loaded) return;
    const opts=new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.5});
    const det = await faceapi.detectSingleFace(vid,opts).withFaceLandmarks(true).withFaceDescriptor();
    cvs.width=vid.videoWidth; cvs.height=vid.videoHeight;
    const ctx=cvs.getContext('2d'); ctx.clearRect(0,0,cvs.width,cvs.height);
    if(det){
      const box=det.detection.box;
      ctx.strokeStyle='#4ade80'; ctx.lineWidth=2; ctx.strokeRect(box.x,box.y,box.width,box.height);
      if(onResult) onResult({type:'detected', descriptor:det.descriptor, det});
    } else {
      if(onResult) onResult({type:'no-face'});
    }
  },400);
}

async function frCaptureSingle(videoId){
  const vid=$(videoId); if(!vid||!FR.loaded) return null;
  await frLoadModels();
  const opts=new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.5});
  const det=await faceapi.detectSingleFace(vid,opts).withFaceLandmarks(true).withFaceDescriptor();
  return det?det.descriptor:null;
}

function frGetEnrolled(){
  // Returns array of {name, descriptor (Float32Array)}
  const raw=JSON.parse(localStorage.getItem('wf_faces')||'[]');
  return raw.map(r=>({name:r.name, descriptor:new Float32Array(r.descriptor)}));
}

function frSaveEnrolled(list){
  localStorage.setItem('wf_faces', JSON.stringify(list.map(r=>({name:r.name,descriptor:Array.from(r.descriptor)}))));
}

function frMatchDescriptor(descriptor){
  const enrolled=frGetEnrolled();
  if(!enrolled.length) return null;
  let best=null, bestDist=Infinity;
  enrolled.forEach(e=>{
    const dist=faceapi.euclideanDistance(descriptor, e.descriptor);
    if(dist<bestDist){bestDist=dist;best=e;}
  });
  return bestDist<0.55?{name:best.name,distance:bestDist}:null;
}

async function startFaceScan(){
  const statusEl=$('face-status-txt'),ring=$('face-ring');
  if(statusEl) statusEl.textContent='Starting camera…'; statusEl&&statusEl.setAttribute('class','face-status scanning');
  await frStartCamera('fr-video','fr-canvas', result=>{
    const s=$('face-status-txt'),r=$('face-ring');
    if(result.type==='cam-error'){
      if(s){s.textContent=result.msg;s.className='face-status fail';}
      if(r) r.className='face-ring fail'; return;
    }
    if(result.type==='no-face'){
      if(s){s.textContent='No face detected — look at the camera';s.className='face-status idle';}
      if(r) r.className='face-ring'; return;
    }
    if(result.type==='detected'){
      if(r) r.className='face-ring detected';
      const match=frMatchDescriptor(result.descriptor);
      if(match){
        frStopCamera();
        if(s){s.textContent=`✅ Face matched: ${match.name}`;s.className='face-status success';}
        if(r) r.className='face-ring matched';
        // Auto-fill email if we find this employee
        const emp=D.employees.find(e=>e.name.toLowerCase()===match.name.toLowerCase());
        if(emp&&$('l-email')) $('l-email').value=emp.email;
        if($('l-pass')) $('l-pass').value='';
        if($('login-err')) $('login-err').innerHTML=`<div class="alert alert-s">Face recognised as <strong>${match.name}</strong>. Enter password or <button onclick="faceSignIn('${match.name}')" class="btn btn-primary" style="padding:2px 10px;font-size:12px;margin-left:4px">Sign in with face only</button></div>`;
      } else {
        if(frGetEnrolled().length===0){
          if(s){s.textContent='No faces enrolled — enroll first using the Enroll Face tab';s.className='face-status fail';}
        } else {
          if(s){s.textContent='Face not recognised — try again or use password';s.className='face-status fail';}
          if(r) r.className='face-ring fail';
        }
      }
    }
  });
}

async function startFaceEnroll(){
  const s=$('enroll-status-txt'),r=$('face-ring-enroll');
  if(s){s.textContent='Starting camera…';s.className='face-status scanning';}
  await frStartCamera('fr-video-enroll','fr-canvas-enroll', result=>{

async function enrollFace(){

let regData={};

function clearRegErr(){
  ['reg-err-1','reg-err-2','reg-err-3'].forEach(id=>{const el=$(id);if(el)el.innerHTML='';});
}

function regStep1Next(){
  const name=($('reg-name')||{}).value?.trim();
  const dob=($('reg-dob')||{}).value;
  const phone=($('reg-phone')||{}).value?.trim();
  const email=($('reg-email')||{}).value?.trim().toLowerCase();
  const err=$('reg-err-1');
  if(!name||!dob||!phone||!email){if(err)err.innerHTML=`<div class="alert alert-e">Please fill in all fields</div>`;return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){if(err)err.innerHTML=`<div class="alert alert-e">Enter a valid email address</div>`;return;}
  if(phone.replace(/\D/g,'').length<10){if(err)err.innerHTML=`<div class="alert alert-e">Enter a valid 10-digit phone number</div>`;return;}
  const dup=D.employees.find(e=>e.email.toLowerCase()===email);
  if(dup){if(err)err.innerHTML=`<div class="alert alert-e">This email is already registered. <span style="cursor:pointer;text-decoration:underline" onclick="renderApp()">Sign in instead</span></div>`;return;}
  regData={name,dob,phone,email};
  if($('reg-name-preview'))$('reg-name-preview').textContent=name;
  $('reg-step-1').classList.add('hidden');
  $('reg-step-2').classList.remove('hidden');
  $('sdot-1').className='step-dot done';
  $('sdot-2').className='step-dot done';
  $('sdot-3').className='step-dot active';
}

function regBack(){
  $('reg-step-2').classList.add('hidden');
  $('reg-step-1').classList.remove('hidden');
  $('sdot-2').className='step-dot active';
  $('sdot-3').className='step-dot';
}

function regStep2Next(){
  const pw=($('reg-pw')||{}).value;
  const pw2=($('reg-pw2')||{}).value;
  const err=$('reg-err-2');
  if(!pw||pw.length<6){if(err)err.innerHTML=`<div class="alert alert-e">Password must be at least 6 characters</div>`;return;}
  if(pw!==pw2){if(err)err.innerHTML=`<div class="alert alert-e">Passwords do not match</div>`;return;}
  regData.password=pw;
  $('reg-step-2').classList.add('hidden');
  $('reg-step-3').classList.remove('hidden');
  $('sdot-3').className='step-dot done';
}

function regBack2(){
  $('reg-step-3').classList.add('hidden');
  $('reg-step-2').classList.remove('hidden');
  $('sdot-3').className='step-dot active';
}

async function submitRegistration(){
  const dept=($('reg-dept')||{}).value||'Engineering';
  const role=($('reg-role')||{}).value?.trim()||'Employee';
  const empid=($('reg-empid')||{}).value?.trim();

  showSyncBanner('Creating your account…');

  // Check if email already exists in Supabase
  const existing=await sb('employees','GET',null,`?email=eq.${encodeURIComponent(regData.email)}&select=id,emp_id`);
  if(existing&&existing.length>0){
    hideSyncBanner();
    if($('reg-err-3'))$('reg-err-3').innerHTML=`<div class="alert alert-e">This email is already registered. <span style="cursor:pointer;text-decoration:underline" onclick="renderApp()">Sign in instead</span></div>`;
    return;
  }

  const nextNum=D.employees.length+101;
  const id=empid||('EMP-'+String(nextNum).padStart(3,'0'));
  const emp={id,name:regData.name,email:regData.email,phone:regData.phone,dob:regData.dob,dept,role,status:'Active',salary:0,joined:todayStr(),selfRegistered:true,passwordHash:regData.password,empType:'office'};

  const res=await sbSaveEmployee(emp);
  if(res&&res[0]) emp._uuid=res[0].id;
  else if(res&&Array.isArray(res)&&res.length>0) emp._uuid=res[0].id;

  if(!emp._uuid){
    hideSyncBanner();
    if($('reg-err-3'))$('reg-err-3').innerHTML=`<div class="alert alert-e">Registration failed. Please try again.</div>`;
    return;
  }

  D.employees.push(emp);
  const notif={msg:`New employee ${regData.name} self-registered (${dept})`,type:'info',read:false};
  D.notifications.unshift({id:Date.now(),...notif,time:'Just now'});
  sbSaveNotification(notif);
  save();
  hideSyncBanner();
  currentRole='employee';currentEmployee=emp;D.loggedIn=true;
  const nearest=geoState.status==='ok'?getNearestOffice(geoState.lat,geoState.lng):null;
  const log={id:Date.now(),user:emp.name,email:emp.email,time:new Date().toLocaleString('en-IN'),lat:geoState.lat,lng:geoState.lng,accuracy:geoState.accuracy,address:geoState.address||geoState.city||'Unknown',geoStatus:geoState.status,inOffice:nearest?nearest.inZone:null,nearestOffice:nearest?nearest.name:null,method:'register'};
  if(!D.loginLogs)D.loginLogs=[];D.loginLogs.unshift(log);
  sbLoginLog(log);
  save();renderApp();
}

async function submitEmpAtt(){

  D.attendance=D.attendance.filter(a=>!(a.empId===emp.id&&a.date===today));
  const rec={empId:emp._uuid||emp.id,empName:emp.name,date:today,status,in:inT,out:outT};
  // Check if record exists in Supabase
  const existing=await sb('attendance','GET',null,`?employee_name=eq.${encodeURIComponent(emp.name)}&date=eq.${today}&select=id`);
  if(existing&&existing.length>0) rec._uuid=existing[0].id;
  D.attendance.unshift(rec);
  await sbSaveAttendance(rec);
  const notif={msg:`${emp.name} marked attendance: ${status} on ${today}`,type:'info',read:false};

}

function readCSVFile(file){
  if(!file.name.match(/\.(csv|txt)$/i)){
    if($('csv-file-preview'))$('csv-file-preview').innerHTML=`<span style="color:#991b1b">Please select a .csv file</span>`;
    return;
  }
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    const lines=text.trim().split('\n').filter(l=>l.trim());
    let dataLines=lines;
    if(lines[0].toLowerCase().includes('name')&&lines[0].toLowerCase().includes('email')) dataLines=lines.slice(1);
    if($('csv-file-preview'))$('csv-file-preview').innerHTML=`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px">✅ <strong>${file.name}</strong> loaded — <strong>${dataLines.length} employees</strong> found. Click "Import employees" to proceed.</div>`;
    if($('csv-dropzone'))$('csv-dropzone').innerHTML=`<div style="font-size:24px;margin-bottom:.5rem">✅</div><div style="font-weight:600;font-size:14px;color:#166534">${file.name}</div><div style="font-size:12px;color:#166534">${dataLines.length} employees ready to import</div>`;
    // Store parsed text for importCSV to use
    window._csvRawText=text;
  };
  reader.readAsText(file);
}

function parseCSVLine(line){
  const result=[],re=/("([^"]*)"|([^,]*))(,|$)/g;
  let m;while((m=re.exec(line))!==null){result.push((m[2]!==undefined?m[2]:m[3]||'').trim());if(m[4]==='')break;}
  return result;
}

  if(!lines.length){prev.innerHTML='';return;}
  let dataLines=lines;
  if(lines[0].toLowerCase().includes('name')&&lines[0].toLowerCase().includes('email')) dataLines=lines.slice(1);
  prev.innerHTML=`<span style="color:#0f766e;font-weight:600">${dataLines.length} employee${dataLines.length!==1?'s':''} found in CSV</span>`;
}

async function importCSV(){
  const raw=window._csvRawText||($('csv-input')||{}).value||'';
  window._csvRawText=null;
  const lines=raw.trim().split('\n').filter(l=>l.trim());
  const err=$('csv-err');
  if(!lines.length){if(err)err.innerHTML=`<div class="alert alert-e">No data found</div>`;return;}
  let dataLines=lines;
  if(lines[0].toLowerCase().includes('name')&&lines[0].toLowerCase().includes('email')) dataLines=lines.slice(1);
  if(!dataLines.length){if(err)err.innerHTML=`<div class="alert alert-e">No employee data found after header</div>`;return;}

  const btn=document.querySelector('#bulk-import-wrap .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Importing…';}
  showSyncBanner(`Saving ${dataLines.length} employees…`);

  // Parse all rows first
  const toImport=[];
  for(const line of dataLines){
    const cols=parseCSVLine(line);
    if(cols.length<2) continue;
    const [name,email,phone,rawDob,dept,role,salary]=cols;
    if(!name||!email) continue;
    let dob='';
    if(rawDob&&rawDob.trim()){
      const dp=rawDob.trim().split(/[\s\/\-\.]/);
      if(dp.length===3&&dp[0].length<=2&&parseInt(dp[0])<=31){
        dob=`${dp[2].padStart(4,'20')}-${dp[1].padStart(2,'0')}-${dp[0].padStart(2,'0')}`;
      } else { dob=rawDob.trim(); }
    }
    toImport.push({name:name.trim(),email:email.trim().toLowerCase(),phone:(phone||'').trim(),dob,dept:(dept||'Engineering').trim(),role:(role||'Employee').trim(),salary:parseInt(salary)||0});
  }

  let saved=0, failed=0;

  for(let i=0;i<toImport.length;i++){
    const row=toImport[i];
    showSyncBanner(`Saving ${i+1}/${toImport.length}: ${row.name}…`);

    // Check if employee already exists in Supabase by email
    const existing=await sb('employees','GET',null,`?email=eq.${encodeURIComponent(row.email)}&select=id,emp_id`);
    
    const empId=(existing&&existing.length>0)?existing[0].emp_id:('EMP-'+String(D.employees.length+101+saved).padStart(3,'0'));
    const empUUID=(existing&&existing.length>0)?existing[0].id:null;

    const payload={
      emp_id:empId, name:row.name, email:row.email,
      department:row.dept, role:row.role, status:'Active',
      salary:row.salary, date_of_joining:todayStr(),
      password_hash:'emp@123', emp_type:'office'
    };
    if(row.phone) payload.phone=row.phone;
    if(row.dob&&/^\d{4}-\d{2}-\d{2}$/.test(row.dob)) payload.dob=row.dob;

    let r;
    if(empUUID){
      // Update existing by UUID
      r=await sb('employees','PATCH',payload,`?id=eq.${empUUID}`);
    } else {
      // Try insert - if fails due to emp_id conflict, find and update that record
      r=await sb('employees','POST',payload);
      if(!r){
        // emp_id conflict - find the conflicting record and update it
        const conflict=await sb('employees','GET',null,`?emp_id=eq.${encodeURIComponent(empId)}&select=id`);
        if(conflict&&conflict.length>0){
          r=await sb('employees','PATCH',payload,`?id=eq.${conflict[0].id}`);
          if(r&&r[0]) empUUID=r[0].id;
        }
      }
    }

    if(r){
      const uuid=empUUID||(r[0]?r[0].id:null);
      // Update local cache
      const localIdx=D.employees.findIndex(e=>e.email===row.email);
      const empObj={id:empId,_uuid:uuid,name:row.name,email:row.email,phone:row.phone,dob:row.dob,dept:row.dept,role:row.role,status:'Active',salary:row.salary,joined:todayStr(),passwordHash:'emp@123',empType:'office'};
      if(localIdx>=0) D.employees[localIdx]=empObj;
      else D.employees.push(empObj);
      saved++;
    } else {
      failed++;
      console.error('❌ Failed:',row.name);
    }
  }

  const notif={msg:`Import complete: ${saved} saved, ${failed} failed`,type:'success',read:false};
  D.notifications.unshift({id:Date.now(),...notif,time:'Just now'});
  sbSaveNotification(notif);
  save();
  hideSyncBanner();
  closeModal('bulk-import-wrap');
  nav('employees');
  setTimeout(()=>alert(`✅ Import complete!\n\n${saved} employees saved to database\n${failed} failed\n\nAll data is saved permanently.`),100);
}

  </div>`;

function markAllAtt(status){
  document.querySelectorAll('.att-st').forEach(s=>s.value=status);
}
async function saveAtt(){
  const date=window._attDate||todayStr();
  showSyncBanner('Saving attendance…');
  const promises=[];
  document.querySelectorAll('.att-st').forEach(s=>{
    const id=s.dataset.id,emp=D.employees.find(e=>e.id===id);
    if(!emp)return;
    const inT=document.querySelector(`.att-in[data-id="${id}"]`).value;
    const outT=document.querySelector(`.att-out[data-id="${id}"]`).value;
    const existing=D.attendance.find(a=>(a.empId===id||a.empId===emp._uuid)&&a.date===date);
    D.attendance=D.attendance.filter(a=>!((a.empId===id||a.empId===emp._uuid)&&a.date===date));
    const rec={empId:emp._uuid||id,empName:emp.name,date,status:s.value,in:inT,out:outT};
    if(existing)rec._uuid=existing._uuid;
    D.attendance.unshift(rec);
    promises.push(sbSaveAttendance(rec));
  });
  await Promise.all(promises);
  save();hideSyncBanner();alert('✅ Attendance saved!');
}

// ─── LOCATION LOGS ───────────────────────────────────────────────
function pgLocations(){
  if(!D.loginLogs)D.loginLogs=[];
  if(!D.officeLocations)D.officeLocations=[];
  const logs=D.loginLogs;
  const total=logs.length;
  const inOff=logs.filter(l=>l.inOffice===true).length;
  const outOff=logs.filter(l=>l.inOffice===false).length;
  const uniqueEmps=[...new Set(logs.map(l=>l.user))];

  function statusBadge(log){
    if(log.inOffice===true) return '<span class="badge bg">✅ In-office</span>';
    const emp=D.employees.find(e=>e.name===log.user);
    if(!log.lat) return '<span class="badge bx">📵 No GPS</span>';
    return '<span class="badge ba">📍 Outside office</span>';
  }

  function trailSVG(empLogs){
    const valid=empLogs.filter(l=>l.lat&&l.lng).slice(0,15);
    if(!valid.length) return '<div style="background:#f1f5f9;border-radius:8px;height:130px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center">No GPS data yet<br>Location captured on next login</div>';
    const lats=valid.map(l=>l.lat),lngs=valid.map(l=>l.lng);
    const pad=0.006;
    const minLa=Math.min(...lats)-pad,maxLa=Math.max(...lats)+pad;
    const minLn=Math.min(...lngs)-pad,maxLn=Math.max(...lngs)+pad;
    const w=320,h=130;
    const tx=ln=>((ln-minLn)/(maxLn-minLn||.001))*w;
    const ty=la=>(1-(la-minLa)/(maxLa-minLa||.001))*h;
    const pts=valid.map(l=>`${tx(l.lng)},${ty(l.lat)}`).join(' ');
    const dots=valid.map((l,i)=>`<circle cx="${tx(l.lng)}" cy="${ty(l.lat)}" r="${i===0?9:5}" fill="${i===0?'#3b82f6':l.inOffice?'#22c55e':'#f59e0b'}" opacity="${Math.max(0.35,1-i*0.06)}"/><text x="${tx(l.lng)}" y="${ty(l.lat)+3.5}" text-anchor="middle" font-size="7" fill="#fff">${i===0?'●':i+1}</text>`).join('');
    return `<svg width="100%" viewBox="0 0 ${w} ${h}" style="border-radius:8px;border:1px solid var(--border);background:#f0f9ff">
      <polyline points="${pts}" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="5,3"/>
      ${dots}
      <text x="3" y="10" font-size="8" fill="#64748b">🔵 Latest  🟡 Remote  🟢 In-office</text>
    </svg>`;
  }

  return `
  <div class="page-hd">
    <div><div class="pg-title">Login location tracking</div><div class="pg-sub">Every employee login GPS captured automatically</div></div>
    <button class="btn btn-primary" onclick="nav('settings')">⚙ Office locations</button>
  </div>

  <div class="stat-grid">
    <div class="stat"><div class="stat-lbl">Total logins</div><div class="stat-val">${total}</div><div class="stat-sub">All employees</div></div>
    <div class="stat"><div class="stat-lbl">In-office</div><div class="stat-val">${inOff}</div><div class="stat-sub">${total?Math.round(inOff/total*100):0}% of logins</div></div>
    <div class="stat"><div class="stat-lbl">Outside office</div><div class="stat-val">${outOff}</div><div class="stat-sub">Travel / remote / field</div></div>
    <div class="stat"><div class="stat-lbl">Employees tracked</div><div class="stat-val">${uniqueEmps.length}</div><div class="stat-sub">Unique logins</div></div>
  </div>

  <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 16px;margin-bottom:1rem;font-size:13px;color:#1e40af">
    <strong>📍 How this works:</strong> Every time any employee logs in — whether from office, home, another city, or a client site — their GPS location is automatically captured and shown here. No manual entry needed.
  </div>

  <div class="card" style="margin-bottom:1rem">
    <div class="card-hd">
      <h3>Per-employee location history</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="loc-emp-filter" onchange="renderLocTrails()" style="width:180px;font-size:12px">
          <option value="">All employees</option>
          ${uniqueEmps.map(n=>`<option>${n}</option>`).join('')}
        </select>
        <select id="loc-date-filter" onchange="renderLocTrails()" style="width:140px;font-size:12px">
          <option value="">All dates</option>
          <option value="today">Today</option>
          <option value="week">This week</option>
          <option value="month">This month</option>
        </select>
      </div>
    </div>
    <div id="loc-trails-grid" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem">
      ${uniqueEmps.slice(0,6).map(name=>{
        const empLogs=logs.filter(l=>l.user===name);
        const last=empLogs[0];
        const emp=D.employees.find(e=>e.name===name);
        return `<div style="border:1px solid var(--border);border-radius:10px;padding:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            ${av(name,30)}
            <div style="min-width:0">
              <div style="font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
              <div style="font-size:10px;color:var(--muted)">${emp?emp.role+' · '+emp.dept:'Employee'}</div>
            </div>
          </div>
          ${trailSVG(empLogs)}
          <div style="margin-top:8px;font-size:11px">
            <div style="color:var(--muted)">Last login: ${last?last.time:'Never'}</div>
            <div style="color:var(--muted);margin-top:2px">📍 ${last&&last.address?last.address:'No location data'}</div>
            <div style="margin-top:4px;display:flex;align-items:center;gap:6px">
              ${last?statusBadge(last):''}<span style="color:var(--muted)">${empLogs.length} login${empLogs.length!==1?'s':''}</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${uniqueEmps.length>6?`<div style="text-align:center;margin-top:12px"><button class="btn btn-sec" onclick="showAllTrails()">Show all ${uniqueEmps.length} employees</button></div>`:''}
  </div>

  <div class="card" style="padding:0">
    <div class="card-hd" style="padding:1rem 1rem 0">
      <h3>Complete login log</h3>
      <span class="muted">${logs.length} records</span>
    </div>
    ${logs.length===0?`<div style="text-align:center;padding:2rem;color:var(--muted)">No login records yet.<br>Location is captured automatically on next login.</div>`:
    `<table style="margin-top:8px"><thead><tr>
      <th style="width:14%;padding-left:12px">Employee</th>
      <th style="width:16%">Date & time</th>
      <th style="width:20%">Location / Address</th>
      <th style="width:16%">Nearest office</th>
      <th style="width:12%">Coordinates</th>
      <th style="width:10%">Device</th>
      <th style="width:12%">Status</th>
    </tr></thead><tbody>
    ${logs.map(l=>`<tr>
      <td style="padding-left:12px"><div style="display:flex;align-items:center;gap:6px">${av(l.user,22)}<div><div style="font-size:12px;font-weight:600">${l.user}</div><div style="font-size:10px;color:var(--muted)">${D.employees.find(e=>e.name===l.user)?.role||''}</div></div></div></td>
      <td style="color:var(--muted);font-size:11px">${l.time}</td>
      <td style="font-size:11px">${l.address||'Location not captured'}</td>
      <td style="font-size:11px;font-weight:500">${l.nearestOffice||'—'}</td>
      <td style="color:var(--muted);font-size:11px">${l.lat?`${l.lat.toFixed(4)}, ${l.lng.toFixed(4)}`:'No GPS'}</td>
      <td>${l.method==='face'?'<span class="badge bb">🎭 Face</span>':'<span class="badge bx">🔑 Pass</span>'}</td>
      <td>${l.inOffice===true?'<span class="badge bg">✅ In-office</span>':l.lat?'<span class="badge ba">📍 Outside</span>':'<span class="badge bx">No GPS</span>'}</td>
    </tr>`).join('')}
    </tbody></table>`}
  </div>`;
}

function renderLocTrails(){
  const empF=($('loc-emp-filter')||{}).value||'';
  const dateF=($('loc-date-filter')||{}).value||'';
  const grid=$('loc-trails-grid');if(!grid)return;
  let logs=D.loginLogs||[];
  const now=new Date();
  if(dateF==='today') logs=logs.filter(l=>{try{return new Date(l.time).toDateString()===now.toDateString();}catch(e){return true;}});
  if(dateF==='week') logs=logs.filter(l=>{try{return (now-new Date(l.time))<7*86400000;}catch(e){return true;}});
  if(dateF==='month') logs=logs.filter(l=>{try{return new Date(l.time).getMonth()===now.getMonth();}catch(e){return true;}});
  const emps=empF?[empF]:[...new Set(logs.map(l=>l.user))];
  grid.style.gridTemplateColumns=`repeat(${Math.min(emps.length,3)},minmax(0,1fr))`;
  grid.innerHTML=emps.map(name=>{
    const empLogs=logs.filter(l=>l.user===name);
    const last=empLogs[0];
    const emp=D.employees.find(e=>e.name===name);
    const valid=empLogs.filter(l=>l.lat&&l.lng).slice(0,15);
    let trailHtml='';
    if(!valid.length){trailHtml='<div style="background:#f1f5f9;border-radius:8px;height:130px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;text-align:center">No GPS data</div>';}
    else{
      const pad=0.006,lats=valid.map(l=>l.lat),lngs=valid.map(l=>l.lng);
      const minLa=Math.min(...lats)-pad,maxLa=Math.max(...lats)+pad,minLn=Math.min(...lngs)-pad,maxLn=Math.max(...lngs)+pad;
      const w=320,h=130,tx=ln=>((ln-minLn)/(maxLn-minLn||.001))*w,ty=la=>(1-(la-minLa)/(maxLa-minLa||.001))*h;
      const pts=valid.map(l=>`${tx(l.lng)},${ty(l.lat)}`).join(' ');
      const dots=valid.map((l,i)=>`<circle cx="${tx(l.lng)}" cy="${ty(l.lat)}" r="${i===0?9:5}" fill="${i===0?'#3b82f6':l.inOffice?'#22c55e':'#f59e0b'}" opacity="${Math.max(0.35,1-i*0.06)}"/><text x="${tx(l.lng)}" y="${ty(l.lat)+3.5}" text-anchor="middle" font-size="7" fill="#fff">${i===0?'●':i+1}</text>`).join('');
      trailHtml=`<svg width="100%" viewBox="0 0 ${w} ${h}" style="border-radius:8px;border:1px solid var(--border);background:#f0f9ff"><polyline points="${pts}" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="5,3"/>${dots}<text x="3" y="10" font-size="8" fill="#64748b">🔵 Latest  🟡 Outside  🟢 In-office</text></svg>`;
    }
    const inOfficeCnt=empLogs.filter(l=>l.inOffice===true).length;
    const badge=last?(last.inOffice===true?'<span class="badge bg">✅ In-office</span>':last.lat?'<span class="badge ba">📍 Outside</span>':'<span class="badge bx">No GPS</span>'):'';
    return `<div style="border:1px solid var(--border);border-radius:10px;padding:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">${av(name,30)}<div style="min-width:0"><div style="font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div><div style="font-size:10px;color:var(--muted)">${emp?emp.role+' · '+emp.dept:'Employee'}</div></div></div>
      ${trailHtml}
      <div style="margin-top:8px;font-size:11px">
        <div style="color:var(--muted)">Last: ${last?last.time:'Never'}</div>
        <div style="color:var(--muted);margin-top:1px">📍 ${last&&last.address?last.address:'—'}</div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px">${badge}<span style="color:var(--muted)">${inOfficeCnt}/${empLogs.length} in-office</span></div>
      </div>
    </div>`;
  }).join('');
}

function showAllTrails(){
  const grid=$('loc-trails-grid');if(!grid)return;
  const empFilter=($('loc-emp-filter')||{}).value||'';
  const emps=empFilter?[empFilter]:[...new Set((D.loginLogs||[]).map(l=>l.user))];
  grid.style.gridTemplateColumns=`repeat(${Math.min(emps.length,3)},minmax(0,1fr))`;
  renderLocTrails();
}

function viewFieldTrail(id,name){
  nav('locations');
  setTimeout(()=>{
    const sel=$('loc-emp-filter');
    if(sel){sel.value=name;renderLocTrails();}
  },100);
}

  const wrap=$('loc-modal-wrap');if(!wrap)return;
  wrap.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal('loc-modal-wrap')">
  <div class="modal"><div class="modal-hd"><h3>${editId?'Edit location':'Add office location'}</h3><button class="xbtn" onclick="closeModal('loc-modal-wrap')">×</button></div>
  <div class="fld"><label>Location name</label><input type="text" id="loc-name" placeholder="e.g. Head Office Hyderabad" value="${existing?existing.name:''}"></div>
  <div class="frow">
    <div class="fld"><label>Latitude</label><input type="number" id="loc-lat" step="0.0001" placeholder="17.3850" value="${existing?existing.lat:''}"></div>
    <div class="fld"><label>Longitude</label><input type="number" id="loc-lng" step="0.0001" placeholder="78.4867" value="${existing?existing.lng:''}"></div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      ${colors.map(c=>`<div onclick="selectLocColor(this,'${c}')" data-color="${c}" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:${(existing?existing.color:colors[0])===c?'3px solid #111':'3px solid transparent'}"></div>`).join('')}

  </div></div>`;
}
function editLocModal(id){openAddLocModal(id);}
function selectLocColor(el,color){
  document.querySelectorAll('[data-color]').forEach(e=>e.style.border='3px solid transparent');
  el.style.border='3px solid #111';
  if($('loc-color'))$('loc-color').value=color;
}
function captureLocFromGPS(){
  const s=$('loc-gps-status');if(s)s.textContent='Getting GPS…';
  if(!navigator.geolocation){if(s)s.textContent='GPS not available';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    if($('loc-lat'))$('loc-lat').value=pos.coords.latitude.toFixed(6);
    if($('loc-lng'))$('loc-lng').value=pos.coords.longitude.toFixed(6);
    if(s)s.textContent=`✅ Location set: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
  },err=>{if(s)s.textContent='Could not get GPS location';},{enableHighAccuracy:true});
}
function useCurrentLoc(id){
  if(!navigator.geolocation){alert('GPS not available');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const loc=D.officeLocations.find(l=>l.id===id);
    if(loc){loc.lat=parseFloat(pos.coords.latitude.toFixed(6));loc.lng=parseFloat(pos.coords.longitude.toFixed(6));save();nav('settings');alert(`✅ ${loc.name} location updated to your current position!`);}
  },()=>alert('Could not get GPS location'),{enableHighAccuracy:true});
}
function saveLocModal(editId){
  const name=($('loc-name')||{}).value?.trim();
  const lat=parseFloat(($('loc-lat')||{}).value);
  const lng=parseFloat(($('loc-lng')||{}).value);
  const radius=parseInt(($('loc-rad')||{}).value)||500;
  const color=($('loc-color')||{}).value||'#3b82f6';
  if(!name||isNaN(lat)||isNaN(lng)){alert('Please fill in name, latitude and longitude');return;}
  if(!D.officeLocations)D.officeLocations=[];
  if(editId){
    const loc=D.officeLocations.find(l=>l.id===editId);
    if(loc){Object.assign(loc,{name,lat,lng,radius,color});}
  } else {
    D.officeLocations.push({id:'LOC-'+Date.now(),name,lat,lng,radius,color});
  }
  save();closeModal('loc-modal-wrap');nav('settings');
}
function deleteLoc(id){
  const loc=D.officeLocations.find(l=>l.id===id);
  if(!loc||!confirm(`Delete "${loc.name}"?`))return;
  D.officeLocations=D.officeLocations.filter(l=>l.id!==id);
  save();nav('settings');
}
function saveSettings(){
  D.settings={...D.settings,company:$('st-cn').value,email:$('st-em').value,tz:$('st-tz').value,currency:$('st-cu').value,hours:parseInt($('st-wh').value)||9};
  save();$('st-msg').innerHTML=`<div class="alert alert-s" style="margin-bottom:8px">Settings saved!</div>`;
  setTimeout(()=>{if($('st-msg'))$('st-msg').innerHTML='';},2000);
}
function useMyLocation(){
  if(!navigator.geolocation){alert('Geolocation not supported');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    if($('st-olat'))$('st-olat').value=pos.coords.latitude.toFixed(6);
    if($('st-olng'))$('st-olng').value=pos.coords.longitude.toFixed(6);
    alert(`Office location set to:\n${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}\n\nClick "Save changes" to confirm.`);
  },()=>alert('Could not get location. Please enter coordinates manually.'),{enableHighAccuracy:true});
}
function saveProfile(){
  D.user.name=$('st-name').value||D.user.name;
  D.user.email=$('st-uemail').value||D.user.email;
  const pw=$('st-pw').value;if(pw&&pw.length>=6)D.user.password=pw;
  save();nav('settings');
}

// ─── HOLIDAY CALENDAR ────────────────────────────────────────────
function pgHolidays(empView=false){
  if(!D.holidays) D.holidays=[
    {id:1,name:'New Year',date:'2026-01-01',type:'National'},
    {id:2,name:'Republic Day',date:'2026-01-26',type:'National'},
    {id:3,name:'Holi',date:'2026-03-25',type:'Festival'},
    {id:4,name:'Good Friday',date:'2026-04-03',type:'National'},
    {id:5,name:'Labour Day',date:'2026-05-01',type:'National'},
    {id:6,name:'Independence Day',date:'2026-08-15',type:'National'},
    {id:7,name:'Gandhi Jayanti',date:'2026-10-02',type:'National'},
    {id:8,name:'Dussehra',date:'2026-10-11',type:'Festival'},
    {id:9,name:'Diwali',date:'2026-10-30',type:'Festival'},
    {id:10,name:'Christmas',date:'2026-12-25',type:'National'},
  ];
  const today=todayStr();
  const upcoming=D.holidays.filter(h=>h.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const past=D.holidays.filter(h=>h.date<today).sort((a,b)=>b.date.localeCompare(a.date));
  const typeColor={National:'bb',Festival:'ba',Optional:'bx',Company:'bg'};
  return `
  <div class="page-hd">
    <div><div class="pg-title">Holiday Calendar 2026</div><div class="pg-sub">${D.holidays.length} holidays · ${upcoming.length} upcoming</div></div>
    ${!empView?`<button class="btn btn-primary" onclick="addHolidayModal()">+ Add holiday</button>`:''}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
    <div class="card">
      <div class="card-hd"><h3>🗓 Upcoming holidays</h3><span class="muted">${upcoming.length} remaining</span></div>
      ${upcoming.length===0?'<div style="text-align:center;color:var(--muted);padding:1rem">No upcoming holidays</div>':
      upcoming.map(h=>{
        const d=new Date(h.date);
        const daysLeft=Math.round((d-new Date(today))/86400000);
        return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f3f4f6">
          <div style="background:#f1f5f9;border-radius:8px;padding:6px 10px;text-align:center;min-width:48px">
            <div style="font-size:16px;font-weight:800;color:var(--navy)">${d.getDate()}</div>
            <div style="font-size:10px;color:var(--muted)">${d.toLocaleString('en-IN',{month:'short'})}</div>
          </div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${h.name}</div>
            <div style="font-size:11px;color:var(--muted)">${d.toLocaleString('en-IN',{weekday:'long'})} · ${daysLeft===0?'Today':daysLeft===1?'Tomorrow':`In ${daysLeft} days`}</div>
          </div>
          <span class="badge ${typeColor[h.type]||'bx'}">${h.type}</span>
          ${!empView?`<button class="btn-icon btn-del" onclick="deleteHoliday(${h.id})">🗑</button>`:''}
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-hd"><h3>✅ Past holidays</h3><span class="muted">${past.length} done</span></div>
      ${past.slice(0,8).map(h=>{
        const d=new Date(h.date);
        return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f3f4f6;opacity:.6">
          <div style="background:#f1f5f9;border-radius:8px;padding:6px 10px;text-align:center;min-width:48px">
            <div style="font-size:16px;font-weight:800;color:var(--muted)">${d.getDate()}</div>
            <div style="font-size:10px;color:var(--muted)">${d.toLocaleString('en-IN',{month:'short'})}</div>
          </div>
          <div style="flex:1"><div style="font-weight:500;font-size:13px">${h.name}</div></div>
          <span class="badge ${typeColor[h.type]||'bx'}">${h.type}</span>
        </div>`;
      }).join('')}
    </div>
  </div>
  <div id="holiday-modal-wrap"></div>`;
}
function addHolidayModal(){
  const wrap=$('holiday-modal-wrap');if(!wrap)return;
  wrap.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal('holiday-modal-wrap')">
  <div class="modal" style="max-width:400px">
    <div class="modal-hd"><h3>Add holiday</h3><button class="xbtn" onclick="closeModal('holiday-modal-wrap')">×</button></div>
    <div class="fld"><label>Holiday name</label><input type="text" id="hol-name" placeholder="e.g. Diwali"></div>
    <div class="fld"><label>Date</label><input type="date" id="hol-date" value="${todayStr()}"></div>
    <div class="fld"><label>Type</label><select id="hol-type"><option>National</option><option>Festival</option><option>Optional</option><option>Company</option></select></div>
    <div class="modal-ftr"><button class="btn btn-sec" onclick="closeModal('holiday-modal-wrap')">Cancel</button><button class="btn btn-primary" onclick="saveHoliday()">Add holiday</button></div>
  </div></div>`;
}
function saveHoliday(){
  if(!D.holidays)D.holidays=[];
  const name=($('hol-name')||{}).value?.trim();
  const date=($('hol-date')||{}).value;
  const type=($('hol-type')||{}).value;
  if(!name||!date)return;
  D.holidays.push({id:Date.now(),name,date,type});
  save();closeModal('holiday-modal-wrap');nav('holidays');
}
function deleteHoliday(id){
  if(!confirm('Delete this holiday?'))return;
  D.holidays=D.holidays.filter(h=>h.id!==id);
  save();nav('holidays');
}

// ─── ORGANIZATION CHART ───────────────────────────────────────────
function pgOrgChart(empView=false){
  const deptGroups={};
  DEPTS.forEach(d=>{deptGroups[d]=D.employees.filter(e=>e.dept===d&&e.status==='Active');});
  const deptColors={'Engineering':'#3b82f6','HR':'#10b981','Sales':'#f59e0b','Finance':'#8b5cf6','Operations':'#ef4444','Marketing':'#ec4899','Legal':'#06b6d4'};
  return `
  <div class="page-hd"><div><div class="pg-title">Organization Chart</div><div class="pg-sub">${D.employees.filter(e=>e.status==='Active').length} active employees across ${DEPTS.length} departments</div></div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:1.5rem;padding:1rem">
    <div style="background:var(--navy);color:#fff;border-radius:12px;padding:14px 32px;text-align:center;box-shadow:0 4px 12px rgba(26,26,78,.3)">
      <div style="font-weight:800;font-size:15px">${D.settings.company||'Kreayotoo Solutions'}</div>
      <div style="font-size:11px;opacity:.7;margin-top:2px">Head Office</div>
    </div>
    <div style="width:2px;height:24px;background:var(--border)"></div>
    <div style="display:grid;grid-template-columns:repeat(${Math.min(Object.keys(deptGroups).filter(d=>deptGroups[d].length>0).length,4)},minmax(180px,1fr));gap:1rem;width:100%">
      ${DEPTS.filter(d=>deptGroups[d].length>0).map(dept=>`
      <div style="border:2px solid ${deptColors[dept]||'#94a3b8'};border-radius:12px;overflow:hidden">
        <div style="background:${deptColors[dept]||'#94a3b8'};color:#fff;padding:8px 12px;font-weight:700;font-size:12px;display:flex;justify-content:space-between">
          <span>${dept}</span><span>${deptGroups[dept].length} staff</span>
        </div>
        ${deptGroups[dept].map(e=>`
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #f3f4f6">
          ${av(e.name,28)}
          <div>
            <div style="font-size:12px;font-weight:600">${e.name}</div>
            <div style="font-size:10px;color:var(--muted)">${e.role}</div>
          </div>
        </div>`).join('')}
      </div>`).join('')}
    </div>
  </div>`;
}

// ─── ID CARDS ────────────────────────────────────────────────────
function pgIDCards(){
  return `
  <div class="page-hd"><div><div class="pg-title">Employee ID Cards</div><div class="pg-sub">Generate and print ID cards for all employees</div></div>
  <button class="btn btn-primary" onclick="printAllCards()">🖨 Print all</button></div>
  <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1rem" id="id-cards-grid">
    ${D.employees.filter(e=>e.status==='Active').map(e=>idCardHTML(e)).join('')}
  </div>`;
}
function idCardHTML(e,mini=false){
  const color=e.empType==='field'?'#f59e0b':e.empType==='remote'?'#10b981':'#1a1a4e';
  return `<div style="background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)${mini?';max-width:260px':''}">
    <div style="background:${color};color:#fff;padding:12px;text-align:center">
      <div style="font-size:9px;letter-spacing:2px;opacity:.8;margin-bottom:4px">${D.settings.company||'KREAYOTOO SOLUTIONS'}</div>
      <div style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:20px;font-weight:800">${initials(e.name)}</div>
    </div>
    <div style="padding:12px;text-align:center">
      <div style="font-weight:800;font-size:14px;margin-bottom:2px">${e.name}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${e.role}</div>
      <div style="background:#f1f5f9;border-radius:6px;padding:4px 8px;display:inline-block;font-size:11px;font-weight:700;color:${color};letter-spacing:1px">${e.id}</div>
      <div style="margin-top:8px;font-size:10px;color:var(--muted)">${e.dept} · ${e.email}</div>
      <div style="margin-top:4px;font-size:10px;color:var(--muted)">Joined: ${e.joined||'—'}</div>
    </div>
  </div>`;
}
function empIDCard(){
  const e=currentEmployee;
  return `
  <div class="page-hd"><div class="pg-title">My ID Card</div></div>
  <div style="display:flex;justify-content:center;padding:2rem">
    <div style="max-width:280px;width:100%">
      ${idCardHTML(e)}
      <button class="btn btn-primary" style="width:100%;margin-top:1rem" onclick="window.print()">🖨 Print ID Card</button>
    </div>
  </div>`;
}
function printAllCards(){
  window.print();
}

// Show loading screen while syncing from Supabase, then render
async function init(){
  if(D.loggedIn){
    // Show a loading screen immediately
    $('root').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f0f2f5;gap:16px">
      <div style="background:#1a1a4e;color:#fff;border-radius:14px;padding:1.5rem 2rem;text-align:center">
        <div style="font-size:18px;font-weight:800;letter-spacing:1px;margin-bottom:8px">KREAYOTOO Solutions</div>
        <div style="font-size:13px;opacity:.7;margin-bottom:16px">Loading your portal…</div>
        <div style="width:200px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden">
          <div style="height:4px;background:#4ecdc4;border-radius:2px;animation:loading 1.5s infinite" id="load-bar"></div>
        </div>
      </div>
    </div>
    <style>@keyframes loading{0%{width:0%}50%{width:70%}100%{width:100%}}</style>`;
    // Sync fresh data from Supabase
    await syncFromSupabase();
    // Now render with fresh data
    renderApp();
  } else {
    renderApp();
  }
}

init();
</script>
