  const expenses = D.expenses || [];
  const approvedExp = expenses.filter(x=>x.status==='Approved');
  const teams = D.teams || [];
  const attendance = D.attendance || [];

  // ── Headcount by department ──
  const deptCounts = {};
  activeEmps.forEach(e=>{
    const d = e.dept || 'Unassigned';
    deptCounts[d] = (deptCounts[d]||0)+1;
  });
  const deptSorted = Object.entries(deptCounts).sort((a,b)=>b[1]-a[1]);
  const deptMax = Math.max(...Object.values(deptCounts),1);

  // ── Leaves by month (last 6 months) ──
  const now = new Date();
  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({
      key: d.toISOString().slice(0,7),
      label: d.toLocaleDateString('en-IN',{month:'short',year:'2-digit'}),
      count: 0, days: 0
    });
  }
  approvedLeaves.forEach(l=>{
    const m = (l.from||'').slice(0,7);
    const target = months.find(x=>x.key===m);
    if(target){ target.count++; target.days += (l.days||0); }
  });
  const leaveMax = Math.max(...months.map(m=>m.days),1);

  // ── Leave type breakdown ──
  const typeCounts = {};
  approvedLeaves.forEach(l=>{
    const t = l.type || 'Other';
    typeCounts[t] = (typeCounts[t]||0) + (l.days||0);
  });
  const typeSorted = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]);
  const totalLeaveDays = Object.values(typeCounts).reduce((s,v)=>s+v,0);

  // ── Attendance trend (last 14 days) ──
  const attDays = [];
  for(let i=13;i>=0;i--){
    const d = new Date(now); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    const att = attendance.filter(a=>a.date===ds);
    attDays.push({
      date: ds,
      label: d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}),
      weekday: d.toLocaleDateString('en-IN',{weekday:'short'}),
      isWeekend: d.getDay()===0 || d.getDay()===6,
      present: att.filter(a=>a.status==='Present'||a.status==='Late').length,
      absent: att.filter(a=>a.status==='Absent').length,
      total: activeEmps.length
    });
  }

  // ── Expense summary ──
  const totalExpenses = approvedExp.reduce((s,x)=>s+(x.amount||0),0);
  const expByCategory = {};
  approvedExp.forEach(x=>{
    const c = x.category || 'Other';
    expByCategory[c] = (expByCategory[c]||0) + (x.amount||0);
  });
  const expSorted = Object.entries(expByCategory).sort((a,b)=>b[1]-a[1]);

  // ── Team utilization ──
  const teamStats = teams.map(t=>{
    const members = activeEmps.filter(e=>e.teamId===t._uuid);
    const memberNames = new Set(members.map(m=>m.name));
    const recentLogs = (window._todayWorkLogs||[]).filter(l=>memberNames.has(l.empName));
    return {
      name: t.name,
      department: t.department,
      members: members.length,
      recentlyActive: recentLogs.length
    };
  }).sort((a,b)=>b.members-a.members);

  // ── Gender diversity (if data exists) ──
  const genderCounts = {};
  activeEmps.forEach(e=>{ const g = e.gender||'Not set'; genderCounts[g]=(genderCounts[g]||0)+1; });

  // ── Quick stats ──
  const monthLeaves = months[months.length-1].days;
  const weekAtt = attDays.slice(-7);
  const avgAttendance = weekAtt.reduce((s,d)=>s+(d.total>0?d.present/d.total*100:0),0)/7;

  return `
  <div class="page-hd">
    <div>
      <div class="pg-title">📊 Analytics Dashboard</div>
      <div class="pg-sub">At-a-glance health of your company · Updated live</div>
    </div>
    <button class="btn btn-sec" onclick="nav('analytics')">🔄 Refresh</button>
  </div>

  <!-- Top-level KPIs -->
  <div class="stat-grid" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1rem">
    <div class="stat">
      <div class="stat-lbl">Headcount</div>
      <div class="stat-val">${activeEmps.length}</div>
      <div class="stat-sub">${emps.length-activeEmps.length} inactive</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">7-day avg attendance</div>
      <div class="stat-val" style="color:${avgAttendance>=80?'#16a34a':avgAttendance>=60?'#f59e0b':'#dc2626'}">${avgAttendance.toFixed(0)}%</div>
      <div class="stat-sub">Rolling week</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Leaves this month</div>
      <div class="stat-val">${monthLeaves}<span style="font-size:13px;color:var(--muted);font-weight:400"> days</span></div>
      <div class="stat-sub">${months[months.length-1].count} requests</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Expenses (approved)</div>
      <div class="stat-val">₹${(totalExpenses/1000).toFixed(1)}k</div>
      <div class="stat-sub">${approvedExp.length} claims</div>
    </div>
  </div>

  <!-- Row 1: Attendance chart + Headcount -->
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1rem">
    <div class="card">
      <div class="card-hd"><h3>📅 Attendance — last 14 days</h3></div>
      <div style="padding:10px 0">
        <div style="display:flex;align-items:flex-end;gap:4px;height:180px;padding:0 8px">
          ${attDays.map(d=>{
            const pct = d.total>0 ? Math.round((d.present/d.total)*100) : 0;
            const h = Math.max(4, pct*1.5); // scale
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
              <div style="font-size:9px;color:var(--muted);font-weight:700">${pct}%</div>
              <div style="width:100%;background:${d.isWeekend?'#e2e8f0':pct>=80?'#86efac':pct>=60?'#fcd34d':'#fca5a5'};height:${h}px;border-radius:4px 4px 0 0;transition:all .2s;border:1px solid ${d.isWeekend?'#cbd5e1':pct>=80?'#16a34a':pct>=60?'#f59e0b':'#dc2626'}" title="${d.label}: ${d.present}/${d.total} present"></div>
              <div style="font-size:9px;color:var(--muted);white-space:nowrap">${d.weekday}</div>
              <div style="font-size:9px;color:var(--muted);white-space:nowrap">${d.label.split(' ')[0]}</div>
            </div>`;
          }).join('')}
        </div>
        <div style="display:flex;gap:12px;justify-content:center;margin-top:14px;font-size:11px;color:var(--muted)">
          <span><span style="display:inline-block;width:10px;height:10px;background:#86efac;border:1px solid #16a34a;border-radius:2px"></span> ≥80%</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#fcd34d;border:1px solid #f59e0b;border-radius:2px"></span> 60-80%</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#fca5a5;border:1px solid #dc2626;border-radius:2px"></span> &lt;60%</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#e2e8f0;border:1px solid #cbd5e1;border-radius:2px"></span> Weekend</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd"><h3>🏢 By department</h3></div>
      <div style="padding:4px 0">
        ${deptSorted.length===0?'<div style="padding:1rem;text-align:center;color:var(--muted);font-size:12px">No employees yet</div>':deptSorted.map(([d,c])=>{
          const pct = Math.round((c/deptMax)*100);
          return `<div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
              <span style="font-weight:600">${d}</span><span style="color:var(--muted);font-weight:700">${c}</span>
            </div>
            <div style="background:#f1f5f9;height:6px;border-radius:3px;overflow:hidden">
              <div style="background:linear-gradient(90deg,var(--navy),var(--navy2));height:100%;width:${pct}%;border-radius:3px"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <!-- Row 2: Leaves trend + Leave types -->
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1rem">
    <div class="card">
      <div class="card-hd"><h3>🏖 Leaves — last 6 months</h3></div>
      <div style="padding:10px 0">
        <div style="display:flex;align-items:flex-end;gap:12px;height:160px;padding:0 8px">
          ${months.map(m=>{
            const h = Math.max(4,(m.days/leaveMax)*140);
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px">
              <div style="font-size:11px;font-weight:700;color:var(--navy2)">${m.days}d</div>
              <div style="width:100%;background:linear-gradient(180deg,#f59e0b,#d97706);height:${h}px;border-radius:6px 6px 0 0;transition:all .2s" title="${m.count} requests"></div>
              <div style="font-size:11px;color:var(--muted);font-weight:600">${m.label}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd"><h3>🎯 Leave types</h3></div>
      <div style="padding:4px 0">
        ${typeSorted.length===0?'<div style="padding:1rem;text-align:center;color:var(--muted);font-size:12px">No approved leaves yet</div>':typeSorted.map(([type,days])=>{
          const pct = totalLeaveDays>0 ? Math.round((days/totalLeaveDays)*100) : 0;
          const colors = {CL:'#3b82f6',EL:'#10b981',SL:'#ef4444',EM:'#f97316','Casual Leave':'#3b82f6','Earned Leave':'#10b981','Sick Leave':'#ef4444','Emergency':'#f97316'};
          const color = colors[type] || '#64748b';
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="font-weight:600">${type}</span>
              <span style="color:var(--muted);font-weight:700">${days}d <span style="font-weight:400">(${pct}%)</span></span>
            </div>
            <div style="background:#f1f5f9;height:8px;border-radius:4px;overflow:hidden">
              <div style="background:${color};height:100%;width:${pct}%;border-radius:4px"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <!-- Row 3: Teams + Expenses by category -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
    <div class="card">
      <div class="card-hd"><h3>👨‍👩‍👧 Team activity</h3></div>
      ${teams.length===0?'<div style="padding:1rem;text-align:center;color:var(--muted);font-size:12px">No teams created yet. <button class="btn-link" onclick="nav(\'teams\')">Create one →</button></div>':`
      <div style="padding:4px 0">
        ${teamStats.map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f8fafc;border-radius:8px;margin-bottom:6px">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${t.name}</div>
            <div style="font-size:11px;color:var(--muted)">${t.department||'No dept'} · ${t.members} member${t.members!==1?'s':''}</div>
          </div>
          ${t.recentlyActive>0?`<span style="background:#dcfce7;color:#166534;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700">🟢 ${t.recentlyActive} active</span>`:'<span style="color:var(--muted);font-size:11px">Quiet</span>'}
        </div>`).join('')}
      </div>`}
    </div>

    <div class="card">
      <div class="card-hd"><h3>💸 Expenses by category</h3></div>
      <div style="padding:4px 0">
        ${expSorted.length===0?'<div style="padding:1rem;text-align:center;color:var(--muted);font-size:12px">No approved expenses yet</div>':expSorted.map(([cat,amt])=>{
          const pct = totalExpenses>0 ? Math.round((amt/totalExpenses)*100) : 0;
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="font-weight:600">${cat}</span>
              <span style="color:var(--muted);font-weight:700">₹${amt.toLocaleString('en-IN')} <span style="font-weight:400">(${pct}%)</span></span>
            </div>
            <div style="background:#f1f5f9;height:8px;border-radius:4px;overflow:hidden">
              <div style="background:linear-gradient(90deg,#8b5cf6,#6366f1);height:100%;width:${pct}%;border-radius:4px"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <!-- Row 4: Top contributors / quick actions -->
  <div class="card">
    <div class="card-hd"><h3>📈 Quick insights</h3></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:4px 0">
      <div style="background:#eff6ff;padding:14px;border-radius:10px;border-left:4px solid #3b82f6">
        <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px">Most active team</div>
        <div style="font-size:14px;font-weight:700;margin-top:4px">${teamStats[0]?.name||'—'}</div>
        <div style="font-size:11px;color:var(--muted)">${teamStats[0]?.members||0} members</div>
      </div>
      <div style="background:#f0fdf4;padding:14px;border-radius:10px;border-left:4px solid #16a34a">
        <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px">Biggest dept</div>
        <div style="font-size:14px;font-weight:700;margin-top:4px">${deptSorted[0]?.[0]||'—'}</div>
        <div style="font-size:11px;color:var(--muted)">${deptSorted[0]?.[1]||0} employees</div>
      </div>
      <div style="background:#fef3c7;padding:14px;border-radius:10px;border-left:4px solid #f59e0b">
        <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px">Most used leave</div>
        <div style="font-size:14px;font-weight:700;margin-top:4px">${typeSorted[0]?.[0]||'—'}</div>
        <div style="font-size:11px;color:var(--muted)">${typeSorted[0]?.[1]||0} days total</div>
      </div>
      <div style="background:#fae8ff;padding:14px;border-radius:10px;border-left:4px solid #a855f7">
        <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px">Top expense category</div>
        <div style="font-size:14px;font-weight:700;margin-top:4px">${expSorted[0]?.[0]||'—'}</div>
        <div style="font-size:11px;color:var(--muted)">₹${expSorted[0]?.[1]?.toLocaleString('en-IN')||0}</div>
      </div>
    </div>
  </div>`;
}

function pgLocations(){
  if(!D.loginLogs)D.loginLogs=[];
  if(!D.officeLocations)D.officeLocations=[];
  const logs=D.loginLogs;
  const total=logs.length;
  const inOff=logs.filter(l=>l.inOffice===true).length;
  const outOff=logs.filter(l=>l.inOffice===false).length;
  const uniqueEmps=[...new Set(logs.map(l=>l.user))];

  function statusBadge(log){
    if(log.inOffice===true) return '<span class="badge bg">✅ In-office</span>';
    const emp=D.employees.find(e=>e.name===log.user);
    if(!log.lat) return '<span class="badge bx">📵 No GPS</span>';
    return '<span class="badge ba">📍 Outside office</span>';
  }

  function trailSVG(empLogs){
    const valid=empLogs.filter(l=>l.lat&&l.lng).slice(0,15);
    if(!valid.length) return '<div style="background:#f1f5f9;border-radius:8px;height:130px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center">No GPS data yet<br>Location captured on next login</div>';
    const lats=valid.map(l=>l.lat),lngs=valid.map(l=>l.lng);
    const pad=0.006;
    const minLa=Math.min(...lats)-pad,maxLa=Math.max(...lats)+pad;
    const minLn=Math.min(...lngs)-pad,maxLn=Math.max(...lngs)+pad;
    const w=320,h=130;
    const tx=ln=>((ln-minLn)/(maxLn-minLn||.001))*w;
    const ty=la=>(1-(la-minLa)/(maxLa-minLa||.001))*h;
    const pts=valid.map(l=>`${tx(l.lng)},${ty(l.lat)}`).join(' ');
    const dots=valid.map((l,i)=>`<circle cx="${tx(l.lng)}" cy="${ty(l.lat)}" r="${i===0?9:5}" fill="${i===0?'#3b82f6':l.inOffice?'#22c55e':'#f59e0b'}" opacity="${Math.max(0.35,1-i*0.06)}"/><text x="${tx(l.lng)}" y="${ty(l.lat)+3.5}" text-anchor="middle" font-size="7" fill="#fff">${i===0?'●':i+1}</text>`).join('');
    return `<svg width="100%" viewBox="0 0 ${w} ${h}" style="border-radius:8px;border:1px solid var(--border);background:#f0f9ff">
      <polyline points="${pts}" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="5,3"/>
      ${dots}
      <text x="3" y="10" font-size="8" fill="#64748b">🔵 Latest  🟡 Remote  🟢 In-office</text>
    </svg>`;
  }

  return `
  <div class="page-hd">
    <div><div class="pg-title">Login location tracking</div><div class="pg-sub">Every employee login GPS captured automatically</div></div>
    <button class="btn btn-primary" onclick="nav('settings')">⚙ Office locations</button>
  </div>

  <div class="stat-grid">
    <div class="stat"><div class="stat-lbl">Total logins</div><div class="stat-val">${total}</div><div class="stat-sub">All employees</div></div>
    <div class="stat"><div class="stat-lbl">In-office</div><div class="stat-val">${inOff}</div><div class="stat-sub">${total?Math.round(inOff/total*100):0}% of logins</div></div>
    <div class="stat"><div class="stat-lbl">Outside office</div><div class="stat-val">${outOff}</div><div class="stat-sub">Travel / remote / field</div></div>
    <div class="stat"><div class="stat-lbl">Employees tracked</div><div class="stat-val">${uniqueEmps.length}</div><div class="stat-sub">Unique logins</div></div>
  </div>

  <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 16px;margin-bottom:1rem;font-size:13px;color:#1e40af">
    <strong>📍 How this works:</strong> Every time any employee logs in — whether from office, home, another city, or a client site — their GPS location is automatically captured and shown here. No manual entry needed.
  </div>

  <div class="card" style="margin-bottom:1rem">
    <div class="card-hd">
      <h3>Per-employee location history</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="loc-emp-filter" onchange="renderLocTrails()" style="width:180px;font-size:12px">
          <option value="">All employees</option>
          ${uniqueEmps.map(n=>`<option>${n}</option>`).join('')}
        </select>
        <select id="loc-date-filter" onchange="renderLocTrails()" style="width:140px;font-size:12px">
          <option value="">All dates</option>
          <option value="today">Today</option>
          <option value="week">This week</option>
          <option value="month">This month</option>
        </select>
      </div>
    </div>
    <div id="loc-trails-grid" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem">
      ${uniqueEmps.slice(0,6).map(name=>{
        const empLogs=logs.filter(l=>l.user===name);
        const last=empLogs[0];
        const emp=D.employees.find(e=>e.name===name);
        return `<div style="border:1px solid var(--border);border-radius:10px;padding:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            ${av(name,30)}
            <div style="min-width:0">
              <div style="font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
              <div style="font-size:10px;color:var(--muted)">${emp?emp.role+' · '+emp.dept:'Employee'}</div>
            </div>
          </div>
          ${trailSVG(empLogs)}
          <div style="margin-top:8px;font-size:11px">
            <div style="color:var(--muted)">Last login: ${last?last.time:'Never'}</div>
            <div style="color:var(--muted);margin-top:2px">📍 ${last&&last.address?last.address:'No location data'}</div>
            <div style="margin-top:4px;display:flex;align-items:center;gap:6px">
              ${last?statusBadge(last):''}<span style="color:var(--muted)">${empLogs.length} login${empLogs.length!==1?'s':''}</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${uniqueEmps.length>6?`<div style="text-align:center;margin-top:12px"><button class="btn btn-sec" onclick="showAllTrails()">Show all ${uniqueEmps.length} employees</button></div>`:''}
  </div>

  <div class="card" style="padding:0">
    <div class="card-hd" style="padding:1rem 1rem 0">
      <h3>Complete login log</h3>
      <span class="muted">${logs.length} records</span>
    </div>
    ${logs.length===0?`<div style="text-align:center;padding:2rem;color:var(--muted)">No login records yet.<br>Location is captured automatically on next login.</div>`:
    `<table style="margin-top:8px"><thead><tr>
      <th style="width:14%;padding-left:12px">Employee</th>
      <th style="width:16%">Date & time</th>
      <th style="width:20%">Location / Address</th>
      <th style="width:16%">Nearest office</th>
      <th style="width:12%">Coordinates</th>
      <th style="width:10%">Device</th>
      <th style="width:12%">Status</th>
    </tr></thead><tbody>
    ${logs.map(l=>`<tr>
      <td style="padding-left:12px"><div style="display:flex;align-items:center;gap:6px">${av(l.user,22)}<div><div style="font-size:12px;font-weight:600">${l.user}</div><div style="font-size:10px;color:var(--muted)">${D.employees.find(e=>e.name===l.user)?.role||''}</div></div></div></td>
      <td style="color:var(--muted);font-size:11px">${l.time}</td>
      <td style="font-size:11px">${l.address||'Location not captured'}</td>

      <td>${l.inOffice===true?'<span class="badge bg">✅ In-office</span>':l.lat?'<span class="badge ba">📍 Outside</span>':'<span class="badge bx">No GPS</span>'}</td>
    </tr>`).join('')}

  </div>`;
}

function renderLocTrails(){
  const empF=($('loc-emp-filter')||{}).value||'';
  const dateF=($('loc-date-filter')||{}).value||'';
  const grid=$('loc-trails-grid');if(!grid)return;
  let logs=D.loginLogs||[];
  const now=new Date();
  if(dateF==='today') logs=logs.filter(l=>{try{return new Date(l.time).toDateString()===now.toDateString();}catch(e){return true;}});
  if(dateF==='week') logs=logs.filter(l=>{try{return (now-new Date(l.time))<7*86400000;}catch(e){return true;}});
  if(dateF==='month') logs=logs.filter(l=>{try{return new Date(l.time).getMonth()===now.getMonth();}catch(e){return true;}});
  const emps=empF?[empF]:[...new Set(logs.map(l=>l.user))];
  grid.style.gridTemplateColumns=`repeat(${Math.min(emps.length,3)},minmax(0,1fr))`;
  grid.innerHTML=emps.map(name=>{
    const empLogs=logs.filter(l=>l.user===name);
    const last=empLogs[0];
    const emp=D.employees.find(e=>e.name===name);
    const valid=empLogs.filter(l=>l.lat&&l.lng).slice(0,15);
    let trailHtml='';
    if(!valid.length){trailHtml='<div style="background:#f1f5f9;border-radius:8px;height:130px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;text-align:center">No GPS data</div>';}
    else{
      const pad=0.006,lats=valid.map(l=>l.lat),lngs=valid.map(l=>l.lng);
      const minLa=Math.min(...lats)-pad,maxLa=Math.max(...lats)+pad,minLn=Math.min(...lngs)-pad,maxLn=Math.max(...lngs)+pad;
      const w=320,h=130,tx=ln=>((ln-minLn)/(maxLn-minLn||.001))*w,ty=la=>(1-(la-minLa)/(maxLa-minLa||.001))*h;
      const pts=valid.map(l=>`${tx(l.lng)},${ty(l.lat)}`).join(' ');
      const dots=valid.map((l,i)=>`<circle cx="${tx(l.lng)}" cy="${ty(l.lat)}" r="${i===0?9:5}" fill="${i===0?'#3b82f6':l.inOffice?'#22c55e':'#f59e0b'}" opacity="${Math.max(0.35,1-i*0.06)}"/><text x="${tx(l.lng)}" y="${ty(l.lat)+3.5}" text-anchor="middle" font-size="7" fill="#fff">${i===0?'●':i+1}</text>`).join('');
      trailHtml=`<svg width="100%" viewBox="0 0 ${w} ${h}" style="border-radius:8px;border:1px solid var(--border);background:#f0f9ff"><polyline points="${pts}" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="5,3"/>${dots}<text x="3" y="10" font-size="8" fill="#64748b">🔵 Latest  🟡 Outside  🟢 In-office</text></svg>`;
    }
    const inOfficeCnt=empLogs.filter(l=>l.inOffice===true).length;
    const badge=last?(last.inOffice===true?'<span class="badge bg">✅ In-office</span>':last.lat?'<span class="badge ba">📍 Outside</span>':'<span class="badge bx">No GPS</span>'):'';
    return `<div style="border:1px solid var(--border);border-radius:10px;padding:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">${av(name,30)}<div style="min-width:0"><div style="font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div><div style="font-size:10px;color:var(--muted)">${emp?emp.role+' · '+emp.dept:'Employee'}</div></div></div>
      ${trailHtml}
      <div style="margin-top:8px;font-size:11px">
        <div style="color:var(--muted)">Last: ${last?last.time:'Never'}</div>
        <div style="color:var(--muted);margin-top:1px">📍 ${last&&last.address?last.address:'—'}</div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px">${badge}<span style="color:var(--muted)">${inOfficeCnt}/${empLogs.length} in-office</span></div>
      </div>
    </div>`;
  }).join('');
}

function showAllTrails(){
  const grid=$('loc-trails-grid');if(!grid)return;
  const empFilter=($('loc-emp-filter')||{}).value||'';
  const emps=empFilter?[empFilter]:[...new Set((D.loginLogs||[]).map(l=>l.user))];

        <button title="Dismiss" onclick="event.stopPropagation();dismissNotif(${nid})" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:18px;padding:2px 8px;border-radius:4px;flex-shrink:0" onmouseover="this.style.background='#fee2e2';this.style.color='#991b1b'" onmouseout="this.style.background='none';this.style.color='#94a3b8'">×</button>
      </div>`;
    }).join('')||'<div style="text-align:center;color:var(--muted);padding:3rem 1rem"><div style="font-size:40px;margin-bottom:8px">🔔</div><div style="font-size:14px;font-weight:600">No notifications</div><div style="font-size:12px;margin-top:4px">You&#39;re all caught up!</div></div>'}
  </div>`;

// Unified handler: marks read + routes to relevant page based on content
function handleNotifClick(id){
  if(!id) return;
  const n=D.notifications.find(x=>x.id===id||x._uuid===id);
  if(!n) return;
  if(!n.read){
    n.read=true;
    if(n._uuid) sbMarkNotifRead(n);
    save();
  }
  // Smart routing based on notification content
  const msg=(n.msg||'').toLowerCase();
  if(msg.includes('kyc')||msg.includes('aadhaar')||msg.includes('pan')){
    if(currentRole==='admin') nav('kycrequests'); else navEmp('emp-profile');
    return;
  }
  if(msg.includes('leave')){ currentRole==='admin' ? nav('leave') : navEmp('emp-leave'); return; }
  if(msg.includes('expense')){ currentRole==='admin' ? nav('expenses') : navEmp('emp-dashboard'); return; }
  if(msg.includes('check-in')||msg.includes('attendance')){ currentRole==='admin' ? nav('attendance') : navEmp('emp-attendance'); return; }
  if(msg.includes('employee')||msg.includes('joined')){ currentRole==='admin' ? nav('employees') : null; return; }
  if(msg.includes('bank')){ currentRole==='admin' ? nav('employees') : navEmp('emp-profile'); return; }
  // Fallback — just re-render current page so the read state updates
  currentRole==='admin' ? nav(currentPage) : renderEmployeeApp();
}

async function dismissNotif(id){
  if(!id) return;
  const n=D.notifications.find(x=>x.id===id||x._uuid===id);
  if(!n) return;
  // Delete from Supabase if it came from there
  if(n._uuid){
    await sb('notifications','DELETE',null,`?id=eq.${n._uuid}`);
  }
  D.notifications=D.notifications.filter(x=>x!==n);
  save();
  currentRole==='admin' ? nav(currentPage) : renderEmployeeApp();
}

async function clearAllNotifs(){
  if(!confirm(`Clear all ${D.notifications.length} notifications? This cannot be undone.`)) return;
  // Delete the Supabase-backed ones in parallel
  const uuids=D.notifications.filter(n=>n._uuid).map(n=>n._uuid);
  if(uuids.length){
    try{
      // Supabase in.() doesn't use quotes around UUIDs
      const inList=uuids.join(',');
      const res = await sb('notifications','DELETE',null,`?id=in.(${inList})`);
      if(res===null) console.warn('Notification delete may have failed');
    }catch(e){console.error('Failed to delete notifications:',e);}
  }
  D.notifications=[];
  save();
  showToast('All notifications cleared','info');
  currentRole==='admin' ? nav(currentPage) : renderEmployeeApp();
}

function markRead(id){
  const n=D.notifications.find(x=>x.id===id||x._uuid===id);
  if(n){
    n.read=true;
    if(n._uuid) sbMarkNotifRead(n);
    save();
    currentRole==='admin' ? nav('notifications') : navEmp('emp-notifications');
  }
}
function markAllRead(){
  D.notifications.forEach(n=>{if(!n.read){n.read=true;if(n._uuid)sbMarkNotifRead(n);}});
  save();
  currentRole==='admin' ? nav(currentPage) : renderEmployeeApp();
}

function editLocModal(id){openAddLocModal(id);}
function selectLocColor(el,color){
  document.querySelectorAll('[data-color]').forEach(e=>e.style.border='3px solid transparent');
  el.style.border='3px solid #111';
  if($('loc-color'))$('loc-color').value=color;
}
function captureLocFromGPS(){
  const s=$('loc-gps-status');if(s)s.textContent='Getting GPS…';
  if(!navigator.geolocation){if(s)s.textContent='GPS not available';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    if($('loc-lat'))$('loc-lat').value=pos.coords.latitude.toFixed(6);
    if($('loc-lng'))$('loc-lng').value=pos.coords.longitude.toFixed(6);
    if(s)s.textContent=`✅ Location set: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
  },err=>{if(s)s.textContent='Could not get GPS location';},{enableHighAccuracy:true});
}
function useCurrentLoc(id){
  if(!navigator.geolocation){alert('GPS not available');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const loc=D.officeLocations.find(l=>l.id===id);
    if(loc){loc.lat=parseFloat(pos.coords.latitude.toFixed(6));loc.lng=parseFloat(pos.coords.longitude.toFixed(6));save();nav('settings');alert(`✅ ${loc.name} location updated to your current position!`);}
  },()=>alert('Could not get GPS location'),{enableHighAccuracy:true});
}
async function saveLocModal(editId){
  const name=($('loc-name')||{}).value?.trim();
  const lat=parseFloat(($('loc-lat')||{}).value);
  const lng=parseFloat(($('loc-lng')||{}).value);
  const radius=parseInt(($('loc-rad')||{}).value)||500;
  const color=($('loc-color')||{}).value||'#3b82f6';
  if(!name||isNaN(lat)||isNaN(lng)){alert('Please fill in name, latitude and longitude');return;}
  if(!D.officeLocations)D.officeLocations=[];
  if(editId){
    const loc=D.officeLocations.find(l=>l.id===editId);
    if(loc){Object.assign(loc,{name,lat,lng,radius,color});await sbSaveLocation(loc);}
  } else {
    const loc={id:'LOC-'+Date.now(),name,lat,lng,radius,color};
    D.officeLocations.push(loc);
    await sbSaveLocation(loc);
  }
  save();closeModal('loc-modal-wrap');nav('settings');
}
async function deleteLoc(id){
  const loc=D.officeLocations.find(l=>l.id===id);
  if(!loc||!confirm(`Delete "${loc.name}"?`))return;
  await sbDeleteLocation(loc);
  D.officeLocations=D.officeLocations.filter(l=>l.id!==id);
  save();nav('settings');
}
async function saveSettings(){
  D.settings={...D.settings,company:$('st-cn').value,email:$('st-em').value,tz:$('st-tz').value,currency:$('st-cu').value,hours:parseInt($('st-wh').value)||9};
  save();
  if($('st-msg'))$('st-msg').innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;margin-bottom:8px">💾 Saving…</div>`;

// Employee Work Log: 3 modes (hourly/session/daily) — employees can pick any

async function sbSaveWorkLog(log){
  // Auto-calculate total hours from entries (hourly mode)
  let totalHours=0;
  if(log.mode==='hourly' && log.entries){
    log.entries.forEach(e=>{
      if(e.from && e.to){
        const [fh,fm]=e.from.split(':').map(Number);
        const [th,tm]=e.to.split(':').map(Number);
        const mins=(th*60+tm)-(fh*60+fm);
        if(mins>0) totalHours += mins/60;
      }
    });
  } else if(log.mode==='session' && log.entries){
    totalHours = log.entries.filter(e=>e.work).length * 2; // approx 2hrs per session
  } else if(log.mode==='daily'){
    totalHours = 8; // standard workday assumption
  }
  log.totalHours=Math.round(totalHours*10)/10;

  const payload={
    emp_uuid:log.empUuid||null,
    emp_name:log.empName,
    emp_email:log.empEmail||null,
    log_date:log.date,
    mode:log.mode,
    entries:log.entries||[],
    summary:log.summary||'',
    tags:log.tags||[],
    admin_comments:log.adminComments||[],
    total_hours:log.totalHours,
    company_id:currentCompany?currentCompany.company_id:'KSPL'
  };
  try{
    if(log._uuid){
      const r=await sb('work_logs','PATCH',{...payload,updated_at:new Date().toISOString()},`?id=eq.${log._uuid}`);
      if(r!==null) return r;
    }
    const q=`?emp_uuid=eq.${log.empUuid}&log_date=eq.${log.date}&select=id`;
    const existing=await sb('work_logs','GET',null,q);
    if(existing&&existing[0]){
      log._uuid=existing[0].id;
      const r=await sb('work_logs','PATCH',{...payload,updated_at:new Date().toISOString()},`?id=eq.${log._uuid}`);
      return r;
    }
    const r=await sb('work_logs','POST',payload);
    if(r&&r[0]) log._uuid=r[0].id;
    return r;
  }catch(e){
    console.error('sbSaveWorkLog error:',e);
    return null;
  }
}

async function sbLoadWorkLogs(filter={}){
  let q='?order=log_date.desc&limit=500';
  if(filter.empUuid) q=`?emp_uuid=eq.${filter.empUuid}&order=log_date.desc&limit=500`;
  else if(filter.empName) q=`?emp_name=eq.${encodeURIComponent(filter.empName)}&order=log_date.desc&limit=500`;
  try{
    const rows=await sb('work_logs','GET',null,q);
    if(!rows) return [];
    return rows.map(r=>({
      _uuid:r.id,
      empUuid:r.emp_uuid,
      empName:r.emp_name,
      empEmail:r.emp_email,
      date:r.log_date,
      mode:r.mode,
      entries:r.entries||[],
      summary:r.summary||'',
      tags:r.tags||[],
      adminComments:r.admin_comments||[],
      totalHours:parseFloat(r.total_hours)||0,
      createdAt:r.created_at,
      updatedAt:r.updated_at
    }));
  }catch(e){
    console.error('sbLoadWorkLogs error:',e);
    return [];
  }
}

async function sbDeleteWorkLog(uuid){
  try{
    await sb('work_logs','DELETE',null,`?id=eq.${uuid}`);
    return true;
  }catch(e){
    console.error('sbDeleteWorkLog error:',e);
    return false;
  }
}

function hourlyRow(e,i){
  return `<div class="wl-hrow" style="display:grid;grid-template-columns:110px 110px 1fr 40px;gap:8px;margin-bottom:6px;align-items:center">
    <input type="time" value="${e.from||''}" data-k="from">

function addHourlyRow(){
  const list=$('wl-hourly-list');
  if(!list) return;
  const rows=list.querySelectorAll('.wl-hrow');
  const last=rows[rows.length-1];
  const lastTo=last?last.querySelector('[data-k="to"]').value:'10:00';
  const [h,m]=(lastTo||'10:00').split(':').map(Number);
  const nextH=Math.min(23,h+1);
  const div=document.createElement('div');
  div.innerHTML=hourlyRow({from:lastTo,to:`${String(nextH).padStart(2,'0')}:${String(m).padStart(2,'0')}`,work:''});
  list.appendChild(div.firstElementChild);
}

async function saveMyWorkLog(){
  const emp=currentEmployee;
  const date=$('wl-date')?.value||todayStr();
  const mode=window._wlMode||'daily';
  const msg=$('wl-save-msg');

  let entries=[];
  if(mode==='hourly'){
    entries=Array.from(document.querySelectorAll('.wl-hrow')).map(row=>{
      const out={};
      row.querySelectorAll('[data-k]').forEach(el=>{out[el.dataset.k]=el.value.trim();});
      return out;
    }).filter(e=>e.work); // only keep rows with actual work entered
    if(!entries.length){
      if(msg) msg.innerHTML=`<div class="alert alert-e">Please fill at least one hour block with work description</div>`;
      return;
    }
  } else if(mode==='session'){
    entries=Array.from(document.querySelectorAll('.wl-srow')).map(row=>{
      const out={};
      row.querySelectorAll('[data-k]').forEach(el=>{out[el.dataset.k]=el.value.trim();});
      return out;
    }).filter(e=>e.work&&e.session);
    if(!entries.length){
      if(msg) msg.innerHTML=`<div class="alert alert-e">Please fill at least one session with a name and work description</div>`;
      return;
    }
  } else {
    const work=$('wl-daily-work')?.value?.trim()||'';
    if(!work){
      if(msg) msg.innerHTML=`<div class="alert alert-e">Please describe today's work</div>`;
      return;
    }
    entries=[{work}];
  }

  const summary=$('wl-summary')?.value?.trim()||'';
  const tagsRaw=$('wl-tags')?.value?.trim()||'';
  const tags=tagsRaw?tagsRaw.split(',').map(t=>t.trim().replace(/^#/,'').toLowerCase()).filter(Boolean):[];

  // Update existing or create new
  const existing=(window._wlCache||[]).find(l=>l.empUuid===emp._uuid&&l.date===date);
  const log={
    _uuid:existing?._uuid,
    empUuid:emp._uuid,
    empName:emp.name,
    empEmail:emp.email,
    date, mode, entries, summary, tags,
    adminComments:existing?.adminComments||[]
  };
  if(msg) msg.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">💾 Saving…</div>`;
  const r=await sbSaveWorkLog(log);
  if(!r){
    if(msg) msg.innerHTML=`<div class="alert alert-e">❌ Save failed. Make sure the work_logs table exists in Supabase.</div>`;
    return;
  }
  if(r&&r[0]) log._uuid=r[0].id;

  // Update cache
  if(!window._wlCache) window._wlCache=[];
  const idx=window._wlCache.findIndex(l=>l.empUuid===emp._uuid&&l.date===date);
  if(idx>=0) window._wlCache[idx]=log;
  else window._wlCache.unshift(log);

  // Invalidate team activity cache so Teams page re-fetches fresh data on next view
  window._teamsActivityLoaded = false;

  if(msg) msg.innerHTML=`<div class="alert alert-s">✅ Work log saved for ${date}</div>`;
  showToast(`✅ Work log saved for ${date}`,'success');
}

async function deleteMyWorkLog(uuid){
  if(!confirm('Delete this work log? This cannot be undone.')) return;
  const ok=await sbDeleteWorkLog(uuid);
  if(!ok){ showToast('❌ Delete failed','info'); return; }
  window._wlCache=(window._wlCache||[]).filter(l=>l._uuid!==uuid);
  showToast('🗑 Work log deleted','success');
  navEmp('emp-worklog');
}

async function reloadMyWorkLogs(){

// Load latest team summaries for the employee's team (posted by their TL)
async function loadTeamSummariesForMyTeam(){
  const emp=currentEmployee;
  if(!emp||!emp.teamId) return;
  const team=D.teams.find(t=>t._uuid===emp.teamId);
  if(!team||!team.teamLeadEmail) return;
  // Fetch the TL's recent work logs (which include any summaries they posted)
  try{
    const tl=D.employees.find(e=>e.email&&e.email.toLowerCase()===team.teamLeadEmail.toLowerCase());
    if(!tl||!tl._uuid) return;
    const tlLogs=await sbLoadWorkLogs({empUuid:tl._uuid});
    window._teamSummariesCache = tlLogs.filter(l=>(l.tags||[]).includes('team-summary'));
    // Also merge into _wlAllCache so widget can find them
    if(!window._wlAllCache) window._wlAllCache=[];
    window._teamSummariesCache.forEach(s=>{
      if(!window._wlAllCache.find(x=>x._uuid===s._uuid)) window._wlAllCache.push(s);
    });
  }catch(e){console.error('Failed to load team summaries:',e);}
}

async function postTeamSummary(){
  const emp=currentEmployee;
  const teamUuid=$('ts-team').value;
  const date=$('ts-date').value;
  const mode=$('ts-mode').value;
  const text=$('ts-text').value.trim();
  const tagsRaw=$('ts-tags').value.trim();
  const err=$('team-summary-err');

  if(!text){
    if(err) err.innerHTML='<div class="alert alert-e">Summary text is required</div>';
    return;
  }
  if(!teamUuid){
    if(err) err.innerHTML='<div class="alert alert-e">Please pick a team</div>';
    return;
  }

  const team=D.teams.find(t=>t._uuid===teamUuid);
  if(!team) return;

  const userTags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim()).filter(Boolean) : [];
  // Prepend the special team-summary + team name tag so the view filter can find it
  const teamTag = 'team-'+team.name.toLowerCase().replace(/\s+/g,'-');
  const tags = ['team-summary', teamTag, ...userTags];

  if(err) err.innerHTML='<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">💾 Posting…</div>';

  const log = {
    empUuid: emp._uuid,
    empName: emp.name,
    empEmail: emp.email,
    date: date,
    mode: mode,
    entries: [],
    summary: text,
    tags: tags,
    adminComments: [],
    totalHours: 0,
    _teamSummaryFor: teamUuid  // Local marker (not persisted)
  };

  const r = await sbSaveWorkLog(log);
  if(!r){
    if(err) err.innerHTML='<div class="alert alert-e">❌ Save failed. Please try again.</div>';
    return;
  }
  if(r && r[0]) log._uuid = r[0].id;

  // Update local cache
  if(window._wlCache){
    const idx=window._wlCache.findIndex(x=>x._uuid===log._uuid);
    if(idx>=0) window._wlCache[idx]=log;
    else window._wlCache.unshift(log);
  }

  closeTeamSummaryModal();
  showToast(`📣 Team summary posted to ${team.name}`, 'success');
  // Refresh view if on worklog page
  if(empPage==='emp-worklog') navEmp('emp-worklog');
}

async function addWorkLogComment(uuid){
  const text=$('wl-new-comment')?.value?.trim();
  if(!text) return;
  const log=(window._wlAllCache||[]).find(x=>x._uuid===uuid);
  if(!log) return;
  const newComment={
    author:D.user?.name||'Admin',
    text,
    at:new Date().toISOString()
  };
  log.adminComments=[...(log.adminComments||[]),newComment];
  // Save to Supabase (just update the admin_comments field)
  try{
    const res=await fetch(`${SB_URL}/rest/v1/work_logs?id=eq.${uuid}`,{
      method:'PATCH',
      headers:{...SB_HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({admin_comments:log.adminComments, updated_at:new Date().toISOString()})
    });
    if(!res.ok){
      showToast('❌ Failed to post comment','info');
      return;
    }
  }catch(e){
    console.error('Comment save error:',e);
    showToast('❌ Network error','info');
    return;
  }
  // Notify the employee
  if(log.empEmail){
    await sbSaveNotification({
      msg:`💬 Admin commented on your work log (${log.date}): "${text.substring(0,80)}${text.length>80?'…':''}"`,
      type:'info',
      to:log.empEmail
    });
  }
  showToast('✅ Comment posted','success');
  // Refresh the modal
  viewWorkLogDetail(uuid);
}

function exportWorkLogsCSV(range){
  const logs=window._wlAllCache||[];
  if(!logs.length){ showToast('No logs to export','info'); return; }

  let filtered=logs;
  const today=new Date();
  if(range==='week'){
    const weekStart=new Date(); weekStart.setDate(weekStart.getDate()-6);
    filtered=logs.filter(l=>new Date(l.date)>=weekStart);
  } else if(range==='month'){
    const monthStart=new Date(today.getFullYear(),today.getMonth(),1);
    filtered=logs.filter(l=>new Date(l.date)>=monthStart);
  }

  if(!filtered.length){ showToast('No logs in this range','info'); return; }

  const esc=s=>`"${String(s||'').replace(/"/g,'""')}"`;
  const hdr=['Employee','Email','Date','Style','Hours','Entries','Summary','Tags','Comments','Created'];
  const lines=[hdr.join(',')];

  filtered.forEach(l=>{
    const entriesText=l.mode==='daily'?(l.entries[0]?.work||''):
      (l.entries||[]).map(e=>{
        if(l.mode==='hourly') return `[${e.from||'?'}→${e.to||'?'}] ${e.work||''}`;
        if(l.mode==='session') return `[${e.session||'?'}] ${e.work||''}`;
        return e.work||'';
      }).join(' | ');
    const commentsText=(l.adminComments||[]).map(c=>`${c.author}: ${c.text}`).join(' | ');
    lines.push([
      esc(l.empName),
      esc(l.empEmail),
      l.date,
      l.mode,
      (parseFloat(l.totalHours)||0).toFixed(1),
      esc(entriesText),
      esc(l.summary),
      esc((l.tags||[]).map(t=>'#'+t).join(', ')),
      esc(commentsText),
      esc(l.createdAt||'')
    ].join(','));
  });

  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const rangeLabel=range==='week'?'ThisWeek':range==='month'?'ThisMonth':'All';
  a.href=url;
  a.download=`WorkLogs_${rangeLabel}_${todayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✅ Exported ${filtered.length} logs`,'success');
}

function exportProductivityCSV(){
  const logs=window._wlAllCache||[];
  const weekStart=new Date(); weekStart.setDate(weekStart.getDate()-6);
  const weekLogs=logs.filter(l=>new Date(l.date)>=weekStart);

  const emps=D.employees.filter(e=>e.status==='Active');
  if(!emps.length){ showToast('No active employees','info'); return; }

  const esc=s=>`"${String(s||'').replace(/"/g,'""')}"`;
  const hdr=['Employee','Department','Email','Logs This Week','Hours Logged','Expected Hours','Productivity %','Avg Hours/Log','Last Logged'];
  const lines=[hdr.join(',')];

  emps.forEach(e=>{
    const myLogs=weekLogs.filter(l=>l.empName===e.name||l.empUuid===e._uuid);
    const myHours=myLogs.reduce((s,l)=>s+(parseFloat(l.totalHours)||0),0);
    const expected=45; // 5 days × 9 hours
    const productivity=expected>0?Math.round((myHours/expected)*100):0;
    const avgPerLog=myLogs.length>0?(myHours/myLogs.length).toFixed(1):'0';
    const lastLog=myLogs.length>0?myLogs.sort((a,b)=>b.date.localeCompare(a.date))[0].date:'—';
    lines.push([
      esc(e.name),
      esc(e.dept||''),
      esc(e.email||''),
      myLogs.length,
      myHours.toFixed(1),
      expected,
      productivity+'%',
      avgPerLog,
      lastLog
    ].join(','));
  });

  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`ProductivityReport_${todayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✅ Productivity report: ${emps.length} employees`,'success');
}

// Reveal masked values in a single KYC row (scoped to that card)
function revealKYCRow(btn){
  const card=btn.closest('.card');
  if(!card) return;
  const revealed=btn.getAttribute('data-revealed')==='1';
  const oldEl=card.querySelector('.kyc-masked-old');
  const newEl=card.querySelector('.kyc-masked-new');
  if(oldEl) oldEl.textContent = revealed ? oldEl.getAttribute('data-masked') : (oldEl.getAttribute('data-full')||'—');
  if(newEl) newEl.textContent = revealed ? newEl.getAttribute('data-masked') : newEl.getAttribute('data-full');
  btn.setAttribute('data-revealed', revealed?'0':'1');
  btn.textContent = revealed ? '👁 Reveal full numbers' : '🔒 Hide';
}

async function approveKYCRequest(uuid, empName, field){
  if(!confirm(`Approve ${field.toUpperCase()} update for ${empName}?\n\nThis will update their employee record immediately.`)) return;
  const req=(D.changeRequests||[]).find(r=>r._uuid===uuid);
  if(!req){showToast('Request not found','info');return;}

  showSyncBanner('Applying change…');

  // Final duplicate check in case another employee took that number
  const column=field==='aadhaar'?'aadhaar_number':'pan_number';
  const dup=await sb('employees','GET',null,`?${column}=eq.${encodeURIComponent(req.newValue)}&id=neq.${req.empUuid}&select=id,name`);
  if(dup&&dup.length){
    hideSyncBanner();
    showToast(`❌ Another employee (${dup[0].name}) already has this ${field.toUpperCase()}. Cannot approve.`,'info');
    return;
  }

  // Apply to employee record
  const empPayload={};
  empPayload[column]=req.newValue;
  const er=await sb('employees','PATCH',empPayload,`?id=eq.${req.empUuid}`);
  if(!er){hideSyncBanner();showToast('Failed to update employee','info');return;}

  // Mark request approved
  await sb('change_requests','PATCH',{
    status:'Approved',
    reviewed_by:D.user.email,
    reviewed_at:new Date().toISOString()
  },`?id=eq.${uuid}`);

  // Notify the employee
  await sbSaveNotification({msg:`✅ Your ${field.toUpperCase()} update has been approved by admin`,type:'success'});

  // Refresh in memory
  await syncChangeRequests();
  await syncFromSupabase();
  hideSyncBanner();
  showToast(`✅ ${field.toUpperCase()} updated for ${empName}`,'success');
  nav('kycrequests');
}

async function rejectKYCRequest(uuid, empName){
  const note=prompt(`Reject request from ${empName}?\n\nOptional: add a note explaining why (visible to the employee):`, '');
  if(note===null) return; // User cancelled

  showSyncBanner('Rejecting…');
  await sb('change_requests','PATCH',{
    status:'Rejected',
    reviewer_note:note||null,
    reviewed_by:D.user.email,
    reviewed_at:new Date().toISOString()
  },`?id=eq.${uuid}`);

  await sbSaveNotification({msg:`❌ Your KYC update request was rejected${note?': '+note:''}`,type:'warning'});

  await syncChangeRequests();
  hideSyncBanner();
  showToast(`Request rejected`,'info');
  nav('kycrequests');
}

async function saveCompany(editId){
  const name=($('co-name')||{}).value?.trim();
  const cid=($('co-id')||{}).value?.trim().toUpperCase().replace(/\s/g,'');
  const email=($('co-admin-email')||{}).value?.trim();
  const pw=($('co-admin-pw')||{}).value?.trim();
  const status=($('co-status')||{}).value||'Active';
  const err=$('co-modal-err');

  console.log('[saveCompany] editId=',editId,'name=',name,'cid=',cid,'email=',email);

  if(!name||!email||!pw){
    if(err)err.innerHTML=`<div class="alert alert-e">Please fill all required fields</div>`;
    return;
  }
  if(!editId&&!cid){
    if(err)err.innerHTML=`<div class="alert alert-e">Company ID is required</div>`;
    return;
  }

  if(err)err.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">💾 Saving…</div>`;

  try{
    let result;
    if(editId){
      const res=await fetch(`${SB_URL}/rest/v1/companies?company_id=eq.${editId}`,{
        method:'PATCH',
        headers:{...SB_HDR,'Prefer':'return=representation'},
        body:JSON.stringify({name,admin_email:email,admin_password:pw,status})
      });
      if(!res.ok){
        const errText=await res.text();
        console.error('[saveCompany] PATCH failed:',res.status,errText);
        if(err)err.innerHTML=`<div class="alert alert-e">Update failed: ${errText.substring(0,150)}</div>`;
        return;
      }
      result=await res.json();
    } else {
      const res=await fetch(`${SB_URL}/rest/v1/companies`,{
        method:'POST',
        headers:{...SB_HDR,'Prefer':'return=representation'},
        body:JSON.stringify({company_id:cid,name,admin_email:email,admin_password:pw,status})
      });
      if(!res.ok){
        const errText=await res.text();
        console.error('[saveCompany] POST failed:',res.status,errText);
        if(err){
          if(res.status===409||errText.includes('duplicate')||errText.includes('unique')){
            err.innerHTML=`<div class="alert alert-e">⚠️ Company ID "${cid}" or email "${email}" already exists. Try a different one.</div>`;
          } else {
            err.innerHTML=`<div class="alert alert-e">Save failed: ${errText.substring(0,200)}</div>`;
          }
        }
        return;
      }
      result=await res.json();
    }

    console.log('[saveCompany] success, returned:',result);

    // Force add to local D.companies immediately so it shows up without waiting for sync
    if(!editId && result && result[0]){
      if(!D.companies) D.companies=[];
      const newRow = result[0];
      // Replace if somehow already in list, else push
      const existingIdx = D.companies.findIndex(c=>c.company_id===newRow.company_id);
      if(existingIdx>=0) D.companies[existingIdx] = newRow;
      else D.companies.push(newRow);
      save();
      console.log('[saveCompany] added to local D.companies. Total:',D.companies.length);
    } else if(editId && result && result[0]){
      const newRow = result[0];
      const idx = D.companies.findIndex(c=>c.company_id===editId);
      if(idx>=0) D.companies[idx] = newRow;
      save();
    }

    if(err)err.innerHTML=`<div class="alert alert-s">✅ Company ${editId?'updated':'added'}!</div>`;

    // Sync + close modal + re-render
    try{ await syncFromSupabase(); }catch(e){ console.warn('sync failed after save:',e); }

    setTimeout(()=>{
      closeModal('company-modal-wrap');
      nav('companies');
      showToast(`✅ Company "${name}" ${editId?'updated':'added'} successfully`, 'success');
    }, 500);
  }catch(e){
    console.error('[saveCompany] error:',e);
    if(err)err.innerHTML=`<div class="alert alert-e">Network error: ${e.message||e}</div>`;
  }
}

// Register PWA service worker + auto-update banner
const APP_VERSION = 'v5-2026-04-29-strict-face-match';

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then((reg) => {
      console.log('PWA: SW registered', reg.scope, 'app version:', APP_VERSION);

      // Force update check immediately on load (don't wait 60s)
      reg.update();

      // Check for updates every 60 seconds
      setInterval(() => reg.update(), 60000);

      // Detect new SW installing
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner(newSW);
          }
        });
      });

      // Auto-reload when new SW takes control
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }).catch((err) => console.warn('PWA: SW registration failed', err));
  });

  // RECOVERY: if stored version differs from current, force-clear caches once
  // This unsticks users on a stale service-worker version (e.g. after a broken release)
  try {
    const stored = localStorage.getItem('app_version_seen');
    if (stored !== APP_VERSION) {
      console.log('PWA: version changed', stored, '->', APP_VERSION, '— clearing caches');
      // Clear all caches
      if (window.caches && caches.keys) {
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))));
      }
      // Unregister all SWs (they'll re-register fresh on next load)
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
      localStorage.setItem('app_version_seen', APP_VERSION);
      // Reload once after a short delay so fresh SW + HTML take effect
      if (stored) {
        setTimeout(() => window.location.reload(), 800);
      }
    }
  } catch (e) { console.warn('Version recovery skipped:', e); }
}

function showUpdateBanner(newSW) {
  if (document.getElementById('updateBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'updateBanner';
  banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1A1A4E;color:#fff;padding:14px 20px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.3);z-index:99999;display:flex;align-items:center;gap:12px;max-width:90%;font-size:14px';
  banner.innerHTML = `
    <span style="font-size:20px">🔄</span>
    <span style="flex:1">A new version is available!</span>
    <button id="updateNowBtn" style="background:#7CC0FF;color:#1A1A4E;border:none;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px">Update</button>
    <button id="updateLaterBtn" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px">Later</button>
  `;
  document.body.appendChild(banner);
  document.getElementById('updateNowBtn').onclick = () => {
    newSW.postMessage({type: 'SKIP_WAITING'});
  };
  document.getElementById('updateLaterBtn').onclick = () => banner.remove();
}

// PWA Install button handling
let _deferredInstallPrompt = null;

function isPWAInstalled(){
  return window.matchMedia('(display-mode: standalone)').matches ||
         window.navigator.standalone === true;
}

function showInstallButton(){
  const btn = document.getElementById('pwa-install-btn');
  if(!btn) return;
  if(isPWAInstalled()) { btn.style.display='none'; return; }
  btn.style.display='flex';
}

// Always show the button on login page (unless already installed)
window.addEventListener('load', () => {
  setTimeout(showInstallButton, 100);
});

// Capture native install prompt when browser fires it
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  showInstallButton();
});

function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

function isAndroid(){
  return /Android/i.test(navigator.userAgent);
}

window.addEventListener('appinstalled', () => {
  _deferredInstallPrompt = null;
  const btn = document.getElementById('pwa-install-btn');
  if(btn) btn.style.display='none';
  if(typeof showToast==='function') showToast('✅ Kreayotoo installed!','success');
});

async function handleInstallClick(){
  // If browser supports native install prompt, use it
  if(_deferredInstallPrompt){
    _deferredInstallPrompt.prompt();
    const result = await _deferredInstallPrompt.userChoice;
    if(result.outcome === 'accepted'){
      const btn = document.getElementById('pwa-install-btn');
      if(btn) btn.style.display='none';
    }
    _deferredInstallPrompt = null;
    return;
  }

  // Otherwise show platform-specific instructions
  let message = '📱 How to install Kreayotoo:\n\n';
  if(isIOS()){
    message +=
      '🍎 iPhone (Safari only):\n\n' +
      '1. Make sure you are using Safari (not Chrome)\n' +
      '2. Tap the Share button (square with ↑ arrow) at the bottom\n' +
      '3. Scroll down and tap "Add to Home Screen"\n' +
      '4. Tap "Add" in the top right corner\n\n' +
      'The app icon will appear on your home screen.';
  } else if(isAndroid()){
    message +=
      '📱 Android (Chrome):\n\n' +
      '1. Tap the 3-dot menu (⋮) at the top right\n' +
      '2. Tap "Install app" or "Add to Home screen"\n' +
      '3. Confirm to install\n\n' +
      'The app icon will appear on your home screen.';
  } else {
    message +=
      '💻 Desktop (Chrome / Edge):\n\n' +
      '• Look for the install icon (⊕) on the right side of the address bar — click it\n' +
      '• Or open the 3-dot menu (⋮) → "Install Kreayotoo HR Portal..."\n\n' +
      '📱 On phone:\n' +
      '• Android Chrome: Menu (⋮) → "Install app"\n' +
      '• iPhone Safari: Share → "Add to Home Screen"';
  }
  alert(message);
}

init();
</script>
