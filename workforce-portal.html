async function importCSV(){
  const raw=window._csvRawText||($('csv-input')||{}).value||'';
  window._csvRawText=null;
  const lines=raw.trim().split('\n').filter(l=>l.trim());
  const err=$('csv-err');
  if(!lines.length){if(err)err.innerHTML=`<div class="alert alert-e">No data found</div>`;return;}
  let dataLines=lines;
  if(lines[0].toLowerCase().includes('name')&&lines[0].toLowerCase().includes('email')) dataLines=lines.slice(1);
  if(!dataLines.length){if(err)err.innerHTML=`<div class="alert alert-e">No employee data found after header</div>`;return;}

  const btn=document.querySelector('#bulk-import-wrap .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Importing…';}
  showSyncBanner(`Saving ${dataLines.length} employees…`);

  // Parse all rows first
  const toImport=[];
  for(const line of dataLines){
    const cols=parseCSVLine(line);
    if(cols.length<2) continue;
    const [name,email,phone,rawDob,dept,role,salary]=cols;
    if(!name||!email) continue;
    let dob='';
    if(rawDob&&rawDob.trim()) dob=parseAnyDate(rawDob.trim());
    toImport.push({name:name.trim(),email:email.trim().toLowerCase(),phone:(phone||'').trim(),dob,dept:(dept||'Engineering').trim(),role:(role||'Employee').trim(),salary:parseInt(salary)||0});
  }

  let saved=0, failed=0;

  for(let i=0;i<toImport.length;i++){
    const row=toImport[i];
    showSyncBanner(`Saving ${i+1}/${toImport.length}: ${row.name}…`);

    // Check if employee already exists in Supabase by email
    const existing=await sb('employees','GET',null,`?email=eq.${encodeURIComponent(row.email)}&select=id,emp_id`);
    
    const empId=(existing&&existing.length>0)?existing[0].emp_id:('EMP-'+String(D.employees.length+101+saved).padStart(3,'0'));
    const empUUID=(existing&&existing.length>0)?existing[0].id:null;

    const payload={
      emp_id:empId, name:row.name, email:row.email,
      department:row.dept, role:row.role, status:'Active',
      salary:row.salary, date_of_joining:todayStr(),
      password_hash:'emp@123', emp_type:'office',
      company_id: currentCompany ? currentCompany.company_id : 'KSPL'
    };
    if(row.phone) payload.phone=row.phone;
    if(row.dob&&/^\d{4}-\d{2}-\d{2}$/.test(row.dob)) payload.dob=row.dob;

    let r;
    if(empUUID){
      // Update existing by UUID
      r=await sb('employees','PATCH',payload,`?id=eq.${empUUID}`);
    } else {
      // Try insert - if fails due to emp_id conflict, find and update that record
      r=await sb('employees','POST',payload);
      if(!r){
        // emp_id conflict - find the conflicting record and update it
        const conflict=await sb('employees','GET',null,`?emp_id=eq.${encodeURIComponent(empId)}&select=id`);
        if(conflict&&conflict.length>0){
          r=await sb('employees','PATCH',payload,`?id=eq.${conflict[0].id}`);
          if(r&&r[0]) empUUID=r[0].id;
        }
      }
    }

    if(r){
      const uuid=empUUID||(r[0]?r[0].id:null);
      // Update local cache
      const localIdx=D.employees.findIndex(e=>e.email===row.email);
      const empObj={id:empId,_uuid:uuid,name:row.name,email:row.email,phone:row.phone,dob:row.dob,dept:row.dept,role:row.role,status:'Active',salary:row.salary,joined:todayStr(),passwordHash:'emp@123',empType:'office'};
      if(localIdx>=0) D.employees[localIdx]=empObj;
      else D.employees.push(empObj);
      saved++;
    } else {
      failed++;
      console.error('❌ Failed:',row.name);
    }
  }

  const notif={msg:`Import complete: ${saved} saved, ${failed} failed`,type:'success',read:false};
  D.notifications.unshift({id:Date.now(),...notif,time:'Just now'});
  sbSaveNotification(notif);
  save();
  hideSyncBanner();
  closeModal('bulk-import-wrap');
  nav('employees');
  setTimeout(()=>alert(`✅ Import complete!\n\n${saved} employees saved to database\n${failed} failed\n\nAll data is saved permanently.`),100);
}

async function saveEmp(){
  const data={name:$('ef-name').value,email:$('ef-email').value,phone:$('ef-ph').value,dob:$('ef-dob-birth').value,joined:$('ef-doj').value,dept:$('ef-dept').value,role:$('ef-role').value,salary:parseInt($('ef-sal').value)||0,status:$('ef-st').value,empType:$('ef-type').value||'office',bloodGroup:$('ef-bg')?.value||'',teamLeadEmail:$('ef-tl')?.value||'',teamId:$('ef-team')?.value||null,isExecutive:$('ef-exec')?.checked===true,executiveTitle:$('ef-exec-title')?.value||''};
  if(!data.name||!data.email){alert('Name and email are required');return;}
  if(editingEmpId){
    const existing=D.employees.find(e=>e.id===editingEmpId);
    // Capture old values BEFORE mutating
    const oldRole=existing.role, oldDept=existing.dept, oldStatus=existing.status;
    Object.assign(existing,data);
    await sbSaveEmployee(existing);
    // Notify employee of meaningful changes
    if(existing.email){
      const changes=[];
      if(data.role!==oldRole&&data.role) changes.push(`role changed to <strong>${data.role}</strong>`);
      if(data.dept!==oldDept&&data.dept) changes.push(`department changed to <strong>${data.dept}</strong>`);
      if(data.status!==oldStatus&&data.status){
        if(data.status==='Inactive') changes.push(`account <strong>deactivated</strong>`);
        else if(oldStatus==='Inactive'&&data.status==='Active') changes.push(`account <strong>reactivated</strong>`);
        else changes.push(`status changed to <strong>${data.status}</strong>`);
      }
      if(changes.length){
        await sbSaveNotification({
          msg:`📋 Admin updated your profile: ${changes.join(', ')}`,
          type:'info',
          to:existing.email
        });
      }
    }
  } else {
    const newId=$('ef-empid-val').value.trim()||'EMP-'+String(D.employees.length+101).padStart(3,'0');
    data.id=newId;data.passwordHash='emp@123';
    D.employees.push(data);
    const r=await sbSaveEmployee(data);
    if(r&&r[0])data._uuid=r[0].id;
    // Admin notification (untargeted)
    await sbSaveNotification({msg:`New employee ${data.name} added`,type:'info'});
    // Welcome notification for the new employee themselves
    if(data.email){
      await sbSaveNotification({
        msg:`👋 Welcome to ${D.settings.company||'the company'}, ${data.name.split(' ')[0]}! Log in with your email and the default password, then complete your profile details.`,
        type:'success',
        to:data.email
      });
    }
  }
  save();

function closeOffboardModal(){ const w=$('offboard-wrap'); if(w) w.innerHTML=''; }

async function doOffboard(empId){
  const emp = D.employees.find(e=>e.id===empId);
  if(!emp) return;
  const lwd = $('off-lwd').value;
  const reason = $('off-reason').value;
  const notes = $('off-notes').value.trim();
  const err = $('off-err');

  if(!lwd){ if(err) err.innerHTML='<div class="alert alert-e">Last working day is required</div>'; return; }

  if(err) err.innerHTML='<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">🔄 Offboarding…</div>';

  try{
    // 1. Remove as TL from any teams they lead
    const tlTeams = (D.teams||[]).filter(t=>t.teamLeadEmail && emp.email && t.teamLeadEmail.toLowerCase()===emp.email.toLowerCase());
    for(const t of tlTeams){
      t.teamLeadEmail = '';
      await sbSaveTeam(t);
    }

    // 2. Remove from their own team
    emp.teamId = null;

    // 3. Set status to Inactive + offboarding metadata
    emp.status = 'Inactive';
    emp.offboardedAt = new Date().toISOString();
    emp.lastWorkingDay = lwd;
    emp.offboardReason = reason;
    emp.offboardNotes = notes;

    // 4. Cancel pending leaves
    const pendingLeaves = D.leaves.filter(l=>l.emp===emp.name && (l.status==='Pending TL' || l.status==='Pending HR' || l.status==='Pending'));
    for(const lv of pendingLeaves){
      lv.status = 'Rejected by HR';
      lv.hrNote = 'Auto-cancelled — employee offboarded';
      lv.hrActionAt = new Date().toISOString();
      await sbSaveLeave(lv);
    }

    // 5. Save employee changes (include offboard metadata)
    const payload = {
      status: 'Inactive',
      team_id: null
    };
    // Note: we persist metadata via the employees PATCH if DB has columns; otherwise local only
    try{
      await fetch(`${SB_URL}/rest/v1/employees?id=eq.${emp._uuid}`,{
        method:'PATCH',
        headers:SB_HDR,
        body:JSON.stringify(payload)
      });
    }catch(e){console.warn('Emp status update failed:',e);}

    // 6. Send farewell notification
    if(emp.email){
      await sbSaveNotification({
        msg:`👋 Farewell, ${emp.name.split(' ')[0]}! Thank you for your contributions. Your account has been deactivated effective ${lwd}. Please contact HR for final settlement.`,
        type:'info',
        to:emp.email
      });
    }

    // 7. Log audit
    await logAudit('offboard','employee',empId,emp.name,{
      reason,
      last_working_day:lwd,
      cancelled_leaves:pendingLeaves.length,
      removed_tl_from:tlTeams.map(t=>t.name),
      notes:notes||null
    });

    save();
    closeOffboardModal();
    showToast(`🚪 ${emp.name} has been offboarded`, 'info');
    nav(currentPage);
  }catch(e){
    console.error('Offboard failed:',e);
    if(err) err.innerHTML = `<div class="alert alert-e">❌ Failed: ${e.message}</div>`;
  }
}

function maskAadhaar(a){ if(!a) return '—'; const s=a.replace(/\s/g,''); return s.length===12?`XXXX XXXX ${s.slice(-4)}`:'XXXX XXXX XXXX'; }
function maskPAN(p){ if(!p) return '—'; return p.length===10?`${p.slice(0,3)}XX${p.slice(-3)}`:'XXXXXXXXXX'; }
function maskAccount(a){ if(!a) return '—'; if(a.length<=4) return 'XX'+a; return 'XXXX'+a.slice(-4); }

let _searchDebounce=null;
function runUniversalSearch(query){
  clearTimeout(_searchDebounce);
  _searchDebounce=setTimeout(()=>_doUniversalSearch(query), 200);
}
function _doUniversalSearch(query){
  const box=$('univ-search-results');
  if(!box) return;
  const q=(query||'').trim().toLowerCase();
  if(!q){ box.style.display='none'; box.innerHTML=''; return; }
  const qDigits=q.replace(/\D/g,'');

  const results={employees:[],leaves:[],expenses:[],performance:[],attendance:[],holidays:[],pages:[],departments:[]};

  // 1. Employees (full profile search)
  (D.employees||[]).forEach(e=>{
    const hit = (e.name && e.name.toLowerCase().includes(q)) ||
                (e.id && e.id.toLowerCase().includes(q)) ||
                (e.email && e.email.toLowerCase().includes(q)) ||
                (e.pan && e.pan.toLowerCase().includes(q)) ||
                (e.role && e.role.toLowerCase().includes(q)) ||
                (e.dept && e.dept.toLowerCase().includes(q)) ||
                (e.bankName && e.bankName.toLowerCase().includes(q)) ||
                (qDigits.length>=3 && (
                  (e.aadhaar && e.aadhaar.includes(qDigits)) ||
                  (e.phone && e.phone.replace(/\D/g,'').includes(qDigits)) ||
                  (e.bankAccount && e.bankAccount.includes(qDigits)) ||
                  (e.uan && e.uan.includes(qDigits))
                ));
    if(hit) results.employees.push(e);
  });

  // 2. Leaves (by employee name, type, status, reason, date)
  (D.leaves||[]).forEach(l=>{
    const blob=`${l.emp||''} ${l.type||''} ${l.status||''} ${l.reason||''} ${l.from||''} ${l.to||''}`.toLowerCase();
    if(blob.includes(q)) results.leaves.push(l);
  });

  // 3. Expenses (by employee name, category, description, status, amount)
  (D.expenses||[]).forEach(ex=>{
    const blob=`${ex.emp||''} ${ex.cat||''} ${ex.desc||''} ${ex.status||''} ${ex.amount||''} ${ex.date||''}`.toLowerCase();
    if(blob.includes(q)) results.expenses.push(ex);
  });

  // 4. Performance reviews
  (D.performance||[]).forEach(p=>{
    const blob=`${p.emp||''} ${p.quarter||''} ${p.rating||''} ${p.notes||''}`.toLowerCase();
    if(blob.includes(q)) results.performance.push(p);
  });

  // 5. Attendance (by employee name, date, status)
  (D.attendance||[]).forEach(a=>{
    const blob=`${a.empName||''} ${a.date||''} ${a.status||''}`.toLowerCase();
    if(blob.includes(q)) results.attendance.push(a);
  });

  // 6. Holidays
  (D.holidays||[]).forEach(h=>{
    const blob=`${h.name||''} ${h.date||''} ${h.type||''}`.toLowerCase();
    if(blob.includes(q)) results.holidays.push(h);
  });

  // 7. Departments
  const deptList=[...new Set((D.employees||[]).map(e=>e.dept).filter(Boolean))];
  deptList.forEach(d=>{ if(d.toLowerCase().includes(q)) results.departments.push(d); });

  // 8. Navigation / pages
  const pages=[
    {name:'Dashboard',emoji:'⊞',page:'dashboard',keywords:'home overview stats'},
    {name:'Employees',emoji:'👥',page:'employees',keywords:'directory staff people'},
    {name:'Attendance',emoji:'📅',page:'attendance',keywords:'check-in check-out present absent'},
    {name:'Leave',emoji:'🏖',page:'leave',keywords:'vacation off sick'},
    {name:'Payroll',emoji:'💰',page:'payroll',keywords:'salary payslip ctc pay'},
    {name:'Expenses',emoji:'🧾',page:'expenses',keywords:'claim reimbursement travel food'},

  ];
  pages.forEach(p=>{
    if(p.name.toLowerCase().includes(q)||p.keywords.includes(q)) results.pages.push(p);
  });

  // Count totals
  const totalHits = results.employees.length+results.leaves.length+results.expenses.length+results.performance.length+results.attendance.length+results.holidays.length+results.pages.length+results.departments.length;
  if(!totalHits){

function infoCard(label,value){
  return `<div style="background:#f8fafc;border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px">${label}</div><div style="font-size:13px;font-weight:600;margin-top:2px;word-break:break-word">${value}</div></div>`;
}
function infoCardMasked(label, rawValue, masked, full){
  const safeFull=(full||'').replace(/'/g,"&#39;");
  return `<div class="masked-card" data-full="${safeFull}" data-masked="${masked}" style="background:#f8fafc;border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px">${label}</div><div class="masked-val" style="font-size:13px;font-weight:600;margin-top:2px;word-break:break-word;font-family:monospace">${masked}</div></div>`;
}
function renderAdminKYCDocBadge(docType, e, label){
  const path=e[docType+'FilePath'];
  const fileName=e[docType+'FileName'];
  const uploadedAt=e[docType+'UploadedAt'];
  if(!path){
    return `<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:18px">⚠️</span>
      <div style="flex:1">
        <div style="font-size:11px;color:#92400e;font-weight:700">${label}</div>
        <div style="font-size:11px;color:#92400e;margin-top:1px">Not uploaded</div>
      </div>
    </div>`;
  }
  const ago=uploadedAt?new Date(uploadedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
  const safePath=path.replace(/'/g,"&#39;");
  const safeLabel=label.replace(/'/g,"&#39;");
  return `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px" onclick="viewKYCDocument('${safePath}','${safeLabel}')" onmouseover="this.style.background='#dcfce7'" onmouseout="this.style.background='#f0fdf4'" title="Click to view/download">
    <span style="font-size:18px">📎</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;color:#166534;font-weight:700">${label}</div>
      <div style="font-size:11px;color:#166534;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fileName||'Document'}${ago?' · '+ago:''}</div>
    </div>
    <span style="font-size:11px;color:#166534;font-weight:700">View ↗</span>
  </div>`;
}
function toggleRevealIdentity(btn){
  const revealed=btn.getAttribute('data-revealed')==='1';
  const cards=document.querySelectorAll('.masked-card');
  cards.forEach(c=>{
    const val=c.querySelector('.masked-val');
    if(!val) return;
    val.textContent = revealed ? c.getAttribute('data-masked') : c.getAttribute('data-full');
  });
  btn.setAttribute('data-revealed', revealed?'0':'1');
  btn.textContent = revealed ? '👁 Reveal' : '🔒 Hide';
}

async function loadAdminSessions(date){
  showSyncBanner('Loading sessions…');
  const cFilter=currentCompany?`&company_id=eq.${currentCompany.company_id}`:'';
  const rows=await sb('attendance_sessions','GET',null,`?date=eq.${date}&order=check_in.desc${cFilter}`);
  hideSyncBanner();
  if(!rows||!rows.length){showToast('No sessions found for this date','info');return;}
  if(!D.attSessions) D.attSessions=[];
  // Merge with local sessions
  rows.forEach(r=>{
    const existing=D.attSessions.find(s=>s._uuid===r.id);
    if(!existing){
      D.attSessions.unshift({
        _uuid:r.id,_localId:r.id,
        empName:r.employee_name,empId:r.employee_id,
        date:r.date,checkIn:r.check_in,checkOut:r.check_out,
        location:r.location||'',lat:r.latitude,lng:r.longitude,
        photo:''
      });
    }
  });
  save();
  nav('attendance');
}

// ── Date range helpers + Excel export for attendance ──
function firstOfMonth(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
function lastOfLastMonth(){
  const d=new Date();
  d.setDate(0); // last day of previous month
  return d.toISOString().slice(0,10);
}
function firstOfLastMonth(){
  const d=new Date();
  d.setDate(1); d.setMonth(d.getMonth()-1);
  return d.toISOString().slice(0,10);
}
function mondayOfThisWeek(){
  const d=new Date();
  const day=d.getDay(); // 0=Sun, 1=Mon, ...
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}

function onAttRangeChange(range){
  localStorage.setItem('wf_att_range', range);
  window._attExportRange = range;
  const from=$('att-from'), to=$('att-to');
  if(!from||!to) return;
  const today=todayStr();
  if(range==='daily'){ from.value=today; to.value=today; }
  else if(range==='weekly'){ from.value=mondayOfThisWeek(); to.value=today; }
  else if(range==='monthly'){ from.value=firstOfMonth(); to.value=today; }
  else if(range==='last-month'){ from.value=firstOfLastMonth(); to.value=lastOfLastMonth(); }
  // custom: leave as-is, let user edit manually
  // Persist whatever dates are now shown
  localStorage.setItem('wf_att_from', from.value);
  localStorage.setItem('wf_att_to', to.value);
  window._attExportFrom = from.value;
  window._attExportTo = to.value;
}

// Called when user manually edits From/To dates (usually when Range=Custom)
function saveAttRange(){
  const from=$('att-from')?.value, to=$('att-to')?.value;
  if(from){ localStorage.setItem('wf_att_from', from); window._attExportFrom = from; }
  if(to){ localStorage.setItem('wf_att_to', to); window._attExportTo = to; }
  // If user edited dates manually and the range doesn't match a preset, snap to custom
  const range=$('att-range');
  if(range && range.value!=='custom'){
    const today=todayStr();
    const presets={
      daily: [today, today],
      weekly: [mondayOfThisWeek(), today],
      monthly: [firstOfMonth(), today],
      'last-month': [firstOfLastMonth(), lastOfLastMonth()]
    };
    const current=presets[range.value];
    if(!current || current[0]!==from || current[1]!==to){
      range.value='custom';
      localStorage.setItem('wf_att_range', 'custom');
      window._attExportRange = 'custom';
    }
  }
}

async function exportAttendanceExcel(){
  const fromDate=$('att-from')?.value;
  const toDate=$('att-to')?.value;
  const empFilter=$('att-emp')?.value||'';
  if(!fromDate||!toDate){ showToast('Pick a date range','info'); return; }
  if(fromDate>toDate){ showToast('From date must be before To date','info'); return; }

  showToast('📊 Building Excel file…','info');

  const empMap={};
  D.employees.forEach(e=>{empMap[e.name]=e; empMap[e._uuid]=e; empMap[e.id]=e;});

  // CONSOLIDATE: one row per employee per date
  // Key = employee + date. Merge all sessions into earliest check-in, latest check-out, total hours.
  const byKey={};

  // Process sessions first (the real data with timestamps)
  (D.attSessions||[]).forEach(s=>{
    if(!s.date||s.date<fromDate||s.date>toDate) return;
    const emp=empMap[s.empName]||empMap[s.empId];
    if(empFilter&&emp&&emp.id!==empFilter) return;
    const key=`${s.empName}|${s.date}`;
    if(!byKey[key]){
      byKey[key]={
        date:s.date,
        employee:s.empName||'Unknown',
        employeeId:emp?.id||'—',
        department:emp?.dept||'—',
        firstCheckIn:null,
        lastCheckOut:null,
        totalMillis:0,
        sessionCount:0,
        hasActive:false,
        locations:new Set(),
        status:'Present',
        source:'Session'
      };
    }
    const row=byKey[key];
    const ci=s.checkIn?new Date(s.checkIn):null;
    const co=s.checkOut?new Date(s.checkOut):null;
    if(ci){
      if(!row.firstCheckIn||ci<row.firstCheckIn) row.firstCheckIn=ci;
    }
    if(co){
      if(!row.lastCheckOut||co>row.lastCheckOut) row.lastCheckOut=co;
      if(ci) row.totalMillis += (co-ci);
    } else if(ci){
      row.hasActive=true; // currently checked in
    }
    row.sessionCount++;
    if(s.location) row.locations.add(s.location);
  });

  // Fill in legacy attendance for employee+date pairs not already covered by sessions
  (D.attendance||[]).forEach(a=>{
    if(!a.date||a.date<fromDate||a.date>toDate) return;
    const emp=empMap[a.empName]||empMap[a.empId];
    if(empFilter&&emp&&emp.id!==empFilter) return;
    const key=`${a.empName}|${a.date}`;
    if(byKey[key]) return; // already have session data, don't double-count
    byKey[key]={
      date:a.date,
      employee:a.empName||'Unknown',
      employeeId:emp?.id||'—',
      department:emp?.dept||'—',
      firstCheckIn:null,
      lastCheckOut:null,
      totalMillis:0,
      sessionCount:0,
      hasActive:false,
      locations:new Set(),
      status:a.status||'Present',
      source:'Manual',
      manualIn:a.in||'—',
      manualOut:a.out||'—'
    };
  });

  // Convert to flat rows
  const rows=Object.values(byKey).map(r=>{
    const checkIn = r.firstCheckIn
      ? r.firstCheckIn.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false})
      : (r.manualIn||'—');
    const checkOut = r.hasActive
      ? 'Active'
      : r.lastCheckOut
        ? r.lastCheckOut.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false})
        : (r.manualOut||'—');
    const hoursWorked = r.totalMillis>0 ? Math.round((r.totalMillis/3600000)*100)/100 : '—';
    const location = r.locations.size>0 ? Array.from(r.locations).join(', ') : '—';
    const sessionCol = r.sessionCount>1 ? r.sessionCount : '';
    return {
      date:r.date,
      employee:r.employee,
      employeeId:r.employeeId,
      department:r.department,
      checkIn,
      checkOut,
      hoursWorked,
      sessionsCount:sessionCol,
      status:r.status,
      location,
      source:r.source
    };
  });

  // Sort by date desc, then employee
  rows.sort((x,y)=>y.date.localeCompare(x.date)||x.employee.localeCompare(y.employee));

  if(!rows.length){
    showToast('No attendance records in this range','info');
    return;
  }

  // Build Excel via SheetJS-with-styles CDN (xlsx-js-style supports borders/alignment)
  // We MUST load this even if plain XLSX is already defined, because plain SheetJS
  // ignores cell styles. Loading xlsx-js-style overrides the global XLSX with one that supports styles.
  if(!window._xlsxStylesLoaded){
    await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js';
      s.onload=()=>{ window._xlsxStylesLoaded=true; resolve(); };
      s.onerror=()=>reject(new Error('Could not load Excel library'));
      document.head.appendChild(s);
    }).catch(e=>{
      console.error('xlsx-js-style load failed:',e);
      showToast('❌ Could not load Excel library — downloading CSV instead','info');
      return downloadAttendanceCSV(rows, fromDate, toDate);
    });
  }

  if(typeof XLSX!=='undefined'){
    const companyName = (currentCompany?.name || D.settings?.company || 'Company').toUpperCase();

    // Style helpers
    const border = { style:'thin', color:{rgb:'000000'} };
    const allBorders = { top:border, bottom:border, left:border, right:border };
    const headerStyle = {
      font:{ bold:true, sz:11, name:'Calibri' },
      alignment:{ horizontal:'center', vertical:'center', wrapText:true },
      border:allBorders,
      fill:{ fgColor:{rgb:'F2F2F2'} }
    };
    const titleStyle = {
      font:{ bold:true, sz:14, name:'Calibri' },
      alignment:{ horizontal:'center', vertical:'center' }
    };
    const companyStyle = {
      font:{ bold:true, italic:true, sz:11, name:'Calibri' },
      alignment:{ horizontal:'center', vertical:'center' }
    };
    const empHeaderStyle = {
      font:{ bold:true, sz:11, name:'Calibri' },
      alignment:{ horizontal:'left', vertical:'center' },
      fill:{ fgColor:{rgb:'FFF8DC'} }
    };
    const dataCellStyle = {
      font:{ sz:10, name:'Calibri' },
      alignment:{ horizontal:'center', vertical:'center' },
      border:allBorders
    };
    const dataCellLeftStyle = {
      font:{ sz:10, name:'Calibri' },
      alignment:{ horizontal:'left', vertical:'center' },
      border:allBorders
    };

    const NUM_COLS = 18; // Date, Day, Shift(3), Actual(2), Meal(2), Hrs, Late, Early, MealLate, MealEarly, Short, Break, OT/Coff, Reason
    const COL_LETTERS = 'ABCDEFGHIJKLMNOPQR'; // 18 columns

    // Helper to set a cell with value + style
    const ws = {};
    const merges = [];
    let currentRow = 0; // 0-indexed

    function setCell(row, col, value, style){
      const addr = XLSX.utils.encode_cell({r:row, c:col});
      const cell = { v: value==null?'':value, t: typeof value==='number'?'n':'s' };
      if(style) cell.s = style;
      ws[addr] = cell;
    }
    function setRow(row, values, style){
      for(let c=0; c<NUM_COLS; c++){
        setCell(row, c, values[c]==null?'':values[c], style);
      }
    }

    // ── Row 0: "Punch Card" title (merged across all 18 cols) ──
    setCell(0, 0, 'Punch Card', titleStyle);
    for(let c=1; c<NUM_COLS; c++) setCell(0, c, '', titleStyle);
    merges.push({ s:{r:0,c:0}, e:{r:0,c:NUM_COLS-1} });

    // ── Row 1: blank ──
    currentRow = 2;

    // ── Row 2: company name (merged left half) + site name (right half) ──
    setRow(2, ['','','','','','','','','','','','','','','','','',''], companyStyle);
    setCell(2, 0, companyName, { ...companyStyle, alignment:{horizontal:'left',vertical:'center'} });
    merges.push({ s:{r:2,c:0}, e:{r:2,c:8} });
    setCell(2, 9, 'Ascent', { ...companyStyle, alignment:{horizontal:'right',vertical:'center'} });
    merges.push({ s:{r:2,c:9}, e:{r:2,c:NUM_COLS-1} });

    // ── Rows 3-4: two-row column header with merges ──
    // Row 3 (group headers)
    const groupRow = [
      'Date', 'Day',
      'Shift', '', '',
      'Actual', '',
      'Meal', '',
      'Hrs',
      'Late', 'Early',
      'Meal Late', 'Meal Early',
      'Short', 'Break', 'OT/',
      'Reason/'
    ];
    setRow(3, groupRow, headerStyle);
    // Row 4 (sub-headers)
    const subRow = [
      '', '',
      'Code', 'Start', 'End',
      'In', 'Out',
      'Out', 'In',
      '',
      'In', 'Out',
      'In', 'Out',
      'Hrs', 'Hrs', 'Coff Hrs',
      'Exception'
    ];
    setRow(4, subRow, headerStyle);

    // Vertical merges for single-column headers (Date, Day, Hrs, Late, Early, Meal Late, Meal Early, Short Hrs, Break Hrs, OT/Coff Hrs, Reason)
    // These take both rows 3 & 4
    [0, 1, 9, 10, 11, 12, 13, 14, 15, 16, 17].forEach(c=>{
      merges.push({ s:{r:3,c:c}, e:{r:4,c:c} });
    });
    // Horizontal merges for the group headers in row 3
    merges.push({ s:{r:3,c:2}, e:{r:3,c:4} });   // Shift across Code/Start/End
    merges.push({ s:{r:3,c:5}, e:{r:3,c:6} });   // Actual across In/Out
    merges.push({ s:{r:3,c:7}, e:{r:3,c:8} });   // Meal across Out/In

    currentRow = 5;

    // Group rows by employee
    const byEmp = {};
    rows.forEach(r=>{
      const key = r.employee + '|' + r.employeeId;
      if(!byEmp[key]) byEmp[key] = { name:r.employee, id:r.employeeId, dept:r.department, rows:[] };
      byEmp[key].rows.push(r);
    });

    Object.values(byEmp).forEach(emp=>{
      // Employee header row (full-width merged)
      setCell(currentRow, 0, `Employee:  ${emp.name} — ${emp.id}${emp.dept?' — '+emp.dept:''}`, empHeaderStyle);
      for(let c=1; c<NUM_COLS; c++) setCell(currentRow, c, '', empHeaderStyle);
      merges.push({ s:{r:currentRow,c:0}, e:{r:currentRow,c:NUM_COLS-1} });
      currentRow++;

      emp.rows.forEach(r=>{
        let dayName = '';
        try{ dayName = new Date(r.date).toLocaleDateString('en-IN',{weekday:'short'}); }catch(e){}

        const vals = [
          r.date,
          dayName,
          '', '', '',
          r.checkIn || '',
          r.checkOut === 'Active' ? '' : (r.checkOut || ''),
          '', '',
          (typeof r.hoursWorked==='number' ? r.hoursWorked.toFixed(2) : (r.hoursWorked && r.hoursWorked!=='—' ? r.hoursWorked : '')),
          '', '', '', '',
          '', '', '',
          (r.status==='Present' || r.status==='Late') ? '' : (r.status || '')
        ];
        for(let c=0; c<NUM_COLS; c++){
          setCell(currentRow, c, vals[c]==null?'':vals[c], dataCellStyle);
        }
        currentRow++;
      });

      // blank separator
      currentRow++;
    });

    // Summary section
    const totalHours = rows.reduce((s,r)=>s+(typeof r.hoursWorked==='number'?r.hoursWorked:0),0);
    const presentCount = rows.filter(r=>r.status==='Present').length;
    const uniqueEmps = Object.keys(byEmp).length;

    currentRow++;
    setCell(currentRow, 0, 'SUMMARY', { font:{bold:true,sz:11}, alignment:{horizontal:'left'} });
    currentRow++;
    [
      ['Date range:', `${fromDate} to ${toDate}`],
      ['Total day-records:', rows.length],
      ['Unique employees:', uniqueEmps],
      ['Present count:', presentCount],
      ['Total hours worked:', Math.round(totalHours*100)/100],
      ['Generated:', new Date().toLocaleString('en-IN')]
    ].forEach(([k,v])=>{
      setCell(currentRow, 0, k, { font:{bold:true,sz:10}, alignment:{horizontal:'left'} });
      setCell(currentRow, 1, v, { font:{sz:10}, alignment:{horizontal:'left'} });
      currentRow++;
    });

    // Set the worksheet's range
    ws['!ref'] = `A1:${COL_LETTERS[NUM_COLS-1]}${currentRow}`;
    ws['!merges'] = merges;
    ws['!cols'] = [
      {wch:12}, {wch:6},               // Date, Day
      {wch:8}, {wch:8}, {wch:8},       // Shift Code/Start/End
      {wch:9}, {wch:9},                // Actual In/Out
      {wch:8}, {wch:8},                // Meal Out/In
      {wch:6},                         // Hrs
      {wch:8}, {wch:8},                // Late In, Early Out
      {wch:11}, {wch:11},              // Meal Late In, Meal Early Out
      {wch:8}, {wch:8}, {wch:10},      // Short, Break, OT/Coff
      {wch:18}                         // Reason/Exception
    ];
    // Set row heights for header rows
    ws['!rows'] = [
      {hpt:24},  // row 1 (title)
      {hpt:8},   // row 2 (blank)
      {hpt:18},  // row 3 (company)
      {hpt:18},  // row 4 (group header)
      {hpt:32}   // row 5 (sub-header, taller)
    ];
    ws['!freeze'] = { xSplit:0, ySplit:5 };

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Punch Card');
    const filename = `Punch_Card_${fromDate}_to_${toDate}${empFilter?'_'+(empMap[empFilter]?.name||'emp').replace(/\s+/g,'_'):''}.xlsx`;
    XLSX.writeFile(wb, filename, { cellStyles: true });
    showToast(`✅ Downloaded ${rows.length} rows (${uniqueEmps} employee${uniqueEmps!==1?'s':''})`,'success');
  }
}

// CSV fallback if SheetJS fails to load
function downloadAttendanceCSV(rows, fromDate, toDate){
  const esc=s=>`"${String(s||'').replace(/"/g,'""')}"`;
  const header=['Date','Employee','Employee ID','Department','First Check-in','Last Check-out','Hours Worked','Sessions','Status','Location','Source'];
  const lines=[header.join(',')];
  rows.forEach(r=>{
    lines.push([r.date,esc(r.employee),r.employeeId,esc(r.department),r.checkIn,r.checkOut,r.hoursWorked,r.sessionsCount,r.status,esc(r.location),r.source].join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`Attendance_${fromDate}_to_${toDate}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✅ Downloaded ${rows.length} rows (CSV)`,'success');
}

function renderEmpAttDetail(){
  const emp = D.employees.find(e => e.id === _empAttDetailId);
  if(!emp) return;
  const date = _empAttDetailDate;
  const wrap = $('emp-att-detail-modal');
  if(!wrap) return;

  // Collect all sessions for this employee on this date
  const sessions = (D.attSessions||[])
    .filter(s => (s.empName===emp.name || s.empId===emp._uuid || s.empId===emp.id) && s.date === date)
    .sort((a,b) => new Date(a.checkIn||0) - new Date(b.checkIn||0));

  // Legacy attendance fallback
  const legacy = D.attendance.find(a => (a.empName===emp.name || a.empId===emp._uuid || a.empId===emp.id) && a.date === date);

  // Calculate timeline data: for each session, find start hour and end hour (fractional)
  const timelineSpans = sessions.map(s => {
    const ci = s.checkIn ? new Date(s.checkIn) : null;
    const co = s.checkOut ? new Date(s.checkOut) : null;
    if(!ci) return null;
    const startHour = ci.getHours() + ci.getMinutes()/60;
    const endHour = co ? co.getHours() + co.getMinutes()/60 : (ci.getHours() + ci.getMinutes()/60 + 0.25); // active: show 15 min stub
    return { startHour, endHour, active: !co, session: s };
  }).filter(Boolean);

  // Work duration (total)
  let totalMins = 0;
  sessions.forEach(s => {
    if(s.checkIn && s.checkOut){ totalMins += (new Date(s.checkOut) - new Date(s.checkIn))/60000; }
  });
  const workHours = Math.floor(totalMins/60);
  const workMinsRem = Math.round(totalMins%60);

  // Break duration = gaps between consecutive sessions (only for completed sessions)
  let breakMins = 0;
  const completed = sessions.filter(s => s.checkIn && s.checkOut).sort((a,b)=>new Date(a.checkIn)-new Date(b.checkIn));
  for(let i=1; i<completed.length; i++){
    const prevEnd = new Date(completed[i-1].checkOut);
    const currStart = new Date(completed[i].checkIn);
    const gap = (currStart - prevEnd)/60000;
    if(gap > 0) breakMins += gap;
  }
  const breakHours = Math.floor(breakMins/60);
  const breakMinsRem = Math.round(breakMins%60);

  // Generate hour labels (9 AM → 9 AM next day, 25 points on axis)
  const hours = [];
  for(let h=9; h<=24+9; h++){ hours.push(h%24); }

  // Build timeline bars SVG-style using absolute-positioned divs
  const timelineWidth = 100; // percentage
  const startHourOfDay = 9; // 9 AM
  const totalHoursShown = 24;

  const timelineBars = timelineSpans.map(span => {
    // Convert to offset from 9 AM
    let startOffset = span.startHour - startHourOfDay;
    let endOffset = span.endHour - startHourOfDay;
    if(startOffset < 0) startOffset += 24; // wrap past midnight
    if(endOffset < 0) endOffset += 24;
    const leftPct = (startOffset / totalHoursShown) * 100;
    const widthPct = Math.max(0.8, ((endOffset - startOffset) / totalHoursShown) * 100);
    const color = span.active ? '#f59e0b' : '#3b82f6';
    return `<div style="position:absolute;top:50%;transform:translateY(-50%);left:${leftPct}%;width:${widthPct}%;height:22px;background:${color};border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.1)" title="${span.active?'Active':'Completed'} session"></div>`;
  }).join('');

  // Session table rows (each check-in + check-out as separate rows)
  const tableRows = [];

    if(s.checkIn){
      tableRows.push({
        time: new Date(s.checkIn).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}),

        typeColor: '#f59e0b',

        location: '',
        lat: null, lng: null
      });
    }
  });

  // Count sessions summary
  const activeCount = sessions.filter(s => !s.checkOut).length;
  const doneCount = sessions.filter(s => s.checkOut).length;

  wrap.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal('emp-att-detail-modal')">
  <div class="modal" style="max-width:960px;max-height:90vh;overflow-y:auto">
    <div class="modal-hd" style="background:#1a1a4e;color:#fff;margin:-1.5rem -1.5rem 1rem;padding:16px 24px;border-radius:12px 12px 0 0">
      <div>
        <div style="display:flex;align-items:center;gap:12px">
          ${av(emp.name, 36)}
          <div>
            <h3 style="color:#fff;margin:0;font-size:17px">${emp.name}</h3>
            <div style="font-size:12px;opacity:.8">${emp.dept||'—'} · ${emp.id}</div>
          </div>
        </div>
      </div>
      <button class="xbtn" onclick="closeModal('emp-att-detail-modal')" style="background:rgba(255,255,255,.15);color:#fff">×</button>
    </div>

    <!-- Tab bar -->
    <div style="display:flex;align-items:center;gap:20px;border-bottom:2px solid #e5e7eb;margin-bottom:1rem">
      <div style="padding:10px 0;border-bottom:3px solid #1a1a4e;font-weight:700;font-size:14px;color:#1a1a4e">Daily Log</div>
      <div style="padding:10px 0;color:var(--muted);font-size:14px">Monthly Log <span style="font-size:10px;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:10px;margin-left:4px">Soon</span></div>
    </div>

    <!-- Date nav -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">

    </div>

    <!-- Timeline -->
    <div style="background:#fafbfc;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>

          <div style="display:flex;gap:12px;font-size:11px">

async function saveAtt(){
  const date=window._attDate||todayStr();
  showSyncBanner('Saving attendance…');
  const promises=[];
  // First fetch existing records for this date from Supabase to get UUIDs
  const existingRecs=await sb('attendance','GET',null,`?date=eq.${date}&select=id,employee_name`).catch(()=>null);

  document.querySelectorAll('.att-st').forEach(s=>{
    const id=s.dataset.id,emp=D.employees.find(e=>e.id===id);
    if(!emp)return;
    if(s.value==='Not marked') return; // Don't save Not marked
    const inT=document.querySelector(`.att-in[data-id="${id}"]`).value;
    const outT=document.querySelector(`.att-out[data-id="${id}"]`).value;

    // Find existing record — check Supabase result first, then local cache
    const sbRec=existingRecs?existingRecs.find(r=>r.employee_name===emp.name):null;
    const localRec=D.attendance.find(a=>a.date===date&&(a.empName===emp.name||a.empId===emp._uuid));

    // Remove old local records for this employee+date
    D.attendance=D.attendance.filter(a=>!(a.date===date&&(a.empName===emp.name||a.empId===emp._uuid)));

    const rec={empId:emp._uuid||id,empName:emp.name,date,status:s.value,in:inT,out:outT};
    // Use UUID from Supabase or local cache for update
    if(sbRec&&sbRec.id) rec._uuid=sbRec.id;
    else if(localRec&&localRec._uuid) rec._uuid=localRec._uuid;

    D.attendance.unshift(rec);
    promises.push(sbSaveAttendance(rec));
  });
  await Promise.all(promises);
  save();hideSyncBanner();
  showToast('✅ Attendance saved for '+date,'success');
  nav('attendance');
}

function getLeaveTypes(){
  const saved=D.settings?.leaveTypes;
  if(saved&&Array.isArray(saved)&&saved.length>0){
    // Merge: keep saved types, but add any default types missing (so existing companies get new types auto)
    const savedCodes=new Set(saved.map(t=>t.code));
    const missing=DEFAULT_LEAVE_TYPES.filter(t=>!savedCodes.has(t.code));
    return [...saved, ...missing];
  }
  return DEFAULT_LEAVE_TYPES;
}

  if(search) rows=rows.filter(l=>(l.emp||'').toLowerCase().includes(search)||(l.reason||'').toLowerCase().includes(search)||(l.type||'').toLowerCase().includes(search));

  // Team filter

        const e=D.employees.find(x=>x.name===l.emp);

function pgLeaveBalance(){
  const types=getLeaveTypes().filter(t=>t.annualQuota>0); // only accruing types

  const year=new Date().getFullYear();

  return `

    <div>
      <div style="font-size:16px;font-weight:700">📊 Leave Balance — ${year}</div>
      <div style="font-size:12px;color:var(--muted)">Accrued minus used, per employee per leave type</div>
    </div>
    <button class="btn btn-sec" style="font-size:12px" onclick="exportBalanceCSV()">⬇ Export CSV</button>
  </div>

  <div class="card" style="padding:0;overflow-x:auto">
    <table style="min-width:900px">
      <thead><tr>
        <th style="padding-left:12px;text-align:left">Employee</th>
        ${types.map(t=>`<th style="text-align:center"><span style="color:${t.color}">${t.icon} ${t.code}</span></th>`).join('')}
        <th style="text-align:center">Total</th>
      </tr></thead>
      <tbody>${emps.map(e=>{
        const bal=calcLeaveBalanceFor(e, types, year);
        const total=types.reduce((s,t)=>s+(bal[t.code]?.balance||0),0);
        return `<tr>
          <td style="padding-left:12px"><div style="display:flex;align-items:center;gap:8px">${av(e.name,28)}<div><div style="font-weight:600">${e.name}</div><div style="font-size:11px;color:var(--muted)">${e.dept||'—'}</div></div></div></td>
          ${types.map(t=>{
            const b=bal[t.code]||{balance:0,used:0,accrued:0};
            const pct=b.accrued>0?Math.round((b.balance/b.accrued)*100):0;
            const color=pct>50?'#16a34a':pct>20?'#f59e0b':'#ef4444';
            return `<td style="text-align:center"><div style="font-weight:700;color:${color};font-size:14px">${b.balance.toFixed(1)}</div><div style="font-size:10px;color:var(--muted)">${b.used}/${b.accrued}</div></td>`;
          }).join('')}
          <td style="text-align:center"><strong style="color:var(--navy);font-size:15px">${total.toFixed(1)}</strong></td>
        </tr>`;
      }).join('')||`<tr><td colspan="${types.length+2}" style="text-align:center;padding:2rem;color:var(--muted)">No active employees</td></tr>`}</tbody>
    </table>
  </div>

  <div style="margin-top:1rem;padding:12px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;font-size:12px;color:#1e40af">
    💡 Balance = Accrued − Used. Colour coding: <span style="color:#16a34a;font-weight:700">green &gt; 50%</span>, <span style="color:#f59e0b;font-weight:700">amber 20-50%</span>, <span style="color:#ef4444;font-weight:700">red &lt; 20%</span>
  </div>`;
}

function calcLeaveBalanceFor(emp, types, year){
  const bal={};
  const yearStart=new Date(year,0,1);
  const now=new Date();
  types.forEach(t=>{
    let accrued=0;
    if(t.accrual==='yearly') accrued=t.annualQuota;
    else if(t.accrual==='monthly'){
      // Months elapsed since year start OR join date, whichever later
      const joinDate=emp.joined?new Date(emp.joined):yearStart;
      const start=joinDate>yearStart?joinDate:yearStart;
      const monthsElapsed=(now.getFullYear()-start.getFullYear())*12 + (now.getMonth()-start.getMonth())+1;
      accrued=Math.max(0, monthsElapsed*t.accrualRate);
    }
    const used=(D.leaves||[]).filter(l=>l.emp===emp.name && (l.type===t.code||l.type===t.name) && l.status==='Approved' && new Date(l.from).getFullYear()===year).reduce((s,l)=>s+(l.days||0),0);
    bal[t.code]={accrued, used, balance:Math.max(0,accrued-used)};
  });
  return bal;
}

  types[idx]={

    annualQuota:parseInt($('lr-quota').value)||0,
    accrual:$('lr-accrual').value,
    accrualRate:parseFloat($('lr-rate').value)||0,
    description:$('lr-desc').value.trim(),
    carryForward:$('lr-cf').checked,

    weekendsCount:$('lr-we').checked,
    holidaysCount:$('lr-hl').checked,
    allowedInProbation:$('lr-pb').checked,

  D.settings.leaveTypes=types;
  await sbSaveSettings();
  save();
  closeModal('leave-modal-wrap');
  showToast(`✅ ${types[idx].name} rules updated`,'success');
  nav('leave');
}

async function bulkApproveAllPending(){
  const pending=D.leaves.filter(l=>l.status==='Pending');
  if(!pending.length) return;
  if(!confirm(`Approve all ${pending.length} pending leaves at once?`)) return;
  for(const l of pending){
    l.status='Approved';
    await sbUpdateLeaveStatus(l);

async function submitLeave(){
  const from=$('lv-from').value,to=$('lv-to').value;
  if(!from||!to)return;
  const days=Math.max(1,Math.round((new Date(to)-new Date(from))/86400000)+1);
  const empName=$('lv-emp').value;
  const emp=D.employees.find(e=>e.name===empName);
  const tlEmail=emp?.teamLeadEmail||'';
  const requiresHr=days>2; // TL-only for ≤2 days, otherwise must also go to HR
  const type=$('lv-type').value;
  const reason=$('lv-reason').value||'—';

  // Initial status based on routing
  let status='Pending HR';
  if(tlEmail){
    status='Pending TL';
  }

  const lv={
    id:Date.now(),
    emp:empName,
    type, from, to, days, reason,
    status,
    tlEmail: tlEmail || '',
    tlStatus: tlEmail ? 'Pending' : '',
    tlActionAt: null,
    tlNote: '',
    hrStatus: '',
    hrActionAt: null,
    hrNote: '',
    requiresHr
  };
  D.leaves.unshift(lv);
  await sbSaveLeave(lv);
  save();

  // Notify — first responder based on routing
  try{
    if(tlEmail){
      // TL gets the request
      await sbSaveNotification({
        msg: `🏖 New leave request from ${empName} (${days} day${days>1?'s':''}, ${from} to ${to}) awaits your approval`,
        type:'info',
        to: tlEmail
      });
      // Send email to TL
      const tl=D.employees.find(e=>e.email&&e.email.toLowerCase()===tlEmail.toLowerCase());
      if(tl) await sendApprovalEmail(tlEmail, tl.name, empName, type, from, to, days, reason, 'Team Lead');
    } else {
      // Direct to HR
      const hrEmail = currentCompany?.admin_email || D.user.email;
      await sbSaveNotification({
        msg: `🏖 New leave request from ${empName} (${days} day${days>1?'s':''}, ${from} to ${to}) awaits your approval`,
        type:'info',
        to: hrEmail
      });
      if(hrEmail) await sendApprovalEmail(hrEmail, 'HR', empName, type, from, to, days, reason, 'HR');
    }
  }catch(e){ console.warn('leave notify failed:',e); }

  showToast(tlEmail
    ? `📤 Leave submitted. Awaiting Team Lead's approval.`
    : `📤 Leave submitted. Awaiting HR approval.`, 'success');

  closeModal('leave-modal-wrap');
  nav('leave');
}

// Team Lead or HR approves a leave
async function leaveDecide(leaveUuid, action, note){
  const lv=D.leaves.find(l=>l._uuid===leaveUuid || String(l.id)===String(leaveUuid));
  if(!lv){ showToast('Leave not found','info'); return; }

  const actorEmail = currentRole==='employee'
    ? (currentEmployee?.email||'').toLowerCase()
    : (currentCompany?.admin_email || D.user.email || '').toLowerCase();
  const isTL = lv.tlEmail && actorEmail === lv.tlEmail.toLowerCase();
  const isHR = !isTL; // If not TL, assume admin (HR) is deciding

  const now = new Date().toISOString();

  if(isTL){
    // TL decision
    if(action==='approve'){
      lv.tlStatus='Approved';
      lv.tlActionAt=now;
      lv.tlNote=note||'';
      if(lv.requiresHr){
        // Escalate to HR (leave > 2 days)
        lv.status='Pending HR';
      } else {
        // TL alone approved (≤ 2 days) — final
        lv.status='Approved';
        lv.hrStatus='Auto (≤2d)';
        lv.hrActionAt=now;

        // Send info-only notification to HR
        const hrEmail = currentCompany?.admin_email || D.user.email;
        if(hrEmail){
          try{
            await sbSaveNotification({
              msg:`ℹ️ ${lv.emp}'s leave (${lv.days}d, ${lv.from} to ${lv.to}) was approved by TL — no HR action needed`,
              type:'info', to: hrEmail
            });
          }catch(e){/*ignore*/}
        }
      }
    } else {
      lv.tlStatus='Rejected';
      lv.tlActionAt=now;
      lv.tlNote=note||'';
      lv.status='Rejected by TL';
    }
  } else if(isHR){
    // HR decision
    if(action==='approve'){
      lv.hrStatus='Approved';
      lv.hrActionAt=now;
      lv.hrNote=note||'';
      lv.status='Approved';
    } else {
      lv.hrStatus='Rejected';
      lv.hrActionAt=now;
      lv.hrNote=note||'';
      lv.status='Rejected by HR';
    }
  }

  // Auto-dismiss the "awaits your approval" notification since action is being taken
  try{
    const matching = D.notifications.filter(n=>{
      if(n.read) return false;
      const m = (n.msg||'').toLowerCase();
      return m.includes((lv.emp||'').toLowerCase()) &&
             (m.includes('awaits your approval') || m.includes('needs your final approval') || m.includes('action needed'));
    });
    for(const n of matching){
      n.read = true;
      if(n._uuid) await sbMarkNotifRead(n);
    }
  }catch(e){ console.warn('auto-dismiss notif failed:',e); }

  await sbSaveLeave(lv);
  logAudit(action,'leave',lv._uuid||String(lv.id),lv.emp,{
    type:lv.type, from:lv.from, to:lv.to, days:lv.days,
    role:isTL?'TL':'HR', status:lv.status, note:note||''
  });
  save();

  // Notify employee
  const emp=D.employees.find(e=>e.name===lv.emp);
  if(emp?.email){
    const msg = lv.status==='Approved'
      ? `✅ Your leave (${lv.from} to ${lv.to}) has been approved!`
      : lv.status==='Pending HR'
        ? `✓ Your Team Lead approved your leave. Awaiting HR final approval.`
        : `❌ Your leave request was rejected${note?' — '+note:''}`;
    await sbSaveNotification({msg, type: lv.status==='Approved'?'success':(lv.status==='Pending HR'?'info':'danger'), to: emp.email});
  }

  // If escalated to HR, notify them too
  if(lv.status==='Pending HR'){
    const hrEmail = currentCompany?.admin_email || D.user.email;
    if(hrEmail){
      await sbSaveNotification({
        msg:`🏖 ${lv.emp}'s leave (${lv.days}d) approved by TL, needs your final approval`,
        type:'info', to: hrEmail
      });
      await sendApprovalEmail(hrEmail, 'HR', lv.emp, lv.type, lv.from, lv.to, lv.days, lv.reason, 'HR');
    }
  }

  showToast(`Leave ${action==='approve'?'approved':'rejected'}`, 'success');
  if(currentRole==='employee') navEmp('emp-leave');
  else nav('leave');
}

async function updateSalary(id,val){
  const v=parseInt(val);
  if(isNaN(v)||v<=0){ showToast('Enter a valid CTC','info'); return; }
  const e=D.employees.find(x=>x.id===id||x._uuid===id);
  if(!e){ console.error('Employee not found locally:', id); showToast('Employee not found','info'); return; }
  const oldSalary=e.salary||0;
  if(v===oldSalary) return;
  if(!e.email){ showToast('Cannot update: employee has no email','info'); return; }

  console.log(`💰 Updating CTC for ${e.name} (${e.email}): ${oldSalary} → ${v}`);

  // Step 1: If we don't have a UUID locally, look up by email in Supabase
  let uuid = e._uuid;
  if(!uuid){
    console.log('  ⏳ No local UUID, looking up by email...');
    try{
      const byEmail=await sb('employees','GET',null,`?email=eq.${encodeURIComponent(e.email)}&select=id`);
      if(byEmail && byEmail[0] && byEmail[0].id){
        uuid = byEmail[0].id;
        e._uuid = uuid;
        console.log('  ✓ Found UUID by email:', uuid);
      }
    }catch(err){
      console.error('  ❌ Email lookup failed:', err);
    }
  }

  // Step 2: If still no UUID, the employee doesn't exist in Supabase yet — create them
  if(!uuid){
    console.log('  ⏳ Employee not in Supabase yet, creating new row...');
    e.salary=v;
    const r=await sbSaveEmployee(e);
    if(!r){
      showToast(`❌ Failed to create ${e.name} in database`,'info');
      return;
    }
    if(r&&r[0]&&r[0].id){
      e._uuid=r[0].id;
      console.log('  ✓ Created in Supabase:', r[0].id);
    }
    save();
    showToast(`✅ Created ${e.name} with CTC ₹${fmt(v)}`,'success');
    nav('payroll');
    return;
  }

  // Step 3: We have a UUID — do a narrow PATCH with verification
  console.log('  ⏳ PATCHing salary on UUID:', uuid);
  try{
    const res = await fetch(`${SB_URL}/rest/v1/employees?id=eq.${uuid}`,{
      method:'PATCH',
      headers:{...SB_HDR, 'Prefer':'return=representation'},
      body:JSON.stringify({salary:v})
    });
    if(!res.ok){
      const errText=await res.text();
      console.error('  ❌ PATCH failed:', res.status, errText);
      showToast(`❌ Save failed: ${errText.substring(0,100)}`,'info');
      return;
    }
    const rows=await res.json();
    console.log('  ✓ Server returned:', rows);
    if(!rows||!rows[0]){
      showToast('❌ Update returned no row','info');
      return;
    }
    if(parseInt(rows[0].salary)!==v){
      showToast(`❌ DB saved ₹${rows[0].salary}, expected ₹${v}`,'info');
      return;
    }
  }catch(err){
    console.error('  ❌ Network error:', err);
    showToast('❌ Network error while saving','info');
    return;
  }

  // Success — update local cache
  e.salary=v;
  const idx=D.employees.findIndex(x=>x._uuid===uuid||x.id===e.id);
  if(idx>=0) D.employees[idx]=e;
  save();

  // Notify employee of salary change
  if(e.email){
    const direction=v>oldSalary?'revised upward':'revised';
    await sbSaveNotification({
      msg:`💰 Your salary has been ${direction} to ₹${fmt(v)} per month`,
      type:'success',
      to:e.email
    });
  }

  showToast(`✅ ${e.name}: ₹${fmt(oldSalary)} → ₹${fmt(v)}`,'success');
  nav('payroll');
}

async function updateExp(id,status){
  const e=D.expenses.find(x=>x.id===id||x._uuid===id);
  if(!e) return;
  e.status=status;
  await sbUpdateExpStatus(e);
  // Notify the affected employee
  const emp=D.employees.find(x=>x.name===e.emp);
  if(emp&&emp.email){
    const icon=status==='Approved'?'✅':'❌';
    const msg=`${icon} Your ₹${fmt(e.amount||0)} ${e.cat||'expense'} claim (${e.date||''}) was ${status.toLowerCase()} by admin`;
    await sbSaveNotification({msg, type:status==='Approved'?'success':'warning', to:emp.email});
  }
  save();
  nav('expenses');
}

async function saveTeam(uuid){
  const name=$('tm-name').value.trim();
  const dept=$('tm-dept').value;
  const tlEmail=$('tm-tl').value;
  const desc=$('tm-desc').value.trim();
  const err=$('team-err');

  if(!name){ if(err) err.innerHTML='<div class="alert alert-e">Team name is required</div>'; return; }

  if(err) err.innerHTML='<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">💾 Saving…</div>';

  const team = uuid ? D.teams.find(t=>t._uuid===uuid) : { name:'', department:'', teamLeadEmail:'', description:'' };
  team.name=name;
  team.department=dept;
  team.teamLeadEmail=tlEmail;
  team.description=desc;

  const result = await sbSaveTeam(team);
  if(!result){
    if(err) err.innerHTML='<div class="alert alert-e">Save failed. Check console for details.</div>';
    return;
  }

  if(!uuid){
    // New team
    if(result[0]){ team._uuid=result[0].id; team.id=result[0].id; team.companyId=result[0].company_id; }
    D.teams.push(team);
    logAudit('create','team',team._uuid,team.name,{department:dept,tl:tlEmail});
  } else {
    logAudit('update','team',team._uuid,team.name,{department:dept,tl:tlEmail});
  }
  save();

  // Also update team_lead_email for all employees on this team
  if(tlEmail){
    for(const emp of D.employees){
      if(emp.teamId === team._uuid){
        emp.teamLeadEmail = tlEmail;
        sbSaveEmployee(emp);
      }
    }
  }

  closeModal('team-modal-wrap');
  nav('teams');
  showToast(`✅ Team "${name}" ${uuid?'updated':'created'}`, 'success');
}

async function deleteTeam(uuid){
  const t=D.teams.find(x=>x._uuid===uuid);
  if(!t) return;
  const memberCount=D.employees.filter(e=>e.teamId===uuid).length;
  if(!confirm(`Delete team "${t.name}"? ${memberCount>0?`Its ${memberCount} member${memberCount>1?'s':''} will be unassigned.`:''}`)) return;
  await sbDeleteTeam(t);
  D.teams=D.teams.filter(x=>x._uuid!==uuid);
  logAudit('delete','team',uuid,t.name,{department:t.department,memberCount});
  save();
  nav('teams');
  showToast(`🗑 Team "${t.name}" deleted`, 'info');
}

async function assignEmpToTeam(empIdOrUuid, teamUuid){
  const emp=D.employees.find(e=>e._uuid===empIdOrUuid || e.id===empIdOrUuid);
  if(!emp) return;
  emp.teamId=teamUuid||null;
  // Also update teamLeadEmail from the team's TL
  if(teamUuid){
    const team=D.teams.find(t=>t._uuid===teamUuid);
    if(team && team.teamLeadEmail){
      emp.teamLeadEmail = team.teamLeadEmail;
    }
  }
  save();
  await sbSaveEmployee(emp);
  // Re-render members modal
  if(teamUuid) openTeamMembers(teamUuid);
  else if(window._openTeamMembersId) openTeamMembers(window._openTeamMembersId);
  showToast(teamUuid?`✓ Added to team`:`✓ Removed from team`,'success');
}

// Load most recent work logs across all employees (to show latest-entry preview on team cards)
async function loadTodayWorkLogs(){
  try{
    // Get latest log per employee — fetch recent and sort/dedupe locally
    const q = `?order=log_date.desc,updated_at.desc&limit=500`;
    const rows = await sb('work_logs','GET',null,q);
    if(!rows) return;
    // Keep only the most recent entry per employee (by name), excluding team summaries
    const latestByEmp = {};
    rows.forEach(r=>{
      if((r.tags||[]).includes('team-summary')) return; // skip team summaries
      if(!latestByEmp[r.emp_name]) latestByEmp[r.emp_name] = r;
    });
    window._todayWorkLogs = Object.values(latestByEmp).map(r=>({
      _uuid:r.id, empUuid:r.emp_uuid, empName:r.emp_name, empEmail:r.emp_email,
      date:r.log_date, mode:r.mode, entries:r.entries||[], summary:r.summary||'',
      tags:r.tags||[], totalHours:parseFloat(r.total_hours)||0,
      updatedAt:r.updated_at||''
    }));
    if(currentPage==='teams') nav('teams');
  }catch(e){console.error('Failed to load latest logs:',e);}
}

// Navigate to team work logs view
async function viewTeamWorkLogs(teamUuid){
  window._teamWLTeamId = teamUuid;
  // Default date range = last 7 days
  if(!window._teamWLFrom){
    const d=new Date(); d.setDate(d.getDate()-6);
    window._teamWLFrom = d.toISOString().slice(0,10);
  }
  if(!window._teamWLTo) window._teamWLTo = todayStr();
  if(!window._teamWLMode) window._teamWLMode = 'all';

  // Load work logs for this team's members
  const team = D.teams.find(t=>t._uuid===teamUuid);
  if(!team){ showToast('Team not found','info'); return; }
  const members = D.employees.filter(e=>e.teamId===teamUuid);
  if(members.length===0){
    showToast('This team has no members yet — add some first','info');
    return;
  }

  showSyncBanner('Loading team work logs…');
  // Fetch all logs for all members in parallel
  const allLogs = [];
  for(const m of members){
    const logs = await sbLoadWorkLogs({empUuid:m._uuid});
    allLogs.push(...logs);
  }
  window._teamWLLogs = allLogs;
  hideSyncBanner();

  nav('team-worklogs');
}

function exportTeamWorkLogsCSV(teamUuid){
  const team = D.teams.find(t=>t._uuid===teamUuid);
  if(!team) return;
  const logs = window._teamWLLogs || [];
  const from = window._teamWLFrom;
  const to = window._teamWLTo;
  const mode = window._teamWLMode || 'all';
  const filtered = logs.filter(l=>{
    if(l.date < from || l.date > to) return false;
    if(mode !== 'all' && l.mode !== mode) return false;
    return true;
  });

  let csv='Date,Employee,Mode,Hours,Summary,Tags\n';
  filtered.sort((a,b)=>b.date.localeCompare(a.date)).forEach(l=>{
    const safe=(s)=>'"'+(s||'').toString().replace(/"/g,'""')+'"';
    csv+=`${l.date},${safe(l.empName)},${l.mode},${(l.totalHours||0).toFixed(1)},${safe(l.summary)},${safe((l.tags||[]).join(', '))}\n`;
  });

  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`${team.name.replace(/\s+/g,'_')}_worklogs_${from}_to_${to}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`⬇ Exported ${filtered.length} log entries`,'success');
}
