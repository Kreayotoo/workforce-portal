// Employee Work Log: 3 modes (hourly/session/daily) — employees can pick any

async function sbSaveWorkLog(log){
  // Auto-calculate total hours from entries (hourly mode)
  let totalHours=0;
  if(log.mode==='hourly' && log.entries){
    log.entries.forEach(e=>{
      if(e.from && e.to){
        const [fh,fm]=e.from.split(':').map(Number);
        const [th,tm]=e.to.split(':').map(Number);
        const mins=(th*60+tm)-(fh*60+fm);
        if(mins>0) totalHours += mins/60;
      }
    });
  } else if(log.mode==='session' && log.entries){
    totalHours = log.entries.filter(e=>e.work).length * 2; // approx 2hrs per session
  } else if(log.mode==='daily'){
    totalHours = 8; // standard workday assumption
  }
  log.totalHours=Math.round(totalHours*10)/10;

  const payload={
    emp_uuid:log.empUuid||null,
    emp_name:log.empName,
    emp_email:log.empEmail||null,
    log_date:log.date,
    mode:log.mode,
    entries:log.entries||[],
    summary:log.summary||'',
    tags:log.tags||[],
    admin_comments:log.adminComments||[],
    total_hours:log.totalHours,
    company_id:currentCompany?currentCompany.company_id:'KSPL'
  };
  try{
    if(log._uuid){
      const r=await sb('work_logs','PATCH',{...payload,updated_at:new Date().toISOString()},`?id=eq.${log._uuid}`);
      if(r!==null) return r;
    }
    const q=`?emp_uuid=eq.${log.empUuid}&log_date=eq.${log.date}&select=id`;
    const existing=await sb('work_logs','GET',null,q);
    if(existing&&existing[0]){
      log._uuid=existing[0].id;
      const r=await sb('work_logs','PATCH',{...payload,updated_at:new Date().toISOString()},`?id=eq.${log._uuid}`);
      return r;
    }
    const r=await sb('work_logs','POST',payload);
    if(r&&r[0]) log._uuid=r[0].id;
    return r;
  }catch(e){
    console.error('sbSaveWorkLog error:',e);
    return null;
  }
}

async function sbLoadWorkLogs(filter={}){
  let q='?order=log_date.desc&limit=500';
  if(filter.empUuid) q=`?emp_uuid=eq.${filter.empUuid}&order=log_date.desc&limit=500`;
  else if(filter.empName) q=`?emp_name=eq.${encodeURIComponent(filter.empName)}&order=log_date.desc&limit=500`;
  try{
    const rows=await sb('work_logs','GET',null,q);
    if(!rows) return [];
    return rows.map(r=>({
      _uuid:r.id,
      empUuid:r.emp_uuid,
      empName:r.emp_name,
      empEmail:r.emp_email,
      date:r.log_date,
      mode:r.mode,
      entries:r.entries||[],
      summary:r.summary||'',
      tags:r.tags||[],
      adminComments:r.admin_comments||[],
      totalHours:parseFloat(r.total_hours)||0,
      createdAt:r.created_at,
      updatedAt:r.updated_at
    }));
  }catch(e){
    console.error('sbLoadWorkLogs error:',e);
    return [];
  }
}

async function sbDeleteWorkLog(uuid){
  try{
    await sb('work_logs','DELETE',null,`?id=eq.${uuid}`);
    return true;
  }catch(e){
    console.error('sbDeleteWorkLog error:',e);
    return false;
  }
}

function addHourlyRow(){
  const list=$('wl-hourly-list');
  if(!list) return;
  const rows=list.querySelectorAll('.wl-hrow');
  const last=rows[rows.length-1];
  const lastTo=last?last.querySelector('[data-k="to"]').value:'10:00';
  const [h,m]=(lastTo||'10:00').split(':').map(Number);
  const nextH=Math.min(23,h+1);
  const div=document.createElement('div');
  div.innerHTML=hourlyRow({from:lastTo,to:`${String(nextH).padStart(2,'0')}:${String(m).padStart(2,'0')}`,work:''});
  list.appendChild(div.firstElementChild);
}

async function saveMyWorkLog(){
  const emp=currentEmployee;
  const date=$('wl-date')?.value||todayStr();
  const mode=window._wlMode||'daily';
  const msg=$('wl-save-msg');

  let entries=[];
  if(mode==='hourly'){
    entries=Array.from(document.querySelectorAll('.wl-hrow')).map(row=>{
      const out={};
      row.querySelectorAll('[data-k]').forEach(el=>{out[el.dataset.k]=el.value.trim();});
      return out;
    }).filter(e=>e.work); // only keep rows with actual work entered
    if(!entries.length){
      if(msg) msg.innerHTML=`<div class="alert alert-e">Please fill at least one hour block with work description</div>`;
      return;
    }
  } else if(mode==='session'){
    entries=Array.from(document.querySelectorAll('.wl-srow')).map(row=>{
      const out={};
      row.querySelectorAll('[data-k]').forEach(el=>{out[el.dataset.k]=el.value.trim();});
      return out;
    }).filter(e=>e.work&&e.session);
    if(!entries.length){
      if(msg) msg.innerHTML=`<div class="alert alert-e">Please fill at least one session with a name and work description</div>`;
      return;
    }
  } else {
    const work=$('wl-daily-work')?.value?.trim()||'';
    if(!work){
      if(msg) msg.innerHTML=`<div class="alert alert-e">Please describe today's work</div>`;
      return;
    }
    entries=[{work}];
  }

  const summary=$('wl-summary')?.value?.trim()||'';
  const tagsRaw=$('wl-tags')?.value?.trim()||'';
  const tags=tagsRaw?tagsRaw.split(',').map(t=>t.trim().replace(/^#/,'').toLowerCase()).filter(Boolean):[];

  // Update existing or create new
  const existing=(window._wlCache||[]).find(l=>l.empUuid===emp._uuid&&l.date===date);
  const log={
    _uuid:existing?._uuid,
    empUuid:emp._uuid,
    empName:emp.name,
    empEmail:emp.email,
    date, mode, entries, summary, tags,
    adminComments:existing?.adminComments||[]
  };
  if(msg) msg.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">💾 Saving…</div>`;
  const r=await sbSaveWorkLog(log);
  if(!r){
    if(msg) msg.innerHTML=`<div class="alert alert-e">❌ Save failed. Make sure the work_logs table exists in Supabase.</div>`;
    return;
  }
  if(r&&r[0]) log._uuid=r[0].id;

  // Update cache
  if(!window._wlCache) window._wlCache=[];
  const idx=window._wlCache.findIndex(l=>l.empUuid===emp._uuid&&l.date===date);
  if(idx>=0) window._wlCache[idx]=log;
  else window._wlCache.unshift(log);

  if(msg) msg.innerHTML=`<div class="alert alert-s">✅ Work log saved for ${date}</div>`;
  showToast(`✅ Work log saved for ${date}`,'success');
}

async function deleteMyWorkLog(uuid){
  if(!confirm('Delete this work log? This cannot be undone.')) return;
  const ok=await sbDeleteWorkLog(uuid);
  if(!ok){ showToast('❌ Delete failed','info'); return; }
  window._wlCache=(window._wlCache||[]).filter(l=>l._uuid!==uuid);
  showToast('🗑 Work log deleted','success');
  navEmp('emp-worklog');
}

async function reloadMyWorkLogs(){
  const emp=currentEmployee;
  window._wlCache=await sbLoadWorkLogs({empUuid:emp._uuid});
  navEmp('emp-worklog');
}

async function addWorkLogComment(uuid){
  const text=$('wl-new-comment')?.value?.trim();
  if(!text) return;
  const log=(window._wlAllCache||[]).find(x=>x._uuid===uuid);
  if(!log) return;
  const newComment={
    author:D.user?.name||'Admin',
    text,
    at:new Date().toISOString()
  };
  log.adminComments=[...(log.adminComments||[]),newComment];
  // Save to Supabase (just update the admin_comments field)
  try{
    const res=await fetch(`${SB_URL}/rest/v1/work_logs?id=eq.${uuid}`,{
      method:'PATCH',
      headers:{...SB_HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({admin_comments:log.adminComments, updated_at:new Date().toISOString()})
    });
    if(!res.ok){
      showToast('❌ Failed to post comment','info');
      return;
    }
  }catch(e){
    console.error('Comment save error:',e);

    return;
  }
  // Notify the employee
  if(log.empEmail){
    await sbSaveNotification({

  viewWorkLogDetail(uuid);
}

function exportWorkLogsCSV(range){
  const logs=window._wlAllCache||[];
  if(!logs.length){ showToast('No logs to export','info'); return; }

  let filtered=logs;
  const today=new Date();
  if(range==='week'){
    const weekStart=new Date(); weekStart.setDate(weekStart.getDate()-6);
    filtered=logs.filter(l=>new Date(l.date)>=weekStart);
  } else if(range==='month'){
    const monthStart=new Date(today.getFullYear(),today.getMonth(),1);
    filtered=logs.filter(l=>new Date(l.date)>=monthStart);
  }

  if(!filtered.length){ showToast('No logs in this range','info'); return; }

  const esc=s=>`"${String(s||'').replace(/"/g,'""')}"`;
  const hdr=['Employee','Email','Date','Style','Hours','Entries','Summary','Tags','Comments','Created'];
  const lines=[hdr.join(',')];

  filtered.forEach(l=>{
    const entriesText=l.mode==='daily'?(l.entries[0]?.work||''):
      (l.entries||[]).map(e=>{
        if(l.mode==='hourly') return `[${e.from||'?'}→${e.to||'?'}] ${e.work||''}`;
        if(l.mode==='session') return `[${e.session||'?'}] ${e.work||''}`;
        return e.work||'';
      }).join(' | ');
    const commentsText=(l.adminComments||[]).map(c=>`${c.author}: ${c.text}`).join(' | ');
    lines.push([
      esc(l.empName),
      esc(l.empEmail),
      l.date,
      l.mode,
      (parseFloat(l.totalHours)||0).toFixed(1),
      esc(entriesText),
      esc(l.summary),
      esc((l.tags||[]).map(t=>'#'+t).join(', ')),
      esc(commentsText),
      esc(l.createdAt||'')
    ].join(','));
  });

  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const rangeLabel=range==='week'?'ThisWeek':range==='month'?'ThisMonth':'All';
  a.href=url;
  a.download=`WorkLogs_${rangeLabel}_${todayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✅ Exported ${filtered.length} logs`,'success');
}

function exportProductivityCSV(){
  const logs=window._wlAllCache||[];
  const weekStart=new Date(); weekStart.setDate(weekStart.getDate()-6);
  const weekLogs=logs.filter(l=>new Date(l.date)>=weekStart);

  const emps=D.employees.filter(e=>e.status==='Active');
  if(!emps.length){ showToast('No active employees','info'); return; }

  const esc=s=>`"${String(s||'').replace(/"/g,'""')}"`;
  const hdr=['Employee','Department','Email','Logs This Week','Hours Logged','Expected Hours','Productivity %','Avg Hours/Log','Last Logged'];
  const lines=[hdr.join(',')];

  emps.forEach(e=>{
    const myLogs=weekLogs.filter(l=>l.empName===e.name||l.empUuid===e._uuid);
    const myHours=myLogs.reduce((s,l)=>s+(parseFloat(l.totalHours)||0),0);
    const expected=45; // 5 days × 9 hours
    const productivity=expected>0?Math.round((myHours/expected)*100):0;
    const avgPerLog=myLogs.length>0?(myHours/myLogs.length).toFixed(1):'0';
    const lastLog=myLogs.length>0?myLogs.sort((a,b)=>b.date.localeCompare(a.date))[0].date:'—';
    lines.push([
      esc(e.name),
      esc(e.dept||''),
      esc(e.email||''),
      myLogs.length,
      myHours.toFixed(1),
      expected,
      productivity+'%',
      avgPerLog,
      lastLog
    ].join(','));
  });

  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`ProductivityReport_${todayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✅ Productivity report: ${emps.length} employees`,'success');
}

function setKYCFilter(f){ window._kycFilter=f; nav('kycrequests'); }

// Reveal masked values in a single KYC row (scoped to that card)
function revealKYCRow(btn){
  const card=btn.closest('.card');
  if(!card) return;
  const revealed=btn.getAttribute('data-revealed')==='1';
  const oldEl=card.querySelector('.kyc-masked-old');
  const newEl=card.querySelector('.kyc-masked-new');
  if(oldEl) oldEl.textContent = revealed ? oldEl.getAttribute('data-masked') : (oldEl.getAttribute('data-full')||'—');
  if(newEl) newEl.textContent = revealed ? newEl.getAttribute('data-masked') : newEl.getAttribute('data-full');
  btn.setAttribute('data-revealed', revealed?'0':'1');
  btn.textContent = revealed ? '👁 Reveal full numbers' : '🔒 Hide';
}

async function approveKYCRequest(uuid, empName, field){
  if(!confirm(`Approve ${field.toUpperCase()} update for ${empName}?\n\nThis will update their employee record immediately.`)) return;
  const req=(D.changeRequests||[]).find(r=>r._uuid===uuid);
  if(!req){showToast('Request not found','info');return;}

  showSyncBanner('Applying change…');

  // Final duplicate check in case another employee took that number
  const column=field==='aadhaar'?'aadhaar_number':'pan_number';
  const dup=await sb('employees','GET',null,`?${column}=eq.${encodeURIComponent(req.newValue)}&id=neq.${req.empUuid}&select=id,name`);
  if(dup&&dup.length){
    hideSyncBanner();
    showToast(`❌ Another employee (${dup[0].name}) already has this ${field.toUpperCase()}. Cannot approve.`,'info');
    return;
  }

  // Apply to employee record
  const empPayload={};
  empPayload[column]=req.newValue;
  const er=await sb('employees','PATCH',empPayload,`?id=eq.${req.empUuid}`);
  if(!er){hideSyncBanner();showToast('Failed to update employee','info');return;}

  // Mark request approved
  await sb('change_requests','PATCH',{
    status:'Approved',
    reviewed_by:D.user.email,
    reviewed_at:new Date().toISOString()
  },`?id=eq.${uuid}`);

  // Notify the employee
  await sbSaveNotification({msg:`✅ Your ${field.toUpperCase()} update has been approved by admin`,type:'success'});

  // Refresh in memory
  await syncChangeRequests();
  await syncFromSupabase();
  hideSyncBanner();
  showToast(`✅ ${field.toUpperCase()} updated for ${empName}`,'success');
  nav('kycrequests');
}

async function rejectKYCRequest(uuid, empName){
  const note=prompt(`Reject request from ${empName}?\n\nOptional: add a note explaining why (visible to the employee):`, '');
  if(note===null) return; // User cancelled

  showSyncBanner('Rejecting…');
  await sb('change_requests','PATCH',{
    status:'Rejected',
    reviewer_note:note||null,
    reviewed_by:D.user.email,
    reviewed_at:new Date().toISOString()
  },`?id=eq.${uuid}`);

  await sbSaveNotification({msg:`❌ Your KYC update request was rejected${note?': '+note:''}`,type:'warning'});

  await syncChangeRequests();
  hideSyncBanner();
  showToast(`Request rejected`,'info');
  nav('kycrequests');
}

async function saveCompany(editId){
  const name=($('co-name')||{}).value?.trim();
  const cid=($('co-id')||{}).value?.trim().toUpperCase().replace(/\s/g,'');
  const email=($('co-admin-email')||{}).value?.trim();
  const pw=($('co-admin-pw')||{}).value?.trim();
  const status=($('co-status')||{}).value||'Active';
  const err=$('co-modal-err');
  if(!name||!email||!pw){if(err)err.innerHTML=`<div class="alert alert-e">Please fill all required fields</div>`;return;}
  if(!editId&&!cid){if(err)err.innerHTML=`<div class="alert alert-e">Company ID is required</div>`;return;}
  showSyncBanner('Saving company…');
  let result;
  if(editId){
    result=await sb('companies','PATCH',{name,admin_email:email,admin_password:pw,status},`?company_id=eq.${editId}`);
  } else {
    result=await sb('companies','POST',{company_id:cid,name,admin_email:email,admin_password:pw,status});
  }
  hideSyncBanner();
  if(!result){if(err)err.innerHTML=`<div class="alert alert-e">Failed to save. Email or Company ID may already exist.</div>`;return;}
  await syncFromSupabase();
  closeModal('company-modal-wrap');
  nav('companies');
  alert(`✅ Company "${name}" ${editId?'updated':'added'}!\n\nLogin details:\nURL: kspl.vercel.app\nTab: 🏢 Company\nEmail: ${email}\nPassword: ${pw}`);
}

async function toggleCompanyStatus(cid,currentStatus){
  const newStatus=currentStatus==='Active'?'Inactive':'Active';
  if(!confirm(`${newStatus==='Inactive'?'Suspend':'Activate'} this company?`))return;
  await sb('companies','PATCH',{status:newStatus},`?company_id=eq.${cid}`);
  await syncFromSupabase();nav('companies');
}

async function deleteCompany(cid){
  const co=(D.companies||[]).find(c=>c.company_id===cid);
  if(!confirm(`Delete "${co?.name}"? Their employees stay in the database but they cannot log in.`))return;
  await sb('companies','DELETE',null,`?company_id=eq.${cid}`);
  await syncFromSupabase();nav('companies');
}
