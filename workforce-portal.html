async function submitKYC(){
  const emp=currentEmployee;
  const err=$('kyc-err');
  const aadhaar=($('kyc-aadhaar')||{}).value?.replace(/\s/g,'')||'';
  const pan=($('kyc-pan')||{}).value?.trim()||'';
  const dob=($('kyc-dob')||{}).value||'';
  const address=($('kyc-address')||{}).value?.trim()||'';
  const bankAccount=($('kyc-bank-account')||{}).value?.trim()||'';
  const bankIfsc=($('kyc-bank-ifsc')||{}).value?.trim()||'';
  const bankName=($('kyc-bank-name')||{}).value?.trim()||'';
  const emName=($('kyc-em-name')||{}).value?.trim()||'';
  const emPhone=($('kyc-em-phone')||{}).value?.trim()||'';
  const emRelation=($('kyc-em-relation')||{}).value||'';

  // Validation
  if(!aadhaar||!pan||!dob||!address||!bankAccount||!bankIfsc||!bankName||!emName||!emPhone||!emRelation){
    if(err)err.innerHTML=`<div class="alert alert-e">Please fill in all mandatory fields</div>`;return;
  }
  if(!/^\d{12}$/.test(aadhaar)){
    if(err)err.innerHTML=`<div class="alert alert-e">Aadhaar must be exactly 12 digits</div>`;return;
  }
  if(!/^[A-Z]{5}[0-9]{4}[A-Z]$/.test(pan)){
    if(err)err.innerHTML=`<div class="alert alert-e">PAN format invalid (should be like ABCDE1234F)</div>`;return;
  }
  if(!/^[A-Z]{4}0[A-Z0-9]{6}$/.test(bankIfsc)){
    if(err)err.innerHTML=`<div class="alert alert-e">IFSC format invalid (11 chars, e.g. SBIN0001234)</div>`;return;
  }
  if(!/^\d{10}$/.test(emPhone)){
    if(err)err.innerHTML=`<div class="alert alert-e">Emergency contact phone must be 10 digits</div>`;return;
  }
  // Duplicate Aadhaar check
  const dupAadhaar=await sb('employees','GET',null,`?aadhaar_number=eq.${aadhaar}&select=id,name${emp._uuid?`&id=neq.${emp._uuid}`:''}`);
  if(dupAadhaar&&dupAadhaar.length){
    if(err)err.innerHTML=`<div class="alert alert-e">This Aadhaar is already registered to another employee. Contact admin if this is an error.</div>`;return;
  }
  const dupPan=await sb('employees','GET',null,`?pan_number=eq.${pan}&select=id,name${emp._uuid?`&id=neq.${emp._uuid}`:''}`);
  if(dupPan&&dupPan.length){
    if(err)err.innerHTML=`<div class="alert alert-e">This PAN is already registered to another employee. Contact admin if this is an error.</div>`;return;
  }

  if(err)err.innerHTML=`<div class="alert alert-e" style="color:#0f766e;background:#f0fdf4;border-color:#bbf7d0">Saving your details…</div>`;

  const payload={
    aadhaar_number:aadhaar, pan_number:pan, dob,
    address, bank_account:bankAccount, bank_ifsc:bankIfsc, bank_name:bankName,
    emergency_contact_name:emName, emergency_contact_phone:emPhone, emergency_contact_relation:emRelation,
    kyc_completed:true, kyc_completed_at:new Date().toISOString()
  };
  // Use return=representation so we get the updated row back and can verify kyc_completed was actually set
  let saved=null;
  try{
    const res = await fetch(`${SB_URL}/rest/v1/employees?id=eq.${emp._uuid}`,{
      method:'PATCH',
      headers:{...SB_HDR, 'Prefer':'return=representation'},
      body:JSON.stringify(payload)
    });
    if(res.ok){
      const rows = await res.json();
      saved = rows && rows[0] ? rows[0] : null;
    } else {
      const errText = await res.text();
      console.error('❌ KYC save failed:', res.status, errText);
    }
  }catch(e){ console.error('❌ KYC save error:', e); }

  if(!saved){
    if(err)err.innerHTML=`<div class="alert alert-e">Failed to save. If this persists, your database may be missing KYC columns. Ask admin to run the KYC migration SQL.</div>`;
    return;
  }

  // Verify the kyc_completed flag was actually persisted (column exists)
  if(saved.kyc_completed !== true){
    if(err)err.innerHTML=`<div class="alert alert-e">KYC completion flag wasn't saved by the database. The <code>kyc_completed</code> column may be missing. Ask admin to run the KYC migration SQL.</div>`;
    console.error('❌ kyc_completed returned as:', saved.kyc_completed, '— column likely missing or had a failed constraint');
    return;
  }

  // Update local with what the server confirmed
  Object.assign(emp,{
    aadhaar, pan, dob, address,
    bankAccount, bankIfsc, bankName,
    emergencyName:emName, emergencyPhone:emPhone, emergencyRelation:emRelation,
    kycCompleted:true, kycCompletedAt:saved.kyc_completed_at
  });
  const idx=D.employees.findIndex(e=>e._uuid===emp._uuid);
  if(idx>=0) D.employees[idx]=emp;
  save();

  // Notify admin(s)
  await sbSaveNotification({msg:`🪪 ${emp.name} has completed KYC details`,type:'success'});

  showToast('✅ KYC completed. Welcome to the portal!', 'success');
  renderEmployeeApp();
}

async function regStep1Next(){

  const dup=D.employees.find(e=>e.email.toLowerCase()===email);

  regData={name,dob,phone,email};

  $('reg-step-1').classList.add('hidden');
  $('reg-step-otp').classList.remove('hidden');
  if($('reg-otp-email-display'))$('reg-otp-email-display').textContent=email;
  startOTPTimer('reg-otp-timer');
}

function startOTPTimer(timerId){
  if(_otpTimerInterval) clearInterval(_otpTimerInterval);
  let secs=600;
  const el=$(timerId);
  function tick(){
    if(!el){clearInterval(_otpTimerInterval);return;}
    const m=Math.floor(secs/60),s=secs%60;
    el.textContent=`OTP expires in ${m}:${String(s).padStart(2,'0')}`;
    if(secs<=0){clearInterval(_otpTimerInterval);el.textContent='OTP expired. Please resend.';}
    secs--;
  }
  tick();
  _otpTimerInterval=setInterval(tick,1000);
}

  $('reg-step-otp').classList.add('hidden');
  $('reg-step-1').classList.remove('hidden');
  if(_otpTimerInterval){clearInterval(_otpTimerInterval);_otpTimerInterval=null;}
}

  const res=await sbSaveEmployee(emp);

  // Extract UUID from any response shape
  if(res){
    if(Array.isArray(res)&&res[0]&&res[0].id) emp._uuid=res[0].id;
    else if(res.id) emp._uuid=res.id;
  }

  // Even if UUID extraction failed, try fetching from Supabase to confirm
  if(!emp._uuid){
    const saved=await sb('employees','GET',null,`?email=eq.${encodeURIComponent(emp.email)}&select=id`);
    if(saved&&saved.length>0) emp._uuid=saved[0].id;
  }

  if(!emp._uuid){
    hideSyncBanner();
    if($('reg-err-3'))$('reg-err-3').innerHTML=`<div class="alert alert-e">Registration failed. Please try again.</div>`;
    return;
  }

  // Update local cache
  const existingIdx=D.employees.findIndex(e=>e.email===emp.email);
  if(existingIdx>=0) D.employees[existingIdx]=emp;
  else D.employees.push(emp);

  const notif={msg:`New employee ${regData.name} self-registered (${dept})`,type:'info',read:false};
  D.notifications.unshift({id:Date.now(),...notif,time:'Just now'});
  sbSaveNotification(notif);

  // Set session
  currentRole='employee';
  currentEmployee=emp;
  D.loggedIn=true;
  empPage='emp-dashboard';

  const nearest=geoState.status==='ok'?getNearestOffice(geoState.lat,geoState.lng):null;
  const log={id:Date.now(),user:emp.name,email:emp.email,time:new Date().toLocaleString('en-IN'),lat:geoState.lat,lng:geoState.lng,accuracy:geoState.accuracy,address:geoState.address||geoState.city||'Unknown',geoStatus:geoState.status,inOffice:nearest?nearest.inZone:null,nearestOffice:nearest?nearest.name:null,method:'register'};
  if(!D.loginLogs)D.loginLogs=[];
  D.loginLogs.unshift(log);
  sbLoginLog(log);
  save();
  hideSyncBanner();
  renderEmployeeApp();
}

async function doChangePassword(){
  const oldPw = $('cp-old').value;
  const newPw = $('cp-new').value;
  const conf  = $('cp-confirm').value;
  const msg   = $('cp-msg');

  if(!oldPw || !newPw || !conf){
    if(msg) msg.innerHTML = '<div class="alert alert-e">All fields are required.</div>';
    return;
  }
  if(newPw.length < 6){
    if(msg) msg.innerHTML = '<div class="alert alert-e">New password must be at least 6 characters.</div>';
    return;
  }
  if(newPw !== conf){
    if(msg) msg.innerHTML = '<div class="alert alert-e">New passwords do not match.</div>';
    return;
  }
  if(newPw === oldPw){
    if(msg) msg.innerHTML = '<div class="alert alert-e">New password must be different from current.</div>';
    return;
  }

  if(msg) msg.innerHTML = '<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">🔄 Verifying…</div>';

  try{
    // Employee path
    if(currentRole === 'employee' && currentEmployee){
      if((currentEmployee.passwordHash||'') !== oldPw){
        if(msg) msg.innerHTML = '<div class="alert alert-e">❌ Current password is incorrect.</div>';
        return;
      }
      const res = await fetch(`${SB_URL}/rest/v1/employees?id=eq.${currentEmployee._uuid}`,{
        method:'PATCH',
        headers:{...SB_HDR,'Prefer':'return=representation'},
        body: JSON.stringify({ password_hash: newPw })
      });
      if(!res.ok) throw new Error(`DB error ${res.status}`);
      currentEmployee.passwordHash = newPw;
      const empRec = D.employees.find(e=>e._uuid===currentEmployee._uuid);
      if(empRec) empRec.passwordHash = newPw;
      save();
      await logAudit('password_change','employee',currentEmployee._uuid,currentEmployee.name,{self:true});
    }
    // Company admin path
    else if(currentRole === 'admin' && currentCompany){
      if(currentCompany.admin_password !== oldPw){
        if(msg) msg.innerHTML = '<div class="alert alert-e">❌ Current password is incorrect.</div>';
        return;
      }
      const res = await fetch(`${SB_URL}/rest/v1/companies?company_id=eq.${encodeURIComponent(currentCompany.company_id)}`,{
        method:'PATCH',
        headers:{...SB_HDR,'Prefer':'return=representation'},
        body: JSON.stringify({ admin_password: newPw })
      });
      if(!res.ok) throw new Error(`DB error ${res.status}`);
      currentCompany.admin_password = newPw;
      await logAudit('password_change','company',currentCompany.company_id,currentCompany.name,{self:true});
    }
    // Super admin path
    else if(currentRole === 'admin' && !currentCompany){
      if(D.superAdminPassword && D.superAdminPassword !== oldPw){
        if(msg) msg.innerHTML = '<div class="alert alert-e">❌ Current password is incorrect.</div>';
        return;
      }
      if(!D.superAdminPassword && oldPw !== 'Kreayotoo@123'){
        if(msg) msg.innerHTML = '<div class="alert alert-e">❌ Current password is incorrect.</div>';
        return;
      }
      D.superAdminPassword = newPw;
      save();
      await logAudit('password_change','super_admin','claudekreayotoo@gmail.com','Super Admin',{self:true});
    }

    if(msg) msg.innerHTML = '<div class="alert alert-s">✅ Password updated successfully!</div>';
    setTimeout(closeChangePasswordModal, 1200);
    showToast('🔒 Password changed','success');
  }catch(e){
    console.error('Change password failed:',e);
    if(msg) msg.innerHTML = `<div class="alert alert-e">❌ Save failed: ${e.message}</div>`;
  }
}

async function logAudit(action, entityType, entityId, entityName, details){
  try{
    const actor = currentEmployee ? {email:currentEmployee.email,name:currentEmployee.name} :
                  currentCompany ? {email:currentCompany.admin_email,name:currentCompany.admin_name||currentCompany.name} :
                  {email:'claudekreayotoo@gmail.com',name:'Super Admin'};
    const cid = currentCompany ? currentCompany.company_id : (currentEmployee?.companyId || 'KSPL');
    const payload = {
      actor_email: actor.email || 'unknown',
      actor_name: actor.name || 'Unknown',
      action: action,
      entity_type: entityType || null,
      entity_id: (entityId||'').toString(),
      entity_name: entityName || null,
      details: details || {},
      company_id: cid
    };
    await fetch(`${SB_URL}/rest/v1/audit_log`,{
      method:'POST',
      headers:SB_HDR,
      body:JSON.stringify(payload)
    });
  }catch(e){
    console.warn('Audit log failed (non-fatal):',e);
  }
}

async function loadAuditLog(limit=200){
  try{
    const cid = currentCompany ? currentCompany.company_id : null;
    const q = cid
      ? `?company_id=eq.${encodeURIComponent(cid)}&order=created_at.desc&limit=${limit}`
      : `?order=created_at.desc&limit=${limit}`;
    const rows = await sb('audit_log','GET',null,q);
    return rows || [];
  }catch(e){
    console.warn('Load audit failed:',e);
    return [];
  }
}

function filterAuditLog(){
  const q=($('audit-search').value||'').toLowerCase();
  document.querySelectorAll('.audit-row').forEach(row=>{
    const s = row.getAttribute('data-search');
    row.style.display = (!q || s.includes(q)) ? 'flex' : 'none';
  });
}

function downloadAuditCSV(){
  const rows = window._auditRows || [];
  if(rows.length===0){ showToast('No audit entries to export','info'); return; }
  let csv='Date,Actor Name,Actor Email,Action,Entity Type,Entity Name,Details\n';
  rows.forEach(r=>{
    const safe=(s)=>'"'+(s||'').toString().replace(/"/g,'""')+'"';
    csv+=`${r.created_at},${safe(r.actor_name)},${safe(r.actor_email)},${safe(r.action)},${safe(r.entity_type)},${safe(r.entity_name)},${safe(JSON.stringify(r.details||{}))}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`audit_log_${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('⬇ Audit log exported','success');
}

async function downloadFullBackup(){

    const cid = currentCompany ? currentCompany.company_id : null;
    const filter = cid ? `?company_id=eq.${encodeURIComponent(cid)}` : '';
    const [employees, teams, leaves, attendance, workLogs, holidays, notifications, audit] = await Promise.all([
      sb('employees','GET',null,filter+'&select=*'),
      sb('teams','GET',null,filter+'&select=*'),

      sb('attendance','GET',null,filter+'&select=*'),
      sb('work_logs','GET',null,filter+'&select=*'),
      sb('holidays','GET',null,filter+'&select=*'),
      sb('notifications','GET',null,filter+'&select=*'),
      loadAuditLog(500)
    ]);

    const backup = {
      _meta: {
        exported_at: new Date().toISOString(),
        exported_by: currentCompany?.admin_email || D.user.email || 'super-admin',
        company: currentCompany?.name || 'All companies (super admin)',

      },

      notifications: notifications || [],
      audit_log: audit || [],
      settings: D.settings || {},
      office_locations: D.officeLocations || []
    };

    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;

    a.download = `kreayotoo_backup_${tag}_${todayStr()}.json`;

    showToast(`💾 Backup downloaded (${backup.employees.length} employees, ${backup.leaves.length} leaves)`, 'success');

function empDashboard(){
  const emp=currentEmployee;
  if(!emp){ return `<div style="padding:2rem;text-align:center;color:var(--muted)"><h3>Loading…</h3><p>Employee data not available yet.</p><button class="btn btn-primary" onclick="location.reload()">Refresh</button></div>`; }
  const today=todayStr();

  // Load team summaries once per session
  if(emp.teamId && !window._teamSummariesLoaded){
    window._teamSummariesLoaded=true;
    loadTeamSummariesForMyTeam().then(()=>{if(empPage==='emp-dashboard')navEmp('emp-dashboard');});
  }

  // ── TODAY'S ATTENDANCE STATUS ──
  // Check sessions (new source) first, then legacy attendance grid as fallback
  const mySessions=(D.attSessions||[]).filter(s=>s.empName===emp.name||s.empId===emp._uuid);
  const todaySessions=mySessions.filter(s=>s.date===today);
  const activeToday=todaySessions.find(s=>!s.checkOut);
  const completedToday=todaySessions.filter(s=>s.checkOut);
  const legacyAtt=(D.attendance||[]).find(a=>(a.empName===emp.name||a.empId===emp._uuid||a.empId===emp.id)&&a.date===today);

  // Determine Today's status
  let todayStatus, todaySub;
  if(activeToday){
    todayStatus='Present'; // Currently checked in
    todaySub=`In: ${new Date(activeToday.checkIn).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
  } else if(completedToday.length>0){
    todayStatus='Present'; // Checked in & out
    const earliest=completedToday.reduce((a,b)=>new Date(a.checkIn)<new Date(b.checkIn)?a:b);
    todaySub=`In: ${new Date(earliest.checkIn).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
  } else if(legacyAtt){
    todayStatus=legacyAtt.status;
    todaySub=`In: ${legacyAtt.in||'--'}`;
  } else {
    todayStatus='Not marked';
    todaySub='Mark attendance below';
  }

  // ── DAYS PRESENT THIS MONTH ──
  // Union of unique dates from sessions AND legacy attendance
  const ym=currentMonth();
  const presentDates=new Set();
  mySessions.filter(s=>s.date&&s.date.startsWith(ym)).forEach(s=>presentDates.add(s.date));
  (D.attendance||[])
    .filter(a=>(a.empName===emp.name||a.empId===emp._uuid||a.empId===emp.id)&&a.date&&a.date.startsWith(ym)&&a.status==='Present')
    .forEach(a=>presentDates.add(a.date));
  const present=presentDates.size;

  const myLeaves=(D.leaves||[]).filter(l=>l.emp===emp.name);
  const approved=myLeaves.filter(l=>l.status==='Approved').reduce((s,l)=>s+(l.days||0),0);
  const slip=calcPayslip(emp, currentMonth());
  const net=slip?slip.netPay:0;

  // Build unified recent attendance list from sessions + legacy, dedupe by date, newest first
  const attByDate={};
  mySessions.forEach(s=>{
    if(!s.date) return;
    if(!attByDate[s.date]){
      attByDate[s.date]={
        date:s.date,
        in:s.checkIn?new Date(s.checkIn).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'--',
        out:s.checkOut?new Date(s.checkOut).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'--',
        status:'Present'
      };
    } else if(s.checkOut && attByDate[s.date].out==='--'){
      attByDate[s.date].out=new Date(s.checkOut).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    }
  });
  (D.attendance||[])
    .filter(a=>a.empName===emp.name||a.empId===emp._uuid||a.empId===emp.id)
    .forEach(a=>{
      if(!attByDate[a.date]){
        attByDate[a.date]={date:a.date,in:a.in||'--',out:a.out||'--',status:a.status||'Present'};
      }
    });
  const myAtt=Object.values(attByDate).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  // Profile completion calc: 5 required fields
  const profileFields=[
    {key:'name', label:'Name', filled:!!emp.name&&emp.name.trim().length>0},
    {key:'phone', label:'Phone', filled:!!emp.phone&&emp.phone.trim().length>=10},
    {key:'dob', label:'Date of birth', filled:!!emp.dob},
    {key:'bloodGroup', label:'Blood group', filled:!!emp.bloodGroup},
    {key:'address', label:'Address', filled:!!emp.address&&emp.address.trim().length>3}
  ];
  const filledCount=profileFields.filter(f=>f.filled).length;
  const totalCount=profileFields.length;
  const pct=Math.round((filledCount/totalCount)*100);
  const missing=profileFields.filter(f=>!f.filled);

  return `
  <div class="page-hd">
    <div><div class="pg-title"><span class="live-greeting">${greetingForTime()}, ${emp.name||'there'}</span>! 👋</div><div class="pg-sub">${dateLabel()} · 🕐 <span class="live-clock">${timeLabel()}</span> · ${emp.role||'Employee'} · ${emp.dept||'—'}</div></div>
  </div>

  ${pct<100?`
  <!-- Profile completion nudge -->
  <div style="background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #fbbf24;border-radius:12px;padding:16px 20px;margin-bottom:1rem;display:flex;align-items:center;gap:16px">
    <!-- Circular progress ring -->
    <div style="position:relative;width:72px;height:72px;flex-shrink:0">
      <svg viewBox="0 0 72 72" style="transform:rotate(-90deg);width:72px;height:72px">
        <circle cx="36" cy="36" r="30" stroke="#fff" stroke-width="7" fill="none" opacity=".5"/>
        <circle cx="36" cy="36" r="30" stroke="#d97706" stroke-width="7" fill="none"
          stroke-dasharray="${2*Math.PI*30}"
          stroke-dashoffset="${2*Math.PI*30*(1-pct/100)}"
          stroke-linecap="round"
          style="transition:stroke-dashoffset .6s"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#92400e">${pct}%</div>
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-size:15px;font-weight:700;color:#92400e;margin-bottom:2px">📝 Complete your profile</div>
      <div style="font-size:13px;color:#78350f;margin-bottom:6px">${filledCount} of ${totalCount} fields filled. Please add: <strong>${missing.map(m=>m.label).join(', ')}</strong></div>
      <button onclick="navEmp('emp-profile')" style="background:#d97706;color:#fff;border:none;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">Complete now →</button>
    </div>
  </div>
  `:''}

  <div class="stat-grid">
    <div class="stat"><div class="stat-lbl">Days present</div><div class="stat-val">${present}</div><div class="stat-sub">This month</div></div>
    <div class="stat"><div class="stat-lbl">Leave taken</div><div class="stat-val">${approved}</div><div class="stat-sub">Days this year</div></div>
    <div class="stat"><div class="stat-lbl">Net salary</div><div class="stat-val">₹${fmt(net)}</div><div class="stat-sub">This month</div></div>
    <div class="stat"><div class="stat-lbl">Today</div><div class="stat-val" style="font-size:14px">${todayStatus}</div><div class="stat-sub">${todaySub}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
    <div class="card">
      <div class="card-hd"><h3>Quick actions</h3></div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${activeToday
          ? `<button class="btn btn-primary" style="background:#dc2626" onclick="navEmp('emp-attendance')">🔴 Check out now (active since ${new Date(activeToday.checkIn).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})})</button>`
          : `<button class="btn btn-primary" style="background:#0f766e" onclick="navEmp('emp-attendance')">📅 ${completedToday.length>0?`Check in again (${completedToday.length} session${completedToday.length===1?'':'s'} done today)`:`Mark today's attendance`}</button>`}
        <button class="btn btn-primary" style="background:#0f766e" onclick="navEmp('emp-leave')">🏖 Apply for leave</button>
        <button class="btn btn-primary" style="background:#0f766e" onclick="navEmp('emp-payslip')">💰 View payslip</button>
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><h3>My info</h3></div>
      <div style="display:flex;flex-direction:column;gap:6px;font-size:13px">
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Employee ID</span><span style="font-weight:600">${emp.id}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Department</span><span>${emp.dept}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Role</span><span>${emp.role}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Joined</span><span>${emp.joined}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Status</span><span>${badge(emp.status)}</span></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-hd"><h3>Recent attendance</h3></div>
    ${myAtt.length===0?'<div style="text-align:center;color:var(--muted);padding:1rem">No attendance records yet</div>':
    `<table><thead><tr><th style="width:25%">Date</th><th style="width:20%">In</th><th style="width:20%">Out</th><th style="width:20%">Status</th></tr></thead>
    <tbody>${myAtt.slice(0,7).map(a=>`<tr><td>${a.date}</td><td>${a.in||'--'}</td><td>${a.out||'--'}</td><td>${badge(a.status)}</td></tr>`).join('')}</tbody></table>`}
  </div>

  ${renderExecutiveWidget(emp)}
  ${renderMyTeamWidget(emp)}
  `;
}

// Load team's data for executive view
async function loadExecTeamData(teamUuid){
  const team = D.teams.find(t=>t._uuid===teamUuid);
  if(!team) return;
  const members = D.employees.filter(e=>e.teamId===teamUuid);
  if(members.length===0){ window._execTeamLogs=[]; return; }
  showSyncBanner('Loading team logs…');
  const allLogs=[];
  for(const m of members){
    const logs = await sbLoadWorkLogs({empUuid:m._uuid});
    allLogs.push(...logs);
  }
  window._execTeamLogs = allLogs;
  hideSyncBanner();
}

// Post a reply on a work log
async function postReply(logUuid){
  const input = $('reply-in-'+logUuid);
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;

  const emp = currentEmployee;
  // Fetch fresh version of log from Supabase to avoid stale adminComments
  try{
    const rows = await sb('work_logs','GET',null,`?id=eq.${logUuid}&select=*`);
    if(!rows || !rows[0]){ showToast('Log not found','info'); return; }
    const log = rows[0];
    const existingComments = log.admin_comments || [];
    const newReply = {
      author_name: emp.name,
      author_email: emp.email,
      role: emp.isExecutive ? 'executive' : 'employee',
      text: text,
      at: new Date().toISOString()
    };
    const updatedComments = [...existingComments, newReply];

    const res = await fetch(`${SB_URL}/rest/v1/work_logs?id=eq.${logUuid}`,{
      method:'PATCH',
      headers:SB_HDR,
      body:JSON.stringify({admin_comments:updatedComments})
    });
    if(!res.ok){ showToast('Reply failed to save','error'); return; }

    // Notify the work log author (if not the replier)
    if(log.emp_email && log.emp_email !== emp.email){
      await sbSaveNotification({
        msg: `💬 ${emp.name}${emp.isExecutive?' ('+(emp.executiveTitle||'Executive')+')':''} replied on your work log (${log.log_date}): "${text.slice(0,80)}${text.length>80?'…':''}"`,
        type: 'info',
        to: log.emp_email
      });
    }

    // Update local cache for exec view
    if(window._execTeamLogs){
      const cached = window._execTeamLogs.find(x=>x._uuid===logUuid);
      if(cached) cached.adminComments = updatedComments;
    }
    if(window._wlCache){
      const cached = window._wlCache.find(x=>x._uuid===logUuid);
      if(cached) cached.adminComments = updatedComments;
    }

    input.value = '';
    showToast('💬 Reply posted','success');
    await logAudit('reply','work_log',logUuid,log.emp_name,{text:text.slice(0,100)});

    // Re-render current view
    renderEmployeeApp();
  }catch(e){
    console.error('Post reply failed:',e);
    showToast('Failed: '+e.message,'error');
  }
}

let _attGeoState={status:'idle',lat:null,lng:null,address:null};

function initAttGeo(callback){
  if(!navigator.geolocation){_attGeoState={status:'error'};if(callback)callback();return;}
  const el=$('att-location-status');
  if(el)el.textContent='📍 Getting your location…';
  navigator.geolocation.getCurrentPosition(
    pos=>{
      _attGeoState={status:'ok',lat:pos.coords.latitude,lng:pos.coords.longitude};
      getLocationName(pos.coords.latitude,pos.coords.longitude).then(name=>{
        _attGeoState.address=name;
        const el=$('att-location-status');
        if(el)el.textContent=`📍 ${name}`;
        if(callback)callback();
      }).catch(()=>{
        _attGeoState.address='Location detected';
        const el=$('att-location-status');
        if(el)el.textContent='📍 Location detected';
        if(callback)callback();
      });
    },
    ()=>{_attGeoState={status:'error'};const el=$('att-location-status');if(el)el.textContent='📍 Location unavailable';if(callback)callback();},
    {timeout:8000,enableHighAccuracy:true}
  );
}

function startModalEnroll(){
  const s=$('att-modal-status');
  if(s){s.textContent='Position your face in the frame';s.style.color='var(--muted)';}
  let _samples=[];
  let _enrolled=false;
  let _lastSampleTime=0;
  const SAMPLE_COUNT=3;
  const SAMPLE_INTERVAL_MS=800;

  frStartCamera('att-modal-video','att-modal-canvas',async result=>{
    const s=$('att-modal-status');
    if(!s||_enrolled) return;
    if(result.type==='cam-error'){s.textContent=result.msg;s.style.color='#ef4444';}
    else if(result.type==='no-face'){s.textContent=`No face detected — look at camera (${_samples.length}/${SAMPLE_COUNT} samples)`;s.style.color='var(--muted)';}
    else if(result.type==='detected'){
      const now=Date.now();
      // Throttle samples to avoid grabbing too many at once
      if(now - _lastSampleTime < SAMPLE_INTERVAL_MS) return;
      _lastSampleTime=now;

      _samples.push(result.descriptor);
      s.textContent=`📸 Capturing... (${_samples.length}/${SAMPLE_COUNT}) — keep looking at camera`;
      s.style.color='#0f766e';

      if(_samples.length >= SAMPLE_COUNT){
        _enrolled=true;
        // Average the descriptors element-wise
        const avgDesc=new Float32Array(_samples[0].length);
        for(let i=0;i<avgDesc.length;i++){
          let sum=0;
          for(const sample of _samples) sum += sample[i];
          avgDesc[i] = sum / _samples.length;
        }
        s.textContent='✅ Face enrolled! Checking you in…';
        s.style.color='#166534';
        await frSaveFaceToSupabase(currentEmployee, avgDesc);
        setTimeout(async()=>{
          const photoDataUrl=captureModalPhoto();
          closeFaceModal();
          await doCheckInWithPhoto(photoDataUrl);
        },500);
      }
    }
  });
}

async function startModalScan(mode){
  const emp=currentEmployee;
  const s=$('att-modal-status');
  if(s){s.textContent='Loading your face data…';s.style.color='var(--muted)';}

  const faceData=await frLoadFaceFromSupabase(emp.email);
  if(!faceData){
    // Supabase has no face record — clear stale localStorage flag and route to enrollment
    try{
      const list=frGetEnrolled().filter(e=>e.email!==emp.email && e.name.toLowerCase()!==emp.name.toLowerCase());
      frSaveEnrolled(list);
    }catch(_){}
    if(mode==='checkout'){
      // Can't enroll mid-checkout — show clear message
      if(s){s.innerHTML='Face not enrolled on this device.<br><span style="font-size:11px;font-weight:400;color:var(--muted)">Please check in first to enroll your face.</span>';s.style.color='#ef4444';}
      return;
    }
    // Switch modal title and start enrollment flow seamlessly
    const titleEl=$('att-modal-title');
    if(titleEl) titleEl.textContent='📷 Enroll Your Face';
    if(s){s.textContent='First-time setup — let\'s enrol your face';s.style.color='var(--muted)';}
    setTimeout(()=>startModalEnroll(),300);
    return;
  }

  // Load all company faces for anti-impersonation cross-check
  let allFaces=[];
  try{ allFaces=await frLoadAllFacesInCompany(); }
  catch(e){ console.warn('Could not load company faces:',e); }

  let _scanned=false;
  let _failCount=0;
  let _consecutiveMatches=0; // require 2 in a row to accept
  const REQUIRED_CONSECUTIVE=2;
  frStartCamera('att-modal-video','att-modal-canvas',result=>{
    const s=$('att-modal-status');
    if(!s||_scanned) return;
    if(result.type==='cam-error'){s.textContent=result.msg;s.style.color='#ef4444';}
    else if(result.type==='no-face'){
      _consecutiveMatches=0;
      s.textContent='No face detected — look at camera';s.style.color='var(--muted)';
    }
    else if(result.type==='detected'){
      const verdict=frStrictMatch(result.descriptor, emp.email, faceData.descriptor, allFaces);
      if(verdict.match){
        _consecutiveMatches++;
        if(_consecutiveMatches < REQUIRED_CONSECUTIVE){
          s.textContent=`🔍 Verifying… (${_consecutiveMatches}/${REQUIRED_CONSECUTIVE})`;
          s.style.color='#0f766e';
          return;
        }
        // 2 in a row → accept
        _scanned=true;
        const photoDataUrl=captureModalPhoto();
        s.textContent=`✅ Verified! ${mode==='checkin'?'Checking in':'Checking out'}…`;
        s.style.color='#166534';
        setTimeout(async()=>{
          closeFaceModal();
          if(mode==='checkin') await doCheckInWithPhoto(photoDataUrl);
          else await doCheckOutWithPhoto(photoDataUrl);
        },500);
      } else {
        _consecutiveMatches=0; // reset streak on any miss
        _failCount++;
        let failMsg='';
        if(verdict.reason==='matches-other-closer' && verdict.closestOther){
          failMsg=`❌ Face does not match ${emp.name}. Try again.`;
          console.warn('Closer match to:', verdict.closestOther.name);
        } else if(verdict.reason==='too-far-from-self'){
          failMsg=`❌ Face does not match. Try again. (dist ${verdict.dist.toFixed(2)})`;
        } else {
          failMsg='❌ Face does not match. Try again.';
        }
        if(_failCount>=5){
          // After 5 failed attempts, offer re-enrollment
          _scanned=true; // stop scanning
          s.innerHTML=`❌ Face doesn't match (tried ${_failCount}x).<br><span style="font-size:11px;font-weight:400;color:var(--muted)">If this is you, your enrolment may need updating.</span>`;
          s.style.color='#ef4444';
          // Show re-enroll button (checkin only — checkout shouldn't re-enroll)
          const modal=$('att-face-modal');
          if(modal && !$('att-reenroll-btn')){
            const btnContainer=document.createElement('div');
            btnContainer.style.cssText='margin-top:12px;display:flex;gap:8px;width:100%;max-width:400px';
            const reenrollBtnHtml = mode==='checkin'
              ? `<button class="btn btn-primary" id="att-reenroll-btn" style="flex:1;background:#f59e0b;font-size:13px" onclick="reEnrollFace()">📷 Re-enroll face</button>`
              : '';
            btnContainer.innerHTML=`
              <button class="btn btn-sec" id="att-retry-btn" style="flex:1;font-size:13px" onclick="closeFaceModal();setTimeout(()=>${mode==='checkin'?'openCheckInModal':'openCheckOutModal'}(),200)">🔄 Try again</button>
              ${reenrollBtnHtml}`;
            const inner=modal.querySelector('div');
            if(inner) inner.appendChild(btnContainer);
          }
          frStopCamera();
        } else {
          s.textContent=`${failMsg} (${_failCount}/5)`;s.style.color='#ef4444';
          setTimeout(()=>{ if(!_scanned){const s=$('att-modal-status');if(s){s.textContent='Look at camera';s.style.color='var(--muted)';}}},1500);
        }
      }
    }
  });
}

async function reEnrollFace(){
  if(!confirm('Re-enroll your face? Your current saved face data will be replaced with a new one.')) return;
  closeFaceModal();
  // Clear old face from supabase by saving null descriptor
  const emp=currentEmployee;
  try{
    await sb('employees','PATCH',{face_descriptor:null},`?id=eq.${emp._uuid}`);
    // Clear local cache
    const list=frGetEnrolled().filter(e=>e.email!==emp.email);
    frSaveEnrolled(list);
    if(typeof frInvalidateFacesCache==='function') frInvalidateFacesCache();
    showToast('Old face data cleared. Please enroll again.','info');
    // Open the enrollment flow
    setTimeout(()=>openCheckInModal(),300);
  }catch(e){
    console.error('Re-enroll error:',e);
    showToast('Could not reset face data. Try again.','info');
  }
}

function captureModalPhoto(){
  const vid=$('att-modal-video');
  if(!vid) return '';
  const canvas=document.createElement('canvas');
  canvas.width=80; canvas.height=60;
  canvas.getContext('2d').drawImage(vid,0,0,80,60);
  return canvas.toDataURL('image/jpeg',0.5);
}

async function doCheckInWithPhoto(photoDataUrl){
  const emp=currentEmployee;

  // Block if already has an open session (no checkout yet)
  const stillOpen = D.attSessions?D.attSessions.find(s=>s.empName===emp.name&&s.date===today&&!s.checkOut):null;
  if(stillOpen){
    showToast('⚠️ Already checked in. Please check out first.','info');
    navEmp('emp-attendance');
    return;
  }
  await new Promise(resolve=>initAttGeo(resolve));
  const session={
    _localId:Date.now(),empName:emp.name,empId:emp._uuid||emp.id,date:today,
    checkIn:now.toISOString(),checkOut:null,
    location:_attGeoState.address||'',lat:_attGeoState.lat||null,lng:_attGeoState.lng||null,
    photo:photoDataUrl||null
  };

async function doCheckOutWithPhoto(photoDataUrl){
  const emp=currentEmployee;

  const openSessions = D.attSessions?D.attSessions.filter(s=>s.empName===emp.name&&s.date===today&&!s.checkOut):[];
  if(openSessions.length===0){ showToast('No active session','info'); return; }

    active.checkOutLat=coLat;
    active.checkOutLng=coLng;
    if(active._uuid){
      try{

          checkout_latitude:coLat,
          checkout_longitude:coLng,
          checkout_location:coAddr
        },`?id=eq.${active._uuid}`);
      }catch(err){console.warn('Failed to close session',active._uuid,err);}

  }
  // Update main attendance record
  const todaySessions=D.attSessions.filter(s=>s.empName===emp.name&&s.date===today);
  let totalMins=0;

      employee_id:emp._uuid||null,

  save();

async function faceCheckIn(timeStr, photo=''){
  const emp=currentEmployee;
  const now=new Date();
  const today=todayStr();

  // Get location
  await new Promise(resolve=>{
    if(_attGeoState.status==='ok'){resolve();return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{
        _attGeoState={status:'ok',lat:pos.coords.latitude,lng:pos.coords.longitude};
        getLocationName(pos.coords.latitude,pos.coords.longitude)
          .then(name=>{_attGeoState.address=name;resolve();})
          .catch(()=>resolve());
      },
      ()=>{_attGeoState={status:'error'};resolve();},
      {timeout:5000,enableHighAccuracy:true}
    );
  });

  const activeSession=D.attSessions?D.attSessions.find(s=>s.empName===emp.name&&s.date===today&&!s.checkOut):null;

  if(activeSession){
    // Check OUT
    activeSession.checkOut=now.toISOString();
    activeSession.checkOutPhoto=photo||'';
    activeSession.checkOutLocation=_attGeoState.address||'';
    activeSession.checkOutLat=_attGeoState.lat||null;
    activeSession.checkOutLng=_attGeoState.lng||null;
    if(activeSession._uuid) await sb('attendance_sessions','PATCH',{
      check_out:activeSession.checkOut,
      checkout_latitude:activeSession.checkOutLat,
      checkout_longitude:activeSession.checkOutLng,
      checkout_location:activeSession.checkOutLocation
    },`?id=eq.${activeSession._uuid}`);

    // Update main attendance record
    const todaySessions=D.attSessions.filter(s=>s.empName===emp.name&&s.date===today);
    let totalMins=0;
    todaySessions.forEach(s=>{if(s.checkIn&&s.checkOut)totalMins+=(new Date(s.checkOut)-new Date(s.checkIn))/60000;});
    const status=totalMins>=240?'Present':totalMins>=120?'Half Day':'Present';
    const firstSession=todaySessions[todaySessions.length-1];
    const existing=await sb('attendance','GET',null,`?employee_name=eq.${encodeURIComponent(emp.name)}&date=eq.${today}&select=id`);
    const attPayload={employee_id:emp._uuid||null,employee_name:emp.name,date:today,status,in_time:new Date(firstSession.checkIn).toTimeString().slice(0,5),out_time:now.toTimeString().slice(0,5),company_id:currentCompany?currentCompany.company_id:'KSPL'};
    if(existing&&existing.length>0) await sb('attendance','PATCH',attPayload,`?id=eq.${existing[0].id}`);
    else await sb('attendance','POST',attPayload);

    save();
    showToast(`✅ Checked OUT at ${timeStr}`, 'success');
  } else {
    // Check IN — save with photo
    const session={
      _localId:Date.now(),empName:emp.name,empId:emp._uuid||emp.id,date:today,
      checkIn:now.toISOString(),checkOut:null,
      location:_attGeoState.address||'',lat:_attGeoState.lat||null,lng:_attGeoState.lng||null,
      photo:photo||''
    };
    const r=await sb('attendance_sessions','POST',{
      employee_id:emp._uuid||null,employee_name:emp.name,date:today,
      check_in:session.checkIn,location:session.location,
      latitude:session.lat,longitude:session.lng,
      photo:photo||null,
      company_id:currentCompany?currentCompany.company_id:'KSPL'
    });
    if(r&&r[0]) session._uuid=r[0].id;
    if(!D.attSessions) D.attSessions=[];
    D.attSessions.unshift(session);
    save();
    showToast(`✅ Checked IN at ${timeStr}${session.location?' — '+session.location:''}`, 'success');
  }
  navEmp('emp-attendance');
}

// Load attendance history from Supabase
async function loadAttHistory(){
  const emp=currentEmployee;
  const tbody=$('att-history-body');
  if(!tbody)return;
  const rows=await sb('attendance_sessions','GET',null,`?employee_name=eq.${encodeURIComponent(emp.name)}&order=check_in.desc&limit=30`);
  if(!rows||!rows.length){tbody.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:1rem;color:var(--muted)">No sessions yet</td></tr>`;return;}
  tbody.innerHTML=rows.map(r=>{

      <td style="padding-left:12px;font-size:12px">${r.date}</td>

async function startAttFaceScan(){
  const emp=currentEmployee;
  const s=$('att-scan-status');
  if(s){s.textContent='Loading your face data…';s.style.color='var(--muted)';}

  const faceData=await frLoadFaceFromSupabase(emp.email);
  if(!faceData){
    if(s){s.textContent='Face not found. Please enroll your face first.';s.style.color='#ef4444';}
    setTimeout(()=>navEmp('emp-attendance'),1500);
    return;
  }

  let _scanned=false;

  frStartCamera('att-scan-video','att-scan-canvas',result=>{
    const s=$('att-scan-status');
    if(!s||_scanned)return;
    if(result.type==='cam-error'){s.textContent=result.msg;s.style.color='#ef4444';}
    else if(result.type==='no-face'){s.textContent='No face detected — look at camera';s.style.color='var(--muted)';}
    else if(result.type==='detected'){
      s.textContent='🔍 Verifying your face…';s.style.color='#0f766e';
      const isMatch=frMatchSingleEmployee(result.descriptor, faceData.descriptor);
      if(isMatch){
        _scanned=true;
        // Capture and compress photo from video
        let photoDataUrl='';
        if(video){
          const canvas=document.createElement('canvas');
          // Reduce size significantly for Supabase storage
          canvas.width=80;
          canvas.height=60;
          canvas.getContext('2d').drawImage(video,0,0,80,60);
          photoDataUrl=canvas.toDataURL('image/jpeg',0.5); // Very compressed
        }
        frStopCamera();
        const now=new Date();
        const timeStr=now.toTimeString().slice(0,5);
        const today=todayStr();
        const activeSession=D.attSessions?D.attSessions.find(s=>s.empName===emp.name&&s.date===today&&!s.checkOut):null;

        s.textContent=activeSession?`✅ Face verified! Checking OUT at ${timeStr}…`:`✅ Face verified! Checking IN at ${timeStr}…`;
        s.style.color='#166534';

        // Show captured photo preview + confirm buttons
        const scanWrap=s.parentElement;
        if(scanWrap){
          const confirmDiv=document.createElement('div');
          confirmDiv.id='att-confirm-div';
          confirmDiv.style.cssText='margin-top:10px';
          confirmDiv.innerHTML=`
            ${photoDataUrl?`<div style="text-align:center;margin-bottom:10px">
              <img src="${photoDataUrl}" style="width:120px;height:90px;object-fit:cover;border-radius:10px;border:3px solid #0f766e">
              <div style="font-size:11px;color:var(--muted);margin-top:4px">Captured photo</div>
            </div>`:''}
            <div style="display:flex;gap:8px">
              <button class="btn btn-sec" style="flex:1" onclick="attRescan()">🔄 Rescan</button>
              <button class="btn btn-primary" style="flex:2;background:#0f766e" onclick="attConfirmScan('${timeStr}','${encodeURIComponent(photoDataUrl)}')">✅ Confirm ${activeSession?'Check Out':'Check In'}</button>
            </div>`;
          scanWrap.appendChild(confirmDiv);
        }
      } else {
        s.textContent='❌ Face not matching. Try again.';s.style.color='#ef4444';
        setTimeout(()=>{
          if(!_scanned&&$('att-scan-status'))$('att-scan-status').textContent='Look at the camera and hold still';
        },2000);
      }
    }
  });
}

function attRescan(){
  frStopCamera();
  const d=$('att-confirm-div');if(d)d.remove();
  const s=$('att-scan-status');
  if(s){s.textContent='Loading camera…';s.style.color='var(--muted)';}
  setTimeout(()=>startAttFaceScan(),500);
}

function renderLeaveCard(l){

  if(l.hrStatus==='Approved') hrState='approved';
  else if(l.hrStatus==='Rejected') hrState='rejected';

      </div>

        <div style="font-size:9px;margin-top:2px;color:#16a34a;font-weight:600">Submitted</div>

async function submitEmpLeave(){
  try{
    const emp=currentEmployee;
    if(!emp){ alert('Session lost. Please sign in again.'); return; }
    const from=$('lv-from').value,to=$('lv-to').value;
    if(!from||!to){ alert('Please pick both From and To dates'); return; }
    const days=Math.max(1,Math.round((new Date(to)-new Date(from))/86400000)+1);
    const type=$('lv-type').value;
    const reason=$('lv-reason').value||'—';
    const tlEmail=emp.teamLeadEmail||'';
    const requiresHr=days>2;

    const status = tlEmail ? 'Pending TL' : 'Pending HR';

    const lv={
      id:Date.now(),
      emp:emp.name,
      type, from, to, days, reason,
      status,
      tlEmail,
      tlStatus: tlEmail ? 'Pending' : '',
      tlActionAt: null,
      tlNote: '',
      hrStatus: '',
      hrActionAt: null,
      hrNote: '',
      requiresHr
    };
    D.leaves.unshift(lv);
    try{
      const saved=await sbSaveLeave(lv);
      if(saved && saved[0]) lv._uuid=saved[0].id;
    }catch(e){
      console.error('❌ sbSaveLeave failed:',e);
      // Keep local copy so user doesn't lose it
    }
    save();

    // Notify first approver (best-effort, never block)
    try{
      if(tlEmail){
        await sbSaveNotification({
          msg: `🏖 New leave request from ${emp.name} (${days} day${days>1?'s':''}, ${from} to ${to}) awaits your approval`,
          type:'info',
          to: tlEmail
        });
        const tl=D.employees.find(e=>e.email&&e.email.toLowerCase()===tlEmail.toLowerCase());
        if(tl) await sendApprovalEmail(tlEmail, tl.name, emp.name, type, from, to, days, reason, 'Team Lead');
      } else {
        const hrEmail = currentCompany?.admin_email || D.user.email;
        await sbSaveNotification({
          msg: `🏖 New leave request from ${emp.name} (${days} day${days>1?'s':''}, ${from} to ${to}) awaits your approval`,
          type:'info',
          to: hrEmail
        });
        if(hrEmail) await sendApprovalEmail(hrEmail, 'HR', emp.name, type, from, to, days, reason, 'HR');
      }
    }catch(e){ console.warn('leave notify failed:',e); }

    showToast(tlEmail ? `📤 Leave submitted. Awaiting TL approval.` : `📤 Leave submitted. Awaiting HR approval.`, 'success');
    navEmp('emp-leave');
  }catch(e){
    console.error('❌ submitEmpLeave crashed:',e);
    alert('Could not submit leave: ' + (e.message||e) + '\n\nOpen DevTools console for details.');
  }
}

// ─── PAYROLL ENGINE ───────────────────────────────────────────────
// Calculates payslip components from CTC using the company salary structure.
// All amounts in INR per month.
// Calculates payslip components from CTC using the company's salary structure.
// Target: Net Pay is ~84% of CTC (matches both ₹25K→₹21,200 and ₹55K→₹46,228 reference payslips)
// For higher CTCs (≥₹45K), MPP kicks in which keeps the ratio stable at scale.
function calcSalaryBreakdown(ctc){
  const c=parseFloat(ctc)||0;
  if(c<=0) return null;

  // Guard: CTC too low for this salary structure.
  // Fixed components (Conveyance 1,250 + Travel 1,600 = 2,850) + min deductions
  // (PF ₹1,800×2 + PT ₹200 = ₹3,800) = ₹6,650 floor just for fixed + deductions.
  // Plus Basic/HRA/LTA make this viable only above ~₹20,000 CTC.
  const MIN_VIABLE_CTC = 20000;
  if(c < MIN_VIABLE_CTC){
    return {
      ctc: c,
      basic:0, hra:0, lta:0, conveyance:0, travel:0, special:0, deputation:0,
      totalEarnings:0, gross:0,
      professionalTax:0, employeePf:0, employerPf:0, mpp:0, esic:0, otherDeduction:0,
      totalDeductions:0, netBeforeLop:0,
      _belowMinimum: true,
      _minRequired: MIN_VIABLE_CTC
    };
  }

  const basic = Math.round(c * 0.45);
  const hra = Math.round(basic * 0.40);
  const lta = Math.round(basic * 0.10);
  const conveyance = 1250;
  const travel = 1600;
  const deputation = 0;
  const professionalTax = 200;
  const esic = 0;
  const otherDeduction = 0;

  // PF: 12% of Basic, clamped between ₹1,800 (min) and ₹2,430 (max = 12% × ₹20,250)
  const pfBase = Math.max(15000, Math.min(basic, 20250));
  const employeePf = Math.round(pfBase * 0.12);
  const employerPf = Math.round(pfBase * 0.12);

  // MPP: activates when Basic ≥ ₹20,250 (i.e., CTC ≥ ₹45,000)
  // At higher CTCs, MPP scales to keep the Net/CTC ratio at ~84% (matches reference payslips)
  let mpp = 0;
  if(basic >= 20250){
    // Base MPP = 6.75% of CTC (matches ₹55K reference: 6.75% × 55,000 = ₹3,712)
    // For very high CTCs, scale MPP so total deductions keep Net around 84% of CTC
    const baseMpp = Math.floor(c * 0.0675);
    // Total target deductions to hit ~84% Net: CTC × 0.16 minus PT minus Employer PF contributed to Gross
    // Simpler: for CTC > 55K, scale MPP to match the reference ratio
    // At 55K: MPP = 3712 (6.75%). Above that, MPP absorbs the extra balancer.
    const targetNet = Math.round(c * 0.8405);
    const targetDeductions = c - targetNet;
    // MPP = target deductions - PT - both PFs
    const mppNeeded = targetDeductions - professionalTax - employeePf - employerPf;
    mpp = Math.max(baseMpp, mppNeeded);
  }

  // Special Allowance = balancer: CTC minus (everything else including MPP)
  const special = Math.max(0,
    c - basic - hra - lta - conveyance - travel - deputation
      - mpp - employeePf - employerPf - professionalTax - esic - otherDeduction
  );

  const totalEarnings = basic + hra + lta + conveyance + travel + special + deputation;
  const totalDeductions = professionalTax + employeePf + employerPf + mpp + esic + otherDeduction;
  // Net Pay equals Total Earnings (per reference payslip convention)
  const netBeforeLop = totalEarnings;

  return {
    ctc: c,
    basic, hra, lta, conveyance, travel, special, deputation,
    totalEarnings,
    gross: totalEarnings,
    professionalTax, employeePf, employerPf, mpp, esic, otherDeduction,
    totalDeductions,
    netBeforeLop
  };
}

// Count approved leaves for an employee in a given month (YYYY-MM)
function countLeaveDaysInMonth(empName, yearMonth){
  if(!D.leaves) return 0;
  const [year, month] = yearMonth.split('-').map(Number);
  const monthStart = new Date(year, month-1, 1);
  const monthEnd = new Date(year, month, 0); // last day of month
  let days=0;
  D.leaves.forEach(lv=>{
    if(lv.emp!==empName) return;
    if(lv.status!=='Approved') return;
    const from=new Date(lv.from), to=new Date(lv.to||lv.from);
    // Intersect [from,to] with [monthStart, monthEnd]
    const start = from < monthStart ? monthStart : from;
    const end = to > monthEnd ? monthEnd : to;
    if(end >= start){
      const d = Math.floor((end - start)/86400000) + 1;
      days += d;
    }
  });
  return days;
}

// Returns the paid leaves accrued per month based on admin settings (CL + EL).
// Defaults to 1 + 1 = 2/month if settings not configured.
function getPaidLeavesPerMonth(){
  const s=D.settings||{};
  const cl=parseFloat(s.clPerMonth);
  const el=parseFloat(s.elPerMonth);
  const perMonth=(isNaN(cl)?1:cl)+(isNaN(el)?1:el);
  return perMonth;
}

// Calculate paid-leave balance available for the given month.
// Accrues `getPaidLeavesPerMonth()` days/month starting from joining date. Cumulative.
function getPaidLeaveQuotaFor(emp, yearMonth){
  const perMonth=getPaidLeavesPerMonth();
  if(!emp.joined) return perMonth; // fallback if unknown join date
  const [y, m] = yearMonth.split('-').map(Number);
  const monthStart = new Date(y, m-1, 1);
  const joined = new Date(emp.joined);
  if(joined > monthStart){
    // Not yet employed during most of the month — no accrual
    if(joined.getFullYear()===y && joined.getMonth()===m-1) return perMonth; // joined this month: full quota
    return 0;
  }
  // Months completed from join date through the payslip month (inclusive)
  const joinY=joined.getFullYear(), joinM=joined.getMonth();
  const monthsElapsed = (y - joinY)*12 + (m-1 - joinM) + 1;
  return monthsElapsed * perMonth;
}

// Count paid leaves USED up to (but not including) the payslip month — i.e. those that already consumed balance
function getPaidLeaveUsedBefore(emp, yearMonth){
  if(!emp.joined) return 0;
  const [y, m] = yearMonth.split('-').map(Number);
  const monthStart = new Date(y, m-1, 1);
  if(!D.leaves) return 0;
  let used=0;
  D.leaves.forEach(lv=>{
    if(lv.emp!==emp.name) return;
    if(lv.status!=='Approved') return;
    const to=new Date(lv.to||lv.from);
    if(to < monthStart) used += (lv.days||0);
  });
  return used;
}

// Compute the full payslip including leave adjustments
function calcPayslip(emp, yearMonth){
  const breakdown = calcSalaryBreakdown(emp.salary||0);
  if(!breakdown) return null;
  const [y, m] = yearMonth.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();

  const leavesThisMonth = countLeaveDaysInMonth(emp.name, yearMonth);
  const quota = getPaidLeaveQuotaFor(emp, yearMonth);
  const usedBefore = getPaidLeaveUsedBefore(emp, yearMonth);
  const availablePaid = Math.max(0, quota - usedBefore);
  const paidUsedThisMonth = Math.min(leavesThisMonth, availablePaid);
  const lopDays = Math.max(0, leavesThisMonth - availablePaid);
  const perDaySalary = Math.round(breakdown.gross / daysInMonth);
  const lopDeduction = lopDays * perDaySalary;
  const daysWorked = daysInMonth - leavesThisMonth;
  const daysPaid = daysInMonth - lopDays;
  const carryForward = Math.max(0, availablePaid - paidUsedThisMonth);

  const netPay = breakdown.netBeforeLop - lopDeduction;

  // Leave balances to show on payslip — use the actual admin-configured CL and EL accrual rates
  const s=D.settings||{};
  const clPerMonth=parseFloat(s.clPerMonth);
  const elPerMonth=parseFloat(s.elPerMonth);
  const clRate=isNaN(clPerMonth)?1:clPerMonth;
  const elRate=isNaN(elPerMonth)?1:elPerMonth;

  // Months employed (same calc as quota)
  let monthsElapsed=1;
  if(emp.joined){
    const jd=new Date(emp.joined);
    const joinY=jd.getFullYear(), joinM=jd.getMonth();
    monthsElapsed=Math.max(1,(y-joinY)*12 + (m-1-joinM) + 1);
  }

  // CL balance: accrued − used
  const clAccrued = Math.floor(monthsElapsed * clRate);
  const clUsedBefore=(D.leaves||[]).filter(l=>l.emp===emp.name && (l.type==='Casual'||l.type==='CL') && l.status==='Approved' && new Date(l.to||l.from) < new Date(y, m-1, 1)).reduce((s,l)=>s+(l.days||0),0);
  const clUsedThis=(D.leaves||[]).filter(l=>l.emp===emp.name && (l.type==='Casual'||l.type==='CL') && l.status==='Approved' && (()=>{const t=new Date(l.to||l.from);return t.getFullYear()===y && t.getMonth()===m-1;})()).reduce((s,l)=>s+(l.days||0),0);
  const clBalance = Math.max(0, clAccrued - clUsedBefore - clUsedThis);

  // EL balance: accrued − used
  const elAccrued = Math.floor(monthsElapsed * elRate);
  const elUsedBefore = (D.leaves||[]).filter(l=>l.emp===emp.name && (l.type==='Earned'||l.type==='EL') && l.status==='Approved' && new Date(l.to||l.from) < new Date(y, m-1, 1)).reduce((s,l)=>s+(l.days||0),0);
  const elUsedThis = (D.leaves||[]).filter(l=>l.emp===emp.name && (l.type==='Earned'||l.type==='EL') && l.status==='Approved' && (()=>{const t=new Date(l.to||l.from);return t.getFullYear()===y && t.getMonth()===m-1;})()).reduce((s,l)=>s+(l.days||0),0);
  const elBalance = Math.max(0, elAccrued - elUsedBefore - elUsedThis);
  const tlBalance = clBalance + elBalance;

  return {
    ...breakdown,
    month: yearMonth,
    daysInMonth, daysWorked, daysPaid,
    leavesThisMonth, paidUsedThisMonth, lopDays, lopDeduction, perDaySalary, carryForward,
    quota, availablePaid,
    clBalance, elBalance, tlBalance,
    netPay: Math.max(0, netPay)
  };
}

function monthLabel(ym){
  const [y,m]=ym.split('-').map(Number);
  return new Date(y,m-1,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
}
function currentMonth(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
// Generate last 12 months as options
function last12Months(){
  const out=[]; const d=new Date();
  for(let i=0;i<12;i++){
    const y=d.getFullYear(), m=d.getMonth()+1;
    out.push(`${y}-${String(m).padStart(2,'0')}`);
    d.setMonth(d.getMonth()-1);
  }
  return out;
}

// ─── PROFILE SAVE HANDLERS ───────────────────────────────────────
// ─── PROFILE PHOTO CROPPER (move + zoom + circular crop) ─────────
let _cropper={img:null, scale:1, offsetX:0, offsetY:0, dragging:false, startX:0, startY:0, startOffX:0, startOffY:0, fileName:'photo.jpg'};

function openProfileCropper(file){
  if(!file) return;
  if(!['image/jpeg','image/png'].includes(file.type)){
    showToast('Only JPG or PNG files allowed','info');
    return;
  }
  _cropper.fileName = file.name || 'photo.jpg';
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      _cropper.img=img;
      _cropper.scale=1;
      _cropper.offsetX=0;
      _cropper.offsetY=0;
      showCropperModal();
      // Auto-fit on first show
      setTimeout(()=>fitImageToCircle(),50);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function showCropperModal(){
  let modal=$('pf-crop-modal');
  if(!modal){
    modal=document.createElement('div');
    modal.id='pf-crop-modal';
    modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:10000;display:flex;align-items:center;justify-content:center;padding:1rem;box-sizing:border-box';
    modal.innerHTML=`
      <div style="background:#fff;border-radius:14px;padding:1.25rem;width:calc(100% - 2rem);max-width:420px;max-height:92vh;overflow-y:auto;box-sizing:border-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <h3 style="margin:0;font-size:17px">✂️ Adjust your photo</h3>
          <button onclick="closeCropper()" style="background:none;border:none;font-size:26px;cursor:pointer;color:#64748b;padding:0;line-height:1">×</button>
        </div>
        <div style="position:relative;width:100%;aspect-ratio:1;background:#1e293b;border-radius:12px;overflow:hidden;touch-action:none" id="pf-crop-stage">
          <canvas id="pf-crop-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;cursor:grab"></canvas>
          <div style="position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 9999px rgba(0,0,0,.55);pointer-events:none"></div>
        </div>
        <div style="margin:14px 0">
          <label style="font-size:12px;color:var(--muted);font-weight:600">Zoom</label>
          <input type="range" id="pf-crop-zoom" min="0.5" max="3" step="0.05" value="1" style="width:100%;margin-top:4px">
        </div>
        <div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px">Drag the image to position · Use slider to zoom</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sec" style="flex:1;font-size:13px" onclick="closeCropper()">Cancel</button>
          <button class="btn btn-primary" style="flex:2;background:#0f766e;font-size:13px" onclick="applyCropAndUpload()">✅ Apply & Upload</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    bindCropperEvents();
  } else {
    modal.style.display='flex';
    const z=$('pf-crop-zoom'); if(z) z.value='1';
  }
}

function closeCropper(){
  const m=$('pf-crop-modal');
  if(m) m.style.display='none';
  _cropper.img=null;
}

function fitImageToCircle(){
  const canvas=$('pf-crop-canvas');
  if(!canvas||!_cropper.img) return;
  const stage=$('pf-crop-stage');
  const w=stage.clientWidth, h=stage.clientHeight;
  canvas.width=w; canvas.height=h;
  // Initial scale so the smaller image dimension fits the circle
  const img=_cropper.img;
  _cropper.scale = Math.max(w/img.width, h/img.height);
  _cropper.offsetX = (w - img.width*_cropper.scale)/2;
  _cropper.offsetY = (h - img.height*_cropper.scale)/2;
  const z=$('pf-crop-zoom'); if(z) z.value=_cropper.scale;
  z.min = (_cropper.scale*0.6).toFixed(3);
  z.max = (_cropper.scale*4).toFixed(3);
  drawCropper();
}

function drawCropper(){
  const canvas=$('pf-crop-canvas');
  if(!canvas||!_cropper.img) return;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#1e293b';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(_cropper.img, _cropper.offsetX, _cropper.offsetY,
    _cropper.img.width*_cropper.scale, _cropper.img.height*_cropper.scale);
}

function bindCropperEvents(){
  const canvas=$('pf-crop-canvas');
  const zoom=$('pf-crop-zoom');

  function onDown(e){
    _cropper.dragging=true;
    canvas.style.cursor='grabbing';
    const p=getPoint(e);
    _cropper.startX=p.x; _cropper.startY=p.y;
    _cropper.startOffX=_cropper.offsetX; _cropper.startOffY=_cropper.offsetY;
    e.preventDefault();
  }
  function onMove(e){
    if(!_cropper.dragging) return;
    const p=getPoint(e);
    _cropper.offsetX=_cropper.startOffX + (p.x - _cropper.startX);
    _cropper.offsetY=_cropper.startOffY + (p.y - _cropper.startY);
    drawCropper();
    e.preventDefault();
  }
  function onUp(){
    _cropper.dragging=false;
    canvas.style.cursor='grab';
  }
  function getPoint(e){
    const rect=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return {x: (t.clientX-rect.left)*(canvas.width/rect.width), y: (t.clientY-rect.top)*(canvas.height/rect.height)};
  }

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart', onDown, {passive:false});
  canvas.addEventListener('touchmove', onMove, {passive:false});
  canvas.addEventListener('touchend', onUp);

  zoom.addEventListener('input', e=>{
    if(!_cropper.img) return;
    const newScale=parseFloat(e.target.value);
    const canvas=$('pf-crop-canvas');
    // Zoom around center
    const cx=canvas.width/2, cy=canvas.height/2;
    const ratio=newScale/_cropper.scale;
    _cropper.offsetX = cx - (cx - _cropper.offsetX)*ratio;
    _cropper.offsetY = cy - (cy - _cropper.offsetY)*ratio;
    _cropper.scale=newScale;
    drawCropper();
  });
}

async function applyCropAndUpload(){
  if(!_cropper.img) return;
  // Extract the circular crop area as a square 512x512 JPEG
  const out=document.createElement('canvas');
  out.width=512; out.height=512;
  const ctx=out.getContext('2d');
  // Fill background
  ctx.fillStyle='#1e293b'; ctx.fillRect(0,0,512,512);
  // Draw image at scale, mapped from the cropper canvas to 512px output
  const stage=$('pf-crop-stage');
  const stageSize=stage.clientWidth; // square, so width=height
  const ratio=512/stageSize;
  ctx.drawImage(_cropper.img,
    _cropper.offsetX*ratio, _cropper.offsetY*ratio,
    _cropper.img.width*_cropper.scale*ratio,
    _cropper.img.height*_cropper.scale*ratio);
  // Convert to JPEG blob (compressed)
  out.toBlob(async blob=>{
    if(!blob){ showToast('Could not process image','info'); return; }
    // Wrap blob into a File so uploadProfilePhoto handles it normally
    const newFile=new File([blob], _cropper.fileName.replace(/\.(png|jpe?g)$/i,'.jpg'), {type:'image/jpeg'});
    closeCropper();
    await uploadProfilePhoto(newFile);
  }, 'image/jpeg', 0.9);
}

async function uploadProfilePhoto(file){
  const emp=currentEmployee;
  const msg=$('personal-msg');
  if(!file) return;
  if(!['image/jpeg','image/png'].includes(file.type)){
    if(msg)msg.innerHTML=`<div class="alert alert-e">Only JPG or PNG files allowed</div>`;
    return;
  }
  if(msg)msg.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">📤 Uploading photo…</div>`;
  try{
    const ext=file.name.split('.').pop().toLowerCase();
    const path=`profile-photos/${emp._uuid||emp.id}-${Date.now()}.${ext}`;
    const uploadRes=await fetch(`${SB_URL}/storage/v1/object/kyc-documents/${path}`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${SB_KEY}`,'apikey':SB_KEY,'Content-Type':file.type},
      body:file
    });
    if(!uploadRes.ok){
      const err=await uploadRes.text();
      if(msg)msg.innerHTML=`<div class="alert alert-e">Upload failed: ${err.substring(0,100)}</div>`;
      return;
    }
    // Get a long-lived signed URL (1 year)
    const signRes=await fetch(`${SB_URL}/storage/v1/object/sign/kyc-documents/${path}`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${SB_KEY}`,'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({expiresIn:31536000})
    });
    if(!signRes.ok){
      if(msg)msg.innerHTML=`<div class="alert alert-e">Could not generate URL</div>`;
      return;
    }
    const {signedURL}=await signRes.json();
    const fullUrl=`${SB_URL}/storage/v1${signedURL}`;
    // Save to employee record
    const r=await sb('employees','PATCH',{photo_url:fullUrl},`?id=eq.${emp._uuid}`);
    if(!r){
      if(msg)msg.innerHTML=`<div class="alert alert-e">Could not save photo URL</div>`;
      return;
    }
    emp.photoUrl=fullUrl;
    const idx=D.employees.findIndex(e=>e._uuid===emp._uuid);
    if(idx>=0) D.employees[idx]=emp;
    save();
    if(msg)msg.innerHTML=`<div class="alert alert-s">✅ Profile photo updated</div>`;
    showToast('✅ Photo uploaded','success');
    // Re-render profile tab
    navEmp('emp-profile');
  }catch(e){
    console.error('Photo upload error:',e);
    if(msg)msg.innerHTML=`<div class="alert alert-e">Upload failed: ${e.message}</div>`;
  }
}

async function handleKYCFileUpload(input, docType){
  const emp=currentEmployee;
  const msg=$('kyc-upload-msg');
  const file=input.files&&input.files[0];
  if(!file) return;

  // Show inline progress
  if(msg) msg.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">📤 Uploading ${file.name}… (${(file.size/1024).toFixed(0)} KB)</div>`;

  // Delete old file if replacing
  const oldPath=emp[docType+'FilePath'];
  if(oldPath) await deleteKYCFile(oldPath);

  const newPath=await uploadKYCFile(file, emp._uuid, docType);
  if(!newPath){
    if(msg) msg.innerHTML=`<div class="alert alert-e">Upload failed. Check file size (max 5 MB) and type (JPG/PNG/PDF).</div>`;
    input.value='';
    return;
  }

  // Update employee row with new path
  const patchCol=docType==='aadhaar'
    ? {aadhaar_file_path:newPath, aadhaar_file_name:file.name, aadhaar_uploaded_at:new Date().toISOString()}
    : {pan_file_path:newPath, pan_file_name:file.name, pan_uploaded_at:new Date().toISOString()};
  const r=await sb('employees','PATCH',patchCol,`?id=eq.${emp._uuid}`);
  if(!r){
    if(msg) msg.innerHTML=`<div class="alert alert-e">File uploaded but failed to save reference. Contact admin.</div>`;
    return;
  }

  // Update local
  emp[docType+'FilePath']=newPath;
  emp[docType+'FileName']=file.name;
  emp[docType+'UploadedAt']=new Date().toISOString();
  const idx=D.employees.findIndex(e=>e._uuid===emp._uuid); if(idx>=0) D.employees[idx]=emp;
  save();

  // Notify admin
  const docLabel=docType==='aadhaar'?'Aadhaar':'PAN';
  await sbSaveNotification({msg:`📎 ${emp.name} uploaded ${docLabel} document`,type:'info'});

  showToast(`✅ ${docLabel} uploaded`,'success');
  if(msg) msg.innerHTML=`<div class="alert alert-s">✅ ${docLabel} document uploaded successfully</div>`;
  setTimeout(()=>renderEmployeeApp(),800);
}

async function removeKYCFile(docType){
  const emp=currentEmployee;
  const docLabel=docType==='aadhaar'?'Aadhaar':'PAN';
  if(!confirm(`Remove the uploaded ${docLabel} document?\n\nThe file will be deleted permanently. You can upload a new one anytime.`)) return;

  const path=emp[docType+'FilePath'];
  if(path) await deleteKYCFile(path);

  const patchCol=docType==='aadhaar'
    ? {aadhaar_file_path:null, aadhaar_file_name:null, aadhaar_uploaded_at:null}
    : {pan_file_path:null, pan_file_name:null, pan_uploaded_at:null};
  await sb('employees','PATCH',patchCol,`?id=eq.${emp._uuid}`);

  emp[docType+'FilePath']='';
  emp[docType+'FileName']='';
  emp[docType+'UploadedAt']=null;
  const idx=D.employees.findIndex(e=>e._uuid===emp._uuid); if(idx>=0) D.employees[idx]=emp;
  save();

  showToast(`${docLabel} removed`,'info');
  renderEmployeeApp();
}

async function submitKYCRequest(){
  const emp=currentEmployee;
  const msg=$('kyc-edit-msg');
  const aadhaar=($('pf-aadhaar')||{}).value?.replace(/\s/g,'')||'';
  const pan=($('pf-pan')||{}).value?.trim()||'';

  if(!aadhaar&&!pan){if(msg)msg.innerHTML=`<div class="alert alert-e">Nothing to update</div>`;return;}
  if(aadhaar&&!/^\d{12}$/.test(aadhaar)){if(msg)msg.innerHTML=`<div class="alert alert-e">Aadhaar must be 12 digits</div>`;return;}
  if(pan&&!/^[A-Z]{5}[0-9]{4}[A-Z]$/.test(pan)){if(msg)msg.innerHTML=`<div class="alert alert-e">PAN format invalid (ABCDE1234F)</div>`;return;}
  if(aadhaar===emp.aadhaar&&pan===emp.pan){if(msg)msg.innerHTML=`<div class="alert alert-e">No changes detected</div>`;return;}

  // Duplicate checks
  if(aadhaar&&aadhaar!==emp.aadhaar){
    const dup=await sb('employees','GET',null,`?aadhaar_number=eq.${aadhaar}&id=neq.${emp._uuid}&select=id`);
    if(dup&&dup.length){if(msg)msg.innerHTML=`<div class="alert alert-e">This Aadhaar is already registered to another employee</div>`;return;}
  }
  if(pan&&pan!==emp.pan){
    const dup=await sb('employees','GET',null,`?pan_number=eq.${pan}&id=neq.${emp._uuid}&select=id`);
    if(dup&&dup.length){if(msg)msg.innerHTML=`<div class="alert alert-e">This PAN is already registered to another employee</div>`;return;}
  }

  if(msg)msg.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">Saving…</div>`;

  const payload={};
  if(aadhaar) payload.aadhaar_number=aadhaar;
  if(pan) payload.pan_number=pan;

  const r=await sb('employees','PATCH',payload,`?id=eq.${emp._uuid}`);
  if(!r){if(msg)msg.innerHTML=`<div class="alert alert-e">Save failed. Try again.</div>`;return;}

  if(aadhaar) emp.aadhaar=aadhaar;
  if(pan) emp.pan=pan;
  const idx=D.employees.findIndex(e=>e._uuid===emp._uuid); if(idx>=0) D.employees[idx]=emp;
  save();

  await sbSaveNotification({msg:`🪪 ${emp.name} updated their KYC details`,type:'info'});

  if(msg)msg.innerHTML=`<div class="alert alert-s">✅ KYC details saved</div>`;
  showToast('✅ KYC saved','success');
  setTimeout(()=>renderEmployeeApp(),800);
}

function getCelebrations(){
  const today=new Date();
  const todayM=today.getMonth()+1, todayD=today.getDate();
  const result={birthdays:[],welcome:[],sendoff:[],festivals:[]};

  // Birthdays — match month+day from DOB
  D.employees.forEach(e=>{
    if(!e.dob)return;
    try{
      const d=parseAnyDate(e.dob);
      if(!d)return;
      const dt=new Date(d);
      if(dt.getMonth()+1===todayM && dt.getDate()===todayD)
        result.birthdays.push(e);
    }catch(ex){}
  });

  // Welcome — joined today or within last 7 days
  D.employees.forEach(e=>{
    if(!e.joined)return;
    try{
      const d=parseAnyDate(e.joined);
      if(!d)return;
      const dt=new Date(d);
      const diff=(today-dt)/86400000;
      if(diff>=0 && diff<7) result.welcome.push({emp:e,days:Math.floor(diff)});
    }catch(ex){}
  });

  // Sendoff — Inactive employees (recently marked inactive)
  D.employees.forEach(e=>{
    if(e.status==='Inactive') result.sendoff.push(e);
  });

  // Festivals today or upcoming 7 days
  INDIAN_FESTIVALS.forEach(f=>{
    const fDate=new Date(today.getFullYear(),f.month-1,f.day);
    const diff=Math.floor((fDate-today)/86400000);
    if(diff>=0 && diff<=7) result.festivals.push({...f,daysAway:diff});
    // Also check if today
    if(f.month===todayM && f.day===todayD) {
      if(!result.festivals.find(x=>x.name===f.name))
        result.festivals.unshift({...f,daysAway:0});
    }
  });

  return result;
}

// Dismissed celebration IDs are stored per-day in localStorage so they don't reappear until tomorrow
function getDismissedCelebrations(){
  try{ return JSON.parse(localStorage.getItem('wf_dismissed_celebrations')||'{}'); }catch(e){ return {}; }
}
function setDismissedCelebrations(o){ localStorage.setItem('wf_dismissed_celebrations', JSON.stringify(o)); }
function isCelDismissed(key){
  const today=todayStr();
  const d=getDismissedCelebrations();
  return d[today]&&d[today].includes(key);
}
function dismissCelebration(key){
  const today=todayStr();
  const d=getDismissedCelebrations();
  // Clean up any old days
  Object.keys(d).forEach(k=>{if(k!==today) delete d[k];});
  if(!d[today]) d[today]=[];
  if(!d[today].includes(key)) d[today].push(key);
  setDismissedCelebrations(d);
  if(currentRole==='admin') nav(currentPage); else renderEmployeeApp();
}
function dismissAllCelebrations(){
  if(!confirm('Dismiss all celebrations for today?')) return;
  const today=todayStr();
  const d=getDismissedCelebrations();
  d[today]=['__all__'];
  setDismissedCelebrations(d);
  if(currentRole==='admin') nav(currentPage); else renderEmployeeApp();
}

async function wizHandleCSV(file){
  const msg=$('wiz-upload-msg');
  if(!file){return;}
  const ext=file.name.split('.').pop().toLowerCase();
  if(!['csv','xlsx','xls'].includes(ext)){
    if(msg)msg.innerHTML=`<div class="alert alert-e">Unsupported file type. Please upload CSV or Excel (.xlsx/.xls).</div>`;
    return;
  }
  if(file.size>5*1024*1024){
    if(msg)msg.innerHTML=`<div class="alert alert-e">File too large (max 5 MB).</div>`;
    return;
  }
  if(msg)msg.innerHTML=`<div class="alert" style="background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe">📤 Reading ${file.name}…</div>`;

  try{
    const text=await file.text();
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){
      if(msg)msg.innerHTML=`<div class="alert alert-e">File has no data rows. Please include at least one employee.</div>`;
      return;
    }
    const header=lines[0].split(',').map(h=>h.trim().toLowerCase());
    const col=(name)=>header.findIndex(h=>h.includes(name));
    const idxName=col('name'), idxEmail=col('email'), idxPhone=col('phone'), idxDob=col('birth')>=0?col('birth'):col('dob');
    const idxDept=col('department')>=0?col('department'):col('dept'), idxRole=col('role'), idxSalary=col('ctc')>=0?col('ctc'):col('salary');
    const idxJoined=col('joining')>=0?col('joining'):col('joined'), idxType=col('type');

    if(idxName<0||idxEmail<0){
      if(msg)msg.innerHTML=`<div class="alert alert-e">Missing required columns. Need at least <strong>Name</strong> and <strong>Email</strong>. Download the template for reference.</div>`;
      return;
    }

    const newEmployees=[], errors=[];
    for(let i=1;i<lines.length;i++){
      const cells=lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      const name=cells[idxName]||'';
      const email=cells[idxEmail]||'';
      if(!name||!email){ errors.push(`Row ${i+1}: missing name or email`); continue; }
      newEmployees.push({
        name, email,
        phone:idxPhone>=0?cells[idxPhone]:'',
        dob:idxDob>=0?cells[idxDob]:'',
        dept:idxDept>=0?cells[idxDept]||'Engineering':'Engineering',
        role:idxRole>=0?cells[idxRole]||'Employee':'Employee',
        salary:idxSalary>=0?parseInt(cells[idxSalary])||0:0,
        joined:idxJoined>=0?cells[idxJoined]||todayStr():todayStr(),
        empType:idxType>=0?(cells[idxType]||'office').toLowerCase():'office',
        status:'Active',
        passwordHash:'emp@123'
      });
    }

    if(!newEmployees.length){
      if(msg)msg.innerHTML=`<div class="alert alert-e">No valid rows found. ${errors.length?'Errors: '+errors.slice(0,3).join('; '):''}</div>`;
      return;
    }

    // Save each to Supabase
    let saved=0, skipped=0;
    for(const e of newEmployees){
      // Check duplicate by email
      const existing=D.employees.find(x=>x.email.toLowerCase()===e.email.toLowerCase());
      if(existing){ skipped++; continue; }
      const newId='EMP-'+String(D.employees.length+saved+101).padStart(3,'0');
      e.id=newId;
      D.employees.push(e);
      const r=await sbSaveEmployee(e);
      if(r&&r[0])e._uuid=r[0].id;
      saved++;
    }
    save();

    if(msg)msg.innerHTML=`<div class="alert alert-s">✅ Bulk import: <strong>${saved} employees added</strong>${skipped?`, ${skipped} skipped (duplicate email)`:''}${errors.length?`, ${errors.length} skipped (errors)`:''}</div>`;
    showToast(`✅ Imported ${saved} employees`,'success');
    await sbSaveNotification({msg:`📥 Bulk import: ${saved} employees added${skipped?`, ${skipped} skipped`:''}`,type:'success'});
  }catch(e){
    console.error('CSV parse error:',e);
    if(msg)msg.innerHTML=`<div class="alert alert-e">Could not read file: ${e.message}. Check the format and try again.</div>`;
  }
}

    const mq=!q||e.name.toLowerCase().includes(q)||e.email.toLowerCase().includes(q)||(e.dept||'').toLowerCase().includes(q)||(e.role||'').toLowerCase().includes(q)||(e.phone||'').includes(q);

    const ms=!s||e.status===s;
    const mr=!reg||(reg==='self'&&e.selfRegistered)||(reg==='admin'&&!e.selfRegistered);
    return mq&&md&&ms&&mr;
  });
}

function readCSVFile(file){
  if(!file.name.match(/\.(csv|txt)$/i)){
    if($('csv-file-preview'))$('csv-file-preview').innerHTML=`<span style="color:#991b1b">Please select a .csv file</span>`;
    return;
  }
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    const lines=text.trim().split('\n').filter(l=>l.trim());
    let dataLines=lines;
    if(lines[0].toLowerCase().includes('name')&&lines[0].toLowerCase().includes('email')) dataLines=lines.slice(1);
    if($('csv-file-preview'))$('csv-file-preview').innerHTML=`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px">✅ <strong>${file.name}</strong> loaded — <strong>${dataLines.length} employees</strong> found. Click "Import employees" to proceed.</div>`;

    // Store parsed text for importCSV to use
    window._csvRawText=text;
  };
  reader.readAsText(file);
}

function parseCSVLine(line){
  const result=[],re=/("([^"]*)"|([^,]*))(,|$)/g;
  let m;while((m=re.exec(line))!==null){result.push((m[2]!==undefined?m[2]:m[3]||'').trim());if(m[4]==='')break;}
  return result;
}
